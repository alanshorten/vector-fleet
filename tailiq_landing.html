<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TailiQ</title>

<style>
  :root{
    --navy-deep:#0B1622;
    --navy:#11202F;
    --navy-line: rgba(255,255,255,0.06);
    --ink:#EAEDF1;
    --ink-soft: rgba(234,237,241,0.62);
    --ink-faint: rgba(234,237,241,0.34);
    --accent-green:#3FA66B;
    --accent-red:#C2483F;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }

  body{
    background:
      radial-gradient(ellipse 900px 600px at 12% -8%, rgba(63,166,107,0.07), transparent 60%),
      radial-gradient(ellipse 900px 600px at 92% 108%, rgba(194,72,63,0.06), transparent 60%),
      var(--navy-deep);
    color:var(--ink);
    font-family: "Helvetica Neue", Arial, sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    padding: 6vh 6vw 4vh;
    overflow-x:hidden;
  }

  /* faint structural grid, evokes a spec/drawing sheet without being literal */
  .grid-overlay{
    position:fixed; inset:0;
    background-image:
      linear-gradient(var(--navy-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--navy-line) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 35%, black 0%, transparent 75%);
    pointer-events:none;
    opacity:0.5;
  }

  header{
    width:100%;
    display:flex;
    justify-content:flex-start;
    z-index:1;
    opacity:0;
    animation: fadeDown 0.9s ease-out 0.1s forwards;
  }

  .wordmark{
    height:34px;
    display:block;
    border-radius:3px;
  }

  main{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    max-width:880px;
    z-index:1;
    padding: 4vh 0;
  }

  h1{
    font-family: Georgia, "Times New Roman", serif;
    font-weight:400;
    font-size: clamp(2rem, 4.6vw, 3.4rem);
    line-height:1.22;
    letter-spacing:-0.01em;
    margin:0 0 22px;
    color:var(--ink);
    opacity:0;
    animation: fadeUp 1s ease-out 0.35s forwards;
  }

  .sub{
    font-size: clamp(0.95rem, 1.3vw, 1.1rem);
    color: var(--ink-soft);
    letter-spacing:0.01em;
    margin: 0 0 52px;
    font-weight:400;
    opacity:0;
    animation: fadeUp 1s ease-out 0.55s forwards;
  }

  form{
    display:flex;
    width:100%;
    max-width:440px;
    gap:10px;
    opacity:0;
    animation: fadeUp 1s ease-out 0.75s forwards;
  }

  input[type="email"]{
    flex:1;
    min-width:0;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.14);
    color: var(--ink);
    border-radius: 6px;
    padding: 14px 16px;
    font-size: 0.95rem;
    font-family: inherit;
    outline:none;
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  input[type="email"]::placeholder{ color: var(--ink-faint); }
  input[type="email"]:focus{
    border-color: rgba(63,166,107,0.55);
    background: rgba(255,255,255,0.045);
  }
  input[type="email"]:focus-visible{
    outline: 2px solid rgba(63,166,107,0.6);
    outline-offset:2px;
  }

  button{
    flex-shrink:0;
    background: var(--ink);
    color: var(--navy-deep);
    border:none;
    border-radius:6px;
    padding: 14px 22px;
    font-size: 0.95rem;
    font-weight:600;
    font-family: inherit;
    cursor:pointer;
    transition: transform 0.15s ease, background 0.2s ease;
  }
  button:hover{ background:#fff; }
  button:active{ transform: scale(0.97); }
  button:focus-visible{
    outline: 2px solid rgba(63,166,107,0.7);
    outline-offset:2px;
  }

  .confirm{
    font-size:0.92rem;
    color: var(--accent-green);
    margin-top:18px;
    height:18px;
    opacity:0;
    transition: opacity 0.4s ease;
  }
  .confirm.show{ opacity:1; }
  .confirm.error{ color:#dc2626; }

  footer{
    z-index:1;
    font-size:0.78rem;
    color: var(--ink-faint);
    letter-spacing:0.02em;
    opacity:0;
    animation: fadeUp 1s ease-out 1s forwards;
  }

  @keyframes fadeDown{
    from{ opacity:0; transform:translateY(-8px); }
    to{ opacity:1; transform:translateY(0); }
  }
  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
  }

  @media (prefers-reduced-motion: reduce){
    header, h1, .sub, form, footer{ animation:none !important; opacity:1 !important; }
  }

  @media (max-width: 520px){
    form{ flex-direction:column; }
    button{ width:100%; }
  }
</style>
</head>

      e.preventDefault();
      const msg = document.getElementById('confirm-msg');
      const emailInput = document.getElementById('email');
      const button = document.querySelector('#interest-form button[type="submit"]');
      const email = emailInput.value.trim();

      button.disabled = true;
      button.textContent = 'Sending...';

      fetch('/api/landing-interest', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email })
      })
      .then(function(response) {
        return response.json().then(function(data) {
          if (!response.ok) {
            throw new Error(data.error || 'Something went wrong.');
          }
          return data;
        });
      })
      .then(function() {
        msg.textContent = "Thank you — we'll be in touch.";
        msg.classList.remove('error');
        msg.classList.add('show');
        emailInput.value = '';
        setTimeout(() => msg.classList.remove('show'), 4000);
      })
      .catch(function(err) {
        msg.textContent = err.message || 'Something went wrong. Please try again.';
        msg.classList.add('show');
        msg.classList.add('error');
        setTimeout(() => { msg.classList.remove('show'); msg.classList.remove('error'); }, 4000);
      })
      .finally(function() {
        button.disabled = false;
        button.textContent = 'Stay informed';
      });
    });
  </script>

</body>
</html>
