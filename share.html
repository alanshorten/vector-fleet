<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VectorIQ — Shared Tech Spec</title>
<!-- Same pure-JS builders the main app uses — no React/Babel/Firebase needed
     for this page, since it only ever reads allowlisted data returned by
     the public /api/share/{token} function. -->
<script src="/calculations/llpCalculator.js"></script>
<script src="/calculations/techSpecBuilder.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Segoe UI',sans-serif;background:#0b1520;color:#e2e8f0;min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:32px 16px}
.center{display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;padding:24px}
.card{background:#111f30;border:1px solid #1e3048;border-radius:10px;padding:28px;max-width:420px}
.gold{color:#C9A84C;font-weight:700}
.muted{color:#7a9ab5;font-size:13px;margin-top:8px;line-height:1.6}
iframe{width:100%;border:none;background:#fff;border-radius:8px;min-height:80vh}
.bar{display:flex;gap:10px;align-items:center;margin-bottom:16px}
.btn{cursor:pointer;border:none;border-radius:6px;font-family:inherit;font-weight:700;font-size:13px;padding:8px 16px}
.btn-gold{background:#C9A84C;color:#0a1520}
.btn-gold:hover{background:#b8963d}
.spinner{width:28px;height:28px;border:3px solid #1e3048;border-top-color:#C9A84C;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root">
  <div class="center"><div><div class="spinner"></div><div class="muted">Loading shared tech spec…</div></div></div>
</div>
<script>
(async function(){
  const root = document.getElementById('root');

  function showError(message){
    root.innerHTML = '';
    const center = document.createElement('div');
    center.className = 'center';
    center.innerHTML = `
      <div class="card">
        <div class="gold" style="font-size:16px;margin-bottom:10px">VectorIQ</div>
        <div style="font-size:14px;font-weight:600">${message}</div>
        <div class="muted">If you believe this is a mistake, ask the sender for a fresh share link.</div>
      </div>`;
    root.appendChild(center);
  }

  // Path is /share/{token} (rewritten by vercel.json to /share.html?token={token}).
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  if (!token) { showError('Missing share link token.'); return; }

  let res;
  try {
    res = await fetch('/api/share/' + encodeURIComponent(token));
  } catch (e) {
    showError('Could not reach VectorIQ — check your connection and try again.');
    return;
  }

  if (!res.ok) {
    const map = { 404: 'This share link was not found.', 410: 'This share link has expired or been revoked.' };
    showError(map[res.status] || 'This share link could not be loaded.');
    return;
  }

  const { asset } = await res.json();

  // buildTechSpecHTML is the SAME function the authenticated app uses to
  // generate the printable tech spec — see /calculations/techSpecBuilder.js.
  const html = buildTechSpecHTML(asset, '', null);

  root.innerHTML = '';
  const bar = document.createElement('div');
  bar.className = 'wrap';
  bar.innerHTML = `
    <div class="bar">
      <span class="gold" style="flex:1;font-size:14px">VectorIQ — Shared Tech Spec (read-only)</span>
      <button class="btn btn-gold" id="printBtn">🖨 Print / Save PDF</button>
    </div>`;
  const iframeWrap = document.createElement('div');
  iframeWrap.className = 'wrap';
  iframeWrap.style.paddingTop = '0';
  const iframe = document.createElement('iframe');
  iframeWrap.appendChild(iframe);

  document.body.appendChild(bar);
  document.body.appendChild(iframeWrap);

  iframe.srcdoc = html;
  iframe.onload = () => {
    try { iframe.style.height = (iframe.contentWindow.document.body.scrollHeight + 40) + 'px'; } catch (e) {}
  };

  document.getElementById('printBtn').addEventListener('click', () => {
    try { iframe.contentWindow.print(); } catch (e) {}
  });
})();
</script>
</body>
</html>
