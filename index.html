async function uploadToCloudinary(file) {
  const cloudName = CLOUD_NAME();
  const uploadPreset = UPLOAD_PRESET();
  if (!cloudName || !uploadPreset) throw new Error('Cloudinary config not loaded yet — try again in a moment');
  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', uploadPreset);
  formData.append('folder', 'vector-fleet');
  const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
    method: 'POST',
    body: formData
  });
  if (!res.ok) throw new Error('Upload failed');
  const data = await res.json();
  return data.secure_url;
}


function LopaCropTool({asset,saveAsset,notify,onClose}){
  const[stage,setStage]=useState("upload"); // upload | pages | crop | saving
  const[file,setFile]=useState(null);
  const[pdfDoc,setPdfDoc]=useState(null);
  const[pageThumbs,setPageThumbs]=useState([]);
  const[selectedPage,setSelectedPage]=useState(1);
  const[pageImageUrl,setPageImageUrl]=useState(null);
  const[imgNatural,setImgNatural]=useState({w:0,h:0});
  const[crop,setCrop]=useState({x:40,y:40,w:300,h:200});
  const[dragMode,setDragMode]=useState(null); // null | "move" | "br" | "tl" etc
  const[dragStart,setDragStart]=useState(null);
  const[error,setError]=useState(null);
  const imgRef=useRef(null);
  const containerRef=useRef(null);

  const handleFile=async(e)=>{
    const f=e.target.files?.[0];
    if(!f)return;
    setFile(f);setError(null);
    const isPDF=f.type==="application/pdf";
    if(isPDF){
      if(!window.pdfjsLib){setError("PDF rendering library failed to load. Please refresh and try again.");return;}
      try{
        const buf=await f.arrayBuffer();
        const doc=await pdfjsLib.getDocument({data:buf}).promise;
        setPdfDoc(doc);
        if(doc.numPages===1){
          await renderPage(doc,1);
          setStage("crop");
        } else {
          const thumbs=[];
          for(let i=1;i<=doc.numPages;i++){
            const page=await doc.getPage(i);
            const viewport=page.getViewport({scale:0.3});
            const canvas=document.createElement("canvas");
            canvas.width=viewport.width;canvas.height=viewport.height;
            await page.render({canvasContext:canvas.getContext("2d"),viewport}).promise;
            thumbs.push({page:i,url:canvas.toDataURL()});
          }
          setPageThumbs(thumbs);
          setStage("pages");
        }
      }catch(err){setError("Could not read PDF: "+err.message);}
    } else if(f.type.startsWith("image/")){
      const url=URL.createObjectURL(f);
      setPageImageUrl(url);
      setStage("crop");
    } else {
      setError("Please upload a PDF or image file.");
    }
  };

  const renderPage=async(doc,pageNum)=>{
    const page=await doc.getPage(pageNum);
    const viewport=page.getViewport({scale:2});
    const canvas=document.createElement("canvas");
    canvas.width=viewport.width;canvas.height=viewport.height;
    await page.render({canvasContext:canvas.getContext("2d"),viewport}).promise;
    setPageImageUrl(canvas.toDataURL());
  };

  const choosePage=async(pageNum)=>{
    setSelectedPage(pageNum);
    await renderPage(pdfDoc,pageNum);
    setStage("crop");
  };

  const onImgLoad=()=>{
    const el=imgRef.current;
    if(!el)return;
    setImgNatural({w:el.naturalWidth,h:el.naturalHeight});
    // default crop box to 80% centered
    const dispW=el.clientWidth,dispH=el.clientHeight;
    setCrop({x:dispW*0.1,y:dispH*0.1,w:dispW*0.8,h:dispH*0.8});
  };

  const getRelPos=(e)=>{
    const rect=containerRef.current.getBoundingClientRect();
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    return{x:clientX-rect.left,y:clientY-rect.top};
  };

  const startDrag=(mode)=>(e)=>{
    e.preventDefault();e.stopPropagation();
    setDragMode(mode);
    setDragStart({...getRelPos(e),crop:{...crop}});
  };

  const onDrag=(e)=>{
    if(!dragMode||!dragStart)return;
    const pos=getRelPos(e);
    const dx=pos.x-dragStart.x,dy=pos.y-dragStart.y;
    const el=imgRef.current;
    const maxW=el.clientWidth,maxH=el.clientHeight;
    let{x,y,w,h}=dragStart.crop;
    if(dragMode==="move"){
      x=Math.max(0,Math.min(maxW-w,x+dx));
      y=Math.max(0,Math.min(maxH-h,y+dy));
    } else if(dragMode==="br"){
      w=Math.max(40,Math.min(maxW-x,w+dx));
      h=Math.max(40,Math.min(maxH-y,h+dy));
    } else if(dragMode==="tl"){
      const newX=Math.max(0,Math.min(x+w-40,x+dx));
      const newY=Math.max(0,Math.min(y+h-40,y+dy));
      w=w+(x-newX);h=h+(y-newY);x=newX;y=newY;
    }
    setCrop({x,y,w,h});
  };

  const endDrag=()=>{setDragMode(null);setDragStart(null);};

  const confirmCrop=async()=>{
    setStage("saving");
    try{
      const el=imgRef.current;
      const scaleX=el.naturalWidth/el.clientWidth;
      const scaleY=el.naturalHeight/el.clientHeight;
      const canvas=document.createElement("canvas");
      canvas.width=crop.w*scaleX;
      canvas.height=crop.h*scaleY;
      const ctx=canvas.getContext("2d");
      ctx.fillStyle="#fff";ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(el,crop.x*scaleX,crop.y*scaleY,crop.w*scaleX,crop.h*scaleY,0,0,canvas.width,canvas.height);
      const blob=await new Promise(res=>canvas.toBlob(res,"image/png"));
      const croppedFile=new File([blob],"lopa-crop.png",{type:"image/png"});
      const url=await uploadToCloudinary(croppedFile);
      const photos=(asset.photos||[]).filter(p=>p.label!=="LOPA");
      const updated=[...photos,{label:"LOPA",url,date:new Date().toISOString().split("T")[0]}];
      await saveAsset({...asset,photos:updated});
      notify("LOPA photo saved");
      onClose();
    }catch(err){
      setError("Failed to save crop: "+err.message);
      setStage("crop");
    }
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div className="card" style={{padding:20,maxWidth:900,width:"100%",maxHeight:"90vh",overflow:"auto",background:"#0b1520"}}>
        <div className="flj" style={{marginBottom:14}}>
          <div className="section-title" style={{margin:0}}>LOPA Crop Tool</div>
          <button className="btn btn-ghost" onClick={onClose}>✕ Close</button>
        </div>
        {error&&<div style={{color:"#f87171",fontSize:12,marginBottom:10}}>{error}</div>}

        {stage==="upload"&&(
          <div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:10}}>Upload the full LOPA file (PDF or image). You'll be able to pick a page and crop to just the cabin diagram.</div>
            <input type="file" accept=".pdf,image/*" onChange={handleFile}/>
          </div>
        )}

        {stage==="pages"&&(
          <div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:10}}>This PDF has multiple pages. Select the page with the cabin diagram.</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
              {pageThumbs.map(t=>(
                <div key={t.page} onClick={()=>choosePage(t.page)} style={{cursor:"pointer",border:"2px solid #1e3348",borderRadius:6,overflow:"hidden",width:140}}>
                  <img src={t.url} style={{width:"100%",display:"block"}}/>
                  <div style={{textAlign:"center",fontSize:11,color:"#94a3b8",padding:"4px 0",background:"#0d1925"}}>Page {t.page}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {stage==="crop"&&pageImageUrl&&(
          <div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:10}}>Drag the box to select just the cabin diagram. Drag corners to resize.</div>
            <div ref={containerRef} style={{position:"relative",display:"inline-block",maxWidth:"100%"}}
              onMouseMove={onDrag} onMouseUp={endDrag} onMouseLeave={endDrag}
              onTouchMove={onDrag} onTouchEnd={endDrag}>
              <img ref={imgRef} src={pageImageUrl} onLoad={onImgLoad} style={{maxWidth:"100%",display:"block",userSelect:"none"}} draggable={false}/>
              <div onMouseDown={startDrag("move")} onTouchStart={startDrag("move")}
                style={{position:"absolute",left:crop.x,top:crop.y,width:crop.w,height:crop.h,border:"2px solid #C9A84C",background:"rgba(201,168,76,0.15)",cursor:"move"}}>
                <div onMouseDown={startDrag("tl")} onTouchStart={startDrag("tl")} style={{position:"absolute",left:-6,top:-6,width:14,height:14,background:"#C9A84C",borderRadius:"50%",cursor:"nwse-resize"}}/>
                <div onMouseDown={startDrag("br")} onTouchStart={startDrag("br")} style={{position:"absolute",right:-6,bottom:-6,width:14,height:14,background:"#C9A84C",borderRadius:"50%",cursor:"nwse-resize"}}/>
              </div>
            </div>
            <div className="flab g8" style={{marginTop:14}}>
              <button className="btn btn-ghost" onClick={()=>{setStage("upload");setFile(null);setPageImageUrl(null);}}>Start Over</button>
              <button className="btn btn-gold" onClick={confirmCrop}>Save Crop as LOPA</button>
            </div>
          </div>
        )}

        {stage==="saving"&&<div style={{textAlign:"center",padding:30,color:"#64748b"}}>Saving crop...</div>}
      </div>
    </div>
  );
}

function PhotoManager({asset, saveAsset, notify, label="photos", field="photos"}) {
  const [uploading, setUploading] = useState(false);
  const [photoLabel, setPhotoLabel] = useState('Airframe');
  const [lopaToolOpen, setLopaToolOpen] = useState(false);
  const photos = asset[field] || [];

  const handleUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setUploading(true);
    try {
      const url = await uploadToCloudinary(file);
      const updated = [...photos, {label: photoLabel, url, date: new Date().toISOString().split('T')[0]}];
      await saveAsset({...asset, [field]: updated});
      notify(`${photoLabel} photo uploaded`);
    } catch(err) {
      notify('Upload failed: ' + err.message, 'error');
    }
    setUploading(false);
  };

  const deletePhoto = async (i) => {
    if (!confirm('Delete photo?')) return;
    const updated = photos.filter((_,idx) => idx !== i);
    await saveAsset({...asset, [field]: updated});
    notify('Photo deleted');
  };

  return (
    <div>
      <div className="flab g8" style={{marginBottom:12,flexWrap:'wrap'}}>
        <select value={photoLabel} onChange={e=>setPhotoLabel(e.target.value)} style={{width:160}}>
          {['Airframe','LOPA','Avionics','Cabin','Flight Deck','Passenger Seat','Galley G1','Galley G2','Galley G3','Engine','Landing Gear','Documents','Other'].map(l=>(
            <option key={l}>{l}</option>
          ))}
        </select>
        <label style={{cursor:'pointer'}}>
          <input type="file" accept="image/*" onChange={handleUpload} style={{display:'none'}}/>
          <span className="btn btn-primary" style={{padding:'7px 14px',fontSize:12}}>
            {uploading ? '⏳ Uploading…' : '+ Upload Photo'}
          </span>
        </label>
        <button className="btn btn-ghost" style={{padding:'7px 14px',fontSize:12}} onClick={()=>setLopaToolOpen(true)}>
          ✂️ Crop LOPA from File
        </button>
      </div>
      {lopaToolOpen&&<LopaCropTool asset={asset} saveAsset={saveAsset} notify={notify} onClose={()=>setLopaToolOpen(false)}/>}
      {photos.length === 0 && <div style={{color:'#475569',fontSize:12,fontStyle:'italic',padding:'8px 0'}}>No photos uploaded yet.</div>}
      <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
        {photos.map((p,i) => (
          <div key={i} style={{background:'#0d1925',borderRadius:6,overflow:'hidden',border:'1px solid #1e3348',width:120}}>
            <img src={p.url} alt={p.label} style={{width:'100%',height:70,objectFit:'cover',display:'block'}}/>
            <div style={{padding:'5px 7px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontSize:10,color:'#94a3b8',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:70}}>{p.label}</div>
              <button className="btn-danger btn" style={{fontSize:9,padding:'1px 5px'}} onClick={()=>deletePhoto(i)}>✕</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}


function CheckDateInput({val,onCommit,yrs}){
  const toDisplay=(s)=>{if(!s)return"";if(/^\d{2}\/\d{2}\/\d{4}$/.test(s))return s;try{const dt=new Date(s);if(isNaN(dt))return"";return String(dt.getDate()).padStart(2,"0")+"/"+String(dt.getMonth()+1).padStart(2,"0")+"/"+dt.getFullYear();}catch{return"";}};
  const toISO=(s)=>{const m=/^(\d{2})\/(\d{2})\/(\d{4})$/.exec(s);if(m)return m[3]+"-"+m[2]+"-"+m[1];return null;};
  const plus=(s,y)=>{const m=/^(\d{2})\/(\d{2})\/(\d{4})$/.exec(s);if(!m)return null;return m[1]+"/"+m[2]+"/"+(+m[3]+y);};
  const isoPlus=(isoStr,y)=>{if(!isoStr)return null;const dt=new Date(isoStr);if(isNaN(dt))return null;dt.setFullYear(dt.getFullYear()+y);return dt.toISOString().split("T")[0];};
  const[local,setLocal]=useState(toDisplay(val)||"");
  useEffect(()=>{setLocal(toDisplay(val)||"");},[val]);
  const fmt=(raw)=>{const n=raw.replace(/\D/g,"").slice(0,8);if(n.length<=2)return n;if(n.length<=4)return n.slice(0,2)+"/"+n.slice(2);return n.slice(0,2)+"/"+n.slice(2,4)+"/"+n.slice(4);};
  const handleChange=(raw)=>setLocal(fmt(raw));
  const handleBlur=()=>{
    const iso=toISO(local);
    if(iso){const nextISO=yrs?isoPlus(iso,yrs):null;onCommit(iso,nextISO);}
    else if(!local){onCommit("",null);}
  };
  return<input type="text" placeholder="DDMMYYYY" value={local} onChange={e=>handleChange(e.target.value)} onBlur={handleBlur} style={{width:130}}/>;
}


function SpecsQuickImport({asset,saveAsset,notify,open}){
  const[file,setFile]=useState(null);
  const[extracting,setExtracting]=useState(false);
  const[error,setError]=useState(null);
  const[extracted,setExtracted]=useState(null);

  const handleFile=e=>{const f=e.target.files?.[0];if(f){setFile(f);setExtracted(null);setError(null);}};

  const extract=async()=>{
    if(!file)return;
    const isPDF=file.type==="application/pdf";
    const isExcel=file.type==="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"||file.type==="application/vnd.ms-excel"||file.name.endsWith(".xlsx")||file.name.endsWith(".xls");
    const isImage=file.type.startsWith("image/");
    if(!isPDF&&!isExcel&&!isImage){setError("Unsupported file type. Please upload a PDF, Excel file, or image/screenshot.");return;}
    if(file.size>10*1024*1024){setError("File is too large (maximum 10 MB).");return;}
    setExtracting(true);setError(null);
    try{
      const prompt="Extract aircraft specification data from this document or image. Only extract fields that are clearly present — do not guess or invent values. Return ONLY valid JSON, no markdown:\n{\"dom\":\"MM/YYYY string or null\",\"operator\":\"string or null\",\"weights\":{\"mtow\":number_or_null,\"mtow_lb\":number_or_null,\"mtw\":number_or_null,\"mtw_lb\":number_or_null,\"mzfw\":number_or_null,\"mzfw_lb\":number_or_null,\"mlw\":number_or_null,\"mlw_lb\":number_or_null},\"checks\":[{\"name\":\"e.g. 2 Year Check, 6 Year Check or 12 Year Check\",\"lastDate\":\"DD/MM/YYYY or null\",\"lastFH\":number_or_null,\"lastFC\":number_or_null,\"nextDate\":\"DD/MM/YYYY or null\"}],\"specs\":{\"config\":\"string or null\",\"seatConfig\":\"string or null\",\"seatMfr\":\"string or null\",\"seatPN\":\"string or null\",\"attendantSeats\":\"string or null\",\"galleys\":\"string or null\",\"lavs\":\"string or null\",\"cargoType\":\"string or null\",\"winglets\":\"string or null\",\"adsb\":true_false_or_null,\"cpdlc\":true_false_or_null,\"tcas\":true_false_or_null,\"cdss\":true_false_or_null,\"rfdd\":true_false_or_null,\"qar\":true_false_or_null,\"modeS\":true_false_or_null,\"efb\":true_false_or_null}}";
      let resp;
      if(isPDF){
        const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej(new Error("Could not read the file."));r.readAsDataURL(file);});
        resp=await fetch("/api/extract",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:2000,messages:[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}},{type:"text",text:prompt}]}]})});
      } else if(isImage){
        const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej(new Error("Could not read the file."));r.readAsDataURL(file);});
        resp=await fetch("/api/extract",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:2000,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type,data:base64}},{type:"text",text:prompt}]}]})});
      } else {
        const arrayBuffer=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(new Error("Could not read the file."));r.readAsArrayBuffer(file);});
        let csvText;
        try{
          const wb=XLSX.read(new Uint8Array(arrayBuffer),{type:"array"});
          csvText=wb.SheetNames.map(name=>"Sheet: "+name+"\n"+XLSX.utils.sheet_to_csv(wb.Sheets[name],{skipHidden:true})).join("\n\n");
        }catch(xlsxErr){throw new Error("Could not parse the Excel file.");}
        resp=await fetch("/api/extract",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:2000,messages:[{role:"user",content:[{type:"text",text:"The following is the contents of an Excel spreadsheet exported as CSV.\n\n"+csvText+"\n\n"+prompt}]}]})});
      }
      if(!resp.ok)throw new Error("Extraction request failed (error "+resp.status+"). Please try again.");
      const result=await resp.json();
      if(result.error)throw new Error("Extraction failed. Please check the file and try again.");
      let parsed;
      try{
        const rawParsed=result.ok?result.data:JSON.parse((result.raw||"").replace(/```json|```/g,"").trim());
        parsed=Array.isArray(rawParsed)?rawParsed[rawParsed.length-1]:rawParsed;
      }catch(parseErr){throw new Error("Could not extract structured data from this file. Try a clearer image or a different file.");}
      setExtracted(parsed);
    }catch(err){
      setError(err.message||"Extraction failed.");
    }
    setExtracting(false);
  };

  const fieldList=()=>{
    if(!extracted)return[];
    const list=[];
    if(extracted.dom)list.push(["Date of Manufacture (Overview)","dom",extracted.dom]);
    if(extracted.operator)list.push(["Current Operator (Overview)","operator",extracted.operator]);
    const w=extracted.weights||{};
    [["mtow","MTOW (kg)"],["mtow_lb","MTOW (lb)"],["mtw","Max Taxi (kg)"],["mtw_lb","Max Taxi (lb)"],["mzfw","MZFW (kg)"],["mzfw_lb","MZFW (lb)"],["mlw","MLW (kg)"],["mlw_lb","MLW (lb)"]].forEach(([k,l])=>{
      if(w[k]!=null)list.push([l,"weights."+k,w[k]]);
    });
    (extracted.checks||[]).forEach((c,i)=>{
      if(c.lastDate)list.push([c.name+" — Last Date","checks."+i+".lastDate",c.lastDate]);
      if(c.lastFH!=null)list.push([c.name+" — Last TSN","checks."+i+".lastFH",c.lastFH]);
      if(c.lastFC!=null)list.push([c.name+" — Last CSN","checks."+i+".lastFC",c.lastFC]);
      if(c.nextDate)list.push([c.name+" — Next Due","checks."+i+".nextDate",c.nextDate]);
    });
    const s=extracted.specs||{};
    [["config","Configuration"],["seatConfig","Passenger Seating Config"],["seatMfr","Passenger Seating Manufacturer"],["seatPN","Passenger Seats P/N"],["attendantSeats","Attendant Seats"],["galleys","Galleys"],["lavs","Lavatories"],["cargoType","Cargo Type"],["winglets","Winglets"]].forEach(([k,l])=>{
      if(s[k])list.push([l,"specs."+k,s[k]]);
    });
    [["adsb","ADS-B"],["cpdlc","CPDLC"],["tcas","TCAS 7.1"],["cdss","Cockpit Door Surveillance System"],["rfdd","Reinforced Flight Deck Door"],["qar","QAR"],["modeS","Enhanced Mode-S"],["efb","Electronic Flight Bag"]].forEach(([k,l])=>{
      if(s[k]!=null)list.push([l,"specs."+k,s[k]?"Installed":"Not Installed"]);
    });
    return list;
  };

  const normalizeDate=(s)=>{
    if(!s)return s;
    // Already ISO
    if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
    // DD/MM/YYYY -> ISO
    const m=/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/.exec(s);
    if(m)return m[3]+"-"+m[2].padStart(2,"0")+"-"+m[1].padStart(2,"0");
    // Try generic Date parse as last resort, only if it produces a valid date
    const dt=new Date(s);
    if(!isNaN(dt))return dt.toISOString().split("T")[0];
    return null; // unparseable - don't write garbage
  };

  const applyAll=async()=>{
    const f=JSON.parse(JSON.stringify(asset));
    if(extracted.dom)f.dom=extracted.dom;
    if(extracted.operator)f.operator=extracted.operator;
    const w=extracted.weights||{};
    if(!f.weights)f.weights={};
    Object.keys(w).forEach(k=>{if(w[k]!=null)f.weights[k]=w[k];});
    if(extracted.checks?.length){
      if(!f.checks||!f.checks.length)f.checks=extracted.checks.map(c=>({name:c.name,lastDate:"",lastFH:0,lastFC:0,nextDate:""}));
      extracted.checks.forEach((ec,i)=>{
        let target=f.checks.find(fc=>fc.name===ec.name)||f.checks[i];
        if(!target)return;
        if(ec.lastDate){const norm=normalizeDate(ec.lastDate);if(norm)target.lastDate=norm;}
        if(ec.lastFH!=null)target.lastFH=ec.lastFH;
        if(ec.lastFC!=null)target.lastFC=ec.lastFC;
        if(ec.nextDate){const norm=normalizeDate(ec.nextDate);if(norm)target.nextDate=norm;}
      });
    }
    const s=extracted.specs||{};
    if(!f.specs)f.specs={};
    Object.keys(s).forEach(k=>{if(s[k]!=null)f.specs[k]=s[k];});
    await saveAsset(f);
    notify("Specs data imported");
    setExtracted(null);setFile(null);
  };

  return(
    <div className="card" style={{padding:16,marginBottom:16,gridColumn:"1/-1"}}>
      {open&&<div>
        <div style={{fontSize:11,color:"#64748b",marginBottom:10}}>Upload a tech spec PDF, Excel sheet, or screenshot. Claude will extract Date of Manufacture, Operator, Weights, Check History, and Specifications fields for review before saving. Engines, APU, and Landing Gear are not covered here — use their dedicated uploaders.</div>
        <div className="flab g8" style={{marginBottom:10}}>
          <input type="file" accept=".pdf,.xlsx,.xls,image/*" onChange={handleFile}/>
          <button className="btn btn-primary" disabled={!file||extracting} onClick={extract}>{extracting?"Extracting...":"Extract"}</button>
        </div>
        {error&&<div style={{color:"#f87171",fontSize:12,marginBottom:10}}>{error}</div>}
        {extracted&&(()=>{
          const w=extracted.weights||{};
          const hasWeights=["mtow","mtw","mzfw","mlw"].some(k=>w[k]!=null||w[k+"_lb"]!=null);
          const checks=extracted.checks||[];
          const s=extracted.specs||{};
          const overviewRows=[];
          if(extracted.dom)overviewRows.push(["Date of Manufacture",extracted.dom]);
          if(extracted.operator)overviewRows.push(["Current Operator",extracted.operator]);
          const specRows=[];
          [["config","Configuration"],["seatConfig","Passenger Seating Config"],["seatMfr","Passenger Seating Manufacturer"],["seatPN","Passenger Seats P/N"],["attendantSeats","Attendant Seats"],["galleys","Galleys"],["lavs","Lavatories"],["cargoType","Cargo Type"],["winglets","Winglets"]].forEach(([k,l])=>{
            if(s[k])specRows.push([l,s[k]]);
          });
          [["adsb","ADS-B"],["cpdlc","CPDLC"],["tcas","TCAS 7.1"],["cdss","Cockpit Door Surveillance System"],["rfdd","Reinforced Flight Deck Door"],["qar","QAR"],["modeS","Enhanced Mode-S"],["efb","Electronic Flight Bag"]].forEach(([k,l])=>{
            if(s[k]!=null)specRows.push([l,s[k]?"Installed":"Not Installed"]);
          });
          const nothingFound=!overviewRows.length&&!hasWeights&&!checks.length&&!specRows.length;
          return(
            <div style={{background:"#0d1925",borderRadius:6,padding:12}}>
              <div style={{fontSize:11,fontWeight:700,color:"#C9A84C",textTransform:"uppercase",marginBottom:10}}>Detected Fields — Review Before Saving</div>
              {nothingFound?<div style={{color:"#475569",fontStyle:"italic",fontSize:12}}>No recognisable fields found in this file.</div>:(
              <div className="grid2" style={{gap:12}}>
                {overviewRows.length>0&&<div className="card" style={{padding:12,gridColumn:"1/-1"}}>
                  <div className="section-title">Overview</div>
                  <table><tbody>{overviewRows.map(([l,v],i)=>(<tr key={i}><td style={{color:"#64748b"}}>{l}</td><td style={{fontWeight:600}}>{v}</td></tr>))}</tbody></table>
                </div>}
                {hasWeights&&<div className="card" style={{padding:12}}>
                  <div className="section-title">Operating Weights</div>
                  <table><thead><tr><th>Parameter</th><th>kg</th><th>lb</th></tr></thead><tbody>
                    {[["MTOW","mtow","mtow_lb"],["Max Taxi","mtw","mtw_lb"],["MZFW","mzfw","mzfw_lb"],["MLW","mlw","mlw_lb"]].map(([l,k,klb])=>(
                      (w[k]!=null||w[klb]!=null)?<tr key={k}><td style={{color:"#64748b"}}>{l}</td><td>{w[k]!=null?w[k].toLocaleString():"—"}</td><td style={{color:"#475569"}}>{w[klb]!=null?w[klb].toLocaleString():"—"}</td></tr>:null
                    ))}
                  </tbody></table>
                </div>}
                {specRows.length>0&&<div className="card" style={{padding:12}}>
                  <div className="section-title">Specifications</div>
                  <table><tbody>{specRows.map(([l,v],i)=>(<tr key={i}><td style={{color:"#64748b"}}>{l}</td><td style={{fontWeight:600}}>{v}</td></tr>))}</tbody></table>
                </div>}
                {checks.length>0&&<div className="card" style={{padding:12,gridColumn:"1/-1"}}>
                  <div className="section-title">Check History</div>
                  <table><thead><tr><th>Check</th><th>Last Date</th><th>Last TSN</th><th>Last CSN</th><th>Next Due</th></tr></thead><tbody>
                    {checks.map((c,i)=>(<tr key={i}><td style={{fontWeight:600,color:"#94a3b8"}}>{c.name}</td><td>{c.lastDate||"—"}</td><td style={{fontFamily:"monospace"}}>{c.lastFH!=null?c.lastFH.toLocaleString():"—"}</td><td style={{fontFamily:"monospace"}}>{c.lastFC!=null?c.lastFC.toLocaleString():"—"}</td><td style={{fontWeight:700,color:"#34d399"}}>{c.nextDate||"—"}</td></tr>))}
                  </tbody></table>
                </div>}
              </div>
              )}
              {!nothingFound&&<div className="flab g8" style={{marginTop:12}}>
                <button className="btn btn-ghost" onClick={()=>{setExtracted(null);setFile(null);}}>Discard</button>
                <button className="btn btn-gold" onClick={applyAll}>Confirm &amp; Save All</button>
              </div>}
            </div>
          );
        })()}
      </div>}
    </div>
  );
}

function EngineSNAction({change,prevEngines,mergedAsset,saveAsset,notify}){
  const[mode,setMode]=useState(null); // null | "atshop" | "resolved"
  const[form,setForm]=useState(null);
  const idx=change.position-1;
  const prevEng=prevEngines[idx]||{};
  const isReturn=!!(prevEng.atShop&&prevEng.titleEngine&&prevEng.titleEngine.sn===change.newSN);
  if(mode==="resolved")return<div style={{fontSize:12,color:"#34d399",marginBottom:6}}>✓ Engine {change.position} S/N change resolved</div>;
  const startAtShop=()=>{setForm({tsn:fmtHHMM(prevEng.currentFH),csn:prevEng.currentFC||"",date:"",reason:""});setMode("atshop");};
  const doAtShop=async()=>{
    const newEngines=JSON.parse(JSON.stringify(mergedAsset.engines||[]));
    newEngines[idx]={...newEngines[idx],atShop:true,titleEngine:{sn:change.previousSN,type:prevEng.type||"",thrust:prevEng.thrust||"",currentFH:parseHHMM(form.tsn),currentFC:+form.csn||0,removedDate:form.date,reason:form.reason}};
    await saveAsset({...mergedAsset,engines:newEngines});
    notify(`Engine ${change.position} marked at shop visit`);
    setMode("resolved");
  };
  const doPermanent=async()=>{
    if(prevEng.atShop){
      const newEngines=JSON.parse(JSON.stringify(mergedAsset.engines||[]));
      newEngines[idx]={...newEngines[idx],atShop:false,titleEngine:null};
      await saveAsset({...mergedAsset,engines:newEngines});
    }
    notify(`Engine ${change.position} S/N change confirmed permanent`);
    setMode("resolved");
  };
  const doReturned=async()=>{
    const newEngines=JSON.parse(JSON.stringify(mergedAsset.engines||[]));
    newEngines[idx]={...newEngines[idx],atShop:false,titleEngine:null};
    await saveAsset({...mergedAsset,engines:newEngines});
    notify(`Engine ${change.position} confirmed returned to service`);
    setMode("resolved");
  };
  return(
    <div style={{background:"#1a1306",border:"1px solid #92660a",borderRadius:6,padding:"8px 10px",marginBottom:8}}>
      <div style={{fontSize:12,color:"#fcd34d",marginBottom:6}}>⚠ Engine {change.position} S/N change: was {change.previousSN}, now {change.newSN}</div>
      {mode==="atshop"?(
        <div style={{marginTop:6}}>
          <div className="grid3" style={{gap:6,marginBottom:8}}>
            <div><label className="form-label">TSN at Removal (HH:MM)</label><input value={form.tsn} onChange={e=>setForm({...form,tsn:e.target.value})}/></div>
            <div><label className="form-label">CSN at Removal</label><input type="number" value={form.csn} onChange={e=>setForm({...form,csn:e.target.value})}/></div>
            <div><label className="form-label">Removal Date</label><input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/></div>
            <div style={{gridColumn:"1/-1"}}><label className="form-label">Reason (optional)</label><input value={form.reason} onChange={e=>setForm({...form,reason:e.target.value})}/></div>
          </div>
          <div className="flab g8">
            <button className="btn btn-ghost" onClick={()=>setMode(null)}>Cancel</button>
            <button className="btn btn-gold" onClick={doAtShop}>Confirm At Shop</button>
          </div>
        </div>
      ):(
        <div className="flab g8">
          {isReturn&&<button className="btn btn-gold" style={{fontSize:11,padding:"4px 10px"}} onClick={doReturned}>✓ Engine Returned</button>}
          <button className="btn btn-primary" style={{fontSize:11,padding:"4px 10px"}} onClick={startAtShop}>🔧 At Shop</button>
          <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={doPermanent}>Permanent</button>
        </div>
      )}
    </div>
  );
}

function UploadView({assets,saveAsset,notify}){
  const[uploadType,setUploadType]=useState("util");
  const[file,setFile]=useState(null);
  const[extracting,setExtracting]=useState(false);
  const[extracted,setExtracted]=useState(null);
  const[error,setError]=useState(null);
  const[done,setDone]=useState(false);
  const[saving,setSaving]=useState(false);
  const[matchedAsset,setMatchedAsset]=useState(null);
  const[instructions,setInstructions]=useState("");
  const[showInstructions,setShowInstructions]=useState(false);

  const handleFile=e=>{const f=e.target.files?.[0];if(f){setFile(f);setExtracted(null);setError(null);setDone(false);}};

const extract=async()=>{
    if(!file)return;
    const isPDF=file.type==="application/pdf";
    const isExcel=file.type==="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"||file.type==="application/vnd.ms-excel"||file.name.endsWith(".xlsx")||file.name.endsWith(".xls");
    if(!isPDF&&!isExcel){setError("Unsupported file type. Please upload a PDF or Excel (.xlsx / .xls) file.");return;}
    if(file.size>10*1024*1024){setError("File is too large (maximum 10 MB). Please check you have selected the correct file.");return;}
    setExtracting(true);setError(null);
    try{
      const basePrompt=uploadType==="llp"
        ?"Extract engine LLP data from this document. Process each section (FAN, HPC, HPT, LPT) separately. For each LLP row, read left to right: first the LLP DESCRIPTION (e.g. FAN DISK, BOOSTER SPOOL, FAN SHAFT — each row has a unique description, do not repeat), then PART NUMBER, then SERIAL NUMBER. The remaining cycles value is in the RIGHTMOST column group labelled REMAINING CYCLES — identify the engine variant sub-column from the engine type at the top of the document (e.g. CFM56-5B4/P = use 5B4/P sub-column). Each data row corresponds to exactly one description row — match them by row position. Exclude rows where remaining cycles is N/L, N/A, or non-numeric — this includes cells that mix a number with extra wording (e.g. \"2290 to insp. (non LLP)\" is non-numeric and must be excluded, not read as 2290). All TSN and FH values must be formatted as HH:MM strings. You may reason through the table section by section before answering. Once you have finished reasoning, output the final result as a single fenced code block starting with ```json and ending with ``` — this fenced block must contain ONLY the JSON object below and nothing else inside the fences:\n{\"msn\":\"string\",\"registration\":\"string\",\"engines\":[{\"position\":\"LH or RH\",\"esn\":\"string\",\"engine_type\":\"string\",\"variant\":\"string\",\"csn\":number,\"tsn\":number,\"llps\":[{\"desc\":\"string\",\"pn\":\"string\",\"sn\":\"string\",\"fc_remaining\":number}]}]}"
        :uploadType==="apu_llp"
        ?"Extract APU LLP data ONLY from this document. The APU serial number is labelled SERIAL NUMBER. The fc_remaining value for each LLP must come from the RESIDUAL LIFE - CYS column, not the TOTAL LIFE column. Return ONLY valid JSON, no markdown:\n{\"msn\":\"string or null if not present\",\"registration\":\"string or null if not present\",\"apu\":{\"sn\":\"string\",\"csn\":number,\"llps\":[{\"desc\":\"string\",\"pn\":\"string\",\"sn\":\"string\",\"fc_remaining\":number}]}}"
       :"Extract ALL data from this aircraft utilisation report. This report has separate columns for ENGINE Position 1, ENGINE Position 2, and APU — they are three distinct components, each with their own S/N, TSN, CSN, and FH/FC figures. Do not confuse the APU column with an engine position. If this report includes a dedicated Landing Gear section with a TOTAL HOURS or TOTAL HOURS & CYCLES figure per leg (separate from the routine CSN column), populate total_fh/total_fc for that leg from those ground-truth totals — most reports do not have this section, in which case leave total_fh/total_fc null. Some aircraft only have data for ONE engine position in this report — the single engine may be reported under EITHER Position 1 OR Position 2, so check both columns rather than assuming Position 1 is always populated. Whichever position column is blank or absent, set that entire engine value to null (either \"engine1\" or \"engine2\", whichever is blank) — do not copy APU figures or any other column into a blank engine position, and do not invent placeholder values. All TSN and FH values must be formatted as HH:MM strings. Return ONLY valid JSON, no markdown:\n{\"month_year\":\"e.g. May 2026\",\"operator\":\"string\",\"msn\":\"string\",\"registration\":\"string\",\"airframe\":{\"fh_period\":\"HH:MM\",\"fc_period\":number,\"tsn\":\"HH:MM\",\"csn\":number},\"engine1\":{\"model\":\"string\",\"sn\":\"string\",\"tsn\":\"HH:MM\",\"csn\":number,\"fh_period\":\"HH:MM\",\"fc_period\":number} or null if Position 1 is blank in the report,\"engine2\":{\"model\":\"string\",\"sn\":\"string\",\"tsn\":\"HH:MM\",\"csn\":number,\"fh_period\":\"HH:MM\",\"fc_period\":number} or null if Position 2 is blank in the report,\"apu\":{\"sn\":\"string\",\"tsn\":\"HH:MM\",\"csn\":number},\"landing_gear\":{\"nose\":{\"pn\":\"string\",\"sn\":\"string\",\"csn\":number,\"total_fh\":\"HH:MM or null\",\"total_fc\":\"number or null\"},\"left\":{\"pn\":\"string\",\"sn\":\"string\",\"csn\":number,\"total_fh\":\"HH:MM or null\",\"total_fc\":\"number or null\"},\"right\":{\"pn\":\"string\",\"sn\":\"string\",\"csn\":number,\"total_fh\":\"HH:MM or null\",\"total_fc\":\"number or null\"}},\"removals\":[{\"component\":\"engine or landing_gear or apu\",\"sn\":\"string\",\"position\":\"string\",\"date\":\"string\",\"reason\":\"string\",\"tsn_at_removal\":\"HH:MM\",\"csn_at_removal\":number,\"mro\":\"string\"}]}"
      const prompt=instructions?basePrompt+" Additional instructions: "+instructions:basePrompt;
      // LLP sheets are dense, repetitive tables — use Sonnet for stronger table-tracking accuracy.
      // Everything else (utilisation reports, APU LLP, specs import) stays on Haiku.
      const extractModel=uploadType==="llp"?"claude-sonnet-4-6":"claude-haiku-4-5-20251001";
      let resp;
      if(isPDF){
        const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej(new Error("Could not read the file. Please try again."));r.readAsDataURL(file);});
        resp=await fetch("/api/extract",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:extractModel,max_tokens:4000,messages:[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}},{type:"text",text:prompt}]}]})});
      } else {
        const arrayBuffer=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(new Error("Could not read the file. Please try again."));r.readAsArrayBuffer(file);});
        let csvText;
        try{
          const wb=XLSX.read(new Uint8Array(arrayBuffer),{type:"array"});
          csvText=wb.SheetNames.map(name=>"Sheet: "+name+"\n"+XLSX.utils.sheet_to_csv(wb.Sheets[name],{skipHidden:true})).join("\n\n");
        }catch(xlsxErr){
          throw new Error("Could not parse the Excel file. Please check the file is not corrupted and try again.");
        }
        resp=await fetch("/api/extract",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:extractModel,max_tokens:4000,messages:[{role:"user",content:[{type:"text",text:"The following is the contents of an Excel spreadsheet exported as CSV. This is the most recent month's data.\n\n"+csvText+"\n\n"+prompt}]}]})});
      }
      if(!resp.ok){
        const status=resp.status;
        if(status===401||status===403)throw new Error("Authentication error with the AI service. Please contact your administrator.");
        if(status===429)throw new Error("Too many requests — please wait a moment and try again.");
        if(status>=500)throw new Error("The extraction service is temporarily unavailable. Please try again in a few minutes.");
        throw new Error("Extraction request failed (error "+status+"). Please try again.");
      }
      let result;
      try{result=await resp.json();}catch(jsonErr){throw new Error("Received an unexpected response from the server. Please try again.");}
      if(result.error){
        const msg=result.error;
        if(msg.includes("credit")||msg.includes("billing"))throw new Error("AI service billing issue — please contact your administrator.");
        if(msg.includes("overloaded")||msg.includes("capacity"))throw new Error("The AI service is busy right now. Please wait a moment and try again.");
        throw new Error("Extraction failed. Please check the file is a valid report and try again.");
      }
      let parsed;
      try{
      const rawParsed=result.ok?result.data:JSON.parse((result.raw||"").replace(/```json|```/g,"").trim());
  parsed=Array.isArray(rawParsed)?rawParsed[rawParsed.length-1]:rawParsed;
}catch(parseErr){
        throw new Error("The AI could not extract structured data from this file. Check it is the correct report type, or try adding specific instructions above.");
      }
      
      setExtracted({parsed,fileName:file.name});
    }catch(err){
      const msg=err.message||"";
      if(msg.startsWith("{")||msg.includes('"error"')){
        setError("Extraction failed. Please check the file is a valid report and try again.");
      } else {
        setError(msg);
      }
    }
    setExtracting(false);
  };

  const confirmSave=async()=>{
    setSaving(true);
    try{
      const d=extracted.parsed;
      const msn=d.msn?.toString().replace(/^0+/,"");
      const previousAsset=assets.find(a=>a.msn?.toString().replace(/^0+/,"")===msn)||null;

      const result=window.processUtilisationReport({newReport:d,previousAsset});

      if(result.historyOnly){
        // Out-of-order / duplicate-period upload: per product decision, this is
        // saved into history only and must never overwrite live asset state.
        await db.saveUtilisation(result.utilisationRecord);
        setExtracted(prev=>({...prev,warnings:result.warnings}));
        setDone(true);
        return;
      }

      await saveAsset(result.mergedAsset);
      await db.saveUtilisation(result.utilisationRecord);

      if(result.isNewAsset){
        setDone(true);notify(`MSN ${msn} created from ${d.month_year} report`);return;
      }

      if(result.warnings.length){
        setExtracted(prev=>({...prev,warnings:result.warnings,snChanges:result.snChanges,prevEngines:previousAsset.engines||[],mergedAsset:result.mergedAsset}));
        setDone(true);
      } else {
        setDone(true);
        notify(`MSN ${msn} updated for ${d.month_year}`);
      }
    }catch(err){
      setError("Save failed: "+(err.message||"please try again.")+" Your data has not been lost — Discard and re-upload if needed.");
    }finally{
      setSaving(false);
    }
  };

  const confirmLLP=async()=>{
    setSaving(true);
    try{
      const d=extracted.parsed;
      const msn=d.msn?.toString().replace(/^0+/,"");
      let asset=assets.find(a=>a.msn?.toString().replace(/^0+/,"")===msn);
      if(!asset){
        const esnList=(d.engines||[]).map(e=>e.esn).filter(Boolean);
        if(esnList.length){asset=assets.find(a=>(a.engines||[]).some(e=>esnList.includes(e.sn)));}
      }
      if(!asset&&d.apu?.sn){asset=assets.find(a=>a.apu?.sn&&a.apu.sn===d.apu.sn);}
      if(!asset){setError("Could not match this LLP sheet to any aircraft. Check the file contains a recognisable MSN, engine S/N, or APU S/N.");return;}
      setMatchedAsset(asset);
      // Handle engine LLPs
      const engines=JSON.parse(JSON.stringify(asset.engines||[]));
      (d.engines||[]).forEach(eng=>{
        if(!eng.esn)return;
        const matchIdx=(asset.engines||[]).findIndex(e=>e.sn===eng.esn);
        if(matchIdx===-1)return;
        const idx=matchIdx;
        if(engines[idx]){
          engines[idx].sn=eng.esn||engines[idx].sn;
          engines[idx].type=eng.engine_type||engines[idx].type;
          const refCSN=eng.csn||0;
          engines[idx].llps=(eng.llps||[]).map(l=>({desc:l.desc,pn:l.pn,sn:l.sn,startFCRem:l.fc_remaining,refFC:refCSN}));
        }
      });

      // Handle APU LLPs
      let apu=JSON.parse(JSON.stringify(asset.apu||{}));
      if(d.apu?.llps?.length){
        const refCSN=d.apu.csn||0;
        if(d.apu.sn)apu.sn=d.apu.sn;
        // If no currentFC yet, initialise from LLP sheet CSN
        if(!apu.currentFC&&d.apu.csn)apu.currentFC=d.apu.csn;
        apu.llps=(d.apu.llps||[]).map(l=>({desc:l.desc,pn:l.pn,sn:l.sn,startFCRem:l.fc_remaining,refFC:refCSN}));
      }

      const hasEngines=(d.engines||[]).length>0;
      const hasAPU=d.apu?.llps?.length>0;

      await saveAsset({...asset,engines,apu});
      setDone(true);
      notify(`LLP data saved for MSN ${msn}${hasEngines&&hasAPU?" (engines + APU)":hasAPU?" (APU)":""}`);
    }catch(err){
      setError("Save failed: "+(err.message||"please try again.")+" Your data has not been lost — Discard and re-upload if needed.");
    }finally{
      setSaving(false);
    }

          <div style={{fontSize:12,color:"#475569"}}>{uploadType==="util"?"PDF or Excel (.xlsx)":uploadType==="llp"?"Engine LLP Status Sheet (PDF)":"APU LLP Status Sheet (PDF)"}</div>

          <div style={{marginTop:14,display:"flex",flexDirection:"column",gap:8,alignItems:"center",width:"100%"}}>
            {!showInstructions
              ?<button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>setShowInstructions(true)}>+ Add specific instructions for Claude</button>
              :<div style={{width:"100%",maxWidth:500}}>
                <textarea value={instructions} onChange={e=>setInstructions(e.target.value)}
                  placeholder={uploadType==="llp"?"e.g. Use the 5B4/P column, or use the green highlighted column":uploadType==="apu_llp"?"e.g. APU model is GTCP131-9A, use the corresponding limit column":"e.g. Use position 1 engine data only"}
                  style={{width:"100%",minHeight:70,fontSize:12,resize:"vertical",marginBottom:6}}/>
                <button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>{setShowInstructions(false);setInstructions("");}}>✕ Clear instructions</button>

            <button className="btn btn-gold" onClick={extract} disabled={extracting}>{extracting?"Extracting…":"Extract with AI"}</button>

      {extracting&&<div className="card" style={{padding:32,textAlign:"center"}}><div style={{width:32,height:32,border:"3px solid #C9A84C",borderTop:"3px solid transparent",borderRadius:"50%",animation:"spin 1s linear infinite",margin:"0 auto 14px"}}/><p style={{color:"#94a3b8"}}>Reading document…</p></div>}
      {error&&<div style={{background:"#2a0e0e",border:"1px solid #7f1d1d",borderRadius:8,padding:14,color:"#f87171",marginBottom:14,fontSize:13}}>⚠ {error}</div>}
      {extracted&&!done&&(
        <div className="card" style={{padding:20}}>
          <div className="section-title">Extracted Data — Review Before Saving</div>
          {(uploadType==="llp"||uploadType==="apu_llp")?(
            <div style={{marginTop:14}}>
              <div className="grid2" style={{gap:8,marginBottom:12}}>
                {[["MSN",extracted.parsed.msn||asset?.msn||"Matched by ESN/APU S/N"],["Registration",extracted.parsed.registration||asset?.registration||"—"]].map(([l,v])=>(
                  <div key={l} style={{background:"#0d1925",borderRadius:6,padding:"8px 10px"}}>
                    <div style={{fontSize:9,color:"#475569"}}>{l}</div>
                    <div style={{fontSize:13,fontWeight:600,color:"#f1f5f9"}}>{v?.toString()||"—"}</div>
                  </div>
                ))}
              </div>
              {(extracted.parsed.engines||[]).map((eng,i)=>(
               <div key={i} style={{background:"#0d1925",borderRadius:8,padding:12,marginBottom:10}}>
<div style={{fontSize:10,fontWeight:700,color:"#C9A84C",textTransform:"uppercase",marginBottom:8}}>{eng.position} Engine — ESN {eng.esn} · {eng.llps?.length||0} LLPs</div>
<div className="flab g8" style={{marginBottom:8,alignItems:"center"}}><label className="form-label" style={{margin:0,whiteSpace:"nowrap"}}>Ref CSN (edit if OCR wrong):</label><input type="number" defaultValue={eng.csn} style={{width:120,padding:"4px 8px",fontSize:12}} onChange={e=>{const val=+e.target.value;setExtracted(prev=>{const d=JSON.parse(JSON.stringify(prev));d.parsed.engines[i].csn=val;return d;});}}/></div>
<table style={{fontSize:11}}><thead><tr><th>Description</th><th>P/N</th><th>S/N</th><th>FC Remaining</th></tr></thead><tbody>{(eng.llps||[]).map((l,j)=>{const col=l.fc_remaining<1000?"#f87171":l.fc_remaining<3000?"#fbbf24":"#34d399";return <tr key={j}><td>{l.desc}</td><td style={{fontFamily:"monospace",fontSize:10}}>{l.pn}</td><td style={{fontFamily:"monospace",fontSize:10}}>{l.sn}</td><td style={{fontWeight:700,color:col}}>{l.fc_remaining?.toLocaleString()}</td></tr>;})}</tbody></table>
</div>
                  
              ))}
              {extracted.parsed.apu?.llps?.length>0&&(
                <div style={{background:"#0d1925",borderRadius:8,padding:12,marginBottom:10}}>
<div style={{fontSize:10,fontWeight:700,color:"#C9A84C",textTransform:"uppercase",marginBottom:8}}>APU — S/N {extracted.parsed.apu.sn||"—"} · {extracted.parsed.apu.llps.length} LLPs</div>
<div className="flab g8" style={{marginBottom:8,alignItems:"center"}}><label className="form-label" style={{margin:0,whiteSpace:"nowrap"}}>Ref CSN (edit if OCR wrong):</label><input type="number" defaultValue={extracted.parsed.apu.csn} style={{width:120,padding:"4px 8px",fontSize:12}} onChange={e=>{const val=+e.target.value;setExtracted(prev=>{const d=JSON.parse(JSON.stringify(prev));d.parsed.apu.csn=val;return d;});}}/></div>
<table style={{fontSize:11}}><thead><tr><th>Description</th><th>P/N</th><th>S/N</th><th>FC Remaining</th></tr></thead><tbody>{extracted.parsed.apu.llps.map((l,j)=>{const col=l.fc_remaining<1000?"#f87171":l.fc_remaining<3000?"#fbbf24":"#34d399";return <tr key={j}><td>{l.desc}</td><td style={{fontFamily:"monospace",fontSize:10}}>{l.pn}</td><td style={{fontFamily:"monospace",fontSize:10}}>{l.sn}</td><td style={{fontWeight:700,color:col}}>{l.fc_remaining?.toLocaleString()}</td></tr>;})} </tbody></table>
</div>
              )}
            </div>
          ):(
            <div className="grid2" style={{marginTop:14,gap:12}}>
              <div style={{background:"#0d1925",borderRadius:8,padding:12}}>
                <div style={{fontSize:10,fontWeight:700,color:"#C9A84C",textTransform:"uppercase",marginBottom:8}}>Airframe</div>
                {[["MSN",extracted.parsed.msn||matchedAsset?.msn||"—"],["Registration",extracted.parsed.registration||matchedAsset?.registration||"—"],["Matched Aircraft",matchedAsset?`MSN ${matchedAsset.msn} — ${matchedAsset.registration||"—"}`:"Not yet matched"]].map(([l,v])=>(
                  <div key={l} className="flj" style={{padding:"4px 0",borderBottom:"1px solid #1e3048"}}><span style={{fontSize:11,color:"#475569"}}>{l}</span><span style={{fontSize:12,fontWeight:700,color:"#f1f5f9"}}>{v?.toString()||"—"}</span></div>
                ))}
              </div>
              <div style={{background:"#0d1925",borderRadius:8,padding:12}}>
                <div style={{fontSize:10,fontWeight:700,color:"#C9A84C",textTransform:"uppercase",marginBottom:8}}>Engines & APU</div>
                {(()=>{
                  const msn=(extracted.parsed.msn||"").toString().replace(/^0+/,"");
                  const prev=assets.find(a=>a.msn?.toString().replace(/^0+/,"")===msn);
                  const rows=[
                    ["Eng 1 S/N",extracted.parsed.engine1?.sn,prev?.engines?.[0]?.sn,false,true],
                    ["Eng 1 TSN",extracted.parsed.engine1?.tsn,prev?.engines?.[0]?.currentFH?fmtHHMM(prev.engines[0].currentFH):null,false,false],
                    ["Eng 1 CSN",extracted.parsed.engine1?.csn,prev?.engines?.[0]?.currentFC,true,false],
                    ["Eng 2 S/N",extracted.parsed.engine2?.sn,prev?.engines?.[1]?.sn,false,true],
                    ["Eng 2 TSN",extracted.parsed.engine2?.tsn,prev?.engines?.[1]?.currentFH?fmtHHMM(prev.engines[1].currentFH):null,false,false],
                    ["Eng 2 CSN",extracted.parsed.engine2?.csn,prev?.engines?.[1]?.currentFC,true,false],
                    ["APU S/N",extracted.parsed.apu?.sn,prev?.apu?.sn,false,true],
                    ["APU TSN",extracted.parsed.apu?.tsn,prev?.apu?.currentFH?fmtHHMM(prev.apu.currentFH):null,false,false],
                    ["APU CSN",extracted.parsed.apu?.csn,prev?.apu?.currentFC,true,false]
                  ];
                  return rows.map(([l,v,prevV,isNum,isSN])=>{
                    const changed=isSN&&prevV&&v&&String(v)!==String(prevV);
                    const delta=isNum&&v&&prevV?v-prevV:null;
                    const deltaCol=delta===null?"#475569":delta<0?"#f87171":delta>500?"#fbbf24":"#34d399";
                    return<div key={l} className="flj" style={{padding:"5px 6px",borderBottom:"1px solid #1e3048",background:changed?"#2a1400":"transparent",borderRadius:3}}>
                      <span style={{fontSize:11,color:"#5a7a9a"}}>{l}</span>
                      <div style={{textAlign:"right"}}>
                        <span style={{fontSize:12,fontWeight:700,color:changed?"#fbbf24":"#f1f5f9"}}>{v?.toString()||"—"}</span>
                        {changed&&<span style={{fontSize:10,color:"#f87171",marginLeft:6}}>⚠ changed</span>}
                        {delta!==null&&<span style={{fontSize:10,color:deltaCol,marginLeft:6}}>{delta>0?"+":""}{delta}</span>}
                      </div>
                    </div>;
                  });
                })()}
              </div>
              {!saving&&(()=>{
                const msn=(extracted.parsed.msn||"").toString().replace(/^0+/,"");
                const prev=assets.find(a=>a.msn?.toString().replace(/^0+/,"")===msn)||null;
                if(!prev)return null;
                // Use Brain 1's actual verdict so this banner can never disagree
                // with what Confirm & Save is about to do. Gated on !saving above:
                // once a save is in flight, `assets` can update mid-save (saveAsset
                // triggers loadAssets internally), which would otherwise make this
                // preview compare the just-saved asset against itself and falsely
                // read as out-of-order/mismatch for one render. Freezing here avoids
                // that flash; the done-view replaces this panel moments later anyway.
                const preview=window.processUtilisationReport({newReport:extracted.parsed,previousAsset:prev});
                const dc=preview.deltaCheck;
                if(dc.status==="first_report")return null;
                const isProblem=dc.status==="mismatch"||dc.status==="out_of_order"||dc.status==="period_unparseable";
                const isInfo=dc.status==="gap_detected"||dc.status==="same_month_merge";
                const bg=isProblem?"#2a0e0e":isInfo?"#2a1f0a":"#0d2818";
                const border=isProblem?"#7f1d1d":isInfo?"#92660a":"#166534";
                const fg=isProblem?"#f87171":isInfo?"#fbbf24":"#34d399";
                const headline=dc.status==="out_of_order"
                  ?"⚠ Out-of-order upload — this period predates the asset's current data. Will be saved to history only; live state will not change."
                  :dc.status==="mismatch"
                  ?"⚠ Delta mismatch — check report figures"
                  :dc.status==="period_unparseable"
                  ?`⚠ Could not read reporting period (${extracted.parsed.month_year||"blank"} vs ${prev._lastPeriod||"blank"}) — gap could not be determined. Will be saved to history only; live state will not change. Correct the period and re-upload to apply this report.`
                  :dc.status==="same_month_merge"
                  ?"ℹ Same-month merge — this report updates additional fields for a period already on file. Existing data not covered by this report (e.g. a different engine or APU) will be kept, not overwritten."
                  :dc.status==="gap_detected"
                  ?`⚠ Gap detected — ${dc.monthsGap} months since last report. Tolerance widened accordingly.`
                  :"✓ Delta verified — period figures match report";
                // Gap info must show whenever monthsGap>1, regardless of which
                // status "won" above. Previously this was status==="gap_detected"
                // only, which silently hid the gap whenever a mismatch (or any
                // other status) took priority in deltaStatus — even though the
                // gap was real and the widened tolerance was actually applied.
                const showGapLine=dc.monthsGap!==null&&dc.monthsGap>1&&dc.status!=="gap_detected";
                return<div style={{gridColumn:"1/-1",background:bg,border:`1px solid ${border}`,borderRadius:6,padding:"8px 12px"}}>
                  <div style={{fontSize:11,fontWeight:700,color:fg}}>{headline}</div>
                  {showGapLine&&<div style={{fontSize:11,fontWeight:700,color:"#fbbf24",marginTop:4}}>
                    ⚠ Also: gap detected — {dc.monthsGap} months since last report. Delta tolerance was widened accordingly before checking the figures above.
                  </div>}
                  {dc.fc.calc!==null&&<div style={{fontSize:10,color:"#64748b",marginTop:2}}>
                    FC delta: {dc.fc.calc} · Period FC: {dc.fc.reported??"—"} {dc.fc.match===false?"⚠":dc.fc.match===true?"✓":""}
                  </div>}
                  {dc.fh.calc!==null&&<div style={{fontSize:10,color:"#64748b"}}>
                    FH delta: {fmtHHMM(dc.fh.calc)} · Period FH: {extracted.parsed.airframe?.fh_period||"—"} {dc.fh.match===false?"⚠":dc.fh.match===true?"✓":""}
                  </div>}
                </div>;
              })()}
            </div>
          )}
          <div className="flj" style={{marginTop:16,paddingTop:14,borderTop:"1px solid #1e3048"}}>
            <button className="btn btn-ghost" disabled={saving} onClick={()=>{setExtracted(null);setFile(null);}}>Discard</button>
            <button className="btn btn-gold" disabled={saving} onClick={uploadType==="util"?confirmSave:confirmLLP}>{saving?"Saving…":"✓ Confirm & Save"}</button>
          </div>
        </div>
      )}
      {done&&(
        <div style={{background:"#0d2818",border:"1px solid #166534",borderRadius:8,padding:24,textAlign:"center"}}>
          <div style={{fontSize:36,marginBottom:8}}>✅</div>
          <div style={{fontWeight:700,color:"#34d399",fontSize:16,marginBottom:10}}>Saved successfully</div>
          {extracted?.warnings?.length>0&&(
            <div style={{background:"#2a1f0a",border:"1px solid #78350f",borderRadius:6,padding:12,marginBottom:14,textAlign:"left"}}>
              <div style={{fontSize:11,fontWeight:700,color:"#fbbf24",marginBottom:6}}>⚠ Flags to review:</div>
              {(extracted.snChanges||[]).filter(c=>c.component==="engine").map((c,i)=>(
                <EngineSNAction key={"eng"+i} change={c} prevEngines={extracted.prevEngines||[]} mergedAsset={extracted.mergedAsset} saveAsset={saveAsset} notify={notify}/>
              ))}
              {extracted.warnings.filter(w=>!/^⚠ Engine \d+ S\/N change:/.test(w)).map((w,i)=>(
                <div key={i} style={{fontSize:12,color:"#fcd34d",marginBottom:4,lineHeight:1.5}}>{w}</div>
              ))}
            </div>
          )}
          <button className="btn btn-ghost" onClick={()=>{setFile(null);setExtracted(null);setDone(false);}}>Upload Another</button>
        </div>
      )}
    </div>
  );
}


function LogoSettings({notify}) {
  const [logoUrl, setLogoUrl] = useState(null);
  const [width, setWidth] = useState(200);
  const [uploading, setUploading] = useState(false);
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    db.getSetting('tech_spec_logo_url').then(v => { if(v) setLogoUrl(v); });
    db.getSetting('tech_spec_logo_width').then(v => { if(v) setWidth(v); });
  }, []);

  const handleUpload = async (file) => {
    if (!file) return;
    setUploading(true);
    try {
      const url = await uploadToCloudinary(file);
      await db.setSetting('tech_spec_logo_url', url);
      setLogoUrl(url);
      notify('Logo updated');
    } catch(err) {
      notify('Upload failed: ' + err.message, 'error');
    }
    setUploading(false);
  };

  const commitWidth = async (w) => {
    setWidth(w);
    setSaving(true);
    try {
      await db.setSetting('tech_spec_logo_width', w);
    } catch(err) {
      notify('Failed to save size: ' + err.message, 'error');
    }
    setSaving(false);
  };

  const resetToDefault = async () => {
    setUploading(true);
    try {
      await db.setSetting('tech_spec_logo_url', null);
      setLogoUrl(null);
      notify('Reverted to default Maverick Horizon logo');
    } catch(err) {
      notify('Failed: ' + err.message, 'error');
    }
    setUploading(false);
  };

  return (
    <div>
      <div style={{background:'#0d1925',borderRadius:8,border:'1px solid #1e3348',padding:'24px 16px',display:'flex',justifyContent:'center',marginBottom:14}}>
        <img src={logoUrl||TECH_SPEC_LOGO} alt="Tech spec logo preview" style={{width:width,maxWidth:'100%',borderRadius:0}}/>
      </div>
      <div style={{marginBottom:14}}>
        <label className="form-label" style={{display:'flex',justifyContent:'space-between'}}>
          <span>Logo size</span>
          <span style={{color:'#C9A84C',fontFamily:'monospace'}}>{width}px{saving?' · saving…':''}</span>
        </label>
        <input type="range" min={80} max={320} step={10} value={width} onChange={e=>setWidth(+e.target.value)} onMouseUp={e=>commitWidth(+e.target.value)} onTouchEnd={e=>commitWidth(+e.target.value)} style={{width:'100%'}}/>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#475569'}}><span>80px</span><span>320px</span></div>
      </div>
      <div className="flab g8">
        <label style={{cursor:'pointer'}}>
          <input type="file" accept="image/*" onChange={e=>handleUpload(e.target.files?.[0])} style={{display:'none'}}/>
          <span className="btn btn-primary" style={{fontSize:11,padding:'7px 14px'}}>
            {uploading ? '⏳ Uploading…' : logoUrl ? 'Replace Logo' : 'Upload Custom Logo'}
          </span>
        </label>
        {logoUrl&&<button className="btn btn-ghost" style={{fontSize:11,padding:'7px 14px'}} onClick={resetToDefault}>Revert to Default</button>}
      </div>
      <p style={{fontSize:11,color:'#475569',marginTop:10}}>Applies to both the Full Aircraft and Engine tech spec cover pages.</p>
    </div>
  );
}


function DisclaimerSettings({notify}) {
  const [text, setText] = useState("");
  const [saving, setSaving] = useState(false);
  const DEFAULT_TEXT = "This outline specification has been prepared based on the information available to Maverick Horizon at the relevant time. The recipient must verify the information provided independently.";

  useEffect(() => {
    db.getSetting('default_disclaimer').then(v => { if(v) setText(v); });
  }, []);

  const commit = async (val) => {
    setSaving(true);
    try {
      await db.setSetting('default_disclaimer', val||null);
      notify('Disclaimer updated');
    } catch(err) {
      notify('Failed to save disclaimer: ' + err.message, 'error');
    }
    setSaving(false);
  };

  const resetToDefault = async () => {
    setText("");
    await commit(null);
    notify('Reverted to standard disclaimer wording');
  };

  return (
    <div>
      <textarea value={text} placeholder={DEFAULT_TEXT} onChange={e=>setText(e.target.value)} onBlur={e=>commit(e.target.value)} rows={3} style={{width:'100%',fontFamily:'inherit',fontSize:13,resize:'vertical'}}/>
      <div className="flab g8" style={{marginTop:10}}>
        {saving&&<span style={{fontSize:11,color:'#475569'}}>Saving…</span>}
        {text&&<button className="btn btn-ghost" style={{fontSize:11,padding:'7px 14px'}} onClick={resetToDefault}>Revert to Default</button>}
      </div>
      <p style={{fontSize:11,color:'#475569',marginTop:10}}>Applies to every tech spec by default, unless an individual asset has its own disclaimer set on its Specs tab.</p>
    </div>
  );
}

function AdminView({assets,saveAsset,notify,loadAssets,adminPin,setAdminPin}){
  const[tab,setTab]=useState("assets");
  const[showNew,setShowNew]=useState(false);
  const[newA,setNewA]=useState({msn:"",registration:"",model:"A320-214",operator:"",manufacturer:"Airbus S.A.S.",dom:""});

function InviteUserCard({notify}){
  const[email,setEmail]=useState("");
  const[busy,setBusy]=useState(false);
  const invite=async()=>{
    if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){notify("Enter a valid email address","error");return;}
    setBusy(true);
    try{
      const idToken=await window._auth.getIdToken();
      const resp=await fetch("/api/invite-user",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":`Bearer ${idToken}`},
        body:JSON.stringify({email})
      });
      const result=await resp.json();
      if(!resp.ok||result.error){throw new Error(result.error||"Invite failed.");}
      notify(`Invite sent to ${email}`);
      setEmail("");
    }catch(e){
      notify(e.message||"Could not send invite.","error");
    }
    setBusy(false);
  };
  return(
    <div style={{display:"flex",gap:8}}>
      <input type="email" placeholder="name@company.com" value={email} onChange={e=>setEmail(e.target.value)} style={{flex:1}}/>
      <button className="btn btn-gold" onClick={invite} disabled={busy}>{busy?"Sending…":"Send Invite"}</button>
    </div>
  );
}

function PINChanger({onSave}){
  const[pin,setPin]=useState("");const[conf,setConf]=useState("");const[err,setErr]=useState("");
  const save=()=>{if(pin.length<4){setErr("Min 4 characters");return;}if(pin!==conf){setErr("PINs do not match");return;}onSave(pin);setPin("");setConf("");setErr("");};
  return<div style={{display:"flex",flexDirection:"column",gap:10}}>
    <div><label className="form-label">New PIN</label><input type="password" value={pin} onChange={e=>setPin(e.target.value)}/></div>
    <div><label className="form-label">Confirm PIN</label><input type="password" value={conf} onChange={e=>setConf(e.target.value)}/></div>
    {err&&<p style={{color:"#f87171",fontSize:12}}>{err}</p>}
    <button className="btn btn-gold" onClick={save}>Update PIN</button>
  </div>;
}

function PortfolioView({assets, notify, onSelect}){
  const[shareOpenId,setShareOpenId]=useState(null);
  const ageFromDOM=(dom)=>{
    if(!dom)return null;
    const years=(new Date()-new Date(dom))/(1000*60*60*24*365.25);
    return years.toFixed(1);
  };
  const nextCheck=(asset)=>{
    const dates=(asset.checks||[]).map(c=>c.nextDate).filter(Boolean);
    if(!dates.length)return null;
    return dates.sort()[0];
  };
  const soonestGear=(asset)=>{
    const dates=["nose","left","right"].map(k=>asset.landingGear?.[k]?.nextDue).filter(Boolean);
    if(!dates.length)return null;
    return dates.sort()[0];
  };
  const llpCol=(v)=>v===null?"#94a3b8":v<1000?"#dc2626":v<3000?"#d97706":"#16a34a";
  const llpBg=(v)=>v===null?"#f8fafc":v<1000?"#fef2f2":v<3000?"#fffbeb":"#f0fdf4";
  const llpBorder=(v)=>v===null?"#e2e8f0":v<1000?"#fca5a5":v<3000?"#fcd34d":"#86efac";
  const dateBg=(d)=>d===null?"#f8fafc":d<0?"#fef2f2":d<365?"#fffbeb":"#f8fafc";
  const dateCol=(d)=>d===null?"#94a3b8":d<0?"#dc2626":d<365?"#d97706":"#334155";
  const dateBorder=(d)=>d===null?"#e2e8f0":d<0?"#fca5a5":d<365?"#fcd34d":"#e2e8f0";

  return(
    <div style={{background:"#f1f5f9",minHeight:"100vh",margin:"-20px -22px",padding:"32px 28px",animation:"fadeIn 0.2s ease"}}>
      <div style={{maxWidth:1400,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:32}}>
          <div>
            <h1 style={{fontSize:28,fontWeight:800,color:"#0f172a",letterSpacing:"-0.02em"}}>Fleet Portfolio</h1>
            <p style={{color:"#64748b",fontSize:14,marginTop:4,fontWeight:500}}>{assets.length} aircraft · {new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"})}</p>
          </div>
  
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(380px,1fr))",gap:20}}>
          {assets.map(a=>{
            const st=assetStatus(a);
            const af=a.airframe||{};
            const eng1=a.engines?.[0];const eng2=a.engines?.[1];
            const ll1=lowestLimiter(eng1);const ll2=lowestLimiter(eng2);
            const apuLL=a.apu?.llps?.length?Math.min(...a.apu.llps.map(l=>calcLLPRem(l,a.apu.currentFC))):null;
            const gearDate=soonestGear(a);
            const checkDate=nextCheck(a);
            const gearDays=daysFromNow(gearDate);
            const checkDays=daysFromNow(checkDate);
            const sl=statusLabel[st];

            return(
              <div key={a.id}
                style={{background:"#ffffff",borderRadius:14,border:"1px solid #e2e8f0",
                  boxShadow:"0 4px 16px rgba(0,0,0,0.06)",cursor:"pointer",
                  transition:"all 0.2s",overflow:"hidden"}}
                onClick={()=>onSelect(a.id)}
                onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow="0 12px 32px rgba(0,0,0,0.12)";}}
                onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,0.06)";}}
              >
                {/* Status bar at top */}
                <div style={{height:4,background:st==="critical"?"#dc2626":st==="warn"?"#d97706":"#16a34a"}}/>

                <div style={{padding:22}}>
                  {/* Header */}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:3}}>
                        <span style={{fontSize:24,fontWeight:800,color:"#0f172a",fontFamily:"monospace",letterSpacing:"0.02em"}}>{a.msn}</span>
                        <span style={{fontSize:16,fontWeight:700,color:"#334155"}}>{a.registration||"—"}</span>
                      </div>
                      <div style={{fontSize:12,color:"#64748b",fontWeight:500}}>{a.model||"—"} · {a.operator||"—"}</div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
                      <span style={{background:sl.bg,color:sl.color,border:`1px solid ${sl.border}`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700}}>{sl.text}</span>
                      {a.dom&&<span style={{fontSize:11,color:"#94a3b8",fontWeight:600}}>{ageFromDOM(a.dom)} yrs old</span>}
                    </div>
                  </div>

                  {/* Airframe */}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
                    {[["Airframe TSN",fmtHHMM(af.currentFH)],["Airframe CSN",(af.currentFC||0).toLocaleString()]].map(([l,v])=>(
                      <div key={l} style={{background:"#f8fafc",borderRadius:8,padding:"10px 12px",border:"1px solid #e2e8f0"}}>
                        <div style={{fontSize:9,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:3}}>{l}</div>

                    <div style={{fontSize:9,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:7}}>Life Limited Parts — FC Remaining</div>
                    <div style={{display:"flex",flexDirection:"column",gap:4}}>
                      {[[`Eng 1${eng1?.sn?` · ${eng1.sn}`:""}`,ll1],[`Eng 2${eng2?.sn?` · ${eng2.sn}`:""}`,ll2],["APU",apuLL]].map(([label,val])=>(

                          <span style={{fontSize:13,fontWeight:800,color:llpCol(val),fontFamily:"monospace"}}>{val!==null?val.toLocaleString()+" FC":"No data"}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Dates */}
                  <div style={{marginBottom:18}}>
                    <div style={{fontSize:9,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:7}}>Key Events</div>
                    <div style={{display:"flex",flexDirection:"column",gap:4}}>
                      {[["Next Gear Overhaul",gearDate,gearDays],["Next Major Check",checkDate,checkDays]].map(([label,date,days])=>(
                        <div key={label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:dateBg(days),borderRadius:6,padding:"7px 11px",border:`1px solid ${dateBorder(days)}`}}>

                          <div style={{textAlign:"right"}}>
                            <div style={{fontSize:12,fontWeight:700,color:dateCol(days)}}>{date?fmtDate(date):"Not entered"}</div>
                            {days!==null&&<div style={{fontSize:10,color:dateCol(days),opacity:0.8}}>{days<0?`${Math.abs(days)}d overdue`:days===0?"Today":`${days}d`}</div>}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Footer */}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:14,borderTop:"1px solid #f1f5f9"}}>
                    <span style={{fontSize:11,color:"#94a3b8",fontWeight:500}}>{a._lastPeriod||"No report"}</span>
                    <div style={{display:"flex",gap:8}}>
                      <button style={{background:"transparent",color:"#475569",border:"1px solid #e2e8f0",borderRadius:7,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:"pointer",letterSpacing:"0.03em",transition:"all 0.15s"}}

                        onMouseEnter={e=>e.currentTarget.style.background="#d4b060"}

                          e.stopPropagation();
                          const isCFMAsset=isCFM(a);
                          const photoKey=isCFMAsset?"engine_photo_cfm56":"engine_photo_v2500";
                          const engPhoto=await db.getSetting(photoKey).catch(()=>null)||"";
                          const logo=await getTechSpecLogo();
                          const defaultDisclaimer=await getDefaultDisclaimer();
                          openTechSpec(buildTechSpecHTML(a,engPhoto,logo,defaultDisclaimer));
                        }}>
                        📋 Tech Spec
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
          {assets.length===0&&(
            <div style={{gridColumn:"1/-1",textAlign:"center",padding:80,color:"#94a3b8"}}>

      </div>
      {shareOpenId&&<ShareModal asset={assets.find(x=>x.id===shareOpenId)} notify={notify} onClose={()=>setShareOpenId(null)}/>}

  );
