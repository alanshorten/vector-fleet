function EngineSNAction({change,prevEngines,mergedAsset,saveAsset,notify}){
  const[mode,setMode]=useState(null); // null | "atshop" | "resolved"
  const[form,setForm]=useState(null);
  const idx=change.position-1;
  const prevEng=prevEngines[idx]||{};
  const isReturn=!!(prevEng.atShop&&prevEng.titleEngine&&prevEng.titleEngine.sn===change.newSN);
  if(mode==="resolved")return<div style={{fontSize:12,color:"#34d399",marginBottom:6}}>✓ Engine {change.position} S/N change resolved</div>;
  const startAtShop=()=>{setForm({tsn:fmtHHMM(prevEng.currentFH),csn:prevEng.currentFC||"",date:"",reason:""});setMode("atshop");};
  const doAtShop=async()=>{
    const newEngines=JSON.parse(JSON.stringify(mergedAsset.engines||[]));
    newEngines[idx]={...newEngines[idx],atShop:true,titleEngine:{sn:change.previousSN,type:prevEng.type||"",thrust:prevEng.thrust||"",currentFH:parseHHMM(form.tsn),currentFC:+form.csn||0,removedDate:form.date,reason:form.reason}};
    await saveAsset({...mergedAsset,engines:newEngines});
    notify(`Engine ${change.position} marked at shop visit`);
    setMode("resolved");
  };
  const doPermanent=async()=>{
    if(prevEng.atShop){
      const newEngines=JSON.parse(JSON.stringify(mergedAsset.engines||[]));
      newEngines[idx]={...newEngines[idx],atShop:false,titleEngine:null};
      await saveAsset({...mergedAsset,engines:newEngines});
    }
    notify(`Engine ${change.position} S/N change confirmed permanent`);
    setMode("resolved");
  };
  const doReturned=async()=>{
    const newEngines=JSON.parse(JSON.stringify(mergedAsset.engines||[]));
    newEngines[idx]={...newEngines[idx],atShop:false,titleEngine:null};
    await saveAsset({...mergedAsset,engines:newEngines});
    notify(`Engine ${change.position} confirmed returned to service`);
    setMode("resolved");
  };
  return(
    <div style={{background:"#1a1306",border:"1px solid #92660a",borderRadius:6,padding:"8px 10px",marginBottom:8}}>
      <div style={{fontSize:12,color:"#fcd34d",marginBottom:6}}>⚠ Engine {change.position} S/N change: was {change.previousSN}, now {change.newSN}</div>
      {mode==="atshop"?(
        <div style={{marginTop:6}}>
          <div className="grid3" style={{gap:6,marginBottom:8}}>
            <div><label className="form-label">TSN at Removal (HH:MM)</label><input value={form.tsn} onChange={e=>setForm({...form,tsn:e.target.value})}/></div>
            <div><label className="form-label">CSN at Removal</label><input type="number" value={form.csn} onChange={e=>setForm({...form,csn:e.target.value})}/></div>
            <div><label className="form-label">Removal Date</label><input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/></div>
            <div style={{gridColumn:"1/-1"}}><label className="form-label">Reason (optional)</label><input value={form.reason} onChange={e=>setForm({...form,reason:e.target.value})}/></div>
          </div>
          <div className="flab g8">
            <button className="btn btn-ghost" onClick={()=>setMode(null)}>Cancel</button>
            <button className="btn btn-gold" onClick={doAtShop}>Confirm At Shop</button>
          </div>
        </div>
      ):(
        <div className="flab g8">
          {isReturn&&<button className="btn btn-gold" style={{fontSize:11,padding:"4px 10px"}} onClick={doReturned}>✓ Engine Returned</button>}
          <button className="btn btn-primary" style={{fontSize:11,padding:"4px 10px"}} onClick={startAtShop}>🔧 At Shop</button>
          <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={doPermanent}>Permanent</button>
        </div>
      )}
    </div>
  );
}

function UploadView({assets,saveAsset,notify}){
  const[uploadType,setUploadType]=useState("util");
  const[file,setFile]=useState(null);
  const[extracting,setExtracting]=useState(false);
  const[extracted,setExtracted]=useState(null);
  const[error,setError]=useState(null);
  const[done,setDone]=useState(false);
  const[saving,setSaving]=useState(false);
  const[matchedAsset,setMatchedAsset]=useState(null);
  const[instructions,setInstructions]=useState("");
  const[showInstructions,setShowInstructions]=useState(false);
  const[sheetNames,setSheetNames]=useState([]);
  const[selectedSheet,setSelectedSheet]=useState(null);
  const[xlsxWorkbook,setXlsxWorkbook]=useState(null);

  const handleFile=e=>{
    const f=e.target.files?.[0];
    if(!f)return;
    setFile(f);setExtracted(null);setError(null);setDone(false);
    setSheetNames([]);setSelectedSheet(null);setXlsxWorkbook(null);
    const isExcel=f.type==="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"||f.type==="application/vnd.ms-excel"||f.name.endsWith(".xlsx")||f.name.endsWith(".xls");
    if(isExcel){
      const reader=new FileReader();
      reader.onload=(ev)=>{
        try{
          const wb=XLSX.read(new Uint8Array(ev.target.result),{type:"array"});
          setXlsxWorkbook(wb);
          setSheetNames(wb.SheetNames);
          // default to last sheet (most recent), user can change
          setSelectedSheet(wb.SheetNames[wb.SheetNames.length-1]);
        }catch(e){/* will surface when extract() is called */}
      };
      reader.readAsArrayBuffer(f);
    }
  };

const extract=async()=>{
    if(!file)return;
    const isPDF=file.type==="application/pdf";
    const isExcel=file.type==="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"||file.type==="application/vnd.ms-excel"||file.name.endsWith(".xlsx")||file.name.endsWith(".xls");
    if(!isPDF&&!isExcel){setError("Unsupported file type. Please upload a PDF or Excel (.xlsx / .xls) file.");return;}
    if(file.size>10*1024*1024){setError("File is too large (maximum 10 MB). Please check you have selected the correct file.");return;}
    setExtracting(true);setError(null);
    try{
      const basePrompt=uploadType==="llp"
        ?ENGINE_LLP_PROMPT
        :uploadType==="apu_llp"
        ?APU_LLP_PROMPT
       :"Extract ALL data from this aircraft utilisation report. This report has separate columns for ENGINE Position 1, ENGINE Position 2, and APU — they are three distinct components, each with their own S/N, TSN, CSN, and FH/FC figures. Do not confuse the APU column with an engine position. If this report includes a dedicated Landing Gear section with a TOTAL HOURS or TOTAL HOURS & CYCLES figure per leg (separate from the routine CSN column), populate total_fh/total_fc for that leg from those ground-truth totals — most reports do not have this section, in which case leave total_fh/total_fc null. Some aircraft only have data for ONE engine position in this report — the single engine may be reported under EITHER Position 1 OR Position 2, so check both columns rather than assuming Position 1 is always populated. Whichever position column is blank or absent, set that entire engine value to null (either \"engine1\" or \"engine2\", whichever is blank) — do not copy APU figures or any other column into a blank engine position, and do not invent placeholder values. All TSN and FH values must be formatted as HH:MM strings. Return ONLY valid JSON, no markdown:\n{\"month_year\":\"e.g. May 2026\",\"operator\":\"string\",\"msn\":\"string\",\"registration\":\"string\",\"airframe\":{\"fh_period\":\"HH:MM\",\"fc_period\":number,\"tsn\":\"HH:MM\",\"csn\":number},\"engine1\":{\"model\":\"string\",\"sn\":\"string\",\"tsn\":\"HH:MM\",\"csn\":number,\"fh_period\":\"HH:MM\",\"fc_period\":number} or null if Position 1 is blank in the report,\"engine2\":{\"model\":\"string\",\"sn\":\"string\",\"tsn\":\"HH:MM\",\"csn\":number,\"fh_period\":\"HH:MM\",\"fc_period\":number} or null if Position 2 is blank in the report,\"apu\":{\"sn\":\"string\",\"tsn\":\"HH:MM\",\"csn\":number},\"landing_gear\":{\"nose\":{\"pn\":\"string\",\"sn\":\"string\",\"csn\":number,\"total_fh\":\"HH:MM or null\",\"total_fc\":\"number or null\"},\"left\":{\"pn\":\"string\",\"sn\":\"string\",\"csn\":number,\"total_fh\":\"HH:MM or null\",\"total_fc\":\"number or null\"},\"right\":{\"pn\":\"string\",\"sn\":\"string\",\"csn\":number,\"total_fh\":\"HH:MM or null\",\"total_fc\":\"number or null\"}},\"removals\":[{\"component\":\"engine or landing_gear or apu\",\"sn\":\"string\",\"position\":\"string\",\"date\":\"string\",\"reason\":\"string\",\"tsn_at_removal\":\"HH:MM\",\"csn_at_removal\":number,\"mro\":\"string\"}]}"
      const prompt=instructions?basePrompt+" Additional instructions: "+instructions:basePrompt;
      // LLP sheets are dense, repetitive tables — use Sonnet for stronger table-tracking accuracy.
      // Everything else (utilisation reports, APU LLP, specs import) stays on Haiku.
      const extractModel=uploadType==="llp"?"claude-sonnet-4-6":"claude-haiku-4-5-20251001";
      let resp;
      if(isPDF){
        const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej(new Error("Could not read the file. Please try again."));r.readAsDataURL(file);});
        resp=await fetch("/api/extract",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:extractModel,max_tokens:4000,messages:[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}},{type:"text",text:prompt}]}]})});
      } else {
        let csvText;
        try{
          const wb=xlsxWorkbook;
          if(!wb)throw new Error("Excel file not ready — please re-select the file.");
          const sheetToParse=selectedSheet||wb.SheetNames[wb.SheetNames.length-1];
          csvText="Sheet: "+sheetToParse+"\n"+XLSX.utils.sheet_to_csv(wb.Sheets[sheetToParse],{skipHidden:true});
        }catch(xlsxErr){
          throw new Error(xlsxErr.message||"Could not parse the Excel file. Please check the file is not corrupted and try again.");
        }
        resp=await fetch("/api/extract",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:extractModel,max_tokens:4000,messages:[{role:"user",content:[{type:"text",text:"The following is the contents of an Excel spreadsheet (sheet: "+(selectedSheet||"selected")+") exported as CSV.\n\n"+csvText+"\n\n"+prompt}]}]})});
      }
      if(!resp.ok){
        const status=resp.status;
        if(status===401||status===403)throw new Error("Authentication error with the AI service. Please contact your administrator.");
        if(status===429)throw new Error("Too many requests — please wait a moment and try again.");
        if(status>=500)throw new Error("The extraction service is temporarily unavailable. Please try again in a few minutes.");
        throw new Error("Extraction request failed (error "+status+"). Please try again.");
      }
      let result;
      try{result=await resp.json();}catch(jsonErr){throw new Error("Received an unexpected response from the server. Please try again.");}
      if(result.error){
        const msg=result.error;
        if(msg.includes("credit")||msg.includes("billing"))throw new Error("AI service billing issue — please contact your administrator.");
        if(msg.includes("overloaded")||msg.includes("capacity"))throw new Error("The AI service is busy right now. Please wait a moment and try again.");
        throw new Error("Extraction failed. Please check the file is a valid report and try again.");
      }
      let parsed;
      try{
        const rawParsed=result.ok?result.data:JSON.parse((result.raw||"").replace(/```json|```/g,"").trim());
        parsed=Array.isArray(rawParsed)?rawParsed[rawParsed.length-1]:rawParsed;
      }catch(parseErr){
        throw new Error("The AI could not extract structured data from this file. Check it is the correct report type, or try adding specific instructions above.");
      }
      if(!parsed||typeof parsed!=="object"||Array.isArray(parsed)){
        throw new Error("The AI returned an unexpected format. Check the file is a valid report and try again.");
      }

      setExtracted({parsed,fileName:file.name});
      // For LLP uploads, run asset matching immediately so the review panel
      // shows the correct aircraft before the user clicks Confirm & Save.
      // APU S/N matching normalises zero-padding on both sides ("3014" === "03014").
      if(uploadType==="llp"||uploadType==="apu_llp"){
        const normSN=s=>s?.toString().replace(/^0+/,"")||"";
        const msnStr=normSN(parsed.msn);
        let matched=msnStr?assets.find(a=>normSN(a.msn)===msnStr):null;
        if(!matched){const esnList=(parsed.engines||[]).map(e=>e.esn).filter(Boolean);if(esnList.length){matched=assets.find(a=>(a.engines||[]).some(e=>esnList.includes(e.sn)));}}
        if(!matched&&parsed.apu?.sn){matched=assets.find(a=>a.apu?.sn&&normSN(a.apu.sn)===normSN(parsed.apu.sn));}
        setMatchedAsset(matched||null);
      }
    }catch(err){
      const msg=err.message||"";
      if(msg.startsWith("{")||msg.includes('"error"')){
        setError("Extraction failed. Please check the file is a valid report and try again.");
      } else {
        setError(msg);
      }
    }
    setExtracting(false);
  };

  // Normalise compound period strings like "March-April 2026" → "April 2026"
  // so Brain 1's period parser can sequence them against single-month periods.
  const normPeriod=(p)=>{
    if(!p)return p;
    const s=p.trim();
    // "March - April 2026" or "March-April 2026" (shared year at end)
    let m=/^([A-Za-z]+)\s*-\s*([A-Za-z]+)\s+(\d{4})$/i.exec(s);
    if(m)return m[2]+" "+m[3];
    // "March 2026 - April 2026" (each month has own year)
    m=/^[A-Za-z]+\s+\d{4}\s*-\s*([A-Za-z]+)\s+(\d{4})$/i.exec(s);
    if(m)return m[1]+" "+m[2];
    // "01 Mar 2026 - 30 Apr 2026" or "01.Mar.2026 - 30.Apr.2026" (DD Mon YYYY - DD Mon YYYY, day numbers + optional dot separators)
    m=/^\d{1,2}[\s.]+[A-Za-z]+[\s.]+\d{4}\s*-\s*\d{1,2}[\s.]+([A-Za-z]+)[\s.]+(\d{4})$/i.exec(s);
    if(m)return m[1]+" "+m[2];
    return p;
  };
  const withNormPeriod=(a)=>a?{...a,_lastPeriod:normPeriod(a._lastPeriod)}:a;

  const confirmSave=async()=>{
    setSaving(true);
    try{
      const d=extracted.parsed;
      const msn=d.msn?.toString().replace(/^0+/,"");
      const previousAsset=assets.find(a=>a.msn?.toString().replace(/^0+/,"")===msn)||null;

      const result=window.processUtilisationReport({newReport:d,previousAsset:withNormPeriod(previousAsset)});

      if(result.historyOnly){
        // Out-of-order / duplicate-period upload: per product decision, this is
        // saved into history only and must never overwrite live asset state.
        await db.saveUtilisation(result.utilisationRecord);
        setExtracted(prev=>({...prev,warnings:result.warnings}));
        setDone(true);
        return;
      }

      await saveAsset(result.mergedAsset,"Confirmed utilisation report");
      await db.saveUtilisation(result.utilisationRecord);

      if(result.isNewAsset){
        setDone(true);notify(`MSN ${msn} created from ${d.month_year} report`);return;
      }

      if(result.warnings.length){
        setExtracted(prev=>({...prev,warnings:result.warnings,snChanges:result.snChanges,prevEngines:previousAsset.engines||[],mergedAsset:result.mergedAsset}));
        setDone(true);
      } else {
        setDone(true);
        notify(`MSN ${msn} updated for ${d.month_year}`);
      }
    }catch(err){
      setError("Save failed: "+(err.message||"please try again.")+" Your data has not been lost — Discard and re-upload if needed.");
    }finally{
      setSaving(false);
    }
  };

  const confirmLLP=async()=>{
    setSaving(true);
    try{
      const d=extracted.parsed;
      // matchedAsset is resolved at extract time (with zero-pad-normalised APU S/N matching)
      // so we use state here rather than re-running the search — eliminates the false
      // "Could not match" error that fired when the review panel already showed the correct aircraft.
      const asset=matchedAsset;
      if(!asset){setError("Could not match this LLP sheet to any aircraft. Check the file contains a recognisable MSN, engine S/N, or APU S/N.");return;}
      const msn=asset.msn?.toString().replace(/^0+/,"");
      // Handle engine LLPs
      const engines=JSON.parse(JSON.stringify(asset.engines||[]));
      (d.engines||[]).forEach(eng=>{
        if(!eng.esn)return;
        const matchIdx=(asset.engines||[]).findIndex(e=>e.sn===eng.esn);
        if(matchIdx===-1)return;
        const idx=matchIdx;
        if(engines[idx]){
          engines[idx].sn=eng.esn||engines[idx].sn;
          engines[idx].type=eng.engine_type||engines[idx].type;
          const refCSN=eng.csn||0;
          engines[idx].llps=(eng.llps||[]).map(l=>({desc:l.desc,pn:l.pn,sn:l.sn,startFCRem:l.fc_remaining,refFC:refCSN,approvedLife:(l.cycle_limit===undefined?null:l.cycle_limit)}));
        }
      });

      // Handle APU LLPs
      let apu=JSON.parse(JSON.stringify(asset.apu||{}));
      if(d.apu?.llps?.length){
        const refCSN=d.apu.csn||0;
        if(d.apu.sn)apu.sn=d.apu.sn;
        if(d.apu.pn)apu.pn=d.apu.pn;
        // If no currentFC yet, initialise from LLP sheet CSN
        if(!apu.currentFC&&d.apu.csn)apu.currentFC=d.apu.csn;
        apu.llps=(d.apu.llps||[]).map(l=>({desc:l.desc,pn:l.pn,sn:l.sn,startFCRem:l.fc_remaining,refFC:refCSN,approvedLife:(l.cycle_limit===undefined?null:l.cycle_limit)}));
      }

      const hasEngines=(d.engines||[]).length>0;
      const hasAPU=d.apu?.llps?.length>0;

      await saveAsset({...asset,engines,apu},"Uploaded LLP data");
      setDone(true);
      notify(`LLP data saved for MSN ${msn}${hasEngines&&hasAPU?" (engines + APU)":hasAPU?" (APU)":""}`);
    }catch(err){
      setError("Save failed: "+(err.message||"please try again.")+" Your data has not been lost — Discard and re-upload if needed.");
    }finally{
      setSaving(false);
    }
  };

  return(
    <div style={{maxWidth:860,margin:"0 auto"}}>
      <h1 style={{fontSize:20,color:"#C9A84C",fontWeight:700,marginBottom:6}}>Upload</h1>
      <p style={{color:"#64748b",marginBottom:16,fontSize:13}}>Select report type, upload PDF or Excel, and TailiQ AI extracts the data for your review.</p>
      <div className="flab g8" style={{marginBottom:16}}>
        {[["util","📄 Utilisation Report"],["llp","🔧 Engine LLP Sheet"],["apu_llp","⚙ APU LLP Sheet"]].map(([v,l])=>(
          <button key={v} onClick={()=>{setUploadType(v);setFile(null);setExtracted(null);setError(null);setDone(false);setInstructions("");setShowInstructions(false);setSheetNames([]);setSelectedSheet(null);setXlsxWorkbook(null);}}
            style={{padding:"8px 16px",background:uploadType===v?"#1e3a5f":"#0d1e2e",color:uploadType===v?"#C9A84C":"#64748b",border:`1px solid ${uploadType===v?"#1B3A6B":"#1e3348"}`,borderRadius:6,fontSize:13,fontWeight:600,cursor:"pointer"}}>{l}</button>
        ))}
      </div>
      <div className="card" style={{padding:32,textAlign:"center",marginBottom:16,border:"2px dashed #1e3048"}}>
        <div style={{fontSize:36,marginBottom:10}}>📁</div>
        <input type="file" accept=".pdf,.xlsx" id="upfile" onChange={handleFile} style={{display:"none"}}/>
        <label htmlFor="upfile" style={{cursor:"pointer"}}>
          <div style={{fontWeight:600,color:file?"#C9A84C":"#64748b",marginBottom:4}}>{file?file.name:"Click to select file"}</div>
          <div style={{fontSize:12,color:"#475569"}}>{uploadType==="util"?"PDF or Excel (.xlsx)":uploadType==="llp"?"Engine LLP Status Sheet (PDF)":"APU LLP Status Sheet (PDF)"}</div>
        </label>
        {file&&!done&&(
          <div style={{marginTop:14,display:"flex",flexDirection:"column",gap:8,alignItems:"center",width:"100%"}}>

<table style={{fontSize:11}}><thead><tr><th>Description</th><th>P/N</th><th>S/N</th><th>FC Remaining</th><th>Cycle Limit (edit if OCR wrong)</th></tr></thead><tbody>{(eng.llps||[]).map((l,j)=>{const col=l.fc_remaining<1000?"#f87171":l.fc_remaining<3000?"#fbbf24":"#34d399";return <tr key={j}><td>{l.desc}</td><td style={{fontFamily:"monospace",fontSize:10}}>{l.pn}</td><td style={{fontFamily:"monospace",fontSize:10}}>{l.sn}</td><td style={{fontWeight:700,color:col}}>{l.fc_remaining?.toLocaleString()}</td><td><input type="number" defaultValue={l.cycle_limit??""} placeholder="N/L" style={{width:80,padding:"3px 6px",fontSize:11}} onChange={e=>{const val=e.target.value===""?null:+e.target.value;setExtracted(prev=>{const d=JSON.parse(JSON.stringify(prev));d.parsed.engines[i].llps[j].cycle_limit=val;return d;});}}/></td></tr>;})}</tbody></table>
</div>

<div style={{fontSize:10,fontWeight:700,color:"#C9A84C",textTransform:"uppercase",marginBottom:8}}>APU — S/N {extracted.parsed.apu.sn||"—"} · {extracted.parsed.apu.llps.length} LLPs</div>
<div className="flab g8" style={{marginBottom:8,alignItems:"center",flexWrap:"wrap"}}>
  <label className="form-label" style={{margin:0,whiteSpace:"nowrap"}}>Ref CSN (edit if OCR wrong):</label><input type="number" defaultValue={extracted.parsed.apu.csn} style={{width:120,padding:"4px 8px",fontSize:12}} onChange={e=>{const val=+e.target.value;setExtracted(prev=>{const d=JSON.parse(JSON.stringify(prev));d.parsed.apu.csn=val;return d;});}}/>
  <label className="form-label" style={{margin:0,whiteSpace:"nowrap"}}>APU P/N (enter if not extracted):</label><input type="text" defaultValue={extracted.parsed.apu.pn||""} placeholder="e.g. 3800000-3" style={{width:150,padding:"4px 8px",fontSize:12}} onChange={e=>{const val=e.target.value;setExtracted(prev=>{const d=JSON.parse(JSON.stringify(prev));d.parsed.apu.pn=val;return d;});}}/>
</div>
<table style={{fontSize:11}}><thead><tr><th>Description</th><th>P/N</th><th>S/N</th><th>FC Remaining</th><th>Cycle Limit (edit if OCR wrong)</th></tr></thead><tbody>{extracted.parsed.apu.llps.map((l,j)=>{const col=l.fc_remaining<1000?"#f87171":l.fc_remaining<3000?"#fbbf24":"#34d399";return <tr key={j}><td>{l.desc}</td><td style={{fontFamily:"monospace",fontSize:10}}>{l.pn}</td><td style={{fontFamily:"monospace",fontSize:10}}>{l.sn}</td><td style={{fontWeight:700,color:col}}>{l.fc_remaining?.toLocaleString()}</td><td><input type="number" defaultValue={l.cycle_limit??""} placeholder="N/L" style={{width:80,padding:"3px 6px",fontSize:11}} onChange={e=>{const val=e.target.value===""?null:+e.target.value;setExtracted(prev=>{const d=JSON.parse(JSON.stringify(prev));d.parsed.apu.llps[j].cycle_limit=val;return d;});}}/></td></tr>;})} </tbody></table>

                  <div key={l} className="flj" style={{padding:"4px 0",borderBottom:"1px solid #1e3048"}}><span style={{fontSize:11,color:"#475569"}}>{l}</span><span style={{fontSize:12,fontWeight:700,color:"#f1f5f9"}}>{v?.toString()||"—"}</span></div>

                <div style={{fontSize:10,fontWeight:700,color:"#C9A84C",textTransform:"uppercase",marginBottom:8}}>Engines & APU</div>
                {(()=>{
                  const msn=(extracted.parsed.msn||"").toString().replace(/^0+/,"");
                  const prev=assets.find(a=>a.msn?.toString().replace(/^0+/,"")===msn);
                  const rows=[
                    ["Eng 1 S/N",extracted.parsed.engine1?.sn,prev?.engines?.[0]?.sn,false,true],
                    ["Eng 1 TSN",extracted.parsed.engine1?.tsn,prev?.engines?.[0]?.currentFH?fmtHHMM(prev.engines[0].currentFH):null,false,false],
                    ["Eng 1 CSN",extracted.parsed.engine1?.csn,prev?.engines?.[0]?.currentFC,true,false],
                    ["Eng 2 S/N",extracted.parsed.engine2?.sn,prev?.engines?.[1]?.sn,false,true],
                    ["Eng 2 TSN",extracted.parsed.engine2?.tsn,prev?.engines?.[1]?.currentFH?fmtHHMM(prev.engines[1].currentFH):null,false,false],
                    ["Eng 2 CSN",extracted.parsed.engine2?.csn,prev?.engines?.[1]?.currentFC,true,false],
                    ["APU S/N",extracted.parsed.apu?.sn,prev?.apu?.sn,false,true],
                    ["APU TSN",extracted.parsed.apu?.tsn,prev?.apu?.currentFH?fmtHHMM(prev.apu.currentFH):null,false,false],
                    ["APU CSN",extracted.parsed.apu?.csn,prev?.apu?.currentFC,true,false]
                  ];
                  return rows.map(([l,v,prevV,isNum,isSN])=>{
                    const changed=isSN&&prevV&&v&&String(v)!==String(prevV);
                    const delta=isNum&&v&&prevV?v-prevV:null;
                    const deltaCol=delta===null?"#475569":delta<0?"#f87171":delta>500?"#fbbf24":"#34d399";
                    return<div key={l} className="flj" style={{padding:"5px 6px",borderBottom:"1px solid #1e3048",background:changed?"#2a1400":"transparent",borderRadius:3}}>
                      <span style={{fontSize:11,color:"#5a7a9a"}}>{l}</span>
                      <div style={{textAlign:"right"}}>
                        <span style={{fontSize:12,fontWeight:700,color:changed?"#fbbf24":"#f1f5f9"}}>{v?.toString()||"—"}</span>
                        {changed&&<span style={{fontSize:10,color:"#f87171",marginLeft:6}}>⚠ changed</span>}
                        {delta!==null&&<span style={{fontSize:10,color:deltaCol,marginLeft:6}}>{delta>0?"+":""}{delta}</span>}
                      </div>
                    </div>;
                  });
                })()}
              </div>
              {!saving&&(()=>{
                const msn=(extracted.parsed.msn||"").toString().replace(/^0+/,"");
                const prev=assets.find(a=>a.msn?.toString().replace(/^0+/,"")===msn)||null;
                if(!prev)return null;
                // Use Brain 1's actual verdict so this banner can never disagree
                // with what Confirm & Save is about to do. Gated on !saving above:
                // once a save is in flight, `assets` can update mid-save (saveAsset
                // triggers loadAssets internally), which would otherwise make this
                // preview compare the just-saved asset against itself and falsely
                // read as out-of-order/mismatch for one render. Freezing here avoids
                // that flash; the done-view replaces this panel moments later anyway.
                const preview=window.processUtilisationReport({newReport:extracted.parsed,previousAsset:withNormPeriod(prev)});
                const dc=preview.deltaCheck;
                if(dc.status==="first_report")return null;
                const isProblem=dc.status==="mismatch"||dc.status==="out_of_order"||dc.status==="period_unparseable";
                const isInfo=dc.status==="gap_detected"||dc.status==="same_month_merge";
                const bg=isProblem?"#2a0e0e":isInfo?"#2a1f0a":"#0d2818";
                const border=isProblem?"#7f1d1d":isInfo?"#92660a":"#166534";
                const fg=isProblem?"#f87171":isInfo?"#fbbf24":"#34d399";
                const headline=dc.status==="out_of_order"
                  ?"⚠ Out-of-order upload — this period predates the asset's current data. Will be saved to history only; live state will not change."
                  :dc.status==="mismatch"
                  ?"⚠ Delta mismatch — check report figures"
                  :dc.status==="period_unparseable"
                  ?`⚠ Could not read reporting period (${extracted.parsed.month_year||"blank"} vs ${prev._lastPeriod||"blank"}) — gap could not be determined. Will be saved to history only; live state will not change. Correct the period and re-upload to apply this report.`
                  :dc.status==="same_month_merge"
                  ?"ℹ Same-month merge — this report updates additional fields for a period already on file. Existing data not covered by this report (e.g. a different engine or APU) will be kept, not overwritten."
                  :dc.status==="gap_detected"
                  ?`⚠ Gap detected — ${dc.monthsGap} months since last report. Tolerance widened accordingly.`
                  :"✓ Delta verified — period figures match report";
                // Gap info must show whenever monthsGap>1, regardless of which
                // status "won" above. Previously this was status==="gap_detected"
                // only, which silently hid the gap whenever a mismatch (or any
                // other status) took priority in deltaStatus — even though the
                // gap was real and the widened tolerance was actually applied.
                const showGapLine=dc.monthsGap!==null&&dc.monthsGap>1&&dc.status!=="gap_detected";
                return<div style={{gridColumn:"1/-1",background:bg,border:`1px solid ${border}`,borderRadius:6,padding:"8px 12px"}}>
                  <div style={{fontSize:11,fontWeight:700,color:fg}}>{headline}</div>
                  {showGapLine&&<div style={{fontSize:11,fontWeight:700,color:"#fbbf24",marginTop:4}}>
                    ⚠ Also: gap detected — {dc.monthsGap} months since last report. Delta tolerance was widened accordingly before checking the figures above.
                  </div>}
                  {dc.fc.calc!==null&&<div style={{fontSize:10,color:"#64748b",marginTop:2}}>
                    FC delta: {dc.fc.calc} · Period FC: {dc.fc.reported??"—"} {dc.fc.match===false?"⚠":dc.fc.match===true?"✓":""}
                  </div>}
                  {dc.fh.calc!==null&&<div style={{fontSize:10,color:"#64748b"}}>
                    FH delta: {fmtHHMM(dc.fh.calc)} · Period FH: {extracted.parsed.airframe?.fh_period||"—"} {dc.fh.match===false?"⚠":dc.fh.match===true?"✓":""}
                  </div>}
                </div>;
              })()}
            </div>
          )}
          <div className="flj" style={{marginTop:16,paddingTop:14,borderTop:"1px solid #1e3048"}}>
            <button className="btn btn-ghost" disabled={saving} onClick={()=>{setExtracted(null);setFile(null);}}>Discard</button>
            <button className="btn btn-gold" disabled={saving} onClick={uploadType==="util"?confirmSave:confirmLLP}>{saving?"Saving…":"✓ Confirm & Save"}</button>
          </div>
        </div>
      )}
      {done&&(
        <div style={{background:"#0d2818",border:"1px solid #166534",borderRadius:8,padding:24,textAlign:"center"}}>
          <div style={{fontSize:36,marginBottom:8}}>✅</div>
          <div style={{fontWeight:700,color:"#34d399",fontSize:16,marginBottom:10}}>Saved successfully</div>
          {extracted?.warnings?.length>0&&(
            <div style={{background:"#2a1f0a",border:"1px solid #78350f",borderRadius:6,padding:12,marginBottom:14,textAlign:"left"}}>
              <div style={{fontSize:11,fontWeight:700,color:"#fbbf24",marginBottom:6}}>⚠ Flags to review:</div>
              {(extracted.snChanges||[]).filter(c=>c.component==="engine").map((c,i)=>(
                <EngineSNAction key={"eng"+i} change={c} prevEngines={extracted.prevEngines||[]} mergedAsset={extracted.mergedAsset} saveAsset={saveAsset} notify={notify}/>
              ))}
              {extracted.warnings.filter(w=>!/^⚠ Engine \d+ S\/N change:/.test(w)).map((w,i)=>(
                <div key={i} style={{fontSize:12,color:"#fcd34d",marginBottom:4,lineHeight:1.5}}>{w}</div>
              ))}
            </div>
          )}
          <button className="btn btn-ghost" onClick={()=>{setFile(null);setExtracted(null);setDone(false);}}>Upload Another</button>
        </div>
      )}
    </div>
  );
}


function LogoSettings({notify}) {
  const [logoUrl, setLogoUrl] = useState(null);
  const [width, setWidth] = useState(200);
  const [uploading, setUploading] = useState(false);
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    db.getSetting('tech_spec_logo_url').then(v => { if(v) setLogoUrl(v); });
    db.getSetting('tech_spec_logo_width').then(v => { if(v) setWidth(v); });
  }, []);

  const handleUpload = async (file) => {
    if (!file) return;
    setUploading(true);
    try {
      const url = await uploadToCloudinary(file);
      await db.setSetting('tech_spec_logo_url', url);
      setLogoUrl(url);
      notify('Logo updated');
    } catch(err) {
      notify('Upload failed: ' + err.message, 'error');
    }
    setUploading(false);
  };

  const commitWidth = async (w) => {
    setWidth(w);
    setSaving(true);
    try {
      await db.setSetting('tech_spec_logo_width', w);
    } catch(err) {
      notify('Failed to save size: ' + err.message, 'error');
    }
    setSaving(false);
  };

  const resetToDefault = async () => {
    setUploading(true);
    try {
      await db.setSetting('tech_spec_logo_url', null);
      setLogoUrl(null);
      notify('Reverted to default Maverick Horizon logo');
    } catch(err) {
      notify('Failed: ' + err.message, 'error');
    }
    setUploading(false);
  };

  return (
    <div>
      <div style={{background:'#0d1925',borderRadius:8,border:'1px solid #1e3348',padding:'24px 16px',display:'flex',justifyContent:'center',marginBottom:14}}>
        <img src={logoUrl||TECH_SPEC_LOGO} alt="Tech spec logo preview" style={{width:width,maxWidth:'100%',borderRadius:0}}/>
      </div>
      <div style={{marginBottom:14}}>
        <label className="form-label" style={{display:'flex',justifyContent:'space-between'}}>
          <span>Logo size</span>
          <span style={{color:'#C9A84C',fontFamily:'monospace'}}>{width}px{saving?' · saving…':''}</span>
        </label>
        <input type="range" min={80} max={320} step={10} value={width} onChange={e=>setWidth(+e.target.value)} onMouseUp={e=>commitWidth(+e.target.value)} onTouchEnd={e=>commitWidth(+e.target.value)} style={{width:'100%'}}/>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#475569'}}><span>80px</span><span>320px</span></div>
      </div>
      <div className="flab g8">
        <label style={{cursor:'pointer'}}>
          <input type="file" accept="image/*" onChange={e=>handleUpload(e.target.files?.[0])} style={{display:'none'}}/>
          <span className="btn btn-primary" style={{fontSize:11,padding:'7px 14px'}}>
            {uploading ? '⏳ Uploading…' : logoUrl ? 'Replace Logo' : 'Upload Custom Logo'}
          </span>
        </label>
        {logoUrl&&<button className="btn btn-ghost" style={{fontSize:11,padding:'7px 14px'}} onClick={resetToDefault}>Revert to Default</button>}
      </div>
      <p style={{fontSize:11,color:'#475569',marginTop:10}}>Applies to both the Full Aircraft and Engine tech spec cover pages.</p>
    </div>
  );
}


function DisclaimerSettings({notify}) {
  const [text, setText] = useState("");
  const [saving, setSaving] = useState(false);
  const DEFAULT_TEXT = "This outline specification has been prepared based on the information available to Maverick Horizon at the relevant time. The recipient must verify the information provided independently.";

    db.getSetting('default_disclaimer').then(v => { if(v) setText(v); });
  }, []);

  const commit = async (val) => {
    setSaving(true);
    try {
      await db.setSetting('default_disclaimer', val||null);
      notify('Disclaimer updated');
    } catch(err) {
      notify('Failed to save disclaimer: ' + err.message, 'error');
    }
    setSaving(false);

  const resetToDefault = async () => {
    setText("");

    notify('Reverted to standard disclaimer wording');

  return (
    <div>
      <textarea value={text} placeholder={DEFAULT_TEXT} onChange={e=>setText(e.target.value)} onBlur={e=>commit(e.target.value)} rows={3} style={{width:'100%',fontFamily:'inherit',fontSize:13,resize:'vertical'}}/>

function InviteUserCard({notify}){
  const[email,setEmail]=useState("");
  const[role,setRole]=useState("editor");
  const[busy,setBusy]=useState(false);
  const invite=async()=>{
    if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){notify("Enter a valid email address","error");return;}
    setBusy(true);
    try{
      const idToken=await window._auth.getIdToken();
      const resp=await fetch("/api/invite-user",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":`Bearer ${idToken}`},
        body:JSON.stringify({email,role})
      });
      const result=await resp.json();
      if(!resp.ok||result.error){throw new Error(result.error||"Invite failed.");}
      await logAudit(null,null,`Invited user ${email} as ${role}`);
      notify(`Invite sent to ${email} as ${role}`);
      setEmail("");setRole("editor");
    }catch(e){
      notify(e.message||"Could not send invite.","error");
    }
    setBusy(false);
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{display:"flex",gap:8}}>
        <input type="email" placeholder="name@company.com" value={email} onChange={e=>setEmail(e.target.value)} style={{flex:1}}/>
        <select value={role} onChange={e=>setRole(e.target.value)} style={{background:"#0d1c2c",color:"#e2e8f0",border:"1px solid #2d3f55",borderRadius:6,padding:"8px 12px",fontFamily:"inherit",fontSize:13,cursor:"pointer",width:120,flexShrink:0}}>
          <option value="editor">Editor</option>
          <option value="viewer">Viewer</option>
        </select>
        <button className="btn btn-gold" onClick={invite} disabled={busy}>{busy?"Sending…":"Send Invite"}</button>
      </div>
      <p style={{fontSize:11,color:"#475569",margin:0}}>Editor — can upload reports and edit asset data. Viewer — read-only access.</p>
    </div>
  );
}

function UsersCard({notify}){
  const[users,setUsers]=useState([]);
  const[loading,setLoading]=useState(true);
  const[busy,setBusy]=useState(null);
  const load=async()=>{
    setLoading(true);
    try{
      const idToken=await window._auth.getIdToken();
      const resp=await fetch("/api/set-role",{headers:{"Authorization":`Bearer ${idToken}`}});
      const data=await resp.json();
      if(!resp.ok)throw new Error(data.error||"Failed to load users");
      setUsers(data.users||[]);
    }catch(e){notify(e.message||"Could not load users","error");}
    setLoading(false);
  };
  useEffect(()=>{load();},[]);
  const changeRole=async(uid,newRole)=>{
    setBusy(uid);
    try{
      const idToken=await window._auth.getIdToken();
      const resp=await fetch("/api/set-role",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":`Bearer ${idToken}`},
        body:JSON.stringify({uid,role:newRole})
      });
      const data=await resp.json();
      if(!resp.ok)throw new Error(data.error||"Failed to update role");
      notify("Role updated");
      await load();
    }catch(e){notify(e.message||"Could not update role","error");}
    setBusy(null);
  };
  const roleColour={admin:"#C9A84C",editor:"#34d399",viewer:"#94a3b8"};
  if(loading)return<p style={{color:"#475569",fontSize:13}}>Loading users…</p>;
  if(!users.length)return<p style={{color:"#475569",fontSize:13}}>No users found.</p>;
  return(
    <table style={{width:"100%"}}>
      <thead><tr><th style={{textAlign:"left"}}>Email</th><th style={{textAlign:"left"}}>Role</th><th></th></tr></thead>
      <tbody>
        {users.map(u=>(
          <tr key={u.uid}>
            <td style={{fontSize:13,color:"#e2e8f0",padding:"8px 0"}}>{u.email}</td>
            <td><span style={{fontSize:11,fontWeight:700,color:roleColour[u.role]||"#94a3b8",textTransform:"uppercase",letterSpacing:"0.05em"}}>{u.role||"—"}</span></td>
            <td style={{textAlign:"right"}}>
              {u.role!=="admin"&&(
                <select value={u.role||""} onChange={e=>changeRole(u.uid,e.target.value)} disabled={busy===u.uid}
                  style={{background:"#0d1c2c",color:"#e2e8f0",border:"1px solid #2d3f55",borderRadius:6,padding:"5px 10px",fontFamily:"inherit",fontSize:12,cursor:"pointer"}}>
                  <option value="editor">Editor</option>
                  <option value="viewer">Viewer</option>
                </select>
              )}
              {u.role==="admin"&&<span style={{fontSize:11,color:"#475569"}}>Protected</span>}
            </td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

function PortfolioView({assets, notify, onSelect}){
  const[shareOpenId,setShareOpenId]=useState(null);
  const ageFromDOM=(dom)=>{
    if(!dom)return null;
    let d;
    const mmYYYY=/^(\d{2})\/(\d{4})$/.exec(dom);
    if(mmYYYY){
      // MM/YYYY (the format used by Quick Import extraction and the Overview
      // tab's Date of Manufacture field) isn't parseable by `new Date()` directly.
      d=new Date(+mmYYYY[2],+mmYYYY[1]-1,1);
    }else{
      d=new Date(dom);
    }
    if(isNaN(d))return null;
    const years=(new Date()-d)/(1000*60*60*24*365.25);
    return years.toFixed(1);
  };
  const nextCheck=(asset)=>{
    const dates=(asset.checks||[]).map(c=>c.nextDate).filter(Boolean);
    if(!dates.length)return null;
    return dates.sort()[0];
  };
  const soonestGear=(asset)=>{
    const dates=["nose","left","right"].map(k=>asset.landingGear?.[k]?.nextDue).filter(Boolean);
    if(!dates.length)return null;
    return dates.sort()[0];
  };
  const llpCol=(v)=>v===null?"#94a3b8":v<1000?"#dc2626":v<3000?"#d97706":"#16a34a";
  const llpBg=(v)=>v===null?"#f8fafc":v<1000?"#fef2f2":v<3000?"#fffbeb":"#f0fdf4";
  const llpBorder=(v)=>v===null?"#e2e8f0":v<1000?"#fca5a5":v<3000?"#fcd34d":"#86efac";
  const dateBg=(d)=>d===null?"#f8fafc":d<0?"#fef2f2":d<365?"#fffbeb":"#f8fafc";
  const dateCol=(d)=>d===null?"#94a3b8":d<0?"#dc2626":d<365?"#d97706":"#334155";
  const dateBorder=(d)=>d===null?"#e2e8f0":d<0?"#fca5a5":d<365?"#fcd34d":"#e2e8f0";
  const statusLabel={critical:{text:"Critical",bg:"#fef2f2",color:"#dc2626",border:"#fca5a5"},warn:{text:"Attention",bg:"#fffbeb",color:"#d97706",border:"#fcd34d"},ok:{text:"All Clear",bg:"#f0fdf4",color:"#16a34a",border:"#86efac"}};

  return(
    <div style={{background:"#f1f5f9",minHeight:"100vh",margin:"-20px -22px",padding:"32px 28px",animation:"fadeIn 0.2s ease"}}>
      <div style={{maxWidth:1400,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:32}}>
          <div>
            <h1 style={{fontSize:28,fontWeight:800,color:"#0f172a",letterSpacing:"-0.02em"}}>Fleet Portfolio</h1>
            <p style={{color:"#64748b",fontSize:14,marginTop:4,fontWeight:500}}>{assets.length} aircraft · {new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"})}</p>
          </div>
  
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(380px,1fr))",gap:20}}>
          {assets.map(a=>{
            const st=assetStatus(a);
            const af=a.airframe||{};
            const eng1=a.engines?.[0];const eng2=a.engines?.[1];
            const ll1=lowestLimiter(eng1);const ll2=lowestLimiter(eng2);
            const apuLL=a.apu?.llps?.length?Math.min(...a.apu.llps.map(l=>calcLLPRem(l,a.apu.currentFC))):null;
            const gearDate=soonestGear(a);
            const checkDate=nextCheck(a);
            const gearDays=daysFromNow(gearDate);
            const checkDays=daysFromNow(checkDate);
            const sl=statusLabel[st];

            return(
              <div key={a.id}
                style={{background:"#ffffff",borderRadius:14,border:"1px solid #e2e8f0",
                  boxShadow:"0 4px 16px rgba(0,0,0,0.06)",cursor:"pointer",
                  transition:"all 0.2s",overflow:"hidden"}}
                onClick={()=>onSelect(a.id)}
                onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow="0 12px 32px rgba(0,0,0,0.12)";}}
                onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,0.06)";}}
              >
                {/* Status bar at top */}
                <div style={{height:4,background:st==="critical"?"#dc2626":st==="warn"?"#d97706":"#16a34a"}}/>

                <div style={{padding:22}}>
                  {/* Header */}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:3}}>
                        <span style={{fontSize:24,fontWeight:800,color:"#0f172a",fontFamily:"monospace",letterSpacing:"0.02em"}}>{a.msn}</span>
                        <span style={{fontSize:16,fontWeight:700,color:"#334155"}}>{a.registration||"—"}</span>
                      </div>
                      <div style={{fontSize:12,color:"#64748b",fontWeight:500}}>{a.model||"—"} · {a.operator||"—"}</div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
                      <span style={{background:sl.bg,color:sl.color,border:`1px solid ${sl.border}`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700}}>{sl.text}</span>
                      {ageFromDOM(a.dom)!==null&&<span style={{fontSize:11,color:"#94a3b8",fontWeight:600}}>{ageFromDOM(a.dom)} yrs old</span>}
                    </div>
                  </div>

                  {/* Airframe */}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
                    {[["Airframe TSN",fmtHHMM(af.currentFH)],["Airframe CSN",(af.currentFC||0).toLocaleString()]].map(([l,v])=>(
                      <div key={l} style={{background:"#f8fafc",borderRadius:8,padding:"10px 12px",border:"1px solid #e2e8f0"}}>
                        <div style={{fontSize:9,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:3}}>{l}</div>
                        <div style={{fontSize:18,fontWeight:800,color:"#0f172a",fontFamily:"monospace"}}>{v}</div>
                      </div>
                    ))}
                  </div>

                  {/* LLP Section */}
                  <div style={{marginBottom:14}}>
                    <div style={{fontSize:9,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:7}}>Life Limited Parts — FC Remaining</div>
                    <div style={{display:"flex",flexDirection:"column",gap:4}}>
                      {[[`Eng 1${eng1?.sn?` · ${eng1.sn}`:""}`,ll1],[`Eng 2${eng2?.sn?` · ${eng2.sn}`:""}`,ll2],["APU",apuLL]].map(([label,val])=>(
                        <div key={label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:llpBg(val),borderRadius:6,padding:"7px 11px",border:`1px solid ${llpBorder(val)}`}}>
                          <span style={{fontSize:11,color:"#475569",fontWeight:600}}>{label}</span>
                          <span style={{fontSize:13,fontWeight:800,color:llpCol(val),fontFamily:"monospace"}}>{val!==null?val.toLocaleString()+" FC":"No data"}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Dates */}
                  <div style={{marginBottom:18}}>
                    <div style={{fontSize:9,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:7}}>Key Events</div>
                    <div style={{display:"flex",flexDirection:"column",gap:4}}>
                      {[["Next Gear Overhaul",gearDate,gearDays],["Next Major Check",checkDate,checkDays]].map(([label,date,days])=>(
                        <div key={label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:dateBg(days),borderRadius:6,padding:"7px 11px",border:`1px solid ${dateBorder(days)}`}}>
                          <span style={{fontSize:11,color:"#475569",fontWeight:600}}>{label}</span>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontSize:12,fontWeight:700,color:dateCol(days)}}>{date?fmtDate(date):"Not entered"}</div>
                            {days!==null&&<div style={{fontSize:10,color:dateCol(days),opacity:0.8}}>{days<0?`${Math.abs(days)}d overdue`:days===0?"Today":`${days}d`}</div>}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Footer */}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:14,borderTop:"1px solid #f1f5f9"}}>
                    <span style={{fontSize:11,color:"#94a3b8",fontWeight:500}}>{a._lastPeriod||"No report"}</span>
                    <div style={{display:"flex",gap:8}}>
                      <button style={{background:"transparent",color:"#475569",border:"1px solid #e2e8f0",borderRadius:7,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:"pointer",letterSpacing:"0.03em",transition:"all 0.15s"}}
                        onClick={e=>{e.stopPropagation();setShareOpenId(a.id);}}>
                        🔗 Share
                      </button>
                      <button style={{background:"#C9A84C",color:"#0a1520",border:"none",borderRadius:7,padding:"8px 16px",fontSize:12,fontWeight:700,cursor:"pointer",letterSpacing:"0.03em",transition:"all 0.15s"}}
                        onMouseEnter={e=>e.currentTarget.style.background="#d4b060"}
                        onMouseLeave={e=>e.currentTarget.style.background="#C9A84C"}
                        onClick={async e=>{
                          e.stopPropagation();
                          const isCFMAsset=isCFM(a);
                          const photoKey=isCFMAsset?"engine_photo_cfm56":"engine_photo_v2500";
                          const engPhoto=await db.getSetting(photoKey).catch(()=>null)||"";
                          const logo=await getTechSpecLogo();
                          const defaultDisclaimer=await getDefaultDisclaimer();
                          openTechSpec(buildTechSpecHTML(a,engPhoto,logo,defaultDisclaimer));
                        }}>
                        📋 Tech Spec
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
          {assets.length===0&&(
            <div style={{gridColumn:"1/-1",textAlign:"center",padding:80,color:"#94a3b8"}}>
              <div style={{fontSize:48,marginBottom:16}}>✈</div>
              <p style={{fontSize:16,fontWeight:600,color:"#334155"}}>No assets in portfolio</p>
              <p style={{fontSize:13,marginTop:8}}>Go to Admin to add your first aircraft</p>
            </div>
          )}
        </div>
      </div>
      {shareOpenId&&<ShareModal asset={assets.find(x=>x.id===shareOpenId)} notify={notify} onClose={()=>setShareOpenId(null)}/>}
    </div>
  );
}

// ---------------------------------------------------------------------------
// Prospect Asset Flow (ad hoc / deal-evaluation aircraft)
// Completely separate from the live fleet: own list view, own 50/50
// editor+live-preview UI. Viewer role gets full create/edit rights here even
// though Viewers can't touch the live fleet — permission is per-asset-type,
// not per-role, for this feature. Uses the exact same buildTechSpecHTML()
// generator as the live fleet's "Generate Tech Spec" button, so a prospect
// spec and a live spec are pixel-identical in output.
// ---------------------------------------------------------------------------
function ProspectListView({assets,saveAsset,notify,userRole,onSelect,loadAssets}){
  const canDelete=userRole==='admin'||userRole==='editor';
  const[showNew,setShowNew]=useState(false);
  const[kind,setKind]=useState("aircraft"); // "aircraft" | "engine"
  const[shareOpenId,setShareOpenId]=useState(null);
  const[newA,setNewA]=useState({msn:"",registration:"",model:"A320-214",operator:"",manufacturer:"Airbus S.A.S.",dom:""});
  const[newE,setNewE]=useState({esn:"",engineType:"",thrust:""});
  const createProspect=async()=>{
    if(kind==="aircraft"){
      if(!newA.msn){notify("MSN required","error");return;}
      const blank=makeBlankAsset(newA,"prospect");
      blank.prospectKind="aircraft";
      await saveAsset(blank);
      setShowNew(false);
      setNewA({msn:"",registration:"",model:"A320-214",operator:"",manufacturer:"Airbus S.A.S.",dom:""});
      notify(`Prospect MSN ${blank.msn} created`);
      onSelect(blank.id);
    } else {
      if(!newE.esn){notify("ESN required","error");return;}
      const blank=makeBlankEngineProspect(newE);
      await saveAsset(blank);
      setShowNew(false);
      setNewE({esn:"",engineType:"",thrust:""});
      notify(`Prospect ESN ${blank.engines[0].sn} created`);
      onSelect(blank.id);
    }
  };
  const deleteProspect=async(id)=>{
    if(!confirm(`Delete prospect ${id}? This cannot be undone.`))return;
    await db.deleteAsset(id);
    await logAudit(id,id,"Deleted prospect asset");
    await loadAssets();
    notify("Prospect deleted");
  };
  return(
    <div>
      <div className="flj" style={{marginBottom:14}}>
        <div>
          <h1 style={{fontSize:20,color:"#C9A84C",fontWeight:700}}>Prospect Assets</h1>
          <p style={{color:"#475569",fontSize:12}}>Ad hoc / deal-evaluation aircraft and engines — kept separate from the live fleet. Anyone can create and edit prospects.</p>
        </div>
        <button className="btn btn-gold" onClick={()=>setShowNew(true)}>+ New Prospect</button>
      </div>
      {showNew&&(
        <div className="card" style={{padding:20,marginBottom:16}}>
          <div className="flab g8" style={{marginBottom:14}}>
            <button type="button" onClick={()=>setKind("aircraft")} className="btn" style={{fontSize:12,padding:"6px 14px",background:kind==="aircraft"?"#C9A84C":"transparent",color:kind==="aircraft"?"#0a1520":"#94a3b8",border:"1px solid #C9A84C",fontWeight:700}}>✈ Whole Aircraft</button>
            <button type="button" onClick={()=>setKind("engine")} className="btn" style={{fontSize:12,padding:"6px 14px",background:kind==="engine"?"#C9A84C":"transparent",color:kind==="engine"?"#0a1520":"#94a3b8",border:"1px solid #C9A84C",fontWeight:700}}>⚙ Standalone Engine</button>
          </div>
          {kind==="aircraft"?(
            <>
              <div className="section-title">New Prospect Aircraft</div>
              <div className="grid3" style={{gap:10,marginBottom:12}}>
                {[["MSN *","msn"],["Registration","registration"],["Model","model"],["Operator","operator"],["Manufacturer","manufacturer"]].map(([l,k])=>(
                  <div key={k}><label className="form-label">{l}</label><input value={newA[k]||""} onChange={e=>setNewA({...newA,[k]:e.target.value})} className={!newA[k]&&k==="msn"?"amber":""}/></div>
                ))}
                <div><label className="form-label">Date of Manufacture</label><input type="date" value={newA.dom} onChange={e=>setNewA({...newA,dom:e.target.value})}/></div>
              </div>
            </>
          ):(
            <>
              <div className="section-title">New Prospect Engine</div>
              <p style={{fontSize:11,color:"#94a3b8",marginBottom:10}}>For evaluating a bare spare engine deal — no airframe attached. Produces a standalone engine tech spec.</p>
              <div className="grid3" style={{gap:10,marginBottom:12}}>
                <div><label className="form-label">ESN *</label><input value={newE.esn} onChange={e=>setNewE({...newE,esn:e.target.value})} className={!newE.esn?"amber":""}/></div>
                <div><label className="form-label">Engine Type</label><input value={newE.engineType} onChange={e=>setNewE({...newE,engineType:e.target.value})}/></div>
                <div><label className="form-label">Thrust</label><input value={newE.thrust} onChange={e=>setNewE({...newE,thrust:e.target.value})}/></div>
              </div>
            </>
          )}
          <div className="flab g8"><button className="btn btn-ghost" onClick={()=>setShowNew(false)}>Cancel</button><button className="btn btn-gold" onClick={createProspect}>Create & Open Editor</button></div>
        </div>
      )}
      <div className="grid3" style={{gap:14}}>
        {assets.length===0&&!showNew&&(
          <div style={{gridColumn:"1/-1",textAlign:"center",padding:60,color:"#475569"}}>
            <div style={{fontSize:40,marginBottom:12}}>📋</div>
            <p style={{fontSize:14,fontWeight:600}}>No prospect assets yet</p>
            <p style={{fontSize:12,marginTop:6}}>Create one to evaluate a deal — generate an indicative tech spec without touching the live fleet.</p>
          </div>
        )}
        {assets.map(a=>{
          const isEngine=a.prospectKind==="engine";
          return(
            <div key={a.id} className="card" style={{padding:16,cursor:"pointer"}} onClick={()=>onSelect(a.id)}>
              <div className="flj" style={{marginBottom:8}}>
                <span style={{fontWeight:700,color:"#C9A84C",fontFamily:"monospace",fontSize:14}}>{isEngine?`⚙ ESN ${a.engines?.[0]?.sn||"—"}`:a.msn}</span>
                {canDelete&&<button className="btn-danger btn" style={{fontSize:10,padding:"3px 8px"}} onClick={e=>{e.stopPropagation();deleteProspect(a.id);}}>Delete</button>}
              </div>
              {isEngine?(
                <>
                  <div style={{fontSize:13,fontWeight:600,color:"#e2e8f0"}}>{a.engines?.[0]?.type||"Engine type not entered"}</div>
                  <div style={{fontSize:12,color:"#94a3b8"}}>{a.engines?.[0]?.thrust||"—"} thrust</div>
                </>
              ):(
                <>
                  <div style={{fontSize:13,fontWeight:600,color:"#e2e8f0"}}>{a.registration||"No registration yet"}</div>
                  <div style={{fontSize:12,color:"#94a3b8"}}>{a.model} · {a.operator||"—"}</div>
                </>
              )}
              <div className="flab g8" style={{marginTop:12}}>
                <button className="btn btn-ghost" style={{flex:1,fontSize:11,padding:"7px 0"}} onClick={e=>{e.stopPropagation();setShareOpenId(a.id);}}>🔗 Share</button>
                <button className="btn btn-ghost" style={{flex:1,fontSize:11,padding:"7px 0"}} onClick={e=>{e.stopPropagation();generateTechSpec(a);}}>📋 Tech Spec</button>
              </div>
              <button className="btn btn-gold" style={{width:"100%",marginTop:8,fontSize:12,padding:"7px 0"}} onClick={e=>{e.stopPropagation();onSelect(a.id);}}>Open Editor →</button>
            </div>
          );
        })}
      </div>
      {shareOpenId&&<ShareModal asset={assets.find(x=>x.id===shareOpenId)} notify={notify} onClose={()=>setShareOpenId(null)}/>}
    </div>
  );
}

// Compact labelled field used throughout the ProspectEditor left panel.
// Uncontrolled (defaultValue) + onBlur, matching the rest of the app's
// edit-then-blur-to-commit pattern — here the blur both persists to Firestore
// and regenerates the live preview on the right.
function PField({label,val,onCommit,type="text",placeholder}){
  return(
    <div className="form-group">
      <label className="form-label">{label}</label>
      <input type={type} defaultValue={val??""} placeholder={placeholder||""} onBlur={e=>onCommit(type==="number"?(e.target.value===""?null:+e.target.value):e.target.value)}/>
    </div>
  );
}

function ProspectEditor({asset,saveAsset,notify,onBack}){
  const[form,setForm]=useState(()=>JSON.parse(JSON.stringify(asset)));
  const[previewHtml,setPreviewHtml]=useState("");
  const[saving,setSaving]=useState(false);
  const[shareOpen,setShareOpen]=useState(false);
  const assetsRef=useRef(form);
  assetsRef.current=form;

  const regeneratePreview=useCallback(async(current)=>{
    const specAsset=current.prospectKind==="engine"?{...current,_engineOnly:true,_enginePos:1}:current;
    const isCFMAsset=isCFM(specAsset);
    const photoKey=isCFMAsset?"engine_photo_cfm56":"engine_photo_v2500";
    const[engPhoto,logo,defaultDisclaimer]=await Promise.all([
      db.getSetting(photoKey).catch(()=>null),
      getTechSpecLogo(),
      getDefaultDisclaimer()
    ]);
    setPreviewHtml(buildTechSpecHTML(specAsset,engPhoto,logo,defaultDisclaimer));
  },[]);

  useEffect(()=>{regeneratePreview(form);},[]); // eslint-disable-line

  // commit() persists the whole form on blur — save + refresh preview in one
  // step, so Viewer-tier users never need to find a separate Save button.
  const assetLabel=(f)=>f.prospectKind==="engine"?`ESN ${f.engines?.[0]?.sn||"—"}`:`MSN ${f.msn}`;
  const commit=async(path,val)=>{
    const f=JSON.parse(JSON.stringify(assetsRef.current));
    const parts=path.split(".");let obj=f;
    for(let i=0;i<parts.length-1;i++){if(!obj[parts[i]])obj[parts[i]]={};obj=obj[parts[i]];}
    obj[parts[parts.length-1]]=val;
    setForm(f);
    setSaving(true);
    try{
      await saveAsset(f,`Updated prospect ${assetLabel(f)}`);
      await regeneratePreview(f);
    }catch(e){notify("Save failed: "+e.message,"error");}
    setSaving(false);
  };
  // Same idea but for callers that already have the fully-mutated object in
  // hand (e.g. auto-calculated Next Due, kg/lb weight conversion, hidden-field
  // toggles) — avoids clone-then-reclone.
  const commitObject=async(f)=>{
    setForm(f);
    setSaving(true);
    try{
      await saveAsset(f,`Updated prospect ${assetLabel(f)}`);
      await regeneratePreview(f);
    }catch(e){notify("Save failed: "+e.message,"error");}
    setSaving(false);
  };
  // PhotoManager/LopaCropTool are self-contained — they call saveAsset(mergedAsset)
  // themselves rather than going through commit()/commitObject(). This wrapper
  // gives them the real saveAsset behaviour while still syncing local form state
  // and refreshing the live preview afterwards, exactly like every other field.
  const photoSaveAsset=async(updatedAsset,action)=>{
    setForm(updatedAsset);
    setSaving(true);
    try{
      await saveAsset(updatedAsset,action||`Updated prospect ${assetLabel(updatedAsset)} photos`);
      await regeneratePreview(updatedAsset);
    }catch(e){notify("Save failed: "+e.message,"error");}
    setSaving(false);
  };
  const toggle=(path)=>{
    const parts=path.split(".");let cur=assetsRef.current;for(const p of parts)cur=cur?.[p];
    commit(path,!cur);
  };
  const hiddenFields=form.hiddenSpecFields||[];
  const toggleHide=(path)=>{
    const f=JSON.parse(JSON.stringify(assetsRef.current));
    const hidden=f.hiddenSpecFields||[];
    const idx=hidden.indexOf(path);
    if(idx>=0)hidden.splice(idx,1);else hidden.push(path);
    f.hiddenSpecFields=hidden;
    commitObject(f);
  };

  const d=form;
  const af=d.airframe||{};
  const specs=d.specs||{};

  // Specs are rendered as one ordered list (matching Alan's reference sheet
  // exactly, including label wording and sequence) rather than grouped
  // sub-sections. tabIndex={-1} on the 👁/🚫 toggle keeps it out of the way
  // so Tab moves straight from one field's input to the next field's input.
  const SPEC_FIELDS=[
    {label:"Aircraft Configuration",path:"specs.config",kind:"text"},
    {label:"Passenger Seating Config",path:"specs.seatConfig",kind:"text"},
    {label:"Passenger Seating Manufacturer",path:"specs.seatMfr",kind:"text"},
    {label:"Passenger Seats P/N",path:"specs.seatPN",kind:"text"},
    {label:"Attendant Seats",path:"specs.attendantSeats",kind:"text"},
    {label:"Galleys Installed",path:"specs.galleys",kind:"text"},
    {label:"Lavatories",path:"specs.lavs",kind:"text"},
    {label:"Winglets",path:"specs.winglets",kind:"text"},
    {label:"Cockpit Door Surveillance System",path:"specs.cdss",kind:"toggle"},
    {label:"Reinforced Flight Deck Door",path:"specs.rfdd",kind:"toggle"},
    {label:"QAR",path:"specs.qar",kind:"toggle"},
    {label:"Electronic Flight Bag",path:"specs.efb",kind:"toggle"},
    {label:"Enhanced Mode-S",path:"specs.modeS",kind:"toggle"},
    {label:"ADS-B",path:"specs.adsb",kind:"toggle"},
    {label:"CPDLC",path:"specs.cpdlc",kind:"toggle"},
    {label:"TCAS 7.1",path:"specs.tcas",kind:"toggle"},
    {label:"Cargo",path:"specs.cargoType",kind:"text"},
  ];
  const SpecRow=({label,path,kind})=>{
    const parts=path.split(".");const val=parts.reduce((o,k)=>o?.[k],d);
    const isHidden=hiddenFields.includes(path);
    return(
      <div className="flj" style={{padding:"6px 0",borderBottom:"1px solid #0f2030",opacity:isHidden?0.4:1,gap:10}}>
        <span style={{fontSize:12,color:"#94a3b8",flexShrink:0,width:230}}>{label}</span>
        {kind==="text"
          ?<input type="text" defaultValue={val||""} onBlur={e=>commit(path,e.target.value)} style={{flex:1,fontSize:12}}/>
          :<button type="button" onClick={()=>toggle(path)} className="pill" style={{background:val?"#0d2818":"#2a0e0e",color:val?"#34d399":"#f87171",border:"none",cursor:"pointer",fontSize:11,flex:1,textAlign:"center"}}>{val?"Installed":"Not Installed"}</button>}
        <button type="button" tabIndex={-1} onClick={()=>toggleHide(path)} title={isHidden?"Show in tech spec":"Hide from tech spec"} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:isHidden?"#475569":"#C9A84C",padding:"0 4px",flexShrink:0}}>{isHidden?"🚫":"👁"}</button>
      </div>
    );
  };
  const weightRow=(label,kKg,kLb)=>(
    <tr key={kKg}>
      <td style={{color:"#64748b"}}>{label}</td>
      <td><input type="number" defaultValue={d.weights?.[kKg]||""} onBlur={e=>{
        const kg=e.target.value===""?"":+e.target.value;
        const f=JSON.parse(JSON.stringify(assetsRef.current));
        if(!f.weights)f.weights={};
        f.weights[kKg]=kg;
        f.weights[kLb]=kg?Math.round(kg*2.20462):"";
        commitObject(f);
      }} style={{width:100}}/></td>
      <td style={{color:"#475569"}}><input type="number" defaultValue={d.weights?.[kLb]||""} onBlur={e=>{
        const lb=e.target.value===""?"":+e.target.value;
        const f=JSON.parse(JSON.stringify(assetsRef.current));
        if(!f.weights)f.weights={};
        f.weights[kLb]=lb;
        f.weights[kKg]=lb?Math.round(lb/2.20462):"";
        commitObject(f);
      }} style={{width:100}}/></td>
    </tr>
  );

  const isEngineProspect=d.prospectKind==="engine";
  const specAsset=isEngineProspect?{...d,_engineOnly:true,_enginePos:1}:d;

  return(
    <div style={{animation:"fadeIn 0.2s ease"}}>
      <div className="flab g12" style={{marginBottom:16}}>
        <button className="btn btn-ghost" onClick={onBack}>← Prospects</button>
        <div style={{flex:1}}>
          {isEngineProspect?(
            <>
              <h1 style={{fontSize:18,color:"#C9A84C",fontWeight:700}}>Prospect Engine — ESN {d.engines?.[0]?.sn||"—"}</h1>
              <p style={{color:"#475569",fontSize:12}}>{d.engines?.[0]?.type||"Engine type not entered"} {saving&&<span style={{color:"#94a3b8"}}> · saving…</span>}</p>
            </>
          ):(
            <>
              <h1 style={{fontSize:18,color:"#C9A84C",fontWeight:700}}>Prospect MSN {d.msn} — {d.registration||"—"}</h1>
              <p style={{color:"#475569",fontSize:12}}>{d.model} · {d.operator||"—"} {saving&&<span style={{color:"#94a3b8"}}> · saving…</span>}</p>
            </>
          )}
        </div>
        <button className="btn btn-ghost" style={{fontSize:12,padding:"8px 16px"}} onClick={()=>setShareOpen(true)}>🔗 Share</button>
        <button className="btn btn-gold" style={{fontSize:12,padding:"8px 16px"}} onClick={()=>generateTechSpec(specAsset)}>📋 Generate Tech Spec</button>
      </div>
      <div className="prospect-split" style={{display:"flex",gap:18,alignItems:"flex-start"}}>
        <div style={{flex:"1 1 50%",minWidth:0,display:"flex",flexDirection:"column",gap:14,maxHeight:"calc(100vh - 160px)",overflowY:"auto",paddingRight:6}}>

          {!isEngineProspect&&(<>
          <div className="card" style={{padding:18}}>
            <div className="section-title">Overview</div>
            <div className="grid2" style={{gap:"0 16px"}}>
              <PField label="MSN" val={d.msn} onCommit={v=>commit("msn",v)}/>
              <PField label="Registration" val={d.registration} onCommit={v=>commit("registration",v)}/>
              <div className="form-group">
                <label className="form-label" style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                  <span>{d.operatorLabel||"Current Operator"}</span>
                  <button type="button" tabIndex={-1} onClick={()=>commit("operatorLabel",d.operatorLabel==="Previous Operator"?"Current Operator":"Previous Operator")} style={{fontSize:9,fontWeight:700,padding:"1px 7px",borderRadius:3,border:"1px solid #C9A84C",background:"none",color:"#C9A84C",cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.05em",flexShrink:0}}>{"→ "+(d.operatorLabel==="Previous Operator"?"Current":"Previous")}</button>
                </label>
                <input type="text" defaultValue={d.operator||""} onBlur={e=>commit("operator",e.target.value)}/>
              </div>
              <PField label="Model" val={d.model} onCommit={v=>commit("model",v)}/>
              <PField label="Manufacturer" val={d.manufacturer} onCommit={v=>commit("manufacturer",v)}/>
              <PField label="Date of Manufacture" val={d.dom} type="date" onCommit={v=>commit("dom",v)}/>
            </div>
            <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid #1e3048"}}>
              <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",marginBottom:8}}>Current Airframe</div>
              <div className="grid2" style={{gap:"0 16px"}}>
                <PField label="Airframe TSN (HH:MM)" val={af.currentFH} onCommit={v=>commit("airframe.currentFH",parseHHMM(v))} placeholder="0:00"/>
                <PField label="Airframe CSN" val={af.currentFC} type="number" onCommit={v=>commit("airframe.currentFC",v)}/>
              </div>
            </div>
          </div>

          <div className="card" style={{padding:18}}>
            <div className="section-title">Operating Weights</div>
            <table><thead><tr><th>Parameter</th><th>kg</th><th>lb</th></tr></thead><tbody>
              {weightRow("MTOW","mtow","mtow_lb")}
              {weightRow("Max Taxi","mtw","mtw_lb")}
              {weightRow("MZFW","mzfw","mzfw_lb")}
              {weightRow("MLW","mlw","mlw_lb")}
            </tbody></table>
          </div>

          <div className="card" style={{padding:18}}>
            <div className="section-title">Specifications</div>
            <div style={{fontSize:10,color:"#475569",marginBottom:10}}>👁 fields appear in the generated tech spec; 🚫 fields are entered here but hidden from the output.</div>
            {SPEC_FIELDS.map(f=><SpecRow key={f.path} {...f}/>)}
            <div style={{marginTop:14}}>
              <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Custom Fields</div>
              {[0,1,2,3,4].map(idx=>{
                const cf=(d.specs?.custom||[])[idx]||{label:"",value:""};
                return(
                  <div key={idx} className="flab g8" style={{marginBottom:6}}>
                    <input placeholder="Field name" defaultValue={cf.label||""} onBlur={e=>{
                      const f=JSON.parse(JSON.stringify(assetsRef.current));
                      if(!f.specs)f.specs={};if(!f.specs.custom)f.specs.custom=[{},{},{},{},{}];
                      while(f.specs.custom.length<5)f.specs.custom.push({});
                      f.specs.custom[idx]={...f.specs.custom[idx],label:e.target.value};
                      commitObject(f);
                    }} style={{width:160,fontStyle:"italic",color:"#64748b"}}/>
                    <input placeholder="Value" defaultValue={cf.value||""} onBlur={e=>{
                      const f=JSON.parse(JSON.stringify(assetsRef.current));
                      if(!f.specs)f.specs={};if(!f.specs.custom)f.specs.custom=[{},{},{},{},{}];
                      while(f.specs.custom.length<5)f.specs.custom.push({});
                      f.specs.custom[idx]={...f.specs.custom[idx],value:e.target.value};
                      commitObject(f);
                    }} style={{flex:1}}/>
                  </div>
                );
              })}
            </div>
          </div>
          </>)}

          {(isEngineProspect?[0]:[0,1]).map(ei=>{
            const eng=d.engines?.[ei]||{};
            return(
              <div className="card" key={ei} style={{padding:18}}>
                <div className="flj">
                  <div className="section-title" style={{margin:0}}>{isEngineProspect?"Engine":`Engine #${ei+1}`}</div>
                  {!isEngineProspect&&<button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>generateTechSpec({...d,engines:[eng],_engineOnly:true,_enginePos:eng.position||ei+1})}>📋 Standalone Engine Spec</button>}
                </div>
                <div className="grid2" style={{gap:"0 16px"}}>
                  <PField label="Serial Number" val={eng.sn} onCommit={v=>commit(`engines.${ei}.sn`,v)}/>
                  <PField label="Engine Type" val={eng.type} onCommit={v=>commit(`engines.${ei}.type`,v)}/>
                  <PField label="Thrust" val={eng.thrust} onCommit={v=>commit(`engines.${ei}.thrust`,v)}/>
                  <PField label="Status" val={eng.status} onCommit={v=>commit(`engines.${ei}.status`,v)}/>
                  <PField label="TSN (HH:MM)" val={eng.currentFH} onCommit={v=>commit(`engines.${ei}.currentFH`,parseHHMM(v))} placeholder="0:00"/>
                  <PField label="CSN" val={eng.currentFC} type="number" onCommit={v=>commit(`engines.${ei}.currentFC`,v)}/>
                </div>
                <div style={{marginTop:10,fontSize:11,color:"#475569",fontStyle:"italic"}}>{eng.llps?.length?`${eng.llps.length} LLP line(s) recorded.`:"No LLP data yet."}</div>
              </div>
            );
          })}

          <div className="card" style={{padding:18}}>
            <div className="section-title">Engine LLP Extraction</div>
            <p style={{fontSize:11,color:"#94a3b8"}}>{isEngineProspect?"Upload the Engine LLP Status Sheet (PDF) for this engine.":"Upload the Engine LLP Status Sheet (PDF) — it covers both engines. Extracted rows are matched to the engine slot by serial number where possible, otherwise applied in sheet order."}</p>
            <LLPExtractor kind="llp" label="Engine LLP Sheet (PDF)" notify={notify} onApply={parsed=>{
              const f=JSON.parse(JSON.stringify(assetsRef.current));
              const engines=f.engines||[];
              (parsed.engines||[]).forEach((eng,i)=>{
                if(!eng.esn&&!eng.llps?.length)return;
                let idx=engines.findIndex(e=>e.sn&&eng.esn&&e.sn===eng.esn);
                if(idx===-1)idx=i; // no S/N match yet (fresh prospect) — fall back to sheet order
                if(!engines[idx])return;
                const refCSN=eng.csn||0;
                engines[idx]={
                  ...engines[idx],
                  sn:engines[idx].sn||eng.esn||engines[idx].sn,
                  type:engines[idx].type||eng.engine_type||engines[idx].type,
                  llps:(eng.llps||[]).map(l=>({desc:l.desc,pn:l.pn,sn:l.sn,startFCRem:l.fc_remaining,refFC:refCSN,approvedLife:(l.cycle_limit===undefined?null:l.cycle_limit)}))
                };
              });
              f.engines=engines;
              commitObject(f);
            }}/>
          </div>

          {!isEngineProspect&&(<>
          {[["nose","Nose Landing Gear"],["left","LH Main Landing Gear"],["right","RH Main Landing Gear"]].map(([k,label])=>{
            const g=d.landingGear?.[k]||{};
            return(
              <div className="card" key={k} style={{padding:18}}>
                <div className="section-title">{label}</div>
                <div className="grid2" style={{gap:"0 16px"}}>
                  <PField label="Manufacturer" val={g.mfr} onCommit={v=>commit(`landingGear.${k}.mfr`,v)}/>
                  <PField label="Part Number" val={g.pn} onCommit={v=>commit(`landingGear.${k}.pn`,v)}/>
                  <PField label="Serial Number" val={g.sn} onCommit={v=>commit(`landingGear.${k}.sn`,v)}/>
                  <PField key={"nextdue-"+(g.nextDue||"")} label="Next Overhaul Due" val={g.nextDue} type="date" onCommit={v=>commit(`landingGear.${k}.nextDue`,v)}/>
                  <PField label="Last Overhaul Date" val={g.lastOverhaulDate} type="date" onCommit={v=>{
                    // Mirror the live-fleet auto-calc: if Next Due is still blank,
                    // derive it from Last Overhaul Date + overhaulIntervalYears (default 10yr).
                    const f=JSON.parse(JSON.stringify(assetsRef.current));
                    const leg=f.landingGear[k];
                    leg.lastOverhaulDate=v;
                    if(v&&!leg.nextDue){
                      const yrs=leg.overhaulIntervalYears||10;
                      const m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(v);
                      if(m)leg.nextDue=(+m[1]+yrs)+"-"+m[2]+"-"+m[3];
                    }
                    commitObject(f);
                  }}/>
                  <PField label="Last OH FC" val={g.lastOverhaulFC} type="number" onCommit={v=>commit(`landingGear.${k}.lastOverhaulFC`,v)}/>
                </div>
                <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #1e3048"}}>
                  <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",marginBottom:8}}>Current Totals (Ground Truth)</div>
                  <div className="grid2" style={{gap:"0 16px"}}>
                    <PField label="Leg TSN (HH:MM)" val={g.currentFH} onCommit={v=>commit(`landingGear.${k}.currentFH`,parseHHMM(v))} placeholder="0:00"/>
                    <PField label="Leg CSN" val={g.currentFC} type="number" onCommit={v=>commit(`landingGear.${k}.currentFC`,v)}/>
                  </div>
                </div>
              </div>
            );
          })}

          <div className="card" style={{padding:18}}>
            <div className="section-title">APU</div>
            <div className="grid2" style={{gap:"0 16px"}}>
              <PField label="Manufacturer" val={d.apu?.mfr} onCommit={v=>commit("apu.mfr",v)}/>
              <PField label="Part Number" val={d.apu?.pn} onCommit={v=>commit("apu.pn",v)}/>
              <PField label="Serial Number" val={d.apu?.sn} onCommit={v=>commit("apu.sn",v)}/>
              <PField label="TSN (HH:MM)" val={d.apu?.currentFH} onCommit={v=>commit("apu.currentFH",parseHHMM(v))} placeholder="0:00"/>
              <PField label="CSN" val={d.apu?.currentFC} type="number" onCommit={v=>commit("apu.currentFC",v)}/>
            </div>
            <div style={{marginTop:10,fontSize:11,color:"#475569",fontStyle:"italic"}}>{d.apu?.llps?.length?`${d.apu.llps.length} LLP line(s) recorded.`:"No LLP data yet."}</div>
            <LLPExtractor kind="apu_llp" label="APU LLP Sheet (PDF)" notify={notify} onApply={parsed=>{
              const f=JSON.parse(JSON.stringify(assetsRef.current));
              let apu=f.apu||{};

                apu.llps=(parsed.apu.llps||[]).map(l=>({desc:l.desc,pn:l.pn,sn:l.sn,startFCRem:l.fc_remaining,refFC:refCSN,approvedLife:(l.cycle_limit===undefined?null:l.cycle_limit)}));
