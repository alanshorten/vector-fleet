const FF_COLORS = { AF6Y: "#60a5fa", AF12Y: "#a78bfa", LGOH: "#34d399", APOH: "#fbbf24", ENPR1: "#f472b6", ENLP1: "#f87171", ENPR2: "#fb923c", ENLP2: "#e879f9" };

function MiniLineChart({ labels, datasets, height }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!window.Chart || !canvasRef.current) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new window.Chart(canvasRef.current, {
      type: "line",
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { labels: { color: "#94a3b8", font: { size: 11 }, boxWidth: 12 } },
          tooltip: {
            callbacks: {
              label: ctx => {
                const v = ctx.parsed.y;
                if (v === null || v === undefined) return null;
                return `${ctx.dataset.label}: $${Math.round(v).toLocaleString()}`;
              }
            }
          }
        },
        scales: {
          x: { ticks: { color: "#64748b", font: { size: 10 }, maxTicksLimit: 12 }, grid: { color: "#1e3048" } },
          y: {
            ticks: { color: "#64748b", font: { size: 10 }, callback: v => "$" + (v / 1000).toFixed(0) + "k" },
            grid: { color: "#1e3048" }
          }
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [labels, JSON.stringify(datasets)]);
  return <div style={{ height: height || 220 }}><canvas ref={canvasRef}/></div>;
}

// Small numeric input used throughout the editable lease-terms panel.
// Commits on blur (not every keystroke) so typing "150" doesn't
// recompute the whole projection after every digit.
function FFNumInput({ value, onCommit, width, step }) {
  const [local, setLocal] = useState(String(value));
  useEffect(() => { setLocal(String(value)); }, [value]);
  return (
    <input
      type="number"
      value={local}
      step={step || "any"}
      style={{ width: width || 80, padding: "3px 6px", fontSize: 11 }}
      onChange={e => setLocal(e.target.value)}
      onBlur={() => { const n = parseFloat(local); if (!isNaN(n)) onCommit(n); else setLocal(String(value)); }}
    />
  );
}

// Clones the EN-PR/EN-LP templates once per real engine found on the
// asset (matching VECTORIQ_ROADMAP.md's EN-PR x2 / EN-LP x2 schema),
// using isCFM(asset) to pick the correct catalogue escalation rate
// (6.07% CFM vs 10.53% V2500) instead of assuming one engine family.
// EN-PR only needs the engine to exist (S/N populated); EN-LP
// additionally needs that engine to have LLP records to simulate.
function buildEnginePots(asset) {
  const cfm = isCFM(asset);
  const engineFamily = cfm ? "CFM" : "V2500";
  // Real figures from the actual LLP catalogue (llpCatalogue.js,
  // sourced from Engine_LLP_Escalation_Model.xlsx) — replacing the
  // earlier rounded escalation guesses and the $6,000,000 flat
  // full-stack placeholder. fullStackReplacementCost is still only
  // used as the proportional-share fallback for any part NOT matched
  // by real P/N in harvestCostEstimate (flyForward.js).
  const familyData = window.LLP_CATALOGUE_PRICES[engineFamily];
  const escPct = familyData.escalationPctPerYr;
  const fullStackReplacementCost = familyData.fullStackTotal2026;
  const engines = (asset.engines || []).filter(e => e.sn && String(e.sn).trim());
  const pots = [];
  engines.forEach(e => {
    const pos = e.position;
    const pr = JSON.parse(JSON.stringify(window.DEMO_LEASE_TERMS.enginePotTemplates.EN_PR));
    pr.code = `EN-PR-${pos}`;
    pr.label = `${pr.label} — Engine #${pos} (ESN ${e.sn})`;
    pr.escalationPctPerYr = escPct;
    pr.enginePosition = pos;
    pots.push(pr);

    if (e.llps && e.llps.length) {
      const lp = JSON.parse(JSON.stringify(window.DEMO_LEASE_TERMS.enginePotTemplates.EN_LP));
      lp.code = `EN-LP-${pos}`;
      lp.label = `${lp.label} — Engine #${pos} (ESN ${e.sn})`;
      lp.accrualRate = familyData.blendedRatePerFC2026; // real blended $/FC rate for this family
      lp.escalationPctPerYr = escPct;
      lp.outflowEscalationPct = escPct;
      lp.enginePosition = pos;
      lp.engineFamily = engineFamily;
      lp.fullStackReplacementCost = fullStackReplacementCost;
      pots.push(lp);
    }
  });
  return pots;
}

function buildInitialPots(asset) {
  const basePots = JSON.parse(JSON.stringify(window.DEMO_LEASE_TERMS.reservePots));
  return [...basePots, ...buildEnginePots(asset)];
}

function FlyForwardDemo({ asset, onBack }) {
  const [historyLoading, setHistoryLoading] = useState(true);
  const [utilRate, setUtilRate] = useState(null); // computed from real report history, or null if insufficient
  const [manualRate, setManualRate] = useState({ fhPerMonth: 300, fcPerMonth: 145 }); // fallback only if history is insufficient
  const [pots, setPots] = useState(() => buildInitialPots(asset));

  useEffect(() => {
    let cancelled = false;
    setHistoryLoading(true);
    db.getUtilisation(asset.id)
      .then(rows => { if (!cancelled) { setUtilRate(window.computeRealUtilisationRate(rows)); setHistoryLoading(false); } })
      .catch(() => { if (!cancelled) setHistoryLoading(false); });
    return () => { cancelled = true; };
  }, [asset.id]);

  const updatePot = (updated) => setPots(prev => prev.map(p => (p.code === updated.code ? updated : p)));
  const resetTerms = () => setPots(buildInitialPots(asset));

  if (historyLoading) return <div style={{ padding: 40, textAlign: "center", color: "#64748b" }}>Loading real utilisation history for MSN {asset.msn}…</div>;

  const rate = utilRate || manualRate;
  const usingRealRate = !!utilRate;
  const apuHrPerMonth = window.estimateApuHrPerMonth(rate.fhPerMonth, asset.apu?.currentFH, asset.airframe?.currentFH);

  // Reserve pots carry over across lease transitions (they track the
  // asset's maintenance condition, not a given lease's paperwork), so a
  // "lease start date" control doesn't actually reconstruct anything
  // real — it would just trade one guess (balance = $0 today) for a
  // different guess (balance = $0 on some arbitrary past date), while
  // also silently ignoring any real shop visits/withdrawals that
  // happened in between. leaseStart stays fixed at today. If a more
  // realistic starting balance is known or wanted for a pot, set it
  // directly via that pot's "Opening balance ($)" field below — that's
  // the honest, direct lever for "what's really in this pot right now."
  const leaseStart = new Date();

  const ctx = {
    leaseStart,
    horizonMonths: window.DEMO_LEASE_TERMS.horizonMonths,
    utilisation: { fhPerMonth: rate.fhPerMonth, fcPerMonth: rate.fcPerMonth, apuHrPerMonth: apuHrPerMonth || 0 }
  };

  // Anchor AF-6Y/AF-12Y/LG-OH to this asset's REAL next-due dates where
  // known, instead of letting the fabricated interval count fresh from
  // today. checks[].nextDate and landingGear legs' nextDue are already
  // computed and tracked at Layer 1 — trust them directly rather than
  // re-deriving from lastDate + interval ourselves.
  const check6Y = (asset.checks || []).find(c => c.name === "6 Year Check");
  const check12Y = (asset.checks || []).find(c => c.name === "12 Year Check");
  const lgLegs = ["nose", "left", "right"].map(k => asset.landingGear?.[k]?.nextDue).filter(Boolean);
  const lgDates = lgLegs.map(window.parseDMYDate).filter(Boolean);
  const lgEarliestDue = lgDates.length ? new Date(Math.min(...lgDates)) : null;

  const anchoredPots = pots.map(pot => {
    if (pot.code === "AF-6Y" && check6Y?.nextDate) {
      const d = window.parseDMYDate(check6Y.nextDate);
      if (d) return { ...pot, firstEventOverrideDate: d };
    }
    if (pot.code === "AF-12Y" && check12Y?.nextDate) {
      const d = window.parseDMYDate(check12Y.nextDate);
      if (d) return { ...pot, firstEventOverrideDate: d };
    }
    if (pot.code === "LG-OH" && lgEarliestDue) {
      return { ...pot, firstEventOverrideDate: lgEarliestDue };
    }
    return pot;
  });

  // EN-LP pots each need THEIR OWN engine's real LLP stack, not a
  // single shared one — resolved per-pot here via enginePosition.
  const projections = anchoredPots
    .filter(pot => {
      if (pot.triggerBasis !== "llp_cycles") return true;
      const eng = (asset.engines || []).find(e => e.position === pot.enginePosition);
      return eng && eng.llps && eng.llps.length;
    })
    .map(pot => {
      if (pot.triggerBasis === "llp_cycles") {
        const eng = (asset.engines || []).find(e => e.position === pot.enginePosition);
        return window.projectEnLpPot(pot, { ...ctx, llpEngineStart: { llps: eng.llps, currentFC: eng.currentFC } });
      }
      return window.projectReservePot(pot, ctx);
    });

  const shortfallSummary = window.summarisePortfolioShortfall(projections);
  const riskPeaks = window.findPortfolioRiskPeaks(projections);
  const colorList = [FF_COLORS.AF6Y, FF_COLORS.AF12Y, FF_COLORS.LGOH, FF_COLORS.APOH, FF_COLORS.ENPR1, FF_COLORS.ENLP1, FF_COLORS.ENPR2, FF_COLORS.ENLP2];

  return (
    <div style={{ animation: "fadeIn 0.2s ease" }}>
      <div className="flab g12" style={{ marginBottom: 16 }}>
        <button className="btn btn-ghost" onClick={onBack}>← MSN {asset.msn}</button>
      </div>

      <div style={{ background: "#2a1f00", border: "1px solid #C9A84C", borderRadius: 10, padding: "12px 16px", marginBottom: 16, display: "flex", alignItems: "center", gap: 10 }}>
        <span style={{ fontSize: 18 }}>🧪</span>
        <div>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#C9A84C" }}>Fly-Forward — MSN {asset.msn}</div>
          <div style={{ fontSize: 12, color: "#c9b98a", marginTop: 2 }}>
            {usingRealRate
              ? `Real utilisation rate from ${rate.monthsSpanned} months of this asset's own report history (${rate.oldestPeriod.toISOString().slice(0,7)} – ${rate.newestPeriod.toISOString().slice(0,7)}).`
              : "Fewer than 2 usable utilisation reports for this asset — using a manual rate assumption below."}
            {" "}Each engine with real LLP data gets its own EN-PR/EN-LP pot below ({(asset.engines || []).filter(e => e.llps && e.llps.length).length} of {(asset.engines || []).filter(e => e.sn).length} engine(s) have LLP data), escalating at {isCFM(asset) ? "6.07% (CFM)" : "10.53% (V2500)"} per this asset's engine type. Lease accrual rates, escalation, triggers, outflow costs and full-stack replacement cost below are still fabricated (Layer 2 not built) — edit them freely to explore scenarios.
          </div>
        </div>
      </div>

      {!usingRealRate && (
        <div className="card" style={{ padding: 12, marginBottom: 16, display: "flex", gap: 16, alignItems: "center" }}>
          <span style={{ fontSize: 11, color: "#94a3b8" }}>Manual rate assumption (no real history available):</span>
          <label style={{ fontSize: 10, color: "#94a3b8" }}>FH/month <FFNumInput value={manualRate.fhPerMonth} onCommit={v => setManualRate(r => ({ ...r, fhPerMonth: v }))}/></label>
          <label style={{ fontSize: 10, color: "#94a3b8" }}>FC/month <FFNumInput value={manualRate.fcPerMonth} onCommit={v => setManualRate(r => ({ ...r, fcPerMonth: v }))}/></label>
        </div>
      )}

      <div className="card" style={{ padding: 16, marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#e2e8f0" }}>⚙️ Lease Assumptions (fabricated — editable)</div>
          <button className="btn btn-ghost" style={{ fontSize: 11, padding: "4px 10px" }} onClick={resetTerms}>Reset to defaults</button>
        </div>
        {pots.map(pot => <FFPotTermsRow key={pot.code} pot={pot} onChange={updatePot}/>)}
      </div>

      <div className="card" style={{ padding: 16, marginBottom: 16 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: "#e2e8f0", marginBottom: 8 }}>Portfolio Shortfall Summary</div>
        <div style={{ fontSize: 22, fontWeight: 700, color: shortfallSummary.grandTotalHigh > 0 ? "#f87171" : "#34d399" }}>
          ${Math.round(shortfallSummary.grandTotalLow).toLocaleString()} – ${Math.round(shortfallSummary.grandTotalHigh).toLocaleString()}
        </div>
        <div style={{ fontSize: 11, color: "#64748b", marginTop: 4 }}>
          Total projected shortfall across {projections.length} reserve pot{projections.length===1?"":"s"} over the {ctx.horizonMonths}-month projection (positive events only — surplus in one pot doesn't offset a gap in another).
        </div>
      </div>

      {riskPeaks.length > 0 && (
        <div className="card" style={{ padding: 16, marginBottom: 16 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#e2e8f0", marginBottom: 8 }}>Risk Peaks (earliest first)</div>
          {riskPeaks.map((r, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderTop: i > 0 ? "1px solid #1e3048" : "none", fontSize: 12 }}>
              <span style={{ color: "#e2e8f0" }}>{r.code} — {r.dateWindow ? `${r.dateWindow.start.toISOString().slice(0,7)} – ${r.dateWindow.end.toISOString().slice(0,7)}` : r.date.toISOString().slice(0, 7)}</span>
              <span style={{ color: r.severity === "high" ? "#f87171" : "#fbbf24" }}>
                {r.severity === "high" ? "High" : "Medium"} — ${Math.round(r.shortfallLow).toLocaleString()} to ${Math.round(r.shortfallHigh).toLocaleString()}
              </span>
            </div>
          ))}
        </div>
      )}

      {projections.map((p, i) => {
        const anchoredPot = anchoredPots.find(ap => ap.code === p.code);
        return <FFPotCard key={p.code} projection={p} color={colorList[i % colorList.length]} anchored={!!anchoredPot?.firstEventOverrideDate}/>;
      })}
    </div>
  );
}
