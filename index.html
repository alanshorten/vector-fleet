<script type="module" id="firebase-init">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, collection, doc, getDoc, getDocs, setDoc, deleteDoc, addDoc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, confirmPasswordReset, verifyPasswordResetCode } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

  // Firebase web config + Cloudinary cloud name/upload preset are not
  // secrets (Firebase web config and an unsigned Cloudinary preset are
  // designed to be public client-side) — this fetch exists only to keep
  // them out of GitHub history, via /api/config reading Vercel env vars.
  let cfg;
  try {
    const res = await fetch('/api/config');
    cfg = await res.json();
  } catch (e) {
    console.error('Failed to load /api/config', e);
    window._configError = true;
    window.dispatchEvent(new Event('firebase-config-error'));
  }

  if (cfg) {
    window._cloudinaryConfig = cfg.cloudinary;

    const app = initializeApp(cfg.firebase);
    const db = getFirestore(app);
    const auth = getAuth(app);
    window._firestore = { db, collection, doc, getDoc, getDocs, setDoc, deleteDoc, addDoc, query, where, orderBy };

    // --- Minimal auth layer ---
    // Exposes a small bridge on window so the Babel/React script (which is
    // not a module and can't use `import`) can sign in/out and react to
    // auth state. Firestore rules are the real gate; this is what lets the
    // UI know whether to show the app or a sign-in screen.
    window._auth = {
      signIn: (email, password) => signInWithEmailAndPassword(auth, email, password),
      signOut: () => signOut(auth),
      // Used to authenticate calls to admin-only serverless functions (e.g.
      // /api/invite-user) — the function verifies this token server-side
      // rather than trusting any client-supplied flag.
      getIdToken: () => auth.currentUser ? auth.currentUser.getIdToken() : Promise.resolve(null),
      // Used by the set-password view reached via the invite email link.
      verifyResetCode: (oobCode) => verifyPasswordResetCode(auth, oobCode),
      confirmReset: (oobCode, newPassword) => confirmPasswordReset(auth, oobCode, newPassword)
    };

    // Only now is everything window.* code outside this module might touch
    // (firestore helpers AND auth bridge) actually assigned. Previously this
    // fired right after _firestore was set, before window._auth existed —
    // any listener reacting immediately (e.g. SetPasswordScreen) would find
    // window._auth undefined and crash.
    window._firebaseReady = true;
    window.dispatchEvent(new Event('firebase-ready'));

    onAuthStateChanged(auth, (user) => {
      window._authUser = user ? { uid: user.uid, email: user.email } : null;
      window.dispatchEvent(new Event('auth-state-changed'));
    });
  }
</script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// Cloudinary config is fetched from /api/config (see firebase-init script
// above) and stashed on window. Read lazily via getters so call sites don't
// need to change, and so this works even if the fetch hasn't resolved yet
// at parse time (it will have, by the time any upload actually happens).
const CLOUD_NAME = () => window._cloudinaryConfig?.cloudName;
const UPLOAD_PRESET = () => window._cloudinaryConfig?.uploadPreset;

const getFS = () => {
  if (window._firestore) return window._firestore;
  throw new Error("Firebase not ready");
};

const db = {
  async getAssets() {
    const { db: fs, collection, getDocs } = getFS();
    const snap = await getDocs(collection(fs, "assets"));
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  },
  async saveAsset(asset) {
    const { db: fs, doc, setDoc } = getFS();
    const { _dbId, _updatedAt, ...data } = asset;
    await setDoc(doc(fs, "assets", String(asset.id)), { ...data, updatedAt: new Date().toISOString() });
  },
  async deleteAsset(id) {
    const { db: fs, doc, deleteDoc } = getFS();
    await deleteDoc(doc(fs, "assets", String(id)));
  },
  async getSetting(key) {
    try {
      const { db: fs, doc, getDoc } = getFS();
      const snap = await getDoc(doc(fs, "settings", key));
      return snap.exists() ? snap.data().value : null;
    } catch { return null; }
  },
  async setSetting(key, value) {
    const { db: fs, doc, setDoc } = getFS();
    await setDoc(doc(fs, "settings", key), { value });
  },
  async getUtilisation(asset_id) {
    const { db: fs, collection, query, where, getDocs } = getFS();
    const q = query(collection(fs, "utilisation"), where("asset_id", "==", String(asset_id)));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  },
  async saveUtilisation(data) {
    const { db: fs, collection, addDoc } = getFS();
    await addDoc(collection(fs, "utilisation"), { ...data, asset_id: String(data.asset_id), created_at: new Date().toISOString() });
  },
  async deleteUtilisation(id) {
    const { db: fs, doc, deleteDoc } = getFS();
    await deleteDoc(doc(fs, "utilisation", id));
  },
  // --- Share tokens (V1 gate item, Section 12 of roadmap) ---
  // Token doc ID is the token itself, so the public /api/share/[token]
  // function can do a direct doc lookup with no query/index needed.
  async createShareToken(assetId, companyId = null) {
    const { db: fs, doc, setDoc } = getFS();
    const token = (window.crypto?.randomUUID ? window.crypto.randomUUID() : String(Date.now()) + Math.random().toString(36).slice(2)).replace(/-/g, "");
    const now = new Date();
    const expires = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000); // 7-day default
    const data = {
      assetId: String(assetId),
      companyId,
      createdAt: now.toISOString(),
      expiresAt: expires.toISOString(),
      revoked: false,
      createdBy: window._authUser?.email || window._authUser?.uid || null
    };
    await setDoc(doc(fs, "shareTokens", token), data);
    return { token, ...data };
  },
  async getShareTokensForAsset(assetId) {
    const { db: fs, collection, query, where, getDocs } = getFS();
    const q = query(collection(fs, "shareTokens"), where("assetId", "==", String(assetId)));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({ token: d.id, ...d.data() }));
  },
  async revokeShareToken(token) {
    const { db: fs, doc, setDoc, getDoc } = getFS();
    const ref = doc(fs, "shareTokens", token);
    const snap = await getDoc(ref);
    if (!snap.exists()) return;
    await setDoc(ref, { ...snap.data(), revoked: true });
  },
  // --- Email review queue (Section 12a) ---
  // Staged reports held back by api/email-ingest.js when a high-severity
  // warning (S/N change, delta mismatch, gap) is detected — see
  // hasHighSeverityWarning() there. Apply/Discard act on these.
  async getPendingReports() {
    const { db: fs, collection, getDocs } = getFS();
    const snap = await getDocs(collection(fs, "pendingReports"));
    return snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
  },
  async deletePendingReport(id) {
    const { db: fs, doc, deleteDoc } = getFS();
    await deleteDoc(doc(fs, "pendingReports", id));
  }
};

// calcLLPRem and lowestLimiter now live in /calculations/llpCalculator.js (Brain 2)
const daysFromNow=(d)=>{if(!d)return null;let parsed=d;if(/^\d{2}\/\d{2}\/\d{4}$/.test(d)){const m=d.split("/");parsed=m[2]+"-"+m[1]+"-"+m[0];}return Math.ceil((new Date(parsed)-new Date())/86400000);};
// fmtDate and fmtHHMM now live in /calculations/techSpecBuilder.js (loaded above)
const parseHHMM=(s)=>{if(!s)return 0;const p=s.toString().split(":");return parseFloat(p[0])+(parseFloat(p[1]||0)/60);};
const isCFM=(asset)=>asset?.engines?.some(e=>e.type?.toUpperCase().includes("CFM"));
const isEmpty=(v)=>!v&&v!==0;

function assetStatus(asset){
  const llpVals=(asset.engines||[]).flatMap(e=>(e.llps||[]).map(l=>calcLLPRem(l,e.currentFC)));
  if(asset.apu?.llps)llpVals.push(...asset.apu.llps.map(l=>calcLLPRem(l,asset.apu.currentFC)));
  const minLLP=llpVals.length?Math.min(...llpVals):null;
  const lgDays=["nose","left","right"].map(k=>daysFromNow(asset.landingGear?.[k]?.nextDue)).filter(x=>x!=null);
  const minLG=lgDays.length?Math.min(...lgDays):null;
  if((minLLP!==null&&minLLP<1000)||(minLG!==null&&minLG<0))return"critical";
  if((minLLP!==null&&minLLP<3000)||(minLG!==null&&minLG<365))return"warn";
  return"ok";
}
const SC={critical:{dot:"#f87171",border:"#dc2626"},warn:{dot:"#fbbf24",border:"#d97706"},ok:{dot:"#34d399",border:"#1e3348"}};

function SetPasswordScreen(){
  const[oobCode]=useState(()=>new URLSearchParams(window.location.search).get("oobCode")||"");
  const[email,setEmail]=useState(null);
  const[checking,setChecking]=useState(true);
  const[password,setPassword]=useState("");
  const[confirm,setConfirm]=useState("");
  const[err,setErr]=useState("");
  const[busy,setBusy]=useState(false);
  const[done,setDone]=useState(false);

  useEffect(()=>{
    if(!oobCode){setErr("This link is missing its code — please use the link from your invite email.");setChecking(false);return;}
    const run=()=>{
      if(window._configError){setErr("Could not connect to TailiQ. Please try again shortly.");setChecking(false);return;}
      window._auth.verifyResetCode(oobCode)
        .then(addr=>{setEmail(addr);setChecking(false);})
        .catch(()=>{setErr("This link is invalid or has expired. Ask your administrator to send a new invite.");setChecking(false);});
    };
    if(window._firebaseReady){
      run();
    } else {
      window.addEventListener('firebase-ready', run, {once:true});
      window.addEventListener('firebase-config-error', ()=>{setErr("Could not connect to TailiQ. Please try again shortly.");setChecking(false);}, {once:true});
    }
  },[oobCode]);

  const submit=async(e)=>{
    e.preventDefault();
    setErr("");
    if(password.length<8){setErr("Password must be at least 8 characters.");return;}
    if(password!==confirm){setErr("Passwords do not match.");return;}
    setBusy(true);
    try{
      await window._auth.confirmReset(oobCode,password);
      setDone(true);
    }catch(e){
      setErr("Could not set your password — the link may have expired. Ask your administrator to send a new invite.");
    }
    setBusy(false);
  };

  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}>
      <div style={{width:340,padding:24,background:"#111f30",border:"1px solid #1e3048",borderRadius:10}}>
        <div style={{fontSize:13,fontWeight:700,color:"#C9A84C",marginBottom:16,textTransform:"uppercase",letterSpacing:"0.06em"}}>TailiQ — Set Your Password</div>
        {checking&&<div style={{color:"#64748b",fontSize:13}}>Checking your invite link…</div>}
        {!checking&&done&&(
          <div>
            <div style={{color:"#34d399",fontSize:13,marginBottom:14}}>Password set! You can now sign in.</div>
            <button className="btn btn-gold" style={{width:"100%"}} onClick={()=>{window.location.href="/";}}>Go to Sign In</button>
          </div>
        )}
        {!checking&&!done&&email&&(
          <form onSubmit={submit}>
            <div style={{color:"#7a9ab5",fontSize:12,marginBottom:14}}>Setting a password for <strong style={{color:"#e2e8f0"}}>{email}</strong></div>
            <div className="form-group">
              <label className="form-label">New Password</label>
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)} autoFocus/>
            </div>
            <div className="form-group">
              <label className="form-label">Confirm Password</label>
              <input type="password" value={confirm} onChange={e=>setConfirm(e.target.value)}/>
            </div>
            {err&&<div style={{color:"#f87171",fontSize:12,marginBottom:12}}>{err}</div>}
            <button className="btn btn-gold" type="submit" disabled={busy} style={{width:"100%"}}>{busy?"Setting…":"Set Password"}</button>
          </form>
        )}
        {!checking&&!done&&!email&&err&&<div style={{color:"#f87171",fontSize:13}}>{err}</div>}
      </div>
    </div>
  );
}

function SignInScreen(){
  const[email,setEmail]=useState("");
  const[password,setPassword]=useState("");
  const[err,setErr]=useState("");
  const[busy,setBusy]=useState(false);
  const submit=async(e)=>{
    e.preventDefault();
    setErr("");setBusy(true);
    try{
      await window._auth.signIn(email,password);
    }catch(e){
      setErr("Sign-in failed — check email and password.");
    }
    setBusy(false);
  };
  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}>
      <form onSubmit={submit} style={{width:300,padding:24,background:"#111f30",border:"1px solid #1e3048",borderRadius:10}}>
        <div style={{fontSize:13,fontWeight:700,color:"#C9A84C",marginBottom:16,textTransform:"uppercase",letterSpacing:"0.06em"}}>TailiQ — Sign In</div>
        <div className="form-group">
          <label className="form-label">Email</label>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} autoFocus/>
        </div>
        <div className="form-group">
          <label className="form-label">Password</label>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)}/>
        </div>
        {err&&<div style={{color:"#f87171",fontSize:12,marginBottom:12}}>{err}</div>}
        <button className="btn btn-gold" type="submit" disabled={busy} style={{width:"100%"}}>{busy?"Signing in…":"Sign In"}</button>
      </form>
    </div>

function App(){
  // Invite-link landing — must be checked before any sign-in gate, since
  // the person clicking this link has no TailiQ account/session yet.
  if(new URLSearchParams(window.location.search).get("view")==="set-password"){
    return <SetPasswordScreen/>;
  }
  const[authUser,setAuthUser]=useState(window._authUser===undefined?undefined:window._authUser);
  const[configError,setConfigError]=useState(window._configError||false);
  const[assets,setAssets]=useState([]);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState(null);
  const[view,setView]=useState("dashboard");
  const[selectedId,setSelectedId]=useState(null);
  const[isAdmin,setIsAdmin]=useState(true);
  const[pinModal,setPinModal]=useState(false);
  const[pinInput,setPinInput]=useState("");
  const[pinError,setPinError]=useState("");
  const[notification,setNotification]=useState(null);
  const[adminPin,setAdminPin]=useState("1234");

  const loadAssets=useCallback(async()=>{
    try{
      const assets=await db.getAssets();
      setAssets(assets);
      const pin=await db.getSetting("admin_pin");
      if(pin)setAdminPin(pin);
      setError(null);
    }catch(e){setError(e.message);}
    setLoading(false);
  },[]);

  useEffect(()=>{
    const onConfigError=()=>setConfigError(true);
    window.addEventListener('firebase-config-error', onConfigError);
    return ()=>window.removeEventListener('firebase-config-error', onConfigError);
  },[]);

  useEffect(()=>{
    const syncAuth=()=>setAuthUser(window._authUser);
    if(window._authUser!==undefined){
      syncAuth();
    }
    window.addEventListener('auth-state-changed', syncAuth);
    return ()=>window.removeEventListener('auth-state-changed', syncAuth);
  },[]);

  useEffect(()=>{
    if(!authUser)return; // wait until signed in before touching Firestore
    const doLoad=()=>loadAssets();
    if(window._firebaseReady){
      doLoad();
    } else {
      window.addEventListener('firebase-ready', doLoad, {once:true});
    }
  },[loadAssets,authUser]);

  const saveAsset=useCallback(async(asset)=>{
    await db.saveAsset(asset);
    await loadAssets();
  },[loadAssets]);

  const notify=(msg,type="success")=>{setNotification({msg,type});setTimeout(()=>setNotification(null),3500);};
  const selectedAsset=assets.find(a=>a.id===selectedId);

  if(configError)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}>
      <div style={{textAlign:"center",maxWidth:400,padding:32}}>
        <div style={{color:"#f87171",fontSize:14,fontWeight:700,marginBottom:8}}>Configuration Error</div>
        <p style={{color:"#64748b",fontSize:13}}>Couldn't load app configuration from /api/config. Check that Firebase and Cloudinary environment variables are set in Vercel, then reload.</p>
      </div>
    </div>
  );

  if(authUser===undefined)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}>
      <div style={{width:32,height:32,border:"3px solid #C9A84C",borderTop:"3px solid transparent",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
    </div>
  );

  if(authUser===null)return <SignInScreen/>;

  if(loading)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}>
      <div style={{textAlign:"center"}}>
        <div style={{width:32,height:32,border:"3px solid #C9A84C",borderTop:"3px solid transparent",borderRadius:"50%",animation:"spin 1s linear infinite",margin:"0 auto 12px"}}/>
        <p style={{color:"#64748b",fontSize:13}}>Loading fleet data…</p>
      </div>
    </div>
  );

  if(error)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}>
      <div style={{textAlign:"center",maxWidth:400,padding:32}}>
        <div style={{color:"#f87171",fontSize:14,fontWeight:700,marginBottom:8}}>Connection Error</div>
        <p style={{color:"#64748b",fontSize:12,marginBottom:16}}>{error}</p>
        <button onClick={loadAssets} style={{padding:"8px 20px",background:"#1e3a5f",border:"none",borderRadius:6,color:"#60a5fa",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>Retry</button>
      </div>
    </div>
  );

  return(
    <div>

function ReviewQueueBanner({saveAsset,notify}){
  const[pending,setPending]=useState([]);
  const[expanded,setExpanded]=useState(false);
  const[busyId,setBusyId]=useState(null);
  const refresh=async()=>{try{setPending(await db.getPendingReports());}catch{/* non-fatal — banner just stays empty */}};
  useEffect(()=>{refresh();},[]);
  if(!pending.length)return null;
  const apply=async(p)=>{
    setBusyId(p.id);
    try{
      await saveAsset(p.mergedAsset);
      await db.saveUtilisation(p.utilisationRecord);
      await db.deletePendingReport(p.id);
      notify(`MSN ${p.msn} applied from ${p.period||"report"}`);
      await refresh();
    }catch(err){
      notify("Failed to apply report: "+(err.message||"please try again"),"error");
    }
    setBusyId(null);
  };
  const discard=async(p)=>{
    if(!confirm(`Discard this ${p.period||"report"} for MSN ${p.msn}? The asset will not be updated.`))return;
    setBusyId(p.id);
    try{
      await db.deletePendingReport(p.id);
      notify("Report discarded");
      await refresh();
    }catch(err){
      notify("Failed to discard report: "+(err.message||"please try again"),"error");
    }
    setBusyId(null);
  };
  return(
    <div className="card" style={{padding:0,marginBottom:14,border:"1px solid #92660a",overflow:"hidden"}}>
      <button onClick={()=>setExpanded(e=>!e)} style={{width:"100%",textAlign:"left",background:"#2a1f0a",border:"none",padding:"10px 16px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:13,fontWeight:700,color:"#fbbf24"}}>⚠ {pending.length} email report{pending.length>1?"s":""} awaiting review</span>
        <span style={{fontSize:12,color:"#fbbf24"}}>{expanded?"▲":"▼"}</span>
      </button>
      {expanded&&(
        <div style={{padding:"10px 16px",display:"flex",flexDirection:"column",gap:10}}>
          {pending.map(p=>(
            <div key={p.id} style={{background:"#0d1925",border:"1px solid #1e3048",borderRadius:6,padding:"10px 12px"}}>
              <div className="flj" style={{marginBottom:6}}>
                <div style={{fontSize:12,fontWeight:700,color:"#e2e8f0"}}>MSN {p.msn||"—"} · {p.period||"unknown period"}</div>
                <div style={{fontSize:10,color:"#475569"}}>{p.fileName||""}</div>
              </div>
              {(p.warnings||[]).map((w,i)=>(
                <div key={i} style={{fontSize:11,color:"#fcd34d",marginBottom:2,lineHeight:1.5}}>{w}</div>
              ))}
              <div className="flab g8" style={{marginTop:8}}>
                <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}} disabled={busyId===p.id} onClick={()=>discard(p)}>Discard</button>
                <button className="btn btn-gold" style={{fontSize:11,padding:"4px 10px"}} disabled={busyId===p.id} onClick={()=>apply(p)}>{busyId===p.id?"Applying…":"✓ Apply"}</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function Dashboard({assets,onSelect,saveAsset,notify}){

  const sorted=[...filtered].sort((a,b)=>{const av=String(a[sortCol]||""),bv=String(b[sortCol]||"");return sortDir==="asc"?av.localeCompare(bv):bv.localeCompare(av);});
  const toggleSort=col=>{if(sortCol===col)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortCol(col);setSortDir("asc");}};

  return(
    <div style={{animation:"fadeIn 0.2s ease"}}>
      <ReviewQueueBanner saveAsset={saveAsset} notify={notify}/>

              ))}
              <th>AF TSN</th><th>AF CSN</th><th>Eng 1</th><th>Eng 2</th><th>APU</th><th>NLG</th><th>LLG</th><th>RLG</th><th>Last Report</th><th></th>
            </tr></thead>
            <tbody>

                <tr key={a.id} className="row-hover" onClick={()=>onSelect(a.id)} style={{background:i%2===0?"#0d1e2e":"#152535"}}>

              <div className="flj" style={{marginBottom:10}}>
                <div>
                  <div className="flab g8"><span style={{fontWeight:700,fontSize:15,color:"#C9A84C",fontFamily:"monospace"}}>MSN {a.msn}</span>{isCFM(a)?<span className="tag" style={{background:"#1e3a5f",color:"#60a5fa"}}>CFM</span>:<span className="tag" style={{background:"#1e2a4a",color:"#a78bfa"}}>V2500</span>}</div>
                  <div style={{fontSize:14,fontWeight:600,color:"#f1f5f9",marginTop:2}}>{a.registration||"—"}</div>
                  <div style={{fontSize:11,color:"#475569"}}>{a.model} · {a.operator||"—"}</div>
                </div>
                <div style={{width:10,height:10,borderRadius:"50%",background:SC[st].dot,boxShadow:st!=="ok"?`0 0 8px ${SC[st].dot}`:"none"}}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,background:"#0d1925",borderRadius:6,padding:"8px 10px",marginBottom:10}}>
                {[["AF TSN",fmtHHMM(af.currentFH)],["AF CSN",af.currentFC?.toLocaleString()||"—"]].map(([l,v])=>(

                ))}
              </div>
              <div style={{marginBottom:10}}>
                {(a.engines||[]).map((eng,ei)=>{const ll=lowestLimiter(eng);const col=ll===null?"#475569":ll<1000?"#f87171":ll<3000?"#fbbf24":"#34d399";return<div key={ei} className="flj" style={{padding:"3px 0",borderBottom:"1px solid #0f2030"}}><span style={{fontSize:11,color:"#64748b"}}>Eng {ei+1} LLP</span><span style={{fontSize:11,fontWeight:700,color:col}}>{ll!==null?`${ll.toLocaleString()} FC`:"No data"}</span></div>;})}
                {(()=>{const ll=a.apu?.llps?.length?Math.min(...a.apu.llps.map(l=>calcLLPRem(l,a.apu.currentFC))):null;const col=ll===null?"#475569":ll<1000?"#f87171":ll<3000?"#fbbf24":"#34d399";return<div className="flj" style={{padding:"3px 0",borderBottom:"1px solid #0f2030"}}><span style={{fontSize:11,color:"#64748b"}}>APU LLP</span><span style={{fontSize:11,fontWeight:700,color:col}}>{ll!==null?`${ll.toLocaleString()} FC`:"N/A"}</span></div>;})()}

    </div>
  );

async function getTechSpecLogo(){
  const [url,width]=await Promise.all([
    db.getSetting('tech_spec_logo_url').catch(()=>null),
    db.getSetting('tech_spec_logo_width').catch(()=>null)
  ]);
  return {url:url||null,width:width||200};

  const withPrint=withBar.replace('</style>','@media print{body>div:first-child{display:none!important}div[style*="height:52px"]{display:none!important}}</style>');
  const win=window.open();win.document.write(withPrint);win.document.close();
}

function AssetView({asset,saveAsset,isAdmin,notify,onBack,loadAssets}){

    const withBar=base.replace('<body>',`<body><div style="position:fixed;top:0;left:0;right:0;background:#1B3A6B;padding:10px 20px;display:flex;gap:10px;align-items:center;z-index:999;box-shadow:0 2px 8px rgba(0,0,0,0.3);print-color-adjust:exact;-webkit-print-color-adjust:exact"><span style="color:#C9A84C;font-weight:700;font-size:14px;flex:1">TailiQ — Tech Spec MSN ${asset.msn}</span><button onclick="window.print()" style="background:#C9A84C;color:#0a1520;border:none;border-radius:6px;padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer">🖨 Print / Save PDF</button><button onclick="window.close()" style="background:transparent;color:#94a3b8;border:1px solid #2d3f55;border-radius:6px;padding:8px 16px;font-size:13px;cursor:pointer">✕ Close</button></div><div style="height:52px"></div>`);

    win.document.write(withPrint);

function ShareModal({asset,notify,onClose}){
  const[tokens,setTokens]=useState(null);
  const[busy,setBusy]=useState(false);

  const load=async()=>{
    const list=await db.getShareTokensForAsset(asset.id).catch(()=>[]);
    const active=list.filter(t=>!t.revoked&&new Date(t.expiresAt).getTime()>Date.now());
    setTokens(active);
  };
  useEffect(()=>{load();},[]);

  const shareUrl=(token)=>`https://app.tailiq.app/share/${token}`;

  const generate=async()=>{
    setBusy(true);
    try{
      await db.createShareToken(asset.id, asset.companyId||null);
      await load();
      notify("Share link created — expires in 7 days","success");
    }catch(e){
      notify("Failed to create share link","error");
    }
    setBusy(false);
  };

  const revoke=async(token)=>{
    setBusy(true);
    try{
      await db.revokeShareToken(token);
      await load();
      notify("Share link revoked","success");
    }catch(e){
      notify("Failed to revoke link","error");
    }
    setBusy(false);
  };

  const copy=(token)=>{
    navigator.clipboard?.writeText(shareUrl(token));
    notify("Link copied to clipboard","success");
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(5,10,16,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}} onClick={onClose}>
      <div className="card" style={{width:420,maxWidth:"92vw",padding:24}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h2 style={{fontSize:15,color:"#C9A84C",fontWeight:700}}>Share MSN {asset.msn}</h2>
          <button className="btn btn-ghost" style={{padding:"4px 10px"}} onClick={onClose}>✕</button>
        </div>
        <p style={{fontSize:12,color:"#7a9ab5",marginBottom:16,lineHeight:1.5}}>
          Read-only tech spec view — no financial data. Links expire after 7 days.
        </p>
        {tokens===null&&<div style={{color:"#475569",fontSize:12}}>Loading…</div>}
        {tokens&&tokens.length===0&&(
          <button className="btn btn-gold" style={{width:"100%",padding:10}} disabled={busy} onClick={generate}>
            {busy?"Generating…":"Generate Share Link"}
          </button>
        )}
        {tokens&&tokens.map(t=>(
          <div key={t.token} style={{marginBottom:16,paddingBottom:16,borderBottom:"1px solid #1e3048"}}>
            <div style={{display:"flex",justifyContent:"center",marginBottom:12}}>
              <img
                alt="QR code"
                style={{background:"#fff",borderRadius:6,padding:6}}
                src={`https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(shareUrl(t.token))}`}
              />
            </div>
            <div style={{fontSize:11,color:"#475569",wordBreak:"break-all",marginBottom:10,textAlign:"center"}}>{shareUrl(t.token)}</div>
            <div style={{fontSize:10,color:"#475569",textAlign:"center",marginBottom:12}}>Expires {fmtDate(t.expiresAt)}</div>
            <div style={{display:"flex",gap:8}}>
              <a className="btn btn-primary" style={{flex:1,textAlign:"center",textDecoration:"none",fontSize:12,padding:"8px 0"}}
                 href={`https://wa.me/?text=${encodeURIComponent(shareUrl(t.token))}`} target="_blank" rel="noopener noreferrer">WhatsApp</a>
              <button className="btn btn-ghost" style={{flex:1,fontSize:12}} onClick={()=>copy(t.token)}>Copy Link</button>
            </div>
            <button className="btn btn-danger" style={{width:"100%",marginTop:8}} disabled={busy} onClick={()=>revoke(t.token)}>Revoke Link</button>
          </div>
        ))}
        {tokens&&tokens.length>0&&(
          <button className="btn btn-ghost" style={{width:"100%"}} disabled={busy} onClick={generate}>
            {busy?"Generating…":"+ Generate New Link"}
          </button>
        )}
      </div>
    </div>
  );
}

function OverviewTab({asset,isAdmin,saveAsset,notify}){
  const[editing,setEditing]=useState(false);

  const startEdit=()=>{setForm(JSON.parse(JSON.stringify(asset)));setEditing(true);};
  const cancel=()=>{setForm(null);setEditing(false);};

  const d=editing?form:asset;
  const af=asset.airframe||{};
  const set=(path,val)=>{const f=JSON.parse(JSON.stringify(form));const parts=path.split(".");let obj=f;for(let i=0;i<parts.length-1;i++){if(!obj[parts[i]])obj[parts[i]]={};obj=obj[parts[i]];}obj[parts[parts.length-1]]=val;setForm(f);};
  const fmtMMYYYY=(s)=>{if(!s)return"—";if(/^\d{2}\/\d{4}$/.test(s))return s;try{const d=new Date(s);if(isNaN(d))return s;return String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear();}catch{return s;}};

    const parts=path.split(".");const val=parts.reduce((o,k)=>o?.[k],d);

      {editing&&isAdmin?<input type="text" placeholder={type==="mmyyyy"?"MM/YYYY":""} defaultValue={type==="mmyyyy"?fmtMMYYYY(val):val||""} onBlur={e=>set(path,e.target.value)} className={isEmpty(val)?"amber":""}/>
      :<div style={{fontSize:13,fontWeight:500,color:isEmpty(val)?"#475569":"#e2e8f0",fontStyle:isEmpty(val)?"italic":"normal"}}>{type==="mmyyyy"?fmtMMYYYY(val):val||"Not entered"}</div>}

      <div className="card" style={{padding:18}}>
        <div className="flj" style={{marginBottom:12}}>
          <div className="section-title" style={{margin:0}}>Asset Details</div>

        </div>
        <div className="grid2" style={{gap:"0 16px"}}>
          <Field label="MSN" path="msn"/><Field label="Registration" path="registration"/>
          <Field label="Operator" path="operator"/><Field label="Model" path="model"/>
          <Field label="Manufacturer" path="manufacturer"/><Field label="Date of Manufacture (MM/YYYY)" path="dom" type="mmyyyy"/>
        </div>
        <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid #1e3048"}}>
          <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Current Airframe</div>
          <div className="grid2" style={{gap:8}}>
            {[["AIRFRAME TSN",fmtHHMM(af.currentFH)],["AIRFRAME CSN",af.currentFC?.toLocaleString()||"—"]].map(([l,v])=>(
              <div key={l} style={{background:"#070f18",border:"1px solid #1B3A6B",borderRadius:8,padding:"12px 14px"}}>
                <div style={{fontSize:9,color:"#475569",fontWeight:700,letterSpacing:"0.08em"}}>{l}</div>
                <div style={{fontSize:20,fontWeight:700,color:"#C9A84C",fontFamily:"monospace",marginTop:4}}>{v}</div>
              </div>

          </div>

      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div className="card" style={{padding:18}}>
          <div className="section-title">Status Summary</div>

            {llpVals.map(({label,val})=>{
              const col=val===null?"#475569":val<1000?"#f87171":val<3000?"#fbbf24":"#34d399";
              const bg=val===null?"transparent":val<1000?"#2a0e0e":val<3000?"#2a1f0a":"#0d2818";
              return<div key={label} className="flj" style={{padding:"5px 0",borderBottom:"1px solid #0f2030"}}>
                <span style={{fontSize:12,color:"#94a3b8"}}>{label}</span>

          </div>

              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}


function ShopVisitEditor({eng,engIdx,asset,isAdmin,saveAsset,notify}){
  const[adding,setAdding]=useState(false);
  const[newSV,setNewSV]=useState({details:"",date:"",fh:"",fc:"",mro:""});
  const saveSV=async()=>{
    const engines=JSON.parse(JSON.stringify(asset.engines||[]));
    engines[engIdx].shopVisits=[...(engines[engIdx].shopVisits||[]),{...newSV,fh:parseHHMM(newSV.fh),fc:+newSV.fc}];
    await saveAsset({...asset,engines});
    setAdding(false);setNewSV({details:"",date:"",fh:"",fc:"",mro:""});notify("Shop visit added");
  };
  const delSV=async(si)=>{
    if(!confirm("Delete shop visit?"))return;
    const engines=JSON.parse(JSON.stringify(asset.engines||[]));
    engines[engIdx].shopVisits.splice(si,1);
    await saveAsset({...asset,engines});notify("Deleted");
  };
  return(
    <div>
      <div className="flj" style={{marginBottom:8}}>
        <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:"0.05em"}}>Shop Visit History</div>

      </div>
      {(()=>{const svs=eng.shopVisits||[];if(!svs.length)return null;const last=svs[svs.length-1];const sinceFH=eng.currentFH&&last.fh?eng.currentFH-last.fh:null;const sinceFC=eng.currentFC&&last.fc?eng.currentFC-last.fc:null;const sinceDays=last.date?Math.floor((new Date()-new Date(last.date))/86400000):null;return(<div style={{background:"#0a1a2a",border:"1px solid #1B3A6B",borderRadius:6,padding:"10px 12px",marginBottom:10}}><div style={{fontSize:9,color:"#C9A84C",fontWeight:700,textTransform:"uppercase",marginBottom:6}}>Since Last Shop Visit</div><div className="grid3" style={{gap:8}}><div><div style={{fontSize:9,color:"#475569"}}>Days</div><div style={{fontSize:14,fontWeight:700,color:"#C9A84C",fontFamily:"monospace"}}>{sinceDays!==null?sinceDays.toLocaleString():"—"}</div></div><div><div style={{fontSize:9,color:"#475569"}}>FH</div><div style={{fontSize:14,fontWeight:700,color:"#C9A84C",fontFamily:"monospace"}}>{sinceFH!==null?fmtHHMM(sinceFH):"—"}</div></div><div><div style={{fontSize:9,color:"#475569"}}>FC</div><div style={{fontSize:14,fontWeight:700,color:"#C9A84C",fontFamily:"monospace"}}>{sinceFC!==null?sinceFC.toLocaleString():"—"}</div></div></div></div>);})()}
      <table><thead><tr><th>Details</th><th>Date</th><th>TSN</th><th>CSN</th><th>MRO</th><th></th></tr></thead>
      <tbody>{eng.shopVisits?.length?eng.shopVisits.map((sv,si)=>(
        <tr key={si}>
          <td style={{fontWeight:500}}>{sv.details}</td><td>{fmtDate(sv.date)}</td>
          <td style={{fontFamily:"monospace"}}>{fmtHHMM(sv.fh)}</td><td style={{fontFamily:"monospace"}}>{sv.fc?.toLocaleString()}</td>
          <td style={{color:"#94a3b8"}}>{sv.mro}</td>
          <td><button className="btn-danger btn" style={{fontSize:10,padding:"2px 6px"}} onClick={()=>delSV(si)}>✕</button></td>
        </tr>
      )):<tr><td colSpan={isAdmin?6:5} style={{color:"#475569",fontStyle:"italic"}}>No shop visits recorded</td></tr>}</tbody></table>
      {adding&&(
        <div style={{background:"#0d1925",borderRadius:6,padding:12,marginTop:8,border:"1px solid #1e3048"}}>
          <div className="grid3" style={{gap:6,marginBottom:8}}>
            <div style={{gridColumn:"1/-1"}}><label className="form-label">Details / Description</label><input value={newSV.details} onChange={e=>setNewSV({...newSV,details:e.target.value})}/></div>

              <div key={k}><label className="form-label">{l}</label><input type={t} value={newSV[k]} onChange={e=>setNewSV({...newSV,[k]:e.target.value})}/></div>
            ))}
          </div>
          <div className="flab g8"><button className="btn btn-ghost" onClick={()=>setAdding(false)}>Cancel</button><button className="btn btn-gold" onClick={saveSV}>Add Visit</button></div>
        </div>
      )}
    </div>
  );
}

                {eng.titleEngine.reason&&<div style={{fontSize:11,color:"#94a3b8",marginTop:8}}>Reason: {eng.titleEngine.reason}</div>}
                {isAdmin&&<div className="flab g8" style={{marginTop:10}}>
                  <button className="btn btn-gold" style={{fontSize:11,padding:"4px 10px"}} onClick={async()=>{
                    const engines=JSON.parse(JSON.stringify(asset.engines));
                    engines[ei]={...engines[ei],atShop:false,titleEngine:null};

                  <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={async()=>{
                    if(!confirm("Confirm this engine is permanently replaced? The title engine record will be cleared."))return;
                    const engines=JSON.parse(JSON.stringify(asset.engines));
                    engines[ei]={...engines[ei],atShop:false,titleEngine:null};
                    await patchEngines(engines);notify("Confirmed permanent replacement");
                  }}>Confirm Permanent</button>
                </div>}
              </div>
            )}
            <div style={{marginBottom:16}}>
              <div className="flj" style={{marginBottom:8}}>
                <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:"0.05em"}}>Life Limited Parts</div>
                {isAdmin&&<div className="flab g8">
  {eng.llps?.length>0&&<button className="btn btn-danger" style={{fontSize:11,padding:"4px 10px"}} onClick={async()=>{if(!confirm("Delete all LLPs for this engine?"))return;const engines=JSON.parse(JSON.stringify(asset.engines||[]));engines[ei].llps=[];await patchEngines(engines);notify("All LLPs deleted");}}>Clear All LLPs</button>}
  <button className="btn btn-primary" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>setAddLLPIdx(ei)}>+ Add LLP</button>
</div>}
              </div>
              {eng.llps?.length?(
                <table><thead><tr><th>Descriptor</th><th>P/N</th><th>S/N</th><th>FC Remaining</th><th></th></tr></thead>
                <tbody>{eng.llps.map((llp,li)=>{const rem=calcLLPRem(llp,eng.currentFC);return(
                  <tr key={li} style={{background:rem<1000?"#1a0a0a":rem<3000?"#1a150a":"transparent"}}>
                    <td style={{fontWeight:500}}>{llp.desc}</td><td style={{fontFamily:"monospace",fontSize:11}}>{llp.pn}</td><td style={{fontFamily:"monospace",fontSize:11}}>{llp.sn}</td>
                    <td style={{fontWeight:700,color:rem<1000?"#f87171":rem<3000?"#fbbf24":"#34d399"}}>{rem.toLocaleString()}</td>
                    {isAdmin&&<td><button className="btn-danger btn" style={{fontSize:10,padding:"2px 6px"}} onClick={()=>delLLP(ei,li)}>✕</button></td>}
                  </tr>
                );})}</tbody></table>
              ):<div style={{color:"#475569",fontSize:12,fontStyle:"italic",padding:"6px 0"}}>No LLP data entered yet.</div>}
              {addLLPIdx===ei&&(
                <div style={{background:"#0d1925",borderRadius:6,padding:12,marginTop:8,border:"1px solid #1e3048"}}>
                  <div className="grid3" style={{gap:6,marginBottom:8}}>
                    {[["Descriptor","desc","text"],["P/N","pn","text"],["S/N","sn","text"],["Starting FC Rem","startFCRem","number"],["Reference FC","refFC","number"]].map(([l,k,t])=>(
                      <div key={k}><label className="form-label">{l}</label><input type={t} value={newLLP[k]} onChange={e=>setNewLLP({...newLLP,[k]:e.target.value})}/></div>
                    ))}
                  </div>
                  <div className="flab g8"><button className="btn btn-ghost" onClick={()=>setAddLLPIdx(null)}>Cancel</button><button className="btn btn-gold" onClick={()=>doAddLLP(ei)}>Add LLP</button></div>
                </div>
              )}
            </div>
            <ShopVisitEditor eng={eng} engIdx={ei} asset={asset} isAdmin={isAdmin} saveAsset={saveAsset} notify={notify}/>
          </div>
        );
      })}
    </div>
  );
}

function GearCard({title,gkey,asset,form,editing,isAdmin,set,setForm,af}){
  const g=(editing?form:asset).landingGear?.[gkey]||{};
  const fromDDMMYYYY=(s)=>{if(!s)return"";const m=/^(\d{2})\/(\d{2})\/(\d{4})$/.exec(s);if(m)return m[3]+"-"+m[2]+"-"+m[1];return s;};
  const toDDMMYYYY=(s)=>{if(!s)return"";if(/^\d{2}\/\d{2}\/\d{4}$/.test(s))return s;try{const dt=new Date(s);if(isNaN(dt))return s||"";return String(dt.getDate()).padStart(2,"0")+"/"+String(dt.getMonth()+1).padStart(2,"0")+"/"+dt.getFullYear();}catch{return s||"";}};
  const fmtDigits=(raw)=>{const n=raw.replace(/\D/g,"").slice(0,8);if(n.length<=2)return n;if(n.length<=4)return n.slice(0,2)+"/"+n.slice(2);return n.slice(0,2)+"/"+n.slice(2,4)+"/"+n.slice(4);};
  const plusYears=(s,yrs)=>{const m=/^(\d{2})\/(\d{2})\/(\d{4})$/.exec(s);if(!m)return"";return m[1]+"/"+m[2]+"/"+(+m[3]+(+yrs||10));};
  const intervalYears=g.overhaulIntervalYears!=null?g.overhaulIntervalYears:10;
  const intervalCycles=g.overhaulIntervalCycles!=null?g.overhaulIntervalCycles:20000;
  const[lastDateVal,setLastDateVal]=useState(toDDMMYYYY(g.lastOverhaulDate)||"");
  const[nextDueVal,setNextDueVal]=useState(toDDMMYYYY(g.nextDue)||"");
  useEffect(()=>{if(!editing){setLastDateVal(toDDMMYYYY(g.lastOverhaulDate)||"");setNextDueVal(toDDMMYYYY(g.nextDue)||"");}},[editing]);
  const handleLastDateChange=(raw)=>{const fmt=fmtDigits(raw);setLastDateVal(fmt);if(/^\d{2}\/\d{2}\/\d{4}$/.test(fmt))setNextDueVal(plusYears(fmt,intervalYears));};
  const handleLastDateBlur=(val)=>{
    if(/^\d{2}\/\d{2}\/\d{4}$/.test(val)){
      const n=plusYears(val,intervalYears);
      setNextDueVal(n);
      // Write both fields in one operation to avoid stale form snapshot
      const f=JSON.parse(JSON.stringify(form));
      if(!f.landingGear)f.landingGear={};
      if(!f.landingGear[gkey])f.landingGear[gkey]={};
      f.landingGear[gkey].lastOverhaulDate=val;
      f.landingGear[gkey].nextDue=n;
      setForm(f);
    } else {
      set("landingGear."+gkey+".lastOverhaulDate",val);
    }
  };
  const handleNextDueChange=(raw)=>setNextDueVal(fmtDigits(raw));
  const handleNextDueBlur=(val)=>{if(/^\d{2}\/\d{2}\/\d{4}$/.test(val))set("landingGear."+gkey+".nextDue",val);};
  const handleIntervalYearsBlur=(raw)=>{
    const yrs=raw===""?10:+raw;
    const f=JSON.parse(JSON.stringify(form));
    if(!f.landingGear)f.landingGear={};
    if(!f.landingGear[gkey])f.landingGear[gkey]={};
    f.landingGear[gkey].overhaulIntervalYears=yrs;
    if(/^\d{2}\/\d{2}\/\d{4}$/.test(lastDateVal)){
      const n=plusYears(lastDateVal,yrs);
      f.landingGear[gkey].nextDue=n;
      setNextDueVal(n);
    }
    setForm(f);
  };

  // Current totals: ground truth override (Gear Status Report) always wins;
  // otherwise calculate from the Reference Reading — any matched leg+airframe
  // pair taken at the same moment. This is deliberately independent of the
  // Last Overhaul Record below: a reference reading does NOT need to be from
  // an overhaul, and using it for the overhaul-cycles countdown would give a
  // wrong baseline (it wouldn't be counting from a genuine 0-since-overhaul
  // point). The two are separate inputs that may or may not share a date.
  const hasRefPair=g.refLegFC!=null&&g.refAirframeFC!=null;
  let current=null;
  if(g.currentFC!=null){
    current={fh:g.currentFH,fc:g.currentFC,source:"Ground Truth"};
  } else if(hasRefPair){
    const fh=(g.refLegFH||0)+((af.currentFH||0)-(g.refAirframeFH||0));
    const fc=g.refLegFC+((af.currentFC||0)-g.refAirframeFC);
    current={fh,fc,source:"Calculated"};
  }

  const activeDateStr=editing?lastDateVal:(toDDMMYYYY(g.lastOverhaulDate)||"");
  const activeNextDue=editing?nextDueVal:(toDDMMYYYY(g.nextDue)||"");
  // "Since Last Overhaul" diffs the leg's CURRENT total (however that was
  // derived above) against the leg's own CSN at the last overhaul — both on
  // the same leg-CSN scale, so no airframe figure is needed here at all.
  const daysSince=activeDateStr&&/^\d{2}\/\d{2}\/\d{4}$/.test(activeDateStr)?Math.floor((new Date()-new Date(fromDDMMYYYY(activeDateStr)))/86400000):null;
  const sinceFH=(current&&current.fh!=null&&g.lastOverhaulFH!=null)?current.fh-g.lastOverhaulFH:null;
  const sinceFC=(current&&current.fc!=null&&g.lastOverhaulFC!=null)?current.fc-g.lastOverhaulFC:null;

  // Next Overhaul Due — dual limiter, lowest-wins, same pattern as LLPs:
  // a calendar limit (default 10yr from last overhaul) AND a cycle limit
  // (default 20,000 from the leg's CSN at last overhaul), whichever is more
  // restrictive. Cycles remaining is anchored to the Last Overhaul Record,
  // never to the Reference Reading.
  const calDays=daysFromNow(fromDDMMYYYY(activeNextDue));
  const cyclesRemaining=(g.lastOverhaulFC!=null&&current&&current.fc!=null)?(g.lastOverhaulFC+intervalCycles)-current.fc:null;
  const calStatus=calDays===null?null:calDays<0?"critical":calDays<365?"warn":"ok";
  const cycStatus=cyclesRemaining===null?null:cyclesRemaining<1000?"critical":cyclesRemaining<3000?"warn":"ok";
  const sevRank={critical:0,warn:1,ok:2};
  const bothStatus=[calStatus,cycStatus].filter(Boolean);
  const overallStatus=bothStatus.length?bothStatus.sort((a,b)=>sevRank[a]-sevRank[b])[0]:null;
  const statusColor={critical:"#f87171",warn:"#fbbf24",ok:"#34d399"};
  const statusBg={critical:"#2a0e0e",warn:"#2a1f0a",ok:"#0a1520"};

  return(
    <div className="card" style={{padding:18}}>
      <div className="section-title">{title}{g.atShop&&" 🔧"}</div>
      {[["mfr","Manufacturer"],["pn","Part Number"],["sn","Serial Number"]].map(([k,l])=>(
        <div key={k} className="form-group">
          <label className="form-label">{l}</label>
          {editing&&isAdmin?<input value={g[k]||""} onChange={e=>set("landingGear."+gkey+"."+k,e.target.value)}/>
          :<div style={{fontSize:13,fontWeight:500,color:isEmpty(g[k])?"#475569":"#e2e8f0"}}>{g[k]||"Not entered"}</div>}
        </div>
      ))}

      {editing&&isAdmin&&(
      <>
      <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",marginBottom:6,marginTop:4}}>Reference Reading</div>
      <div style={{fontSize:10,color:"#64748b",marginBottom:6,fontStyle:"italic"}}>Any matched leg + airframe reading taken at the same moment — doesn't need to be from an overhaul. Used only to calculate current totals below.</div>
      <div className="grid2" style={{gap:6,marginBottom:10}}>
        <div><label className="form-label">Leg TSN at Reference</label>
          <input type="number" value={g.refLegFH??""} onChange={e=>set("landingGear."+gkey+".refLegFH",e.target.value===""?null:+e.target.value)}/>
        </div>
        <div><label className="form-label">Leg CSN at Reference</label>
          <input type="number" value={g.refLegFC??""} onChange={e=>set("landingGear."+gkey+".refLegFC",e.target.value===""?null:+e.target.value)}/>
        </div>
        <div><label className="form-label">Airframe TSN at Reference</label>
          <input type="number" value={g.refAirframeFH??""} onChange={e=>set("landingGear."+gkey+".refAirframeFH",e.target.value===""?null:+e.target.value)}/>
        </div>
        <div><label className="form-label">Airframe CSN at Reference</label>
          <input type="number" value={g.refAirframeFC??""} onChange={e=>set("landingGear."+gkey+".refAirframeFC",e.target.value===""?null:+e.target.value)}/>
        </div>
      </div>
      </>
      )}

      <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",marginBottom:6}}>Last Overhaul Record</div>
      {editing&&isAdmin&&<div style={{fontSize:10,color:"#64748b",marginBottom:6,fontStyle:"italic"}}>The actual overhaul — drives Next Overhaul Due below. Must be the genuine overhaul event, not just any reading.</div>}
      <div className="grid2" style={{gap:6,marginBottom:6}}>
        <div><label className="form-label">Date (DDMMYYYY)</label>
          {editing&&isAdmin
            ?<input type="text" placeholder="DDMMYYYY" value={lastDateVal} onChange={e=>handleLastDateChange(e.target.value)} onBlur={e=>handleLastDateBlur(e.target.value)}/>
            :<div style={{fontSize:13,fontWeight:500,color:isEmpty(activeDateStr)?"#475569":"#e2e8f0"}}>{activeDateStr||"Not entered"}</div>}
        </div>
        <div/>
        <div><label className="form-label">Leg TSN at Overhaul</label>
          {editing&&isAdmin?<input type="number" value={g.lastOverhaulFH??""} onChange={e=>set("landingGear."+gkey+".lastOverhaulFH",e.target.value===""?null:+e.target.value)}/>
          :<div style={{fontSize:13,fontWeight:500,color:isEmpty(g.lastOverhaulFH)?"#475569":"#e2e8f0"}}>{g.lastOverhaulFH!=null?fmtHHMM(g.lastOverhaulFH):"Not entered"}</div>}
        </div>
        <div><label className="form-label">Leg CSN at Overhaul</label>
          {editing&&isAdmin?<input type="number" value={g.lastOverhaulFC??""} onChange={e=>set("landingGear."+gkey+".lastOverhaulFC",e.target.value===""?null:+e.target.value)}/>
          :<div style={{fontSize:13,fontWeight:500,color:isEmpty(g.lastOverhaulFC)?"#475569":"#e2e8f0"}}>{g.lastOverhaulFC!=null?g.lastOverhaulFC.toLocaleString():"Not entered"}</div>}
        </div>
      </div>

      <div style={{background:overallStatus?statusBg[overallStatus]:"#0a1520",borderRadius:6,padding:"8px 10px",marginBottom:10}}>
        <div style={{fontSize:9,color:"#475569",textTransform:"uppercase",marginBottom:4,textAlign:"center"}}>Next Overhaul Due — Lowest Wins</div>
        <div className="grid2" style={{gap:6}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:"#475569"}}>Calendar ({editing&&isAdmin?<input type="number" value={intervalYears} onChange={e=>handleIntervalYearsBlur(e.target.value)} style={{width:32,fontSize:9,padding:"1px 2px"}}/>:intervalYears}yr)</div>
            {editing&&isAdmin
              ?<input type="text" placeholder="DDMMYYYY" value={nextDueVal} onChange={e=>handleNextDueChange(e.target.value)} onBlur={e=>handleNextDueBlur(e.target.value)} style={{textAlign:"center",fontWeight:700,fontSize:13,width:"100%"}}/>
              :<div style={{fontSize:13,fontWeight:700,color:calStatus?statusColor[calStatus]:"#475569"}}>{activeNextDue||"Not entered"}</div>}
            {calDays!==null&&<div style={{fontSize:9,color:"#64748b"}}>{calDays<0?Math.abs(calDays)+"d overdue":calDays+"d remaining"}</div>}
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:"#475569"}}>Cycles ({editing&&isAdmin?<input type="number" value={intervalCycles} onChange={e=>set("landingGear."+gkey+".overhaulIntervalCycles",e.target.value===""?20000:+e.target.value)} style={{width:48,fontSize:9,padding:"1px 2px"}}/>:intervalCycles.toLocaleString()})</div>
            <div style={{fontSize:13,fontWeight:700,color:cycStatus?statusColor[cycStatus]:"#475569"}}>{cyclesRemaining!==null?Math.round(cyclesRemaining).toLocaleString():"No data"}</div>
            {cyclesRemaining!==null&&<div style={{fontSize:9,color:"#64748b"}}>cycles remaining</div>}
          </div>
        </div>
      </div>

      {(sinceFH!=null||sinceFC!=null||activeDateStr)&&<div style={{background:"#0d1925",borderRadius:6,padding:"8px 10px",marginBottom:10}}>
        <div style={{fontSize:9,color:"#475569",textTransform:"uppercase",marginBottom:4}}>Since Last Overhaul</div>
        <div className="grid3" style={{gap:4}}>
          <div><div style={{fontSize:9,color:"#475569"}}>Days</div><div style={{fontSize:12,fontWeight:700,color:"#C9A84C",fontFamily:"monospace"}}>{daysSince!==null?daysSince.toLocaleString():"—"}</div></div>
          <div><div style={{fontSize:9,color:"#475569"}}>FH</div><div style={{fontSize:12,fontWeight:700,color:"#C9A84C",fontFamily:"monospace"}}>{sinceFH!=null?fmtHHMM(sinceFH):"—"}</div></div>
          <div><div style={{fontSize:9,color:"#475569"}}>FC</div><div style={{fontSize:12,fontWeight:700,color:"#C9A84C",fontFamily:"monospace"}}>{sinceFC!=null?Math.round(sinceFC).toLocaleString():"—"}</div></div>
        </div>
      </div>}

      <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",marginBottom:6}}>Current Totals (Since New){current&&<span style={{marginLeft:6,fontSize:9,fontWeight:600,color:current.source==="Ground Truth"?"#34d399":"#60a5fa",textTransform:"none"}}>{current.source}</span>}</div>
      {current?(
        <div className="grid2" style={{gap:6}}>
          {[["TSN",current.fh!=null?fmtHHMM(current.fh):"—"],["CSN",current.fc!=null?Math.round(current.fc).toLocaleString():"—"]].map(([l,v])=>(
            <div key={l} style={{background:"#0d1925",borderRadius:5,padding:"6px 8px"}}>
              <div style={{fontSize:9,color:"#475569"}}>{l}</div>
              <div style={{fontSize:12,fontWeight:600,color:"#C9A84C",fontFamily:"monospace"}}>{v}</div>
            </div>
          ))}
        </div>
      ):(
        <div style={{fontSize:11,color:"#475569",fontStyle:"italic"}}>Not entered — enter a Reference Reading (leg + airframe TSN/CSN at the same moment) above to start tracking.</div>
      )}

      <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",marginBottom:6,marginTop:12}}>Ground Truth Override <span style={{fontWeight:400,fontSize:9,textTransform:"none"}}>(optional — from Gear Status Report)</span></div>
      <div className="grid2" style={{gap:6}}>
        <div><label className="form-label">Current TSN</label>
          {editing&&isAdmin?<input type="number" value={g.currentFH??""} onChange={e=>set("landingGear."+gkey+".currentFH",e.target.value===""?null:+e.target.value)}/>
          :<div style={{fontSize:13,fontWeight:500,color:isEmpty(g.currentFH)?"#475569":"#e2e8f0"}}>{g.currentFH!=null?fmtHHMM(g.currentFH):"Not entered"}</div>}
        </div>
        <div><label className="form-label">Current CSN</label>
          {editing&&isAdmin?<input type="number" value={g.currentFC??""} onChange={e=>set("landingGear."+gkey+".currentFC",e.target.value===""?null:+e.target.value)}/>
          :<div style={{fontSize:13,fontWeight:500,color:isEmpty(g.currentFC)?"#475569":"#e2e8f0"}}>{g.currentFC!=null?g.currentFC.toLocaleString():"Not entered"}</div>}
        </div>
      </div>
      {editing&&isAdmin&&<div style={{fontSize:9,color:"#475569",marginTop:3}}>When set, this always overrides the calculated figure above — no tolerance check.</div>}
    </div>
  );
}

function LandingGearTab({asset,isAdmin,saveAsset,notify}){
  const[editing,setEditing]=useState(false);
  const[form,setForm]=useState(null);
  const af=asset.airframe||{};
  const startEdit=()=>{setForm(JSON.parse(JSON.stringify(asset)));setEditing(true);};
  const cancel=()=>{setForm(null);setEditing(false);};
  const save=async()=>{
    await saveAsset(form);setEditing(false);setForm(null);notify("Saved");
  };
  const set=(path,val)=>{const f=JSON.parse(JSON.stringify(form));const parts=path.split(".");let obj=f;for(let i=0;i<parts.length-1;i++){if(!obj[parts[i]])obj[parts[i]]={};obj=obj[parts[i]];}obj[parts[parts.length-1]]=val;setForm(f);};
  return(
    <div>
      <div className="flj" style={{marginBottom:14}}>
        <div/>
        {isAdmin&&!editing&&<button className="btn btn-ghost" onClick={startEdit}>Edit</button>}
        {isAdmin&&editing&&<div className="flab g8"><button className="btn btn-ghost" onClick={cancel}>Cancel</button><button className="btn btn-gold" onClick={save}>Save</button></div>}
      </div>
      <div className="grid3">
        {[["Nose Landing Gear","nose"],["LH Main Landing Gear","left"],["RH Main Landing Gear","right"]].map(([title,gkey])=>(
          <GearCard key={gkey} title={title} gkey={gkey} asset={asset} form={form} editing={editing} isAdmin={isAdmin} set={set} setForm={setForm} af={af}/>
        ))}
      </div>
      <WheelsBrakesCard asset={asset} form={form} editing={editing} isAdmin={isAdmin} set={set}/>
    </div>
  );
}

function APUTab({asset,isAdmin,saveAsset,notify}){
  const[editing,setEditing]=useState(false);
  const[form,setForm]=useState(null);
  const[addLLP,setAddLLP]=useState(false);
  const[newLLP,setNewLLP]=useState({desc:"",pn:"",sn:"",startFCRem:0,refFC:0});
  const[addSV,setAddSV]=useState(false);
  const[editSVIdx,setEditSVIdx]=useState(null);
  const[newSV,setNewSV]=useState({details:"",date:"",fh:"",fc:"",mro:""});
  const[editSVForm,setEditSVForm]=useState(null);
  const apu=asset.apu||{};
  const startEdit=()=>{setForm(JSON.parse(JSON.stringify(asset)));setEditing(true);};
  const cancel=()=>{setForm(null);setEditing(false);};

  const set=(path,val)=>{const f=JSON.parse(JSON.stringify(form));const parts=path.split(".");let obj=f;for(let i=0;i<parts.length-1;i++){if(!obj[parts[i]])obj[parts[i]]={};obj=obj[parts[i]];}obj[parts[parts.length-1]]=val;setForm(f);};
