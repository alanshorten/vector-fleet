function ShareModal({asset,notify,onClose}){
  const[tokens,setTokens]=useState(null);
  const[busy,setBusy]=useState(false);

  const load=async()=>{
    const list=await db.getShareTokensForAsset(asset.id).catch(()=>[]);
    const active=list.filter(t=>!t.revoked&&new Date(t.expiresAt).getTime()>Date.now());
    setTokens(active);
  };
  useEffect(()=>{load();},[]);

  const shareUrl=(token)=>`https://app.tailiq.app/share/${token}`;

  const generate=async()=>{
    setBusy(true);
    try{
      await db.createShareToken(asset.id, asset.companyId||null);
      await load();
      notify("Share link created — expires in 7 days","success");
    }catch(e){
      notify("Failed to create share link","error");
    }
    setBusy(false);
  };

  const revoke=async(token)=>{
    setBusy(true);
    try{
      await db.revokeShareToken(token);
      await load();
      notify("Share link revoked","success");
    }catch(e){
      notify("Failed to revoke link","error");
    }
    setBusy(false);
  };

  const copy=(token)=>{
    navigator.clipboard?.writeText(shareUrl(token));
    notify("Link copied to clipboard","success");
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(5,10,16,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}} onClick={onClose}>
      <div className="card" style={{width:420,maxWidth:"92vw",padding:24}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h2 style={{fontSize:15,color:"#C9A84C",fontWeight:700}}>Share MSN {asset.msn}</h2>
          <button className="btn btn-ghost" style={{padding:"4px 10px"}} onClick={onClose}>✕</button>
        </div>
        <p style={{fontSize:12,color:"#7a9ab5",marginBottom:16,lineHeight:1.5}}>
          Read-only tech spec view — no financial data. Links expire after 7 days.
        </p>
        {tokens===null&&<div style={{color:"#475569",fontSize:12}}>Loading…</div>}
        {tokens&&tokens.length===0&&(
          <button className="btn btn-gold" style={{width:"100%",padding:10}} disabled={busy} onClick={generate}>
            {busy?"Generating…":"Generate Share Link"}
          </button>
        )}
        {tokens&&tokens.map(t=>(
          <div key={t.token} style={{marginBottom:16,paddingBottom:16,borderBottom:"1px solid #1e3048"}}>
            <div style={{display:"flex",justifyContent:"center",marginBottom:12}}>
              <img
                alt="QR code"
                style={{background:"#fff",borderRadius:6,padding:6}}
                src={`https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(shareUrl(t.token))}`}
              />
            </div>
            <div style={{fontSize:11,color:"#475569",wordBreak:"break-all",marginBottom:10,textAlign:"center"}}>{shareUrl(t.token)}</div>
            <div style={{fontSize:10,color:"#475569",textAlign:"center",marginBottom:12}}>Expires {fmtDate(t.expiresAt)}</div>
            <div style={{display:"flex",gap:8}}>
              <a className="btn btn-primary" style={{flex:1,textAlign:"center",textDecoration:"none",fontSize:12,padding:"8px 0"}}
                 href={`https://wa.me/?text=${encodeURIComponent(shareUrl(t.token))}`} target="_blank" rel="noopener noreferrer">WhatsApp</a>
              <button className="btn btn-ghost" style={{flex:1,fontSize:12}} onClick={()=>copy(t.token)}>Copy Link</button>
            </div>
            <button className="btn btn-danger" style={{width:"100%",marginTop:8}} disabled={busy} onClick={()=>revoke(t.token)}>Revoke Link</button>
          </div>
        ))}
        {tokens&&tokens.length>0&&(
          <button className="btn btn-ghost" style={{width:"100%"}} disabled={busy} onClick={generate}>
            {busy?"Generating…":"+ Generate New Link"}
          </button>
        )}
      </div>
    </div>
  );
}

function OverviewTab({asset,isAdmin,saveAsset,notify}){
  const[editing,setEditing]=useState(false);
  const[form,setForm]=useState(null);
  const startEdit=()=>{setForm(JSON.parse(JSON.stringify(asset)));setEditing(true);};
  const cancel=()=>{setForm(null);setEditing(false);};
  const save=async()=>{await saveAsset(form);setEditing(false);setForm(null);notify("Saved");};
  const d=editing?form:asset;
  const af=asset.airframe||{};
  const set=(path,val)=>{const f=JSON.parse(JSON.stringify(form));const parts=path.split(".");let obj=f;for(let i=0;i<parts.length-1;i++){if(!obj[parts[i]])obj[parts[i]]={};obj=obj[parts[i]];}obj[parts[parts.length-1]]=val;setForm(f);};
  const fmtMMYYYY=(s)=>{if(!s)return"—";if(/^\d{2}\/\d{4}$/.test(s))return s;try{const d=new Date(s);if(isNaN(d))return s;return String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear();}catch{return s;}};
  const Field=({label,path,type="text"})=>{
    const parts=path.split(".");const val=parts.reduce((o,k)=>o?.[k],d);
    return<div className="form-group"><label className="form-label">{label}</label>
      {editing&&isAdmin?<input type="text" placeholder={type==="mmyyyy"?"MM/YYYY":""} defaultValue={type==="mmyyyy"?fmtMMYYYY(val):val||""} onBlur={e=>set(path,e.target.value)} className={isEmpty(val)?"amber":""}/>
      :<div style={{fontSize:13,fontWeight:500,color:isEmpty(val)?"#475569":"#e2e8f0",fontStyle:isEmpty(val)?"italic":"normal"}}>{type==="mmyyyy"?fmtMMYYYY(val):val||"Not entered"}</div>}
    </div>;
  };
  // Status calcs
  const llpVals=(asset.engines||[]).map(e=>{const ll=lowestLimiter(e);return{label:`Engine #${e.position||1}`,val:ll,csn:e.currentFC};});
  if(asset.apu?.llps?.length){const ll=Math.min(...asset.apu.llps.map(l=>calcLLPRem(l,asset.apu.currentFC)));llpVals.push({label:"APU",val:ll});}
  const lgItems=[["NLG",asset.landingGear?.nose],["LH",asset.landingGear?.left],["RH",asset.landingGear?.right]];
  return(
    <div className="grid2">
      <div className="card" style={{padding:18}}>
        <div className="flj" style={{marginBottom:12}}>
          <div className="section-title" style={{margin:0}}>Asset Details</div>
          {!isAdmin?null:!editing?<button className="btn btn-ghost" onClick={startEdit}>Edit</button>:<div className="flab g8"><button className="btn btn-ghost" onClick={cancel}>Cancel</button><button className="btn btn-gold" onClick={save}>Save</button></div>}
        </div>
        <div className="grid2" style={{gap:"0 16px"}}>
          <Field label="MSN" path="msn"/><Field label="Registration" path="registration"/>
          <div className="form-group">
            <label className="form-label" style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
              <span>{d.operatorLabel||"Current Operator"}</span>
              {editing&&isAdmin&&<button type="button" onClick={()=>set("operatorLabel",d.operatorLabel==="Previous Operator"?"Current Operator":"Previous Operator")} style={{fontSize:9,fontWeight:700,padding:"1px 7px",borderRadius:3,border:"1px solid #C9A84C",background:"none",color:"#C9A84C",cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.05em",flexShrink:0}}>{"→ "+(d.operatorLabel==="Previous Operator"?"Current":"Previous")}</button>}
            </label>
            {editing&&isAdmin?<input type="text" defaultValue={d.operator||""} onBlur={e=>set("operator",e.target.value)} className={isEmpty(d.operator)?"amber":""}/>:<div style={{fontSize:13,fontWeight:500,color:isEmpty(d.operator)?"#475569":"#e2e8f0",fontStyle:isEmpty(d.operator)?"italic":"normal"}}>{d.operator||"Not entered"}</div>}
          </div>
          <Field label="Model" path="model"/>
          <Field label="Manufacturer" path="manufacturer"/><Field label="Date of Manufacture (MM/YYYY)" path="dom" type="mmyyyy"/>
        </div>
        <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid #1e3048"}}>
          <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Current Airframe</div>
          <div className="grid2" style={{gap:8}}>
            {[["AIRFRAME TSN",fmtHHMM(af.currentFH)],["AIRFRAME CSN",af.currentFC?.toLocaleString()||"—"]].map(([l,v])=>(
              <div key={l} style={{background:"#070f18",border:"1px solid #1B3A6B",borderRadius:8,padding:"12px 14px"}}>
                <div style={{fontSize:9,color:"#475569",fontWeight:700,letterSpacing:"0.08em"}}>{l}</div>
                <div style={{fontSize:20,fontWeight:700,color:"#C9A84C",fontFamily:"monospace",marginTop:4}}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div className="card" style={{padding:18}}>
          <div className="section-title">Status Summary</div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",marginBottom:6}}>LLP Limiters</div>
            {llpVals.map(({label,val})=>{
              const col=val===null?"#475569":val<1000?"#f87171":val<3000?"#fbbf24":"#34d399";
              const bg=val===null?"transparent":val<1000?"#2a0e0e":val<3000?"#2a1f0a":"#0d2818";
              return<div key={label} className="flj" style={{padding:"5px 0",borderBottom:"1px solid #0f2030"}}>
                <span style={{fontSize:12,color:"#94a3b8"}}>{label}</span>
                <span className="pill" style={{background:bg,color:col,fontSize:11}}>{val!==null?`${val.toLocaleString()} FC`:"No data"}</span>
              </div>;
            })}
            {llpVals.length===0&&<div style={{fontSize:12,color:"#475569",fontStyle:"italic"}}>No LLP data</div>}
          </div>
          <div>
            <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",marginBottom:6}}>Landing Gear Overhauls</div>
            {lgItems.map(([label,g])=>{
              const days=daysFromNow(g?.nextDue);
              const col=days===null?"#475569":days<0?"#f87171":days<365?"#fbbf24":"#34d399";
              const bg=days===null?"transparent":days<0?"#2a0e0e":days<365?"#2a1f0a":"#0a1a0a";
              return<div key={label} className="flj" style={{padding:"5px 0",borderBottom:"1px solid #0f2030"}}>
                <span style={{fontSize:12,color:"#94a3b8"}}>{label}</span>
                <span className="pill" style={{background:bg,color:col,fontSize:11}}>{g?.nextDue?`${fmtDate(g.nextDue)}${days!==null?` (${days<0?Math.abs(days)+"d overdue":days+"d"})`:""}`:"Not entered"}</span>
              </div>;
            })}
          </div>
          <div style={{marginTop:10,paddingTop:8,borderTop:"1px solid #1e3048"}}>
            <div className="flj"><span style={{fontSize:11,color:"#475569"}}>Last Report</span><span style={{fontSize:11,fontWeight:600,color:asset._lastPeriod?"#e2e8f0":"#f87171"}}>{asset._lastPeriod||"None"}</span></div>
          </div>
        </div>
        <div className="card" style={{padding:18}}>
          <div className="section-title">Check History</div>
          {(asset.checks||[]).map((c,i)=>(
            <div key={i} style={{marginBottom:10,paddingBottom:10,borderBottom:i<(asset.checks.length-1)?"1px solid #1e3048":"none"}}>
              <div style={{fontSize:11,fontWeight:600,color:"#94a3b8",marginBottom:6}}>{c.name}</div>
              <div className="grid2" style={{gap:"4px 10px"}}>
                {[["Last Date",c.lastDate,"date"],["Next Due",c.nextDate,"date"]].map(([l,v,t])=>(
                  <div key={l}><div style={{fontSize:10,color:"#475569"}}>{l}</div><div style={{fontSize:12,fontWeight:500,color:isEmpty(v)?"#475569":"#e2e8f0"}}>{t==="date"?fmtDate(v):v||"—"}</div></div>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}


function ShopVisitEditor({eng,engIdx,asset,isAdmin,saveAsset,notify}){
  const[adding,setAdding]=useState(false);
  const[newSV,setNewSV]=useState({details:"",date:"",fh:"",fc:"",mro:""});
  const saveSV=async()=>{
    const engines=JSON.parse(JSON.stringify(asset.engines||[]));
    engines[engIdx].shopVisits=[...(engines[engIdx].shopVisits||[]),{...newSV,fh:parseHHMM(newSV.fh),fc:+newSV.fc}];
    await saveAsset({...asset,engines});
    setAdding(false);setNewSV({details:"",date:"",fh:"",fc:"",mro:""});notify("Shop visit added");
  };
  const delSV=async(si)=>{
    if(!confirm("Delete shop visit?"))return;
    const engines=JSON.parse(JSON.stringify(asset.engines||[]));
    engines[engIdx].shopVisits.splice(si,1);
    await saveAsset({...asset,engines});notify("Deleted");
  };
  return(
    <div>
      <div className="flj" style={{marginBottom:8}}>
        <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:"0.05em"}}>Shop Visit History</div>
        <button className="btn btn-primary" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>setAdding(true)}>+ Add Visit</button>
      </div>
      {(()=>{const svs=eng.shopVisits||[];if(!svs.length)return null;const last=svs[svs.length-1];const sinceFH=eng.currentFH&&last.fh?eng.currentFH-last.fh:null;const sinceFC=eng.currentFC&&last.fc?eng.currentFC-last.fc:null;const sinceDays=last.date?Math.floor((new Date()-new Date(last.date))/86400000):null;return(<div style={{background:"#0a1a2a",border:"1px solid #1B3A6B",borderRadius:6,padding:"10px 12px",marginBottom:10}}><div style={{fontSize:9,color:"#C9A84C",fontWeight:700,textTransform:"uppercase",marginBottom:6}}>Since Last Shop Visit</div><div className="grid3" style={{gap:8}}><div><div style={{fontSize:9,color:"#475569"}}>Days</div><div style={{fontSize:14,fontWeight:700,color:"#C9A84C",fontFamily:"monospace"}}>{sinceDays!==null?sinceDays.toLocaleString():"—"}</div></div><div><div style={{fontSize:9,color:"#475569"}}>FH</div><div style={{fontSize:14,fontWeight:700,color:"#C9A84C",fontFamily:"monospace"}}>{sinceFH!==null?fmtHHMM(sinceFH):"—"}</div></div><div><div style={{fontSize:9,color:"#475569"}}>FC</div><div style={{fontSize:14,fontWeight:700,color:"#C9A84C",fontFamily:"monospace"}}>{sinceFC!==null?sinceFC.toLocaleString():"—"}</div></div></div></div>);})()}
      <table><thead><tr><th>Details</th><th>Date</th><th>TSN</th><th>CSN</th><th>MRO</th><th></th></tr></thead>
      <tbody>{eng.shopVisits?.length?eng.shopVisits.map((sv,si)=>(
        <tr key={si}>
          <td style={{fontWeight:500}}>{sv.details}</td><td>{fmtDate(sv.date)}</td>
          <td style={{fontFamily:"monospace"}}>{fmtHHMM(sv.fh)}</td><td style={{fontFamily:"monospace"}}>{sv.fc?.toLocaleString()}</td>
          <td style={{color:"#94a3b8"}}>{sv.mro}</td>
          <td><button className="btn-danger btn" style={{fontSize:10,padding:"2px 6px"}} onClick={()=>delSV(si)}>✕</button></td>
        </tr>
      )):<tr><td colSpan={isAdmin?6:5} style={{color:"#475569",fontStyle:"italic"}}>No shop visits recorded</td></tr>}</tbody></table>
      {adding&&(
        <div style={{background:"#0d1925",borderRadius:6,padding:12,marginTop:8,border:"1px solid #1e3048"}}>
          <div className="grid3" style={{gap:6,marginBottom:8}}>
            <div style={{gridColumn:"1/-1"}}><label className="form-label">Details / Description</label><input value={newSV.details} onChange={e=>setNewSV({...newSV,details:e.target.value})}/></div>
            {[["Date","date","date"],["TSN (HH:MM)","fh","text"],["CSN","fc","number"],["MRO Facility","mro","text"]].map(([l,k,t])=>(
              <div key={k}><label className="form-label">{l}</label><input type={t} value={newSV[k]} onChange={e=>setNewSV({...newSV,[k]:e.target.value})}/></div>
            ))}
          </div>
          <div className="flab g8"><button className="btn btn-ghost" onClick={()=>setAdding(false)}>Cancel</button><button className="btn btn-gold" onClick={saveSV}>Add Visit</button></div>
        </div>
      )}
    </div>
  );
}


function EnginesTab({asset,isAdmin,saveAsset,notify}){
  const[editIdx,setEditIdx]=useState(null);
  const[form,setForm]=useState(null);
  const[addLLPIdx,setAddLLPIdx]=useState(null);
  const[newLLP,setNewLLP]=useState({desc:"",pn:"",sn:"",startFCRem:0,refFC:0});
  const patchEngines=async(engines)=>{await saveAsset({...asset,engines});};
  const saveEngineEdit=async()=>{const engines=[...asset.engines];engines[editIdx]=form;await patchEngines(engines);setEditIdx(null);setForm(null);notify("Engine saved");};
  const doAddLLP=async(ei)=>{const engines=JSON.parse(JSON.stringify(asset.engines));engines[ei].llps=[...(engines[ei].llps||[]),{...newLLP,startFCRem:+newLLP.startFCRem,refFC:+newLLP.refFC}];await patchEngines(engines);setAddLLPIdx(null);setNewLLP({desc:"",pn:"",sn:"",startFCRem:0,refFC:0});notify("LLP added");};
  const delLLP=async(ei,li)=>{if(!confirm("Delete?"))return;const engines=JSON.parse(JSON.stringify(asset.engines));engines[ei].llps.splice(li,1);await patchEngines(engines);notify("LLP deleted");};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      {(asset.engines||[]).map((eng,ei)=>{
        const ll=lowestLimiter(eng);const isEditing=editIdx===ei;const ed=isEditing?form:eng;
        return(
          <div key={ei} className="card" style={{padding:20}}>
            <div className="flj" style={{marginBottom:14}}>
              <div className="flab" style={{gap:10}}>
                <div className="section-title" style={{margin:0}}>Engine #{eng.position||ei+1} — ESN {eng.sn||"TBD"}</div>
                {eng.atShop&&<span style={{fontSize:11,color:"#f87171"}}>🔧 At shop</span>}
              </div>
              <div className="flab g8">
                <button className="btn btn-gold" style={{fontSize:12,padding:"8px 16px"}} onClick={async()=>{
                  const isCFMEng=(eng.type||"").toUpperCase().includes("CFM");
                  const photoKey=isCFMEng?"engine_photo_cfm56":"engine_photo_v2500";
                  const engPhoto=await db.getSetting(photoKey).catch(()=>null)||"";
                  const logo=await getTechSpecLogo();
                  const defaultDisclaimer=await getDefaultDisclaimer();
                  const base=buildTechSpecHTML({...asset,engines:[eng],_engineOnly:true,_enginePos:eng.position||ei+1},engPhoto,logo,defaultDisclaimer);
                  const withBar=base.replace('<body>',`<body><div style="position:fixed;top:0;left:0;right:0;background:#1B3A6B;padding:10px 20px;display:flex;gap:10px;align-items:center;z-index:999;box-shadow:0 2px 8px rgba(0,0,0,0.3)"><span style="color:#C9A84C;font-weight:700;font-size:14px;flex:1">TailiQ — Engine Spec ESN ${eng.sn||"—"}</span><button onclick="window.print()" style="background:#C9A84C;color:#0a1520;border:none;border-radius:6px;padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer">🖨 Print / Save PDF</button><button onclick="window.close()" style="background:transparent;color:#94a3b8;border:1px solid #2d3f55;border-radius:6px;padding:8px 16px;font-size:13px;cursor:pointer">✕ Close</button></div><div style="height:52px"></div>`);
                  const withPrint=withBar.replace('</style>','@media print{body>div:first-child{display:none!important}div[style*="height:52px"]{display:none!important}}</style>');
                  const win=window.open();win.document.write(withPrint);win.document.close();
                }}>📋 Generate Tech Spec</button>
                {isAdmin&&!isEditing&&<button className="btn btn-ghost" onClick={()=>{const f=JSON.parse(JSON.stringify(eng));if(!f.thrust)f.thrust="27K";setForm(f);setEditIdx(ei);}}>Edit</button>}
                {isAdmin&&isEditing&&<><button className="btn btn-ghost" onClick={()=>{setEditIdx(null);setForm(null);}}>Cancel</button><button className="btn btn-gold" onClick={saveEngineEdit}>Save</button></>}
              </div>
            </div>
            <div className="grid4" style={{marginBottom:14}}>
              {[["S/N","sn"],["Type","type"],["Thrust","thrust"],["Status","status"]].map(([l,k])=>(
                <div key={k} style={{background:"#0d1925",borderRadius:6,padding:"8px 10px"}}>
                  <div style={{fontSize:9,color:"#475569"}}>{l}</div>
                  {isEditing&&isAdmin?<input value={ed[k]||""} onChange={e=>setForm({...form,[k]:e.target.value})} style={{marginTop:3}}/>
                  :<div style={{fontSize:12,fontWeight:600,color:isEmpty(eng[k])?"#475569":"#e2e8f0",marginTop:3}}>{eng[k]||"—"}</div>}
                </div>
              ))}

            </div>
            <div className="grid4" style={{marginBottom:14}}>
              {[["TSN",fmtHHMM(eng.currentFH)],["CSN",(eng.currentFC||0).toLocaleString()],["FH/FC",eng.currentFH&&eng.currentFC?(eng.currentFH/eng.currentFC).toFixed(2):"—"],["Lowest LLP",ll!==null?`${ll.toLocaleString()} FC`:"No data"]].map(([l,v])=>(
                <div key={l} style={{background:"#0d1925",borderRadius:6,padding:"8px 10px"}}>
                  <div style={{fontSize:9,color:"#475569"}}>{l}</div>
                  <div style={{fontSize:14,fontWeight:700,fontFamily:"monospace",color:l==="Lowest LLP"?(ll===null?"#475569":ll<1000?"#f87171":ll<3000?"#fbbf24":"#34d399"):"#C9A84C"}}>{v}</div>
                </div>
              ))}
            </div>
            {eng.atShop&&eng.titleEngine&&(
              <div style={{background:"#1a1306",border:"1px solid #92660a",borderRadius:6,padding:"10px 12px",marginBottom:16}}>
                <div style={{fontSize:10,fontWeight:700,color:"#fbbf24",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>🔧 Title Engine — Removed {fmtDate(eng.titleEngine.removedDate)}</div>
                <div className="grid4" style={{gap:8}}>
                  {[["S/N",eng.titleEngine.sn],["Type",eng.titleEngine.type||"—"],["TSN at Removal",fmtHHMM(eng.titleEngine.currentFH)],["CSN at Removal",(eng.titleEngine.currentFC||0).toLocaleString()]].map(([l,v])=>(
                    <div key={l} style={{background:"#0d1925",borderRadius:6,padding:"6px 8px"}}>
                      <div style={{fontSize:9,color:"#475569"}}>{l}</div>
                      <div style={{fontSize:12,fontWeight:600,color:"#e2e8f0"}}>{v}</div>
                    </div>
                  ))}
                </div>
                {eng.titleEngine.reason&&<div style={{fontSize:11,color:"#94a3b8",marginTop:8}}>Reason: {eng.titleEngine.reason}</div>}
                {isAdmin&&<div className="flab g8" style={{marginTop:10}}>
                  <button className="btn btn-gold" style={{fontSize:11,padding:"4px 10px"}} onClick={async()=>{
                    const engines=JSON.parse(JSON.stringify(asset.engines));
                    engines[ei]={...engines[ei],atShop:false,titleEngine:null};
                    await patchEngines(engines);notify("Engine returned to service");
                  }}>✓ Engine Returned</button>
                  <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={async()=>{
                    if(!confirm("Confirm this engine is permanently replaced? The title engine record will be cleared."))return;
                    const engines=JSON.parse(JSON.stringify(asset.engines));
                    engines[ei]={...engines[ei],atShop:false,titleEngine:null};
                    await patchEngines(engines);notify("Confirmed permanent replacement");
                  }}>Confirm Permanent</button>
                </div>}
              </div>
            )}
            <div style={{marginBottom:16}}>
              <div className="flj" style={{marginBottom:8}}>
                <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:"0.05em"}}>Life Limited Parts</div>
                {isAdmin&&<div className="flab g8">
  {eng.llps?.length>0&&<button className="btn btn-danger" style={{fontSize:11,padding:"4px 10px"}} onClick={async()=>{if(!confirm("Delete all LLPs for this engine?"))return;const engines=JSON.parse(JSON.stringify(asset.engines||[]));engines[ei].llps=[];await patchEngines(engines);notify("All LLPs deleted");}}>Clear All LLPs</button>}
  <button className="btn btn-primary" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>setAddLLPIdx(ei)}>+ Add LLP</button>
</div>}
              </div>
              {ed.llps?.length?(
                <table><thead><tr><th>Descriptor</th><th>P/N</th><th>S/N</th><th>FC Remaining{isEditing&&<span style={{fontSize:9,color:"#64748b",fontWeight:400,marginLeft:4}}>(editable)</span>}</th><th></th></tr></thead>
                <tbody>{ed.llps.map((llp,li)=>{const rem=calcLLPRem(llp,ed.currentFC);return(
                  <tr key={li} style={{background:rem<1000?"#1a0a0a":rem<3000?"#1a150a":"transparent"}}>
                    <td style={{fontWeight:500}}>{llp.desc}</td><td style={{fontFamily:"monospace",fontSize:11}}>{llp.pn}</td><td style={{fontFamily:"monospace",fontSize:11}}>{llp.sn}</td>
                    <td>{isEditing&&isAdmin
                      ?<input type="number" defaultValue={rem} style={{width:90,padding:"3px 6px",fontSize:12}} onBlur={e=>{const newRem=+e.target.value;const curFC=ed.currentFC||0;const newStart=newRem+(curFC-llp.refFC);const updLLPs=JSON.parse(JSON.stringify(form.llps));updLLPs[li].startFCRem=newStart;setForm({...form,llps:updLLPs});}}/>
                      :<span style={{fontWeight:700,color:rem<1000?"#f87171":rem<3000?"#fbbf24":"#34d399"}}>{rem.toLocaleString()}</span>
                    }</td>
                    {isAdmin&&<td><button className="btn-danger btn" style={{fontSize:10,padding:"2px 6px"}} onClick={()=>delLLP(ei,li)}>✕</button></td>}
                  </tr>
                );})}</tbody></table>
              ):<div style={{color:"#475569",fontSize:12,fontStyle:"italic",padding:"6px 0"}}>No LLP data entered yet.</div>}
              {addLLPIdx===ei&&(
                <div style={{background:"#0d1925",borderRadius:6,padding:12,marginTop:8,border:"1px solid #1e3048"}}>
                  <div className="grid3" style={{gap:6,marginBottom:8}}>
                    {[["Descriptor","desc","text"],["P/N","pn","text"],["S/N","sn","text"],["Starting FC Rem","startFCRem","number"],["Reference FC","refFC","number"]].map(([l,k,t])=>(
                      <div key={k}><label className="form-label">{l}</label><input type={t} value={newLLP[k]} onChange={e=>setNewLLP({...newLLP,[k]:e.target.value})}/></div>
                    ))}
                  </div>
                  <div className="flab g8"><button className="btn btn-ghost" onClick={()=>setAddLLPIdx(null)}>Cancel</button><button className="btn btn-gold" onClick={()=>doAddLLP(ei)}>Add LLP</button></div>
                </div>
              )}
            </div>
            <ShopVisitEditor eng={eng} engIdx={ei} asset={asset} isAdmin={isAdmin} saveAsset={saveAsset} notify={notify}/>
          </div>
        );
      })}
    </div>
  );
}

function GearCard({title,gkey,asset,form,editing,isAdmin,set,setForm,af}){
  const g=(editing?form:asset).landingGear?.[gkey]||{};
  const fromDDMMYYYY=(s)=>{if(!s)return"";const m=/^(\d{2})\/(\d{2})\/(\d{4})$/.exec(s);if(m)return m[3]+"-"+m[2]+"-"+m[1];return s;};
  const toDDMMYYYY=(s)=>{if(!s)return"";if(/^\d{2}\/\d{2}\/\d{4}$/.test(s))return s;try{const dt=new Date(s);if(isNaN(dt))return s||"";return String(dt.getDate()).padStart(2,"0")+"/"+String(dt.getMonth()+1).padStart(2,"0")+"/"+dt.getFullYear();}catch{return s||"";}};
  const fmtDigits=(raw)=>{const n=raw.replace(/\D/g,"").slice(0,8);if(n.length<=2)return n;if(n.length<=4)return n.slice(0,2)+"/"+n.slice(2);return n.slice(0,2)+"/"+n.slice(2,4)+"/"+n.slice(4);};
  const plusYears=(s,yrs)=>{const m=/^(\d{2})\/(\d{2})\/(\d{4})$/.exec(s);if(!m)return"";return m[1]+"/"+m[2]+"/"+(+m[3]+(+yrs||10));};
  const intervalYears=g.overhaulIntervalYears!=null?g.overhaulIntervalYears:10;
  const intervalCycles=g.overhaulIntervalCycles!=null?g.overhaulIntervalCycles:20000;
  const[lastDateVal,setLastDateVal]=useState(toDDMMYYYY(g.lastOverhaulDate)||"");
  const[nextDueVal,setNextDueVal]=useState(toDDMMYYYY(g.nextDue)||"");
  useEffect(()=>{if(!editing){setLastDateVal(toDDMMYYYY(g.lastOverhaulDate)||"");setNextDueVal(toDDMMYYYY(g.nextDue)||"");}},[editing]);
  const handleLastDateChange=(raw)=>{const fmt=fmtDigits(raw);setLastDateVal(fmt);if(/^\d{2}\/\d{2}\/\d{4}$/.test(fmt))setNextDueVal(plusYears(fmt,intervalYears));else if(fmt==="")setNextDueVal("");};
  const handleLastDateBlur=(val)=>{
    if(/^\d{2}\/\d{2}\/\d{4}$/.test(val)){
      const n=plusYears(val,intervalYears);
      setNextDueVal(n);
      // Write both fields in one operation to avoid stale form snapshot
      const f=JSON.parse(JSON.stringify(form));
      if(!f.landingGear)f.landingGear={};
      if(!f.landingGear[gkey])f.landingGear[gkey]={};
      f.landingGear[gkey].lastOverhaulDate=val;
      f.landingGear[gkey].nextDue=n;
      setForm(f);
    } else if(val===""){
      // Deleting the last overhaul date must also clear the derived Next Due —
      // otherwise a stale auto-calculated date persists in data and tech spec.
      setNextDueVal("");
      const f=JSON.parse(JSON.stringify(form));
      if(!f.landingGear)f.landingGear={};
      if(!f.landingGear[gkey])f.landingGear[gkey]={};
      f.landingGear[gkey].lastOverhaulDate="";
      f.landingGear[gkey].nextDue="";
      setForm(f);
    } else {
      set("landingGear."+gkey+".lastOverhaulDate",val);
    }
  };
  const handleNextDueChange=(raw)=>setNextDueVal(fmtDigits(raw));
  const handleNextDueBlur=(val)=>{if(/^\d{2}\/\d{2}\/\d{4}$/.test(val))set("landingGear."+gkey+".nextDue",val);};
  const handleIntervalYearsBlur=(raw)=>{
    const yrs=raw===""?10:+raw;
    const f=JSON.parse(JSON.stringify(form));
    if(!f.landingGear)f.landingGear={};
    if(!f.landingGear[gkey])f.landingGear[gkey]={};
    f.landingGear[gkey].overhaulIntervalYears=yrs;
    if(/^\d{2}\/\d{2}\/\d{4}$/.test(lastDateVal)){
      const n=plusYears(lastDateVal,yrs);
      f.landingGear[gkey].nextDue=n;
      setNextDueVal(n);
    }
    setForm(f);
  };

  // Current totals: ground truth override (Gear Status Report) always wins;
  // otherwise calculate from the Reference Reading — any matched leg+airframe
  // pair taken at the same moment. This is deliberately independent of the
  // Last Overhaul Record below: a reference reading does NOT need to be from
  // an overhaul, and using it for the overhaul-cycles countdown would give a
  // wrong baseline (it wouldn't be counting from a genuine 0-since-overhaul
  // point). The two are separate inputs that may or may not share a date.
  const hasRefPair=g.refLegFC!=null&&g.refAirframeFC!=null;
  let current=null;
  if(g.currentFC!=null){
    current={fh:g.currentFH,fc:g.currentFC,source:"Ground Truth"};
  } else if(hasRefPair){
    const fh=(g.refLegFH||0)+((af.currentFH||0)-(g.refAirframeFH||0));
    const fc=g.refLegFC+((af.currentFC||0)-g.refAirframeFC);
    current={fh,fc,source:"Calculated"};
  }

  const activeDateStr=editing?lastDateVal:(toDDMMYYYY(g.lastOverhaulDate)||"");
  const activeNextDue=editing?nextDueVal:(toDDMMYYYY(g.nextDue)||"");
  // "Since Last Overhaul" diffs the leg's CURRENT total (however that was
  // derived above) against the leg's own CSN at the last overhaul — both on
  // the same leg-CSN scale, so no airframe figure is needed here at all.
  const daysSince=activeDateStr&&/^\d{2}\/\d{2}\/\d{4}$/.test(activeDateStr)?Math.floor((new Date()-new Date(fromDDMMYYYY(activeDateStr)))/86400000):null;
  const sinceFH=(current&&current.fh!=null&&g.lastOverhaulFH!=null)?current.fh-g.lastOverhaulFH:null;
  const sinceFC=(current&&current.fc!=null&&g.lastOverhaulFC!=null)?current.fc-g.lastOverhaulFC:null;

  // Next Overhaul Due — dual limiter, lowest-wins, same pattern as LLPs:
  // a calendar limit (default 10yr from last overhaul) AND a cycle limit
  // (default 20,000 from the leg's CSN at last overhaul), whichever is more
  // restrictive. Cycles remaining is anchored to the Last Overhaul Record,
  // never to the Reference Reading.
  const calDays=daysFromNow(fromDDMMYYYY(activeNextDue));
  const cyclesRemaining=(g.lastOverhaulFC!=null&&current&&current.fc!=null)?(g.lastOverhaulFC+intervalCycles)-current.fc:null;
  const calStatus=calDays===null?null:calDays<0?"critical":calDays<365?"warn":"ok";
  const cycStatus=cyclesRemaining===null?null:cyclesRemaining<1000?"critical":cyclesRemaining<3000?"warn":"ok";
  const sevRank={critical:0,warn:1,ok:2};
  const bothStatus=[calStatus,cycStatus].filter(Boolean);
  const overallStatus=bothStatus.length?bothStatus.sort((a,b)=>sevRank[a]-sevRank[b])[0]:null;
  const statusColor={critical:"#f87171",warn:"#fbbf24",ok:"#34d399"};
  const statusBg={critical:"#2a0e0e",warn:"#2a1f0a",ok:"#0a1520"};

  return(
    <div className="card" style={{padding:18}}>
      <div className="section-title">{title}{g.atShop&&" 🔧"}</div>
      {[["mfr","Manufacturer"],["pn","Part Number"],["sn","Serial Number"]].map(([k,l])=>(
        <div key={k} className="form-group">
          <label className="form-label">{l}</label>
          {editing&&isAdmin?<input value={g[k]||""} onChange={e=>set("landingGear."+gkey+"."+k,e.target.value)}/>
          :<div style={{fontSize:13,fontWeight:500,color:isEmpty(g[k])?"#475569":"#e2e8f0"}}>{g[k]||"Not entered"}</div>}
        </div>
      ))}

      {editing&&isAdmin&&(
      <>
      <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",marginBottom:6,marginTop:4}}>Reference Reading</div>
      <div style={{fontSize:10,color:"#64748b",marginBottom:6,fontStyle:"italic"}}>Any matched leg + airframe reading taken at the same moment — doesn't need to be from an overhaul. Used only to calculate current totals below.</div>
      <div className="grid2" style={{gap:6,marginBottom:10}}>
        <div><label className="form-label">Leg TSN at Reference</label>
          <input type="number" value={g.refLegFH??""} onChange={e=>set("landingGear."+gkey+".refLegFH",e.target.value===""?null:+e.target.value)}/>
        </div>
        <div><label className="form-label">Leg CSN at Reference</label>
          <input type="number" value={g.refLegFC??""} onChange={e=>set("landingGear."+gkey+".refLegFC",e.target.value===""?null:+e.target.value)}/>
        </div>
        <div><label className="form-label">Airframe TSN at Reference</label>
          <input type="number" value={g.refAirframeFH??""} onChange={e=>set("landingGear."+gkey+".refAirframeFH",e.target.value===""?null:+e.target.value)}/>
        </div>
        <div><label className="form-label">Airframe CSN at Reference</label>
          <input type="number" value={g.refAirframeFC??""} onChange={e=>set("landingGear."+gkey+".refAirframeFC",e.target.value===""?null:+e.target.value)}/>
        </div>
      </div>
      </>
      )}

      <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",marginBottom:6}}>Last Overhaul Record</div>
      {editing&&isAdmin&&<div style={{fontSize:10,color:"#64748b",marginBottom:6,fontStyle:"italic"}}>The actual overhaul — drives Next Overhaul Due below. Must be the genuine overhaul event, not just any reading.</div>}
      <div className="grid2" style={{gap:6,marginBottom:6}}>
        <div><label className="form-label">Date (DDMMYYYY)</label>
          {editing&&isAdmin
            ?<input type="text" placeholder="DDMMYYYY" value={lastDateVal} onChange={e=>handleLastDateChange(e.target.value)} onBlur={e=>handleLastDateBlur(e.target.value)}/>
            :<div style={{fontSize:13,fontWeight:500,color:isEmpty(activeDateStr)?"#475569":"#e2e8f0"}}>{activeDateStr||"Not entered"}</div>}
        </div>
        <div/>
        <div><label className="form-label">Leg TSN at Overhaul</label>
          {editing&&isAdmin?<input type="number" value={g.lastOverhaulFH??""} onChange={e=>set("landingGear."+gkey+".lastOverhaulFH",e.target.value===""?null:+e.target.value)}/>
          :<div style={{fontSize:13,fontWeight:500,color:isEmpty(g.lastOverhaulFH)?"#475569":"#e2e8f0"}}>{g.lastOverhaulFH!=null?fmtHHMM(g.lastOverhaulFH):"Not entered"}</div>}
        </div>
        <div><label className="form-label">Leg CSN at Overhaul</label>
          {editing&&isAdmin?<input type="number" value={g.lastOverhaulFC??""} onChange={e=>set("landingGear."+gkey+".lastOverhaulFC",e.target.value===""?null:+e.target.value)}/>
          :<div style={{fontSize:13,fontWeight:500,color:isEmpty(g.lastOverhaulFC)?"#475569":"#e2e8f0"}}>{g.lastOverhaulFC!=null?g.lastOverhaulFC.toLocaleString():"Not entered"}</div>}
        </div>
      </div>

      <div style={{background:overallStatus?statusBg[overallStatus]:"#0a1520",borderRadius:6,padding:"8px 10px",marginBottom:10}}>
        <div style={{fontSize:9,color:"#475569",textTransform:"uppercase",marginBottom:4,textAlign:"center"}}>Next Overhaul Due — Lowest Wins</div>
        <div className="grid2" style={{gap:6}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:"#475569"}}>Calendar ({editing&&isAdmin?<input type="number" value={intervalYears} onChange={e=>handleIntervalYearsBlur(e.target.value)} style={{width:32,fontSize:9,padding:"1px 2px"}}/>:intervalYears}yr)</div>
            {editing&&isAdmin
              ?<input type="text" placeholder="DDMMYYYY" value={nextDueVal} onChange={e=>handleNextDueChange(e.target.value)} onBlur={e=>handleNextDueBlur(e.target.value)} style={{textAlign:"center",fontWeight:700,fontSize:13,width:"100%"}}/>
              :<div style={{fontSize:13,fontWeight:700,color:calStatus?statusColor[calStatus]:"#475569"}}>{activeNextDue||"Not entered"}</div>}
            {calDays!==null&&<div style={{fontSize:9,color:"#64748b"}}>{calDays<0?Math.abs(calDays)+"d overdue":calDays+"d remaining"}</div>}
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:"#475569"}}>Cycles ({editing&&isAdmin?<input type="number" value={intervalCycles} onChange={e=>set("landingGear."+gkey+".overhaulIntervalCycles",e.target.value===""?20000:+e.target.value)} style={{width:48,fontSize:9,padding:"1px 2px"}}/>:intervalCycles.toLocaleString()})</div>
            <div style={{fontSize:13,fontWeight:700,color:cycStatus?statusColor[cycStatus]:"#475569"}}>{cyclesRemaining!==null?Math.round(cyclesRemaining).toLocaleString():"No data"}</div>
            {cyclesRemaining!==null&&<div style={{fontSize:9,color:"#64748b"}}>cycles remaining</div>}
          </div>
        </div>
      </div>

      {(sinceFH!=null||sinceFC!=null||activeDateStr)&&<div style={{background:"#0d1925",borderRadius:6,padding:"8px 10px",marginBottom:10}}>
        <div style={{fontSize:9,color:"#475569",textTransform:"uppercase",marginBottom:4}}>Since Last Overhaul</div>
        <div className="grid3" style={{gap:4}}>
          <div><div style={{fontSize:9,color:"#475569"}}>Days</div><div style={{fontSize:12,fontWeight:700,color:"#C9A84C",fontFamily:"monospace"}}>{daysSince!==null?daysSince.toLocaleString():"—"}</div></div>
          <div><div style={{fontSize:9,color:"#475569"}}>FH</div><div style={{fontSize:12,fontWeight:700,color:"#C9A84C",fontFamily:"monospace"}}>{sinceFH!=null?fmtHHMM(sinceFH):"—"}</div></div>
          <div><div style={{fontSize:9,color:"#475569"}}>FC</div><div style={{fontSize:12,fontWeight:700,color:"#C9A84C",fontFamily:"monospace"}}>{sinceFC!=null?Math.round(sinceFC).toLocaleString():"—"}</div></div>
        </div>
      </div>}

      <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",marginBottom:6}}>Current Totals (Since New){current&&<span style={{marginLeft:6,fontSize:9,fontWeight:600,color:current.source==="Ground Truth"?"#34d399":"#60a5fa",textTransform:"none"}}>{current.source}</span>}</div>
      {current?(
        <div className="grid2" style={{gap:8}}>
          {[["TSN",current.fh!=null?fmtHHMM(current.fh):"—"],["CSN",current.fc!=null?Math.round(current.fc).toLocaleString():"—"]].map(([l,v])=>(
            <div key={l} style={{background:"#070f18",border:"1px solid #1B3A6B",borderRadius:8,padding:"12px 14px"}}>
              <div style={{fontSize:9,color:"#475569",fontWeight:700,letterSpacing:"0.08em"}}>{l}</div>
              <div style={{fontSize:20,fontWeight:700,color:"#C9A84C",fontFamily:"monospace",marginTop:4}}>{v}</div>
            </div>
          ))}
        </div>
      ):(
        <div style={{fontSize:11,color:"#475569",fontStyle:"italic"}}>Not entered — enter a Reference Reading (leg + airframe TSN/CSN at the same moment) above to start tracking.</div>
      )}

      <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",marginBottom:6,marginTop:12}}>Ground Truth Override <span style={{fontWeight:400,fontSize:9,textTransform:"none"}}>(optional — from Gear Status Report)</span></div>
      <div className="grid2" style={{gap:6}}>
        <div><label className="form-label">Current TSN</label>
          {editing&&isAdmin?<input type="number" value={g.currentFH??""} onChange={e=>set("landingGear."+gkey+".currentFH",e.target.value===""?null:+e.target.value)}/>
          :<div style={{fontSize:13,fontWeight:500,color:isEmpty(g.currentFH)?"#475569":"#e2e8f0"}}>{g.currentFH!=null?fmtHHMM(g.currentFH):"Not entered"}</div>}
        </div>
        <div><label className="form-label">Current CSN</label>
          {editing&&isAdmin?<input type="number" value={g.currentFC??""} onChange={e=>set("landingGear."+gkey+".currentFC",e.target.value===""?null:+e.target.value)}/>
          :<div style={{fontSize:13,fontWeight:500,color:isEmpty(g.currentFC)?"#475569":"#e2e8f0"}}>{g.currentFC!=null?g.currentFC.toLocaleString():"Not entered"}</div>}
        </div>
      </div>
      {editing&&isAdmin&&<div style={{fontSize:9,color:"#475569",marginTop:3}}>When set, this always overrides the calculated figure above — no tolerance check.</div>}
    </div>
  );
}

    await saveAsset(form);setEditing(false);setForm(null);notify("Saved");

  );
}

  const ll=apu.llps?.length?Math.min(...apu.llps.map(l=>calcLLPRem(l,apu.currentFC))):null;
  const ed=editing?form.apu||{}:apu;
  return(

        </div>
      </div>
      <div className="grid4" style={{marginBottom:14}}>
        {[["Manufacturer","mfr"],["P/N","pn"],["S/N","sn"]].map(([l,k])=>(

            :<div style={{fontSize:12,fontWeight:600,color:isEmpty(apu[k])?"#475569":"#e2e8f0",marginTop:3}}>{apu[k]||"—"}</div>}
          </div>
        ))}
        <div style={{background:"#0d1925",borderRadius:6,padding:"8px 10px"}}>
          <div style={{fontSize:9,color:"#475569"}}>TSN</div>

        </div>

async function uploadToCloudinary(file) {
  const cloudName = CLOUD_NAME();
  const uploadPreset = UPLOAD_PRESET();
  if (!cloudName || !uploadPreset) throw new Error('Cloudinary config not loaded yet — try again in a moment');
  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', uploadPreset);
  formData.append('folder', 'vector-fleet');
  const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
    method: 'POST',
    body: formData
  });
  if (!res.ok) throw new Error('Upload failed');
  const data = await res.json();
  return data.secure_url;
}


function LopaCropTool({asset,saveAsset,notify,onClose}){
  const[stage,setStage]=useState("upload"); // upload | pages | crop | saving
  const[file,setFile]=useState(null);
  const[pdfDoc,setPdfDoc]=useState(null);
  const[pageThumbs,setPageThumbs]=useState([]);
  const[selectedPage,setSelectedPage]=useState(1);
  const[pageImageUrl,setPageImageUrl]=useState(null);
  const[imgNatural,setImgNatural]=useState({w:0,h:0});
  const[crop,setCrop]=useState({x:40,y:40,w:300,h:200});
  const[dragMode,setDragMode]=useState(null); // null | "move" | "br" | "tl" etc
  const[dragStart,setDragStart]=useState(null);
  const[error,setError]=useState(null);
  const imgRef=useRef(null);
  const containerRef=useRef(null);

  const handleFile=async(e)=>{
    const f=e.target.files?.[0];
    if(!f)return;
    setFile(f);setError(null);
    const isPDF=f.type==="application/pdf";
    if(isPDF){
      if(!window.pdfjsLib){setError("PDF rendering library failed to load. Please refresh and try again.");return;}
      try{
        const buf=await f.arrayBuffer();
        const doc=await pdfjsLib.getDocument({data:buf}).promise;
        setPdfDoc(doc);
        if(doc.numPages===1){
          await renderPage(doc,1);
          setStage("crop");
        } else {
          const thumbs=[];
          for(let i=1;i<=doc.numPages;i++){
            const page=await doc.getPage(i);
            const viewport=page.getViewport({scale:0.3});
            const canvas=document.createElement("canvas");
            canvas.width=viewport.width;canvas.height=viewport.height;
            await page.render({canvasContext:canvas.getContext("2d"),viewport}).promise;
            thumbs.push({page:i,url:canvas.toDataURL()});
          }
          setPageThumbs(thumbs);
          setStage("pages");
        }
      }catch(err){setError("Could not read PDF: "+err.message);}
    } else if(f.type.startsWith("image/")){
      const url=URL.createObjectURL(f);
      setPageImageUrl(url);
      setStage("crop");
    } else {
      setError("Please upload a PDF or image file.");
    }
  };

  const renderPage=async(doc,pageNum)=>{
    const page=await doc.getPage(pageNum);
    const viewport=page.getViewport({scale:2});
    const canvas=document.createElement("canvas");
    canvas.width=viewport.width;canvas.height=viewport.height;
    await page.render({canvasContext:canvas.getContext("2d"),viewport}).promise;
    setPageImageUrl(canvas.toDataURL());
  };

  const choosePage=async(pageNum)=>{
    setSelectedPage(pageNum);
    await renderPage(pdfDoc,pageNum);
    setStage("crop");
  };

  const onImgLoad=()=>{
    const el=imgRef.current;
    if(!el)return;
    setImgNatural({w:el.naturalWidth,h:el.naturalHeight});
    // default crop box to 80% centered
    const dispW=el.clientWidth,dispH=el.clientHeight;
    setCrop({x:dispW*0.1,y:dispH*0.1,w:dispW*0.8,h:dispH*0.8});
  };

  const getRelPos=(e)=>{
    const rect=containerRef.current.getBoundingClientRect();
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    return{x:clientX-rect.left,y:clientY-rect.top};
  };

  const startDrag=(mode)=>(e)=>{
    e.preventDefault();e.stopPropagation();
    setDragMode(mode);
    setDragStart({...getRelPos(e),crop:{...crop}});
  };

  const onDrag=(e)=>{
    if(!dragMode||!dragStart)return;
    const pos=getRelPos(e);
    const dx=pos.x-dragStart.x,dy=pos.y-dragStart.y;
    const el=imgRef.current;
    const maxW=el.clientWidth,maxH=el.clientHeight;
    let{x,y,w,h}=dragStart.crop;
    if(dragMode==="move"){
      x=Math.max(0,Math.min(maxW-w,x+dx));
      y=Math.max(0,Math.min(maxH-h,y+dy));
    } else if(dragMode==="br"){
      w=Math.max(40,Math.min(maxW-x,w+dx));
      h=Math.max(40,Math.min(maxH-y,h+dy));
    } else if(dragMode==="tl"){
      const newX=Math.max(0,Math.min(x+w-40,x+dx));
      const newY=Math.max(0,Math.min(y+h-40,y+dy));
      w=w+(x-newX);h=h+(y-newY);x=newX;y=newY;
    }
    setCrop({x,y,w,h});
  };

  const endDrag=()=>{setDragMode(null);setDragStart(null);};

  const confirmCrop=async()=>{
    setStage("saving");
    try{
      const el=imgRef.current;
      const scaleX=el.naturalWidth/el.clientWidth;
      const scaleY=el.naturalHeight/el.clientHeight;
      const canvas=document.createElement("canvas");
      canvas.width=crop.w*scaleX;
      canvas.height=crop.h*scaleY;
      const ctx=canvas.getContext("2d");
      ctx.fillStyle="#fff";ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(el,crop.x*scaleX,crop.y*scaleY,crop.w*scaleX,crop.h*scaleY,0,0,canvas.width,canvas.height);
      const blob=await new Promise(res=>canvas.toBlob(res,"image/png"));
      const croppedFile=new File([blob],"lopa-crop.png",{type:"image/png"});
      const url=await uploadToCloudinary(croppedFile);
      const photos=(asset.photos||[]).filter(p=>p.label!=="LOPA");
      const updated=[...photos,{label:"LOPA",url,date:new Date().toISOString().split("T")[0]}];
      await saveAsset({...asset,photos:updated});
      notify("LOPA photo saved");
      onClose();
    }catch(err){
      setError("Failed to save crop: "+err.message);
      setStage("crop");
    }
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div className="card" style={{padding:20,maxWidth:900,width:"100%",maxHeight:"90vh",overflow:"auto",background:"#0b1520"}}>
        <div className="flj" style={{marginBottom:14}}>
          <div className="section-title" style={{margin:0}}>LOPA Crop Tool</div>
          <button className="btn btn-ghost" onClick={onClose}>✕ Close</button>
        </div>
        {error&&<div style={{color:"#f87171",fontSize:12,marginBottom:10}}>{error}</div>}

        {stage==="upload"&&(
          <div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:10}}>Upload the full LOPA file (PDF or image). You'll be able to pick a page and crop to just the cabin diagram.</div>
            <input type="file" accept=".pdf,image/*" onChange={handleFile}/>
          </div>
        )}

        {stage==="pages"&&(
          <div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:10}}>This PDF has multiple pages. Select the page with the cabin diagram.</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
              {pageThumbs.map(t=>(
                <div key={t.page} onClick={()=>choosePage(t.page)} style={{cursor:"pointer",border:"2px solid #1e3348",borderRadius:6,overflow:"hidden",width:140}}>
                  <img src={t.url} style={{width:"100%",display:"block"}}/>
                  <div style={{textAlign:"center",fontSize:11,color:"#94a3b8",padding:"4px 0",background:"#0d1925"}}>Page {t.page}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {stage==="crop"&&pageImageUrl&&(
          <div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:10}}>Drag the box to select just the cabin diagram. Drag corners to resize.</div>
            <div ref={containerRef} style={{position:"relative",display:"inline-block",maxWidth:"100%"}}
              onMouseMove={onDrag} onMouseUp={endDrag} onMouseLeave={endDrag}
              onTouchMove={onDrag} onTouchEnd={endDrag}>
              <img ref={imgRef} src={pageImageUrl} onLoad={onImgLoad} style={{maxWidth:"100%",display:"block",userSelect:"none"}} draggable={false}/>
              <div onMouseDown={startDrag("move")} onTouchStart={startDrag("move")}
                style={{position:"absolute",left:crop.x,top:crop.y,width:crop.w,height:crop.h,border:"2px solid #C9A84C",background:"rgba(201,168,76,0.15)",cursor:"move"}}>
                <div onMouseDown={startDrag("tl")} onTouchStart={startDrag("tl")} style={{position:"absolute",left:-6,top:-6,width:14,height:14,background:"#C9A84C",borderRadius:"50%",cursor:"nwse-resize"}}/>
                <div onMouseDown={startDrag("br")} onTouchStart={startDrag("br")} style={{position:"absolute",right:-6,bottom:-6,width:14,height:14,background:"#C9A84C",borderRadius:"50%",cursor:"nwse-resize"}}/>
              </div>
            </div>
            <div className="flab g8" style={{marginTop:14}}>
              <button className="btn btn-ghost" onClick={()=>{setStage("upload");setFile(null);setPageImageUrl(null);}}>Start Over</button>
              <button className="btn btn-gold" onClick={confirmCrop}>Save Crop as LOPA</button>
            </div>
          </div>
        )}

        {stage==="saving"&&<div style={{textAlign:"center",padding:30,color:"#64748b"}}>Saving crop...</div>}
      </div>
    </div>
  );
}

  );

function CheckDateInput({val,onCommit,yrs}){
  const toDisplay=(s)=>{if(!s)return"";if(/^\d{2}\/\d{2}\/\d{4}$/.test(s))return s;try{const dt=new Date(s);if(isNaN(dt))return"";return String(dt.getDate()).padStart(2,"0")+"/"+String(dt.getMonth()+1).padStart(2,"0")+"/"+dt.getFullYear();}catch{return"";}};
  const toISO=(s)=>{const m=/^(\d{2})\/(\d{2})\/(\d{4})$/.exec(s);if(m)return m[3]+"-"+m[2]+"-"+m[1];return null;};
  const plus=(s,y)=>{const m=/^(\d{2})\/(\d{2})\/(\d{4})$/.exec(s);if(!m)return null;return m[1]+"/"+m[2]+"/"+(+m[3]+y);};
  const isoPlus=(isoStr,y)=>{if(!isoStr)return null;const dt=new Date(isoStr);if(isNaN(dt))return null;dt.setFullYear(dt.getFullYear()+y);return dt.toISOString().split("T")[0];};
  const[local,setLocal]=useState(toDisplay(val)||"");
  useEffect(()=>{setLocal(toDisplay(val)||"");},[val]);
  const fmt=(raw)=>{const n=raw.replace(/\D/g,"").slice(0,8);if(n.length<=2)return n;if(n.length<=4)return n.slice(0,2)+"/"+n.slice(2);return n.slice(0,2)+"/"+n.slice(2,4)+"/"+n.slice(4);};
  const handleChange=(raw)=>setLocal(fmt(raw));
  const handleBlur=()=>{
    const iso=toISO(local);
    if(iso){const nextISO=yrs?isoPlus(iso,yrs):null;onCommit(iso,nextISO);}
    else if(!local){onCommit("",null);}
  };
  return<input type="text" placeholder="DDMMYYYY" value={local} onChange={e=>handleChange(e.target.value)} onBlur={handleBlur} style={{width:130}}/>;
}


function SpecsQuickImport({asset,saveAsset,notify,open}){

  const[extracting,setExtracting]=useState(false);

  const handleFile=e=>{const f=e.target.files?.[0];if(f){setFile(f);setExtracted(null);setError(null);}};

  const extract=async()=>{
    if(!file)return;
    const isPDF=file.type==="application/pdf";
    const isExcel=file.type==="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"||file.type==="application/vnd.ms-excel"||file.name.endsWith(".xlsx")||file.name.endsWith(".xls");
    const isImage=file.type.startsWith("image/");
    if(!isPDF&&!isExcel&&!isImage){setError("Unsupported file type. Please upload a PDF, Excel file, or image/screenshot.");return;}
    if(file.size>10*1024*1024){setError("File is too large (maximum 10 MB).");return;}
    setExtracting(true);setError(null);
    try{
      const prompt="Extract aircraft specification and maintenance data from this document or image. Only extract fields that are clearly present — do not guess or invent values. For shop visits, extract all visits shown (most recent preferred if only one fits). For dates, use DD/MM/YYYY format. For TSN use HH:MM format. Return ONLY valid JSON, no markdown:\n{\"dom\":\"MM/YYYY or null\",\"operator\":\"string or null\",\"weights\":{\"mtow\":number_or_null,\"mtow_lb\":number_or_null,\"mtw\":number_or_null,\"mtw_lb\":number_or_null,\"mzfw\":number_or_null,\"mzfw_lb\":number_or_null,\"mlw\":number_or_null,\"mlw_lb\":number_or_null},\"checks\":[{\"name\":\"e.g. 2 Year Check\",\"lastDate\":\"DD/MM/YYYY or null\",\"lastFH\":number_or_null,\"lastFC\":number_or_null,\"nextDate\":\"DD/MM/YYYY or null\"}],\"specs\":{\"config\":\"string or null\",\"seatConfig\":\"string or null\",\"seatMfr\":\"string or null\",\"seatPN\":\"string or null\",\"attendantSeats\":\"string or null\",\"galleys\":\"string or null\",\"lavs\":\"string or null\",\"cargoType\":\"string or null\",\"winglets\":\"string or null\",\"adsb\":true_false_or_null,\"cpdlc\":true_false_or_null,\"tcas\":true_false_or_null,\"cdss\":true_false_or_null,\"rfdd\":true_false_or_null,\"qar\":true_false_or_null,\"modeS\":true_false_or_null,\"efb\":true_false_or_null},\"engines\":[{\"position\":1_or_2,\"sn\":\"string or null\",\"type\":\"string or null\",\"thrust\":\"string or null\",\"shopVisits\":[{\"details\":\"string\",\"date\":\"DD/MM/YYYY or null\",\"fh\":\"HH:MM or null\",\"fc\":number_or_null,\"mro\":\"string or null\"}]}],\"landingGear\":{\"nose\":{\"lastOverhaulDate\":\"DD/MM/YYYY or null\",\"lastOverhaulFH\":number_or_null,\"lastOverhaulFC\":number_or_null,\"nextDue\":\"DD/MM/YYYY or null\"},\"left\":{\"lastOverhaulDate\":\"DD/MM/YYYY or null\",\"lastOverhaulFH\":number_or_null,\"lastOverhaulFC\":number_or_null,\"nextDue\":\"DD/MM/YYYY or null\"},\"right\":{\"lastOverhaulDate\":\"DD/MM/YYYY or null\",\"lastOverhaulFH\":number_or_null,\"lastOverhaulFC\":number_or_null,\"nextDue\":\"DD/MM/YYYY or null\"}},\"apu\":{\"sn\":\"string or null\",\"shopVisits\":[{\"details\":\"string\",\"date\":\"DD/MM/YYYY or null\",\"fh\":\"HH:MM or null\",\"fc\":number_or_null,\"mro\":\"string or null\"}]}}";
      let resp;
      if(isPDF){
        const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej(new Error("Could not read the file."));r.readAsDataURL(file);});
        resp=await fetch("/api/extract",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:3000,messages:[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}},{type:"text",text:prompt}]}]})});
      } else if(isImage){
        const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej(new Error("Could not read the file."));r.readAsDataURL(file);});
        resp=await fetch("/api/extract",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:3000,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type,data:base64}},{type:"text",text:prompt}]}]})});
      } else {
        const arrayBuffer=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(new Error("Could not read the file."));r.readAsArrayBuffer(file);});
        let csvText;
        try{
          const wb=XLSX.read(new Uint8Array(arrayBuffer),{type:"array"});
          csvText=wb.SheetNames.map(name=>"Sheet: "+name+"\n"+XLSX.utils.sheet_to_csv(wb.Sheets[name],{skipHidden:true})).join("\n\n");
        }catch(xlsxErr){throw new Error("Could not parse the Excel file.");}
        resp=await fetch("/api/extract",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:3000,messages:[{role:"user",content:[{type:"text",text:"The following is the contents of an Excel spreadsheet exported as CSV.\n\n"+csvText+"\n\n"+prompt}]}]})});
      }
      if(!resp.ok)throw new Error("Extraction request failed (error "+resp.status+"). Please try again.");
      const result=await resp.json();
      if(result.error)throw new Error("Extraction failed. Please check the file and try again.");
      let parsed;
      try{
        const rawParsed=result.ok?result.data:JSON.parse((result.raw||"").replace(/```json|```/g,"").trim());
        parsed=Array.isArray(rawParsed)?rawParsed[rawParsed.length-1]:rawParsed;
      }catch(parseErr){throw new Error("Could not extract structured data from this file. Try a clearer image or a different file.");}
      setExtracted(parsed);
    }catch(err){
      setError(err.message||"Extraction failed.");
    }
    setExtracting(false);
  };

  const fieldList=()=>{
    if(!extracted)return[];
    const list=[];
    if(extracted.dom)list.push(["Date of Manufacture (Overview)","dom",extracted.dom]);
    if(extracted.operator)list.push(["Current Operator (Overview)","operator",extracted.operator]);
    const w=extracted.weights||{};
    [["mtow","MTOW (kg)"],["mtow_lb","MTOW (lb)"],["mtw","Max Taxi (kg)"],["mtw_lb","Max Taxi (lb)"],["mzfw","MZFW (kg)"],["mzfw_lb","MZFW (lb)"],["mlw","MLW (kg)"],["mlw_lb","MLW (lb)"]].forEach(([k,l])=>{
      if(w[k]!=null)list.push([l,"weights."+k,w[k]]);
    });
    (extracted.checks||[]).forEach((c,i)=>{
      if(c.lastDate)list.push([c.name+" — Last Date","checks."+i+".lastDate",c.lastDate]);
      if(c.lastFH!=null)list.push([c.name+" — Last TSN","checks."+i+".lastFH",c.lastFH]);
      if(c.lastFC!=null)list.push([c.name+" — Last CSN","checks."+i+".lastFC",c.lastFC]);
      if(c.nextDate)list.push([c.name+" — Next Due","checks."+i+".nextDate",c.nextDate]);
    });
    const s=extracted.specs||{};
    [["config","Configuration"],["seatConfig","Passenger Seating Config"],["seatMfr","Passenger Seating Manufacturer"],["seatPN","Passenger Seats P/N"],["attendantSeats","Attendant Seats"],["galleys","Galleys"],["lavs","Lavatories"],["cargoType","Cargo Type"],["winglets","Winglets"]].forEach(([k,l])=>{
      if(s[k])list.push([l,"specs."+k,s[k]]);
    });
    [["adsb","ADS-B"],["cpdlc","CPDLC"],["tcas","TCAS 7.1"],["cdss","Cockpit Door Surveillance System"],["rfdd","Reinforced Flight Deck Door"],["qar","QAR"],["modeS","Enhanced Mode-S"],["efb","Electronic Flight Bag"]].forEach(([k,l])=>{
      if(s[k]!=null)list.push([l,"specs."+k,s[k]?"Installed":"Not Installed"]);
    });
    return list;
  };

  const normalizeDate=(s)=>{
    if(!s)return s;
    // Already ISO
    if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
    // DD/MM/YYYY -> ISO
    const m=/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/.exec(s);
    if(m)return m[3]+"-"+m[2].padStart(2,"0")+"-"+m[1].padStart(2,"0");
    // Try generic Date parse as last resort, only if it produces a valid date
    const dt=new Date(s);
    if(!isNaN(dt))return dt.toISOString().split("T")[0];
    return null; // unparseable - don't write garbage
  };

  const applyAll=async()=>{
    const f=JSON.parse(JSON.stringify(asset));
    if(extracted.dom)f.dom=extracted.dom;
    if(extracted.operator)f.operator=extracted.operator;
    const w=extracted.weights||{};
    if(!f.weights)f.weights={};
    Object.keys(w).forEach(k=>{if(w[k]!=null)f.weights[k]=w[k];});
    if(extracted.checks?.length){
      if(!f.checks||!f.checks.length)f.checks=extracted.checks.map(c=>({name:c.name,lastDate:"",lastFH:0,lastFC:0,nextDate:""}));
      extracted.checks.forEach((ec,i)=>{
        let target=f.checks.find(fc=>fc.name===ec.name)||f.checks[i];
        if(!target)return;
        if(ec.lastDate){const norm=normalizeDate(ec.lastDate);if(norm)target.lastDate=norm;}
        if(ec.lastFH!=null)target.lastFH=ec.lastFH;
        if(ec.lastFC!=null)target.lastFC=ec.lastFC;
        if(ec.nextDate){const norm=normalizeDate(ec.nextDate);if(norm)target.nextDate=norm;}
      });
    }
    const s=extracted.specs||{};
    if(!f.specs)f.specs={};
    Object.keys(s).forEach(k=>{if(s[k]!=null)f.specs[k]=s[k];});
    // Engine shop visits + basic details
    if(extracted.engines?.length){
      if(!f.engines)f.engines=[];
      extracted.engines.forEach(ee=>{
        const pos=(ee.position||1)-1;
        if(!f.engines[pos])f.engines[pos]={position:ee.position||pos+1,sn:"",type:"",thrust:"",llps:[],shopVisits:[]};
        if(ee.sn)f.engines[pos].sn=ee.sn;
        if(ee.type)f.engines[pos].type=ee.type;
        if(ee.thrust)f.engines[pos].thrust=ee.thrust;
        if(ee.shopVisits?.length){
          const svs=ee.shopVisits.filter(sv=>sv.date||sv.fh||sv.fc).map(sv=>({
            details:sv.details||"",
            date:normalizeDate(sv.date)||"",
            fh:sv.fh?parseHHMM(sv.fh):null,
            fc:sv.fc!=null?+sv.fc:null,
            mro:sv.mro||""
          }));
          if(svs.length)f.engines[pos].shopVisits=[...(f.engines[pos].shopVisits||[]),...svs];
        }
      });
    }
    // Landing gear overhaul dates
    if(extracted.landingGear){
      if(!f.landingGear)f.landingGear={};
      ["nose","left","right"].forEach(leg=>{
        const lg=extracted.landingGear[leg];
        if(!lg)return;
        if(!f.landingGear[leg])f.landingGear[leg]={};
        if(lg.lastOverhaulDate){
          const norm=normalizeDate(lg.lastOverhaulDate);
          if(norm){
            f.landingGear[leg].lastOverhaulDate=norm;
            // Auto-calculate nextDue when the PDF doesn't state it and no value already exists.
            // Uses the leg's configured interval (default 10 years) — same logic as GearCard plusYears().
            // If the PDF does supply nextDue it will overwrite this on the next line below.
            if(!lg.nextDue&&!f.landingGear[leg].nextDue){
              const isoM=/^(\d{4})-(\d{2})-(\d{2})$/.exec(norm);
              if(isoM){const yrs=f.landingGear[leg].overhaulIntervalYears||10;f.landingGear[leg].nextDue=(+isoM[1]+yrs)+"-"+isoM[2]+"-"+isoM[3];}
            }
          }
        }
        if(lg.lastOverhaulFH!=null)f.landingGear[leg].lastOverhaulFH=+lg.lastOverhaulFH;
        if(lg.lastOverhaulFC!=null)f.landingGear[leg].lastOverhaulFC=+lg.lastOverhaulFC;
        if(lg.nextDue){const norm=normalizeDate(lg.nextDue);if(norm)f.landingGear[leg].nextDue=norm;}
      });
    }
    // APU shop visits
    if(extracted.apu?.shopVisits?.length){
      if(!f.apu)f.apu={};
      const svs=extracted.apu.shopVisits.filter(sv=>sv.date||sv.fh||sv.fc).map(sv=>({
        details:sv.details||"",
        date:normalizeDate(sv.date)||"",
        fh:sv.fh?parseHHMM(sv.fh):null,
        fc:sv.fc!=null?+sv.fc:null,
        mro:sv.mro||""
      }));
      if(svs.length)f.apu.shopVisits=[...(f.apu.shopVisits||[]),...svs];
      if(extracted.apu.sn&&!f.apu.sn)f.apu.sn=extracted.apu.sn;
    }
    await saveAsset(f);
    notify("Specs data imported");
    setExtracted(null);setFile(null);
  };

  return(
    <div className="card" style={{padding:16,marginBottom:16,gridColumn:"1/-1"}}>
      {open&&<div>
        <div style={{fontSize:11,color:"#64748b",marginBottom:10}}>Upload a tech spec PDF, Excel sheet, or screenshot. TailiQ AI will extract Date of Manufacture, Operator, Weights, Check History, Specifications, Engine/APU Shop Visits, and Landing Gear Overhaul dates for review before saving.</div>
        <div className="flab g8" style={{marginBottom:10}}>
          <input type="file" accept=".pdf,.xlsx,.xls,image/*" onChange={handleFile}/>
          <button className="btn btn-primary" disabled={!file||extracting} onClick={extract}>{extracting?"Extracting...":"Extract"}</button>
        </div>
        {error&&<div style={{color:"#f87171",fontSize:12,marginBottom:10}}>{error}</div>}
        {extracted&&(()=>{
          const w=extracted.weights||{};
          const hasWeights=["mtow","mtw","mzfw","mlw"].some(k=>w[k]!=null||w[k+"_lb"]!=null);
          const checks=extracted.checks||[];
          const s=extracted.specs||{};
          const overviewRows=[];
          if(extracted.dom)overviewRows.push(["Date of Manufacture",extracted.dom]);
          if(extracted.operator)overviewRows.push(["Current Operator",extracted.operator]);
          const specRows=[];
          [["config","Configuration"],["seatConfig","Passenger Seating Config"],["seatMfr","Passenger Seating Manufacturer"],["seatPN","Passenger Seats P/N"],["attendantSeats","Attendant Seats"],["galleys","Galleys"],["lavs","Lavatories"],["cargoType","Cargo Type"],["winglets","Winglets"]].forEach(([k,l])=>{
            if(s[k])specRows.push([l,s[k]]);
          });
          [["adsb","ADS-B"],["cpdlc","CPDLC"],["tcas","TCAS 7.1"],["cdss","Cockpit Door Surveillance System"],["rfdd","Reinforced Flight Deck Door"],["qar","QAR"],["modeS","Enhanced Mode-S"],["efb","Electronic Flight Bag"]].forEach(([k,l])=>{
            if(s[k]!=null)specRows.push([l,s[k]?"Installed":"Not Installed"]);
          });
          const hasEngSV=(extracted.engines||[]).some(e=>e.shopVisits?.length);
          const hasLDG=(()=>{const lg=extracted.landingGear||{};return["nose","left","right"].some(k=>lg[k]&&(lg[k].lastOverhaulDate||lg[k].lastOverhaulFC!=null));})();
          const hasAPUSV=extracted.apu?.shopVisits?.length>0;
          const nothingFound=!overviewRows.length&&!hasWeights&&!checks.length&&!specRows.length&&!hasEngSV&&!hasLDG&&!hasAPUSV;
          return(
            <div style={{background:"#0d1925",borderRadius:6,padding:12}}>
              <div style={{fontSize:11,fontWeight:700,color:"#C9A84C",textTransform:"uppercase",marginBottom:10}}>Detected Fields — Review Before Saving</div>
              {nothingFound?<div style={{color:"#475569",fontStyle:"italic",fontSize:12}}>No recognisable fields found in this file.</div>:(
              <div className="grid2" style={{gap:12}}>
                {overviewRows.length>0&&<div className="card" style={{padding:12,gridColumn:"1/-1"}}>
                  <div className="section-title">Overview</div>
                  <table><tbody>{overviewRows.map(([l,v],i)=>(<tr key={i}><td style={{color:"#64748b"}}>{l}</td><td style={{fontWeight:600}}>{v}</td></tr>))}</tbody></table>
                </div>}
                {hasWeights&&<div className="card" style={{padding:12}}>
                  <div className="section-title">Operating Weights</div>
                  <table><thead><tr><th>Parameter</th><th>kg</th><th>lb</th></tr></thead><tbody>
                    {[["MTOW","mtow","mtow_lb"],["Max Taxi","mtw","mtw_lb"],["MZFW","mzfw","mzfw_lb"],["MLW","mlw","mlw_lb"]].map(([l,k,klb])=>(
                      (w[k]!=null||w[klb]!=null)?<tr key={k}><td style={{color:"#64748b"}}>{l}</td><td>{w[k]!=null?w[k].toLocaleString():"—"}</td><td style={{color:"#475569"}}>{w[klb]!=null?w[klb].toLocaleString():"—"}</td></tr>:null
                    ))}
                  </tbody></table>
                </div>}
                {specRows.length>0&&<div className="card" style={{padding:12}}>
                  <div className="section-title">Specifications</div>
                  <table><tbody>{specRows.map(([l,v],i)=>(<tr key={i}><td style={{color:"#64748b"}}>{l}</td><td style={{fontWeight:600}}>{v}</td></tr>))}</tbody></table>
                </div>}
                {checks.length>0&&<div className="card" style={{padding:12,gridColumn:"1/-1"}}>
                  <div className="section-title">Check History</div>
                  <table><thead><tr><th>Check</th><th>Last Date</th><th>Last TSN</th><th>Last CSN</th><th>Next Due</th></tr></thead><tbody>
                    {checks.map((c,i)=>(<tr key={i}><td style={{fontWeight:600,color:"#94a3b8"}}>{c.name}</td><td>{c.lastDate||"—"}</td><td style={{fontFamily:"monospace"}}>{c.lastFH!=null?c.lastFH.toLocaleString():"—"}</td><td style={{fontFamily:"monospace"}}>{c.lastFC!=null?c.lastFC.toLocaleString():"—"}</td><td style={{fontWeight:700,color:"#34d399"}}>{c.nextDate||"—"}</td></tr>))}
                  </tbody></table>
                </div>}
                {(extracted.engines||[]).filter(e=>e.shopVisits?.length).length>0&&<div className="card" style={{padding:12,gridColumn:"1/-1"}}>
                  <div className="section-title">Engine Shop Visits</div>
                  {(extracted.engines||[]).filter(e=>e.shopVisits?.length).map((e,i)=>(
                    <div key={i} style={{marginBottom:8}}>
                      <div style={{fontSize:11,fontWeight:700,color:"#C9A84C",marginBottom:4}}>Engine {e.position||i+1}{e.sn?` — ESN ${e.sn}`:""}</div>
                      <table style={{fontSize:11}}><thead><tr><th>Details</th><th>Date</th><th>TSN</th><th>CSN</th><th>MRO</th></tr></thead>
                      <tbody>{e.shopVisits.map((sv,si)=><tr key={si}><td>{sv.details||"—"}</td><td>{sv.date||"—"}</td><td style={{fontFamily:"monospace"}}>{sv.fh||"—"}</td><td style={{fontFamily:"monospace"}}>{sv.fc!=null?sv.fc:"—"}</td><td style={{color:"#94a3b8"}}>{sv.mro||"—"}</td></tr>)}</tbody>
                      </table>
                    </div>
                  ))}
                </div>}
                {(()=>{const lg=extracted.landingGear||{};const legs=[["Nose",lg.nose],["LH Main",lg.left],["RH Main",lg.right]].filter(([,g])=>g&&(g.lastOverhaulDate||g.lastOverhaulFC!=null||g.nextDue));if(!legs.length)return null;return<div className="card" style={{padding:12,gridColumn:"1/-1"}}><div className="section-title">Landing Gear Overhauls</div><table><thead><tr><th>Leg</th><th>Last Overhaul</th><th>Leg TSN</th><th>Leg CSN</th><th>Next Due</th></tr></thead><tbody>{legs.map(([label,g])=><tr key={label}><td style={{fontWeight:600,color:"#94a3b8"}}>{label}</td><td>{g.lastOverhaulDate||"—"}</td><td style={{fontFamily:"monospace"}}>{g.lastOverhaulFH!=null?g.lastOverhaulFH:"—"}</td><td style={{fontFamily:"monospace"}}>{g.lastOverhaulFC!=null?g.lastOverhaulFC:"—"}</td><td style={{fontWeight:700,color:"#34d399"}}>{g.nextDue||"—"}</td></tr>)}</tbody></table></div>;})()}
                {extracted.apu?.shopVisits?.length>0&&<div className="card" style={{padding:12,gridColumn:"1/-1"}}>
                  <div className="section-title">APU Shop Visits{extracted.apu.sn?` — S/N ${extracted.apu.sn}`:""}</div>
                  <table style={{fontSize:11}}><thead><tr><th>Details</th><th>Date</th><th>TSN</th><th>CSN</th><th>MRO</th></tr></thead>
                  <tbody>{extracted.apu.shopVisits.map((sv,si)=><tr key={si}><td>{sv.details||"—"}</td><td>{sv.date||"—"}</td><td style={{fontFamily:"monospace"}}>{sv.fh||"—"}</td><td style={{fontFamily:"monospace"}}>{sv.fc!=null?sv.fc:"—"}</td><td style={{color:"#94a3b8"}}>{sv.mro||"—"}</td></tr>)}</tbody>
                  </table>
                </div>}
              </div>
              )}
              {!nothingFound&&<div className="flab g8" style={{marginTop:12}}>
                <button className="btn btn-ghost" onClick={()=>{setExtracted(null);setFile(null);}}>Discard</button>
                <button className="btn btn-gold" onClick={applyAll}>Confirm &amp; Save All</button>
              </div>}
            </div>
          );
        })()}
      </div>}
    </div>
  );
}

function AddCheckRow({onAdd,existing=[]}){
  const[custom,setCustom]=useState("");
  const presets=["2 Year Check","6 Year Check","12 Year Check"].filter(p=>!existing.includes(p));
  return(
    <div className="flab g8" style={{marginTop:10,flexWrap:"wrap"}}>
      {presets.map(p=>(
        <button key={p} className="btn btn-ghost" style={{fontSize:11,padding:"5px 10px"}} onClick={()=>onAdd(p)}>+ {p}</button>
      ))}
      <input placeholder="Custom check name" value={custom} onChange={e=>setCustom(e.target.value)} style={{width:160,fontSize:12}}/>
      <button className="btn btn-ghost" style={{fontSize:11,padding:"5px 10px"}} onClick={()=>{if(!custom.trim())return;onAdd(custom.trim());setCustom("");}}>+ Add Check</button>
    </div>
  );
}

const AVIONICS_TEMPLATE={
  "ATA 22":["FAC","FMGC","MCDU","FCU"],
  "ATA 23":["TRANSCEIVER-VHF","TRANSCEIVER-HF","CVR","REPRODUCER AUDIO","ACARS/ATSU","AMU"],
  "ATA 27":["ELAC","SFCC","SEC","FCDC"],
  "ATA 31":["DMU","DFDR","FDIMU","FDIU","FWD","SDAC"],
  "ATA 34":["ADIRU","INTERROGATOR-DME","RECEIVER-VOR","RECEIVER-MMR/ILS","TRANSCEIVER-RADIO ALT","TRANSCEIVER-WEATHER RADAR","COMPUTER-TCAS","TRANSPONDER-ATC/MODE S","ADF"]
};
const ataNumSort=(ata)=>{const m=/(\d+)/.exec(ata||"");return m?+m[1]:9999;};
// Merge the standard template with whatever's been saved on the asset — template
// rows always appear (so Admin just fills in P/N), plus any extra rows the
// asset has saved that aren't part of the template (variant-specific kit).
const buildAvionicsRows=(saved)=>{
  const savedMap={};
  (saved||[]).forEach(r=>{savedMap[r.ata+"|"+r.component]=r;});
  const rows=[];
  Object.keys(AVIONICS_TEMPLATE).forEach(ata=>{
    AVIONICS_TEMPLATE[ata].forEach(comp=>{
      const key=ata+"|"+comp;
      const ex=savedMap[key];
      rows.push({ata,component:comp,pn:ex?.pn||"",hidden:ex?.hidden||false,template:true});
      delete savedMap[key];
    });
  });
  Object.values(savedMap).forEach(r=>rows.push({ata:r.ata,component:r.component,pn:r.pn||"",hidden:r.hidden||false,template:false}));
  return rows;
};
function AvionicsTab({asset,isAdmin,saveAsset,notify}){
  const[editing,setEditing]=useState(false);
  const[rows,setRows]=useState(null);
  const[addOpenFor,setAddOpenFor]=useState(null);
  const[newComp,setNewComp]=useState("");
  const displayRows=editing?rows:buildAvionicsRows(asset.avionics);
  const startEdit=()=>{setRows(buildAvionicsRows(asset.avionics));setEditing(true);};
  const cancel=()=>{setRows(null);setEditing(false);setAddOpenFor(null);setNewComp("");};
  const save=async()=>{
    const cleaned=rows.map(({template,...r})=>r);
    await saveAsset({...asset,avionics:cleaned},"Updated avionics data");
    setEditing(false);setRows(null);notify("Saved");
  };
  const setPN=(ata,component,val)=>{setRows(rs=>rs.map(r=>r.ata===ata&&r.component===component?{...r,pn:val}:r));};
  const toggleHidden=(ata,component)=>{setRows(rs=>rs.map(r=>r.ata===ata&&r.component===component?{...r,hidden:!r.hidden}:r));};
  const addRow=(ata)=>{
    if(!newComp.trim()){notify("Component name is required","error");return;}
    setRows(rs=>[...rs,{ata,component:newComp.trim(),pn:"",hidden:false,template:false}]);
    setNewComp("");setAddOpenFor(null);
  };
  const delRow=(ata,component)=>{setRows(rs=>rs.filter(r=>!(r.ata===ata&&r.component===component)));};
  const groups={};
  displayRows.forEach(r=>{const key=r.ata;if(!groups[key])groups[key]=[];groups[key].push(r);});
  const sortedKeys=Object.keys(groups).sort((a,b)=>ataNumSort(a)-ataNumSort(b));
  return(
    <div className="card" style={{padding:20}}>
      <div className="flj" style={{marginBottom:14}}>
        <div className="section-title" style={{margin:0}}>Avionics</div>
        {isAdmin&&(!editing?<button className="btn btn-ghost" onClick={startEdit}>Edit</button>
          :<div className="flab g8"><button className="btn btn-ghost" onClick={cancel}>Cancel</button><button className="btn btn-gold" onClick={save}>Save</button></div>)}
      </div>
      <div className="grid2">
        {sortedKeys.map(key=>(
          <div key={key} className="card" style={{padding:14}}>
            <div className="section-title" style={{fontSize:12}}>{key}</div>
            <table><thead><tr><th>Component</th><th>P/N</th>{editing&&isAdmin&&<th style={{width:60}}></th>}</tr></thead>
            <tbody>{groups[key].filter(r=>editing||!r.hidden).map(r=>(
              <tr key={r.component} style={{opacity:editing&&r.hidden?0.4:1}}>
                <td style={{fontWeight:600,color:"#94a3b8"}}>{r.component}</td>
                <td style={{fontFamily:"monospace"}}>
                  {editing&&isAdmin
                    ?<input defaultValue={r.pn||""} onBlur={e=>setPN(r.ata,r.component,e.target.value)} style={{width:140}}/>
                    :<span style={{color:isEmpty(r.pn)?"#475569":"#e2e8f0"}}>{r.pn||"Not entered"}</span>}
                </td>
                {editing&&isAdmin&&<td style={{whiteSpace:"nowrap"}}>
                  <button onClick={()=>toggleHidden(r.ata,r.component)} title={r.hidden?"Show in tech spec":"Hide from tech spec"} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:r.hidden?"#475569":"#C9A84C",padding:"0 3px"}}>{r.hidden?"🚫":"👁"}</button>
                  {!r.template&&<button className="btn-danger btn" style={{fontSize:9,padding:"3px 7px",marginLeft:2}} onClick={()=>delRow(r.ata,r.component)}>✕</button>}
                </td>}
              </tr>
            ))}</tbody></table>
            {editing&&isAdmin&&(addOpenFor===key?(
              <div className="flab g8" style={{marginTop:8,flexWrap:"wrap"}}>
                <input placeholder="Component name" value={newComp} onChange={e=>setNewComp(e.target.value)} style={{width:150,fontSize:12}}/>
                <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 8px"}} onClick={()=>addRow(key)}>Add</button>
                <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 8px"}} onClick={()=>{setAddOpenFor(null);setNewComp("");}}>Cancel</button>
              </div>
            ):(
              <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 8px",marginTop:8}} onClick={()=>setAddOpenFor(key)}>+ Add Row</button>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}
