<script type="module" id="firebase-init">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, collection, doc, getDoc, getDocs, setDoc, deleteDoc, addDoc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, confirmPasswordReset, verifyPasswordResetCode } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

  // Firebase web config + Cloudinary cloud name/upload preset are not
  // secrets (Firebase web config and an unsigned Cloudinary preset are
  // designed to be public client-side) — this fetch exists only to keep
  // them out of GitHub history, via /api/config reading Vercel env vars.
  let cfg;
  try {
    const res = await fetch('/api/config');
    cfg = await res.json();
  } catch (e) {
    console.error('Failed to load /api/config', e);
    window._configError = true;
    window.dispatchEvent(new Event('firebase-config-error'));
  }

  if (cfg) {
    window._cloudinaryConfig = cfg.cloudinary;

    const app = initializeApp(cfg.firebase);
    const db = getFirestore(app);
    const auth = getAuth(app);
    window._firestore = { db, collection, doc, getDoc, getDocs, setDoc, deleteDoc, addDoc, query, where, orderBy };

    // --- Minimal auth layer ---
    // Exposes a small bridge on window so the Babel/React script (which is
    // not a module and can't use `import`) can sign in/out and react to
    // auth state. Firestore rules are the real gate; this is what lets the
    // UI know whether to show the app or a sign-in screen.
    window._auth = {
      signIn: (email, password) => signInWithEmailAndPassword(auth, email, password),
      signOut: () => signOut(auth),
      // Used to authenticate calls to admin-only serverless functions (e.g.
      // /api/invite-user) — the function verifies this token server-side
      // rather than trusting any client-supplied flag.
      getIdToken: () => auth.currentUser ? auth.currentUser.getIdToken() : Promise.resolve(null),
      // Used to read Firebase custom claims (e.g. role) for the signed-in user.
      // Pass forceRefresh=true after a claim has just been set server-side.
      getIdTokenResult: (forceRefresh=false) => auth.currentUser ? auth.currentUser.getIdTokenResult(forceRefresh) : Promise.resolve(null),
      // Used by the set-password view reached via the invite email link.
      verifyResetCode: (oobCode) => verifyPasswordResetCode(auth, oobCode),
      confirmReset: (oobCode, newPassword) => confirmPasswordReset(auth, oobCode, newPassword)
    };

    // Only now is everything window.* code outside this module might touch
    // (firestore helpers AND auth bridge) actually assigned. Previously this
    // fired right after _firestore was set, before window._auth existed —
    // any listener reacting immediately (e.g. SetPasswordScreen) would find
    // window._auth undefined and crash.
    window._firebaseReady = true;
    window.dispatchEvent(new Event('firebase-ready'));

    onAuthStateChanged(auth, (user) => {
      window._authUser = user ? { uid: user.uid, email: user.email } : null;
      window.dispatchEvent(new Event('auth-state-changed'));
    });
  }
</script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// Cloudinary config is fetched from /api/config (see firebase-init script
// above) and stashed on window. Read lazily via getters so call sites don't
// need to change, and so this works even if the fetch hasn't resolved yet
// at parse time (it will have, by the time any upload actually happens).
const CLOUD_NAME = () => window._cloudinaryConfig?.cloudName;
const UPLOAD_PRESET = () => window._cloudinaryConfig?.uploadPreset;

const getFS = () => {
  if (window._firestore) return window._firestore;
  throw new Error("Firebase not ready");
};

async function logAudit(assetId, assetMSN, action) {
  try {
    const user = window._authUser;
    if (!user) return;
    const { db: fs, collection, addDoc } = getFS();
    await addDoc(collection(fs, "auditLog"), {
      userId: user.uid,
      userEmail: user.email,
      timestamp: new Date().toISOString(),
      assetId: assetId != null ? String(assetId) : null,
      assetMSN: assetMSN != null ? String(assetMSN) : null,
      action
    });
  } catch (e) {
    // Non-fatal — never block the main operation
    console.warn("Audit log write failed:", e);
  }
}

const db = {
  async getAssets() {
    const { db: fs, collection, getDocs } = getFS();
    const snap = await getDocs(collection(fs, "assets"));
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  },
  async saveAsset(asset) {
    const { db: fs, doc, setDoc } = getFS();
    const { _dbId, _updatedAt, ...data } = asset;
    await setDoc(doc(fs, "assets", String(asset.id)), { ...data, updatedAt: new Date().toISOString() });
  },
  async deleteAsset(id) {
    const { db: fs, doc, deleteDoc } = getFS();
    await deleteDoc(doc(fs, "assets", String(id)));
  },
  async getSetting(key) {
    try {
      const { db: fs, doc, getDoc } = getFS();
      const snap = await getDoc(doc(fs, "settings", key));
      return snap.exists() ? snap.data().value : null;
    } catch { return null; }
  },
  async setSetting(key, value) {
    const { db: fs, doc, setDoc } = getFS();
    await setDoc(doc(fs, "settings", key), { value });
  },
  async getUtilisation(asset_id) {
    const { db: fs, collection, query, where, getDocs } = getFS();
    const q = query(collection(fs, "utilisation"), where("asset_id", "==", String(asset_id)));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  },
  async saveUtilisation(data) {
    const { db: fs, collection, addDoc } = getFS();
    await addDoc(collection(fs, "utilisation"), { ...data, asset_id: String(data.asset_id), created_at: new Date().toISOString() });
  },
  async deleteUtilisation(id) {
    const { db: fs, doc, deleteDoc } = getFS();
    await deleteDoc(doc(fs, "utilisation", id));
  },
  // --- Share tokens (V1 gate item, Section 12 of roadmap) ---
  // Token doc ID is the token itself, so the public /api/share/[token]
  // function can do a direct doc lookup with no query/index needed.
  async createShareToken(assetId, companyId = null) {
    const { db: fs, doc, setDoc } = getFS();
    const token = (window.crypto?.randomUUID ? window.crypto.randomUUID() : String(Date.now()) + Math.random().toString(36).slice(2)).replace(/-/g, "");
    const now = new Date();
    const expires = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000); // 7-day default
    const data = {
      assetId: String(assetId),
      companyId,
      createdAt: now.toISOString(),
      expiresAt: expires.toISOString(),
      revoked: false,
      createdBy: window._authUser?.email || window._authUser?.uid || null
    };
    await setDoc(doc(fs, "shareTokens", token), data);
    return { token, ...data };
  },
  async getShareTokensForAsset(assetId) {
    const { db: fs, collection, query, where, getDocs } = getFS();
    const q = query(collection(fs, "shareTokens"), where("assetId", "==", String(assetId)));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({ token: d.id, ...d.data() }));
  },
  async revokeShareToken(token) {
    const { db: fs, doc, setDoc, getDoc } = getFS();
    const ref = doc(fs, "shareTokens", token);
    const snap = await getDoc(ref);
    if (!snap.exists()) return;
    await setDoc(ref, { ...snap.data(), revoked: true });
  },
  // --- Lease / Reserve Setup (Section 8/9 of roadmap, TECH_DEBT 4.25) ---
  // leases/ is append-only — a lease's dates/lessee genuinely change at
  // each transition (unlike reserve pots, which carry over), so history
  // is preserved rather than overwritten. Which lease is "current" is
  // tracked via asset.currentLeaseId (set on the asset doc via saveAsset,
  // not here) — createLease only writes the lease record itself.
  async createLease(assetId, companyId, leaseData) {
    const { db: fs, collection, addDoc } = getFS();
    const now = new Date().toISOString();
    const data = {
      assetId: String(assetId),
      companyId: companyId || null,
      lessee: leaseData.lessee,
      leaseStart: leaseData.leaseStart,
      leaseEnd: leaseData.leaseEnd,
      migrationDate: leaseData.migrationDate,
      derateModifier: null,        // reserved slot — TECH_DEBT 4.24, dedicated Opus session, not v1
      redeliveryConditions: null,  // reserved slot — Layer 3, not v1
      inputMethod: "manual",       // Path 2 — manual entry (Path 1 PDF parsing parked)
      confirmedBy: window._authUser?.email || window._authUser?.uid || null,
      confirmedAt: now,
      createdAt: now
    };
    const ref = await addDoc(collection(fs, "leases"), data);
    return { id: ref.id, ...data };
  },
  async getLeasesForAsset(assetId) {
    const { db: fs, collection, query, where, getDocs } = getFS();
    const q = query(collection(fs, "leases"), where("assetId", "==", String(assetId)));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
  },
  async getLease(leaseId) {
    if (!leaseId) return null;
    const { db: fs, doc, getDoc } = getFS();
    const snap = await getDoc(doc(fs, "leases", leaseId));
    return snap.exists() ? { id: snap.id, ...snap.data() } : null;
  },
  // Deliberate exception to the append-only principle above — this is
  // for correcting a mistaken/test lease entry, not for real lease
  // history. Reserve pots are NOT touched (they carry over independent
  // of any single lease record) — only the lease doc itself is removed,
  // and the caller is responsible for clearing asset.currentLeaseId.
  async deleteLease(leaseId) {
    const { db: fs, doc, deleteDoc } = getFS();
    await deleteDoc(doc(fs, "leases", leaseId));
  },
  // reserves/ is one doc per pot (not a consolidated array), doc id
  // deterministic as `${assetId}_${code}` — this is what makes reserve
  // pots naturally carry over across lease transitions (per Alan's
  // domain knowledge: a new lease does NOT reset pot balances, so
  // re-opening this wizard for a lease transition upserts the same pot
  // docs rather than creating duplicates). companyId is duplicated onto
  // the doc for cheap security-rule matching, per Section 5.
  async saveReservePot(assetId, companyId, pot) {
    const { db: fs, doc, setDoc, getDoc } = getFS();
    const id = `${assetId}_${pot.code}`.replace(/\s+/g, "_");
    const ref = doc(fs, "reserves", id);
    const existing = await getDoc(ref).catch(() => null);
    const now = new Date().toISOString();
    const data = {
      assetId: String(assetId),
      companyId: companyId || null,
      code: pot.code,
      label: pot.label,
      potCategory: pot.potCategory,
      enginePosition: pot.enginePosition ?? null,
      accrualBasis: pot.accrualBasis,
      accrualRate: pot.accrualRate,
      escalationPctPerYr: pot.escalationPctPerYr,
      openingBalance: pot.openingBalance,
      validationWarning: pot.validationWarning || null,
      warningAcknowledged: !!pot.warningAcknowledged,
      inputMethod: "manual",
      confirmedBy: window._authUser?.email || window._authUser?.uid || null,
      confirmedAt: now,
      updatedAt: now,
      createdAt: (existing && existing.exists() ? existing.data().createdAt : null) || now
    };
    await setDoc(ref, data);
    return { id, ...data };
  },
  async getReservePots(assetId) {
    const { db: fs, collection, query, where, getDocs } = getFS();
    const q = query(collection(fs, "reserves"), where("assetId", "==", String(assetId)));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  },
  // --- Email review queue (Section 12a) ---
  // Staged reports held back by api/email-ingest.js when a high-severity
  // warning (S/N change, delta mismatch, gap) is detected — see
  // hasHighSeverityWarning() there. Apply/Discard act on these.
  async getPendingReports() {
    const { db: fs, collection, getDocs } = getFS();
    const snap = await getDocs(collection(fs, "pendingReports"));
    return snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
  },
  async deletePendingReport(id) {
    const { db: fs, doc, deleteDoc } = getFS();
    await deleteDoc(doc(fs, "pendingReports", id));
  }
};

// calcLLPRem and lowestLimiter now live in /calculations/llpCalculator.js (Brain 2)
const daysFromNow=(d)=>{if(!d)return null;let parsed=d;if(/^\d{2}\/\d{2}\/\d{4}$/.test(d)){const m=d.split("/");parsed=m[2]+"-"+m[1]+"-"+m[0];}return Math.ceil((new Date(parsed)-new Date())/86400000);};
// fmtDate and fmtHHMM now live in /calculations/techSpecBuilder.js (loaded above)
const parseHHMM=(s)=>{if(!s)return 0;const p=s.toString().split(":");return parseFloat(p[0])+(parseFloat(p[1]||0)/60);};

const isEmpty=(v)=>!v&&v!==0;

}
// Standalone-engine prospect — a deal on a bare spare engine, no airframe at
// all. Deliberately a single engine slot (not the usual two), identified by
// ESN rather than MSN since there's no aircraft to key off. Still built on
// top of makeBlankAsset so every container field buildTechSpecHTML expects
// (airframe/landingGear/apu/etc) exists, just empty — the engine-only tech
// spec branch (asset._engineOnly) never reads them anyway.

// Shared extraction prompts — used by UploadView (live fleet ingestion)
// and the Prospect editor's inline LLP extractor. Kept as one copy so the
// two flows can never end up parsing sheets with subtly different prompts.
const ENGINE_LLP_PROMPT="Extract engine LLP data from this document. Process each section (FAN, HPC, HPT, LPT) separately. For each LLP row, read left to right: first the LLP DESCRIPTION (e.g. FAN DISK, BOOSTER SPOOL, FAN SHAFT — each row has a unique description, do not repeat), then PART NUMBER, then SERIAL NUMBER. The remaining cycles value is in the RIGHTMOST column group labelled REMAINING CYCLES — identify the engine variant sub-column from the engine type at the top of the document (e.g. CFM56-5B4/P = use 5B4/P sub-column). Each data row corresponds to exactly one description row — match them by row position. Exclude rows where remaining cycles is N/L, N/A, or non-numeric — this includes cells that mix a number with extra wording (e.g. \"2290 to insp. (non LLP)\" is non-numeric and must be excluded, not read as 2290). Also extract the cycle_limit (the approved life limit) for each included row from the CYCLE LIMIT column group (sometimes labelled CYCLE LIMIT/THRESHOLD), using the same engine-variant sub-column as remaining cycles. cycle_limit must be a number, or null if that specific sub-column cell reads N/L, N/A, or is non-numeric — this is independent of whether the row itself was included based on remaining cycles, since a part can have a valid remaining-cycles figure but no approved life limit (e.g. LPT Case, Turbine Rear Frame). Never substitute 0 for null. All TSN and FH values must be formatted as HH:MM strings. You may reason through the table section by section before answering. Once you have finished reasoning, output the final result as a single fenced code block starting with ```json and ending with ``` — this fenced block must contain ONLY the JSON object below and nothing else inside the fences:\n{\"msn\":\"string\",\"registration\":\"string\",\"engines\":[{\"position\":\"LH or RH\",\"esn\":\"string\",\"engine_type\":\"string\",\"variant\":\"string\",\"csn\":number,\"tsn\":number,\"llps\":[{\"desc\":\"string\",\"pn\":\"string\",\"sn\":\"string\",\"fc_remaining\":number,\"cycle_limit\":number}]}]}";
const APU_LLP_PROMPT="Extract APU LLP data ONLY from this document. The APU serial number is labelled SERIAL NUMBER. The fc_remaining value for each LLP must come from the RESIDUAL LIFE - CYS column (also labelled REMAINING COMPON. LIFE or similar), not the TOTAL LIFE or FIXED LIFE column. Also extract cycle_limit (the approved life limit) for each LLP from the TOTAL LIFE or FIXED LIFE column (whichever is present on this document) — this is the figure fc_remaining is explicitly NOT taken from. cycle_limit must be a number, or null if that cell reads N/L, N/A, or is non-numeric. Never substitute 0 for null. IMPORTANT: this document may use European number formatting where a period is a thousands separator, not a decimal point (e.g. 38.093 means 38,093 and 47.075 means 47,075). Convert all numeric values to standard integers. Return ONLY valid JSON, no markdown:\n{\"msn\":\"string or null if not present\",\"registration\":\"string or null if not present\",\"apu\":{\"sn\":\"string\",\"pn\":\"string or null if not present\",\"csn\":number,\"llps\":[{\"desc\":\"string\",\"pn\":\"string\",\"sn\":\"string\",\"fc_remaining\":number,\"cycle_limit\":number}]}}";

function assetStatus(asset){
  const llpVals=(asset.engines||[]).flatMap(e=>(e.llps||[]).map(l=>calcLLPRem(l,e.currentFC)));
  if(asset.apu?.llps)llpVals.push(...asset.apu.llps.map(l=>calcLLPRem(l,asset.apu.currentFC)));
  const minLLP=llpVals.length?Math.min(...llpVals):null;
  const lgDays=["nose","left","right"].map(k=>daysFromNow(asset.landingGear?.[k]?.nextDue)).filter(x=>x!=null);
  const minLG=lgDays.length?Math.min(...lgDays):null;
  if((minLLP!==null&&minLLP<1000)||(minLG!==null&&minLG<0))return"critical";
  if((minLLP!==null&&minLLP<3000)||(minLG!==null&&minLG<365))return"warn";
  return"ok";
}

function SetPasswordScreen(){
  const[oobCode]=useState(()=>new URLSearchParams(window.location.search).get("oobCode")||"");
  const[email,setEmail]=useState(null);
  const[checking,setChecking]=useState(true);
  const[password,setPassword]=useState("");
  const[confirm,setConfirm]=useState("");
  const[err,setErr]=useState("");
  const[busy,setBusy]=useState(false);
  const[done,setDone]=useState(false);

  useEffect(()=>{
    if(!oobCode){setErr("This link is missing its code — please use the link from your invite email.");setChecking(false);return;}
    const run=()=>{
      if(window._configError){setErr("Could not connect to TailiQ. Please try again shortly.");setChecking(false);return;}
      window._auth.verifyResetCode(oobCode)
        .then(addr=>{setEmail(addr);setChecking(false);})
        .catch(()=>{setErr("This link is invalid or has expired. Ask your administrator to send a new invite.");setChecking(false);});
    };
    if(window._firebaseReady){
      run();
    } else {
      window.addEventListener('firebase-ready', run, {once:true});
      window.addEventListener('firebase-config-error', ()=>{setErr("Could not connect to TailiQ. Please try again shortly.");setChecking(false);}, {once:true});
    }
  },[oobCode]);

  const submit=async(e)=>{
    e.preventDefault();
    setErr("");
    if(password.length<8){setErr("Password must be at least 8 characters.");return;}
    if(password!==confirm){setErr("Passwords do not match.");return;}
    setBusy(true);
    try{
      await window._auth.confirmReset(oobCode,password);
      setDone(true);
    }catch(e){
      setErr("Could not set your password — the link may have expired. Ask your administrator to send a new invite.");
    }
    setBusy(false);
  };

  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}>
      <div style={{width:340,padding:24,background:"#111f30",border:"1px solid #1e3048",borderRadius:10}}>
        <div style={{fontSize:13,fontWeight:700,color:"#C9A84C",marginBottom:16,textTransform:"uppercase",letterSpacing:"0.06em"}}>TailiQ — Set Your Password</div>
        {checking&&<div style={{color:"#64748b",fontSize:13}}>Checking your invite link…</div>}
        {!checking&&done&&(
          <div>
            <div style={{color:"#34d399",fontSize:13,marginBottom:14}}>Password set! You can now sign in.</div>
            <button className="btn btn-gold" style={{width:"100%"}} onClick={()=>{window.location.href="/";}}>Go to Sign In</button>
          </div>
        )}
        {!checking&&!done&&email&&(
          <form onSubmit={submit}>
            <div style={{color:"#7a9ab5",fontSize:12,marginBottom:14}}>Setting a password for <strong style={{color:"#e2e8f0"}}>{email}</strong></div>
            <div className="form-group">
              <label className="form-label">New Password</label>
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)} autoFocus/>
            </div>
            <div className="form-group">
              <label className="form-label">Confirm Password</label>
              <input type="password" value={confirm} onChange={e=>setConfirm(e.target.value)}/>
            </div>
            {err&&<div style={{color:"#f87171",fontSize:12,marginBottom:12}}>{err}</div>}
            <button className="btn btn-gold" type="submit" disabled={busy} style={{width:"100%"}}>{busy?"Setting…":"Set Password"}</button>
          </form>
        )}
        {!checking&&!done&&!email&&err&&<div style={{color:"#f87171",fontSize:13}}>{err}</div>}
      </div>
    </div>
  );
}

function SignInScreen(){
  const[email,setEmail]=useState("");
  const[password,setPassword]=useState("");
  const[err,setErr]=useState("");
  const[busy,setBusy]=useState(false);
  const submit=async(e)=>{
    e.preventDefault();
    setErr("");setBusy(true);
    try{
      await window._auth.signIn(email,password);
    }catch(e){
      setErr("Sign-in failed — check email and password.");
    }
    setBusy(false);
  };
  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}>
      <form onSubmit={submit} style={{width:300,padding:24,background:"#111f30",border:"1px solid #1e3048",borderRadius:10}}>
        <div style={{fontSize:13,fontWeight:700,color:"#C9A84C",marginBottom:16,textTransform:"uppercase",letterSpacing:"0.06em"}}>TailiQ — Sign In</div>
        <div className="form-group">
          <label className="form-label">Email</label>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} autoFocus/>
        </div>
        <div className="form-group">
          <label className="form-label">Password</label>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)}/>
        </div>
        {err&&<div style={{color:"#f87171",fontSize:12,marginBottom:12}}>{err}</div>}
        <button className="btn btn-gold" type="submit" disabled={busy} style={{width:"100%"}}>{busy?"Signing in…":"Sign In"}</button>
      </form>
    </div>
  );
}

function App(){
  // Invite-link landing — must be checked before any sign-in gate, since
  // the person clicking this link has no TailiQ account/session yet.
  if(new URLSearchParams(window.location.search).get("view")==="set-password"){
    return <SetPasswordScreen/>;
  }
  const[authUser,setAuthUser]=useState(window._authUser===undefined?undefined:window._authUser);
  const[configError,setConfigError]=useState(window._configError||false);
  const[assets,setAssets]=useState([]);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState(null);
  const[view,setView]=useState("dashboard");
  const[selectedId,setSelectedId]=useState(null);
  const[userRole,setUserRole]=useState(null);
  const[notification,setNotification]=useState(null);

  const loadAssets=useCallback(async()=>{
    try{
      const assets=await db.getAssets();
      setAssets(assets);
      setError(null);
    }catch(e){setError(e.message);}
    setLoading(false);
  },[]);

  useEffect(()=>{
    const onConfigError=()=>setConfigError(true);
    window.addEventListener('firebase-config-error', onConfigError);
    return ()=>window.removeEventListener('firebase-config-error', onConfigError);
  },[]);

  useEffect(()=>{
    const syncAuth=()=>setAuthUser(window._authUser);
    if(window._authUser!==undefined){
      syncAuth();
    }
    window.addEventListener('auth-state-changed', syncAuth);
    return ()=>window.removeEventListener('auth-state-changed', syncAuth);
  },[]);

  useEffect(()=>{
    if(!authUser)return;
    const resolveRole=async()=>{
      try{
        let tokenResult=await window._auth.getIdTokenResult();
        if(!tokenResult)return; // not signed in yet
        let role=tokenResult.claims.role;
        if(!role){
          const idToken=await window._auth.getIdToken();
          const resp=await fetch('/api/bootstrap-admin',{method:'POST',headers:{'Authorization':`Bearer ${idToken}`}});
          if(resp.ok){
            tokenResult=await window._auth.getIdTokenResult(true); // force refresh
            role=tokenResult?.claims?.role;
          }
        }
        setUserRole(role||'viewer');
        if((role||'viewer')==='viewer') setView('portfolio');
      }catch(e){
        console.error('Role resolution failed',e);
        setUserRole('viewer');
      }
    };
    resolveRole();
  },[authUser]);

  useEffect(()=>{
    if(!authUser)return; // wait until signed in before touching Firestore
    const doLoad=()=>loadAssets();
    if(window._firebaseReady){
      doLoad();
    } else {
      window.addEventListener('firebase-ready', doLoad, {once:true});
    }
  },[loadAssets,authUser]);

  const saveAsset=useCallback(async(asset, action="Updated asset data")=>{
    await db.saveAsset(asset);
    await logAudit(asset.id, asset.msn, action);
    await loadAssets();
  },[loadAssets]);

  const notify=(msg,type="success")=>{setNotification({msg,type});setTimeout(()=>setNotification(null),3500);};
  const selectedAsset=assets.find(a=>a.id===selectedId);
  // Prospect assets (type:"prospect") are ad hoc/deal-evaluation aircraft — kept
  // completely separate from the live fleet in Dashboard/Fleet Portfolio/Admin.
  const liveAssets=assets.filter(a=>a.type!=="prospect");
  const prospectAssets=assets.filter(a=>a.type==="prospect");

  if(configError)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}>
      <div style={{textAlign:"center",maxWidth:400,padding:32}}>
        <div style={{color:"#f87171",fontSize:14,fontWeight:700,marginBottom:8}}>Configuration Error</div>
        <p style={{color:"#64748b",fontSize:13}}>Couldn't load app configuration from /api/config. Check that Firebase and Cloudinary environment variables are set in Vercel, then reload.</p>
      </div>
    </div>
  );

  if(authUser===undefined)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}>
      <div style={{width:32,height:32,border:"3px solid #C9A84C",borderTop:"3px solid transparent",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
    </div>
  );

  if(authUser===null)return <SignInScreen/>;

  if(loading)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}>
      <div style={{textAlign:"center"}}>
        <div style={{width:32,height:32,border:"3px solid #C9A84C",borderTop:"3px solid transparent",borderRadius:"50%",animation:"spin 1s linear infinite",margin:"0 auto 12px"}}/>
        <p style={{color:"#64748b",fontSize:13}}>Loading fleet data…</p>
      </div>
    </div>
  );

  if(error)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}>
      <div style={{textAlign:"center",maxWidth:400,padding:32}}>
        <div style={{color:"#f87171",fontSize:14,fontWeight:700,marginBottom:8}}>Connection Error</div>
        <p style={{color:"#64748b",fontSize:12,marginBottom:16}}>{error}</p>
        <button onClick={loadAssets} style={{padding:"8px 20px",background:"#1e3a5f",border:"none",borderRadius:6,color:"#60a5fa",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>Retry</button>
      </div>
    </div>
  );

  return(
    <div>
      <header style={{background:view==="portfolio"?"#ffffff":"#0d1c2c",borderBottom:view==="portfolio"?"1px solid #e2e8f0":"1px solid #1e3348",position:"sticky",top:0,zIndex:100,boxShadow:view==="portfolio"?"0 2px 8px rgba(15,23,42,0.08)":"0 2px 8px rgba(0,0,0,0.3)",padding:"8px 16px"}}>
        <div className="app-header-row" style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"nowrap"}}>
          <img src={view==="portfolio"?HEADER_LOGO_WHITE:HEADER_LOGO_NAVY} alt="TailiQ" style={{height:44,maxWidth:"55vw",objectFit:"contain",objectPosition:"left center",borderRadius:0}} className="header-logo"/>
          {/* Right side: Fleet button above nav pill */}
          <div className="app-header-right" style={{display:"flex",flexDirection:"column",gap:5,alignItems:"stretch"}}>
            {/* Fleet button - full width, colour coded to white theme */}
            <button onClick={()=>{setView("portfolio");setSelectedId(null);}}
              className="app-fleet-btn"
              style={{padding:"7px 20px",background:view==="portfolio"?"#f1f5f9":"transparent",border:`1px solid ${view==="portfolio"?"#e2e8f0":"#2a4060"}`,borderRadius:7,fontFamily:"inherit",fontSize:12,fontWeight:700,cursor:"pointer",color:view==="portfolio"?"#0f172a":"#6a8aaa",letterSpacing:"0.06em",textTransform:"uppercase",transition:"all 0.15s",textAlign:"center"}}>
              ✈ Fleet Portfolio
            </button>
            {/* Nav pill */}
            <nav className="app-nav-pill" style={{display:"flex",alignItems:"center",gap:4,background:view==="portfolio"?"#f1f5f9":"rgba(13,25,37,0.8)",border:`1px solid ${view==="portfolio"?"#e2e8f0":"#1e3348"}`,borderRadius:8,padding:"5px 6px"}}>
              {[["dashboard","Dashboard"],...(userRole==='admin'||userRole==='editor'?[["upload","Upload"]]:[]),["prospects","Prospects"]]
                .map(([v,l])=>(
                <button key={v} className="app-nav-btn" onClick={()=>{setView(v);setSelectedId(null);}}
                  style={{padding:"7px 14px",borderRadius:6,border:"none",fontFamily:"inherit",fontSize:13,fontWeight:600,cursor:"pointer",transition:"all 0.15s",background:view===v?"#1a3050":"transparent",color:view===v?"#C9A84C":(view==="portfolio"?"#475569":"#6a8aaa"),letterSpacing:"0.02em",flex:1}}>
                  <span className="app-nav-label-always">{l}</span>
                </button>
              ))}
              {userRole==='admin'&&<>
                <div style={{width:1,height:22,background:view==="portfolio"?"#cbd5e1":"#1e3348",margin:"0 4px"}}/>
                <button className="app-nav-btn" onClick={()=>{setView("admin");setSelectedId(null);}}
                  style={{padding:"7px 14px",borderRadius:6,border:"none",fontFamily:"inherit",fontSize:13,fontWeight:600,cursor:"pointer",transition:"all 0.15s",background:view==="admin"?"#2a1f00":"transparent",color:view==="admin"?"#C9A84C":(view==="portfolio"?"#475569":"#6a8aaa"),letterSpacing:"0.02em",flex:1}}>
                  ⚙<span className="app-nav-label"> Admin</span>
                </button>
              </>}
              <button className="app-nav-btn" onClick={()=>window._auth.signOut()} title={authUser?.email||""}
                style={{padding:"7px 14px",borderRadius:6,border:"none",fontFamily:"inherit",fontSize:12,fontWeight:600,cursor:"pointer",background:"transparent",color:view==="portfolio"?"#475569":"#6a8aaa",flex:1}}>
                ⎋<span className="app-nav-label"> Sign Out</span>
              </button>
            </nav>
          </div>
        </div>
      </header>

      {notification&&(
        <div style={{position:"fixed",bottom:24,right:18,zIndex:300,padding:"10px 16px",borderRadius:8,
          background:notification.type==="error"?"#2a0e0e":"#0d2818",
          border:`1px solid ${notification.type==="error"?"#7f1d1d":"#166534"}`,
          color:notification.type==="error"?"#f87171":"#34d399",
          fontWeight:600,fontSize:13,animation:"fadeIn 0.2s ease",boxShadow:"0 4px 16px rgba(0,0,0,0.4)"}}>
          {notification.msg}
        </div>
      )}

      <main style={{padding:"20px 22px",maxWidth:1480,margin:"0 auto"}}>
        {view==="dashboard"&&!selectedId&&<Dashboard assets={liveAssets} onSelect={id=>{setSelectedId(id);setView("asset");}} saveAsset={saveAsset} notify={notify}/>}
        {view==="asset"&&selectedId&&selectedAsset&&<AssetView asset={selectedAsset} saveAsset={saveAsset} isAdmin={userRole==='admin'||userRole==='editor'} notify={notify} onBack={()=>{setView("dashboard");setSelectedId(null);}} loadAssets={loadAssets} onFlyForward={(userRole==='admin'||userRole==='editor')?()=>setView("flyforward-demo"):null}/>}
        {view==="upload"&&(userRole==='admin'||userRole==='editor')&&<UploadView assets={liveAssets} saveAsset={saveAsset} notify={notify}/>}
        {view==="guide"&&<GuideView/>}
        {view==="portfolio"&&<PortfolioView assets={liveAssets} notify={notify} onSelect={(id)=>{setSelectedId(id);setView("asset");}}/>}
        {view==="prospects"&&<ProspectListView assets={prospectAssets} saveAsset={saveAsset} notify={notify} userRole={userRole} onSelect={id=>{setSelectedId(id);setView("prospect-editor");}} loadAssets={loadAssets}/>}
        {view==="prospect-editor"&&selectedId&&assets.find(a=>a.id===selectedId)&&<ProspectEditor asset={assets.find(a=>a.id===selectedId)} saveAsset={saveAsset} notify={notify} onBack={()=>{setView("prospects");setSelectedId(null);}}/>}
        {view==="flyforward-demo"&&selectedId&&selectedAsset&&(userRole==='admin'||userRole==='editor')&&<FlyForwardDemo asset={selectedAsset} onBack={()=>setView("asset")}/>}
        {view==="admin"&&userRole==='admin'&&<AdminView assets={liveAssets} saveAsset={saveAsset} notify={notify} loadAssets={loadAssets}/>}
        {view==="admin"&&userRole!=='admin'&&<div style={{padding:60,textAlign:"center",color:"#475569"}}>Admin access required.</div>}
      </main>
    </div>
  );
}

function ReviewQueueBanner({saveAsset,notify}){
  const[pending,setPending]=useState([]);
  const[expanded,setExpanded]=useState(false);
  const[busyId,setBusyId]=useState(null);
  const refresh=async()=>{try{setPending(await db.getPendingReports());}catch{/* non-fatal — banner just stays empty */}};
  useEffect(()=>{refresh();},[]);
  if(!pending.length)return null;
  const apply=async(p)=>{
    setBusyId(p.id);
    try{
      await saveAsset(p.mergedAsset,"Applied email report");
      await db.saveUtilisation(p.utilisationRecord);
      await db.deletePendingReport(p.id);
      notify(`MSN ${p.msn} applied from ${p.period||"report"}`);
      await refresh();
    }catch(err){
      notify("Failed to apply report: "+(err.message||"please try again"),"error");
    }
    setBusyId(null);
  };
  const discard=async(p)=>{
    if(!confirm(`Discard this ${p.period||"report"} for MSN ${p.msn}? The asset will not be updated.`))return;

                <div style={{fontSize:10,color:"#475569"}}>{p.fileName||""}</div>

              ))}
              <div className="flab g8" style={{marginTop:8}}>
                <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}} disabled={busyId===p.id} onClick={()=>discard(p)}>Discard</button>

            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// Shared full-spec generator used by PortfolioView, ProspectListView, and
// ProspectEditor — one place that fetches engine photo/logo/disclaimer and
// opens the print-ready window, so all three surfaces stay in sync.
async function generateTechSpec(asset){
  // Standalone-engine prospects must always render via the engine-only
  // branch of buildTechSpecHTML. This used to be the caller's job (each call
  // site had to remember to spread in _engineOnly/_enginePos) — that's what
  // let the Prospects-list "Tech Spec" button slip through rendering a full
  // aircraft cover. Deriving it here means every caller gets it for free.
  const specAsset=asset.prospectKind==="engine"?{...asset,_engineOnly:true,_enginePos:1}:asset;
  const isCFMAsset=isCFM(specAsset);
  const photoKey=isCFMAsset?"engine_photo_cfm56":"engine_photo_v2500";
  const engPhoto=await db.getSetting(photoKey).catch(()=>null)||"";
  const logo=await getTechSpecLogo();
  const defaultDisclaimer=await getDefaultDisclaimer();
  openTechSpec(buildTechSpecHTML(specAsset,engPhoto,logo,defaultDisclaimer));
}
// Single-asset LLP extraction — same /api/extract call, same prompts and
// model choice as UploadView's "llp"/"apu_llp" flow, but with no fleet
// matching step: the caller already knows exactly which asset this is for
// (used by the Prospect editor's inline "Upload LLP Sheet" controls).
async function extractLLPSheet(file,kind){
  if(file.type!=="application/pdf")throw new Error("Please upload a PDF file.");
  if(file.size>10*1024*1024)throw new Error("File is too large (maximum 10 MB).");
  const prompt=kind==="llp"?ENGINE_LLP_PROMPT:APU_LLP_PROMPT;
  const extractModel=kind==="llp"?"claude-sonnet-4-6":"claude-haiku-4-5-20251001";
  const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej(new Error("Could not read the file. Please try again."));r.readAsDataURL(file);});
  const resp=await fetch("/api/extract",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:extractModel,max_tokens:4000,messages:[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}},{type:"text",text:prompt}]}]})});
  if(!resp.ok){
    const status=resp.status;
    if(status===401||status===403)throw new Error("Authentication error with the AI service. Please contact your administrator.");
    if(status===429)throw new Error("Too many requests — please wait a moment and try again.");
    if(status>=500)throw new Error("The extraction service is temporarily unavailable. Please try again in a few minutes.");
    throw new Error("Extraction request failed (error "+status+"). Please try again.");
  }
  let result;
  try{result=await resp.json();}catch(jsonErr){throw new Error("Received an unexpected response from the server. Please try again.");}
  if(result.error){
    const msg=result.error;
    if(msg.includes("credit")||msg.includes("billing"))throw new Error("AI service billing issue — please contact your administrator.");
    if(msg.includes("overloaded")||msg.includes("capacity"))throw new Error("The AI service is busy right now. Please wait a moment and try again.");
    throw new Error("Extraction failed. Please check the file is a valid report and try again.");
  }
  let parsed;
  try{
    const rawParsed=result.ok?result.data:JSON.parse((result.raw||"").replace(/```json|```/g,"").trim());
    parsed=Array.isArray(rawParsed)?rawParsed[rawParsed.length-1]:rawParsed;
  }catch(parseErr){
    throw new Error("The AI could not extract structured data from this file. Check it is the correct report type.");
  }
  if(!parsed||typeof parsed!=="object"||Array.isArray(parsed)){
    throw new Error("The AI returned an unexpected format. Check the file is a valid report and try again.");
  }
  return parsed;
}
// Small self-contained upload+extract+review widget. Used inline in the
// Prospect editor's Engine and APU cards — no fleet-matching review panel
// needed here since we already know which asset we're editing; just a quick
// row-count preview before the caller's onApply() merges it into the form.
function LLPExtractor({kind,label,onApply,notify}){
  const[file,setFile]=useState(null);
  const[extracting,setExtracting]=useState(false);
  const[parsed,setParsed]=useState(null);
  const[error,setError]=useState(null);
  const doExtract=async()=>{
    if(!file)return;
    setExtracting(true);setError(null);setParsed(null);
    try{
      const result=await extractLLPSheet(file,kind);
      setParsed(result);
    }catch(e){setError(e.message);}
    setExtracting(false);
  };
  const rows=kind==="llp"?(parsed?.engines||[]).reduce((n,e)=>n+(e.llps?.length||0),0):(parsed?.apu?.llps?.length||0);
  const apply=()=>{
    onApply(parsed);
    notify(`${rows} LLP row(s) applied`);
    setParsed(null);setFile(null);
  };
  return(
    <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #1e3048"}}>
      <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",marginBottom:6}}>{label}</div>
      {!parsed?(
        <div className="flab g8">
          <input type="file" accept="application/pdf" onChange={e=>setFile(e.target.files?.[0]||null)} style={{fontSize:11,flex:1}}/>
          <button type="button" className="btn btn-primary" style={{fontSize:11,padding:"4px 10px"}} disabled={!file||extracting} onClick={doExtract}>{extracting?"Extracting…":"Extract"}</button>
        </div>
      ):(
        <div>
          <div style={{fontSize:11,color:"#94a3b8",marginBottom:6}}>{rows} LLP line(s) found in "{file?.name}".</div>
          <div className="flab g8">
            <button type="button" className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>{setParsed(null);setFile(null);}}>Discard</button>
            <button type="button" className="btn btn-gold" style={{fontSize:11,padding:"4px 10px"}} onClick={apply}>Apply {rows} LLP row(s)</button>
          </div>
        </div>
      )}
      {error&&<div style={{color:"#f87171",fontSize:11,marginTop:6}}>{error}</div>}
    </div>
  );
}

// Fixed reserve pots — near-universal across leases, per Section 9.
// Structural defs only (code/label/basis) — real rates/balances are
// always manually entered against the lessee's actual Maintenance
// Payment Rate schedule, never pre-filled with a guessed number.
const FIXED_RESERVE_POT_DEFS = [
  { code: "AF-6Y", label: "Airframe 6-Year Check", potCategory: "fixed", accrualBasis: "per_FH" },
  { code: "AF-12Y", label: "Airframe 12-Year Check", potCategory: "fixed", accrualBasis: "per_FH" },
  { code: "AP-OH", label: "APU Overhaul", potCategory: "fixed", accrualBasis: "per_FH" },
  { code: "LG-OH", label: "Landing Gear Overhaul", potCategory: "fixed", accrualBasis: "per_FH" }
];

// Auto-generates EN-PR/EN-LP pot slots per real engine on the asset —
// same filtering pattern as buildEnginePots() in the Fly-Forward Demo
// code (EN-PR needs the engine to exist; EN-LP additionally needs real
// LLP data to simulate against). No fabricated rates here — Path 2 is
// manual entry of the real lease's figures.
function buildRealEnginePotDefs(asset) {
  const engines = (asset.engines || []).filter(e => e.sn && String(e.sn).trim());
  const defs = [];
  engines.forEach(e => {
    const pos = e.position;
    defs.push({ code: `EN-PR-${pos}`, label: `Engine #${pos} Performance Restoration (ESN ${e.sn})`, potCategory: "engine", enginePosition: pos, accrualBasis: "per_FH" });
    if (e.llps && e.llps.length) {
      defs.push({ code: `EN-LP-${pos}`, label: `Engine #${pos} Life-Limited Parts (ESN ${e.sn})`, potCategory: "engine", enginePosition: pos, accrualBasis: "per_FC" });
    }
  });
  return defs;
}

// Warning-not-block validation (Section 9): cross-checks an entered
// pot against the real LLP catalogue (llpCatalogue.js, via
// window.LLP_CATALOGUE_PRICES) using the same server-side /api/extract
// proxy as existing extraction — figures only, no documents sent.
// Only flags genuinely implausible entries (wrong order of magnitude,
// wrong basis); a real but unusual negotiated rate should NOT be
// flagged, per the design note on avoiding false positives.
async function validatePotWithAI(pot, asset) {
  const cfm = isCFM(asset);
  const engineFamily = cfm ? "CFM" : "V2500";
  const catalogue = window.LLP_CATALOGUE_PRICES?.[engineFamily];

  // Deterministic check FIRST, for pots where we already have a real
  // reference number — an LLM round-trip is the wrong tool for a check
  // that's really just arithmetic, and shouldn't be the only thing
  // standing between a wildly wrong figure and Brain 3. Only EN-LP has
  // a directly comparable known rate (the blended $/FC catalogue rate);
  // EN-PR's known figures are lump-sum restoration costs (Section 4),
  // which don't translate to an expected $/FH accrual rate without
  // knowing the shop-visit interval — so EN-PR still relies on the AI
  // check below only.
  if (pot.code && pot.code.startsWith("EN-LP") && catalogue?.blendedRatePerFC2026 && pot.accrualRate > 0) {
    const known = catalogue.blendedRatePerFC2026;
    const ratio = pot.accrualRate / known;
    if (ratio < 0.3 || ratio > 3) {
      return {
        flagged: true,
        message: `Entered rate ($${pot.accrualRate}/FC) is far from the known ${engineFamily} catalogue blended LLP rate ($${known.toFixed(2)}/FC) — more than 3x off. Please double-check against the real lease schedule.`,
        checkFailed: false
      };
    }
  }

  try {
    const context = pot.potCategory === "engine"
      ? `Engine family: ${engineFamily}. Known catalogue blended LLP rate (2026): $${catalogue?.blendedRatePerFC2026 ?? "unknown"}/FC. Known catalogue escalation: ${catalogue?.escalationPctPerYr ?? "unknown"}%/yr.`
      : `This is a non-engine reserve pot (typical airframe/APU/landing-gear check), usually accrued per flight hour with modest annual escalation.`;
    const prompt = `You are sanity-checking a single reserve pot entry, manually transcribed from a real aircraft lease's Maintenance Payment Rate schedule. Only flag entries that look genuinely implausible (wrong order of magnitude, wrong basis, or a negative/zero value where a positive rate is expected). Do NOT flag a rate just because it's unusual — real negotiated lease rates vary.

Pot: ${pot.code} (${pot.label})
Accrual basis: ${pot.accrualBasis}
Accrual rate: $${pot.accrualRate}
Escalation: ${pot.escalationPctPerYr}%/yr
Opening balance: $${pot.openingBalance}
${context}

Respond with ONLY a single JSON object and absolutely nothing else — no markdown code fences, no preamble, no explanation before or after it: {"flagged": true or false, "message": "one short sentence explaining why, or empty string if not flagged"}`;
    const resp = await fetch("/api/extract", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: "claude-haiku-4-5-20251001", max_tokens: 400, messages: [{ role: "user", content: [{ type: "text", text: prompt }] }] }) });
    if (!resp.ok) throw new Error(`/api/extract returned ${resp.status}`);
    const json = await resp.json();
    const text = (json.content || []).map(b => b.text || "").join("").trim();
    // Pull out the {...} block rather than assuming the whole response is
    // clean JSON — tolerant of stray preamble/fences the model might add
    // despite instructions, and of markdown fences specifically.
    const clean = text.replace(/```json|```/g, "").trim();
    const match = clean.match(/\{[\s\S]*\}/);
    if (!match) throw new Error("No JSON object found in validation response");
    const parsed = JSON.parse(match[0]);
    if (typeof parsed.flagged !== "boolean") throw new Error("Malformed validation response (missing flagged boolean)");
    return { flagged: !!parsed.flagged, message: parsed.message || "", checkFailed: false };
  } catch (e) {
    // Fail-SAFE, not fail-open: a broken validation check must never be
    // silently treated as "this entry is fine" — that defeats the point
    // of having a check at all. Instead it surfaces as a flag requiring
    // the same explicit acknowledgment as a genuine content concern, but
    // with wording that makes clear it's a technical failure, not
    // Claude's judgement on the actual figures.
    console.warn("Pot validation check failed — flagging for manual review rather than passing silently:", e);
    return { flagged: true, message: "Validation check couldn't complete due to a technical error — please review this entry manually before saving.", checkFailed: true };
  }
}


// Add Lease / Reserve Setup wizard — VECTORIQ_ROADMAP.md Section 9,
// TECH_DEBT.md 4.25. Assumes the asset already exists; this flow only

// they're saved (by design — partial completion + carry-over across
// lease transitions), but the lease record itself is only created at
// Confirm & Activate, so closing mid-flow never leaves a lease doc with
// no pots behind it.
function PotRow({ pot, onField, onSave, onAcknowledge }) {

    ? ((pot.accrualRate !== "" || pot.openingBalance !== "") ? "amber" : "red")
    : (pot.validationWarning && !pot.warningAcknowledged ? "amber" : "green");

    red: { background: "#2a0e0e", color: "#f87171", label: "Outstanding" },
    amber: { background: "#2a220e", color: "#fbbf24", label: pot.saved ? "Needs review" : "In progress" },
    green: { background: "#0d2818", color: "#34d399", label: "Complete" }
  }[status];

  return (
    <div className="card" style={{ padding: 14, marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10, gap: 8, flexWrap: "wrap" }}>
        <div>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#e2e8f0" }}>{pot.code}</div>
          <div style={{ fontSize: 11, color: "#64748b" }}>{pot.label}</div>
        </div>
        <span className="pill" style={{ background: statusStyle.background, color: statusStyle.color }}>{statusStyle.label}</span>
      </div>

      <div style={{ display: "flex", flexWrap: "wrap", gap: 12, alignItems: "flex-end" }}>
        <label style={{ fontSize: 10, color: "#94a3b8" }}>Accrual basis
          <div><select value={pot.accrualBasis} onChange={e => onField("accrualBasis", e.target.value)} style={{ fontSize: 12, padding: "4px 6px" }}>
            <option value="per_FH">$ / Flight Hour</option>
            <option value="per_FC">$ / Flight Cycle</option>
            <option value="per_month">$ / Month</option>
          </select></div>
        </label>
        <label style={{ fontSize: 10, color: "#94a3b8" }}>Accrual rate ($)
          <div><input type="number" step="any" value={pot.accrualRate} onChange={e => onField("accrualRate", e.target.value === "" ? "" : +e.target.value)} style={{ width: 100, fontSize: 12, padding: "4px 6px" }}/></div>
        </label>
        <label style={{ fontSize: 10, color: "#94a3b8" }}>Escalation (%/yr)
          <div><input type="number" step="any" value={pot.escalationPctPerYr} onChange={e => onField("escalationPctPerYr", e.target.value === "" ? "" : +e.target.value)} style={{ width: 80, fontSize: 12, padding: "4px 6px" }}/></div>
        </label>
        <label style={{ fontSize: 10, color: "#94a3b8" }}>Opening balance ($)
          <div><input type="number" step="any" value={pot.openingBalance} onChange={e => onField("openingBalance", e.target.value === "" ? "" : +e.target.value)} style={{ width: 110, fontSize: 12, padding: "4px 6px" }}/></div>
        </label>
        <button className="btn btn-gold" style={{ fontSize: 12, padding: "6px 14px" }} disabled={pot.checking} onClick={onSave}>
          {pot.checking ? "Checking…" : (pot.saved ? "Update Pot" : "Save Pot")}
        </button>
      </div>

      {pot.validationWarning && (
        <div style={{ marginTop: 10, padding: 10, background: "#2a220e", borderRadius: 6, fontSize: 11, color: "#fbbf24" }}>
          ⚠ {pot.validationWarning}
          <label style={{ display: "flex", gap: 6, alignItems: "center", marginTop: 8, fontSize: 11, color: "#94a3b8", cursor: "pointer" }}>
            <input type="checkbox" checked={pot.warningAcknowledged} onChange={e => onAcknowledge(e.target.checked)}/>
            I've checked this figure and it's correct as entered
          </label>
        </div>
      )}
    </div>
  );
}

function LeaseWizard({asset,saveAsset,notify,onClose}){
  const[step,setStep]=useState(asset.currentLeaseId?"loading":"details");
  const today=new Date().toISOString().slice(0,10);
  const[form,setForm]=useState({lessee:"",leaseStart:"",leaseEnd:"",migrationDate:today});
  const[originalLease,setOriginalLease]=useState(null); // the lease doc as loaded, for diffing on Activate
  const set=(k,v)=>setForm({...form,[k]:v});
  const canContinue=form.lessee.trim()&&form.leaseStart&&form.leaseEnd&&form.migrationDate;

  const[pots,setPots]=useState(null); // null = not yet loaded
  const[customCode,setCustomCode]=useState("");
  const[customLabel,setCustomLabel]=useState("");
  const[activating,setActivating]=useState(false);
  const[deleting,setDeleting]=useState(false);

  // If this asset already has a current lease, land on an overview
  // screen first — never silently skip into pot entry, so the lease's
  // existence, its details, and the Delete action are always visible
  // and obvious before diving into anything else.
  useEffect(()=>{
    if(!asset.currentLeaseId){ if(step==="loading") setStep("details"); return; }
    (async()=>{
      const lease=await db.getLease(asset.currentLeaseId).catch(()=>null);
      if(lease){
        setForm({lessee:lease.lessee||"",leaseStart:lease.leaseStart||"",leaseEnd:lease.leaseEnd||"",migrationDate:lease.migrationDate||today});
        setOriginalLease(lease);
        setStep("overview");
      }else{
        setStep("details");
      }
    })();
  },[]);

  useEffect(()=>{
    if((step!=="pots"&&step!=="overview")||pots) return;
    (async()=>{
      const existingPots=await db.getReservePots(asset.id).catch(()=>[]);
      const existingByCode={};
      existingPots.forEach(p=>{existingByCode[p.code]=p;});
      const cfm=isCFM(asset);
      const engineFamily=cfm?"CFM":"V2500";
      const catalogueEsc=window.LLP_CATALOGUE_PRICES?.[engineFamily]?.escalationPctPerYr;
      const baseDefs=[...FIXED_RESERVE_POT_DEFS,...buildRealEnginePotDefs(asset)];
      const customDefs=existingPots.filter(p=>p.potCategory==="custom"&&!baseDefs.some(d=>d.code===p.code))
        .map(p=>({code:p.code,label:p.label,potCategory:"custom",enginePosition:null,accrualBasis:p.accrualBasis}));
      const merged={};
      [...baseDefs,...customDefs].forEach(def=>{
        const ex=existingByCode[def.code];
        merged[def.code]={
          ...def,
          accrualRate: ex?ex.accrualRate:"",
          escalationPctPerYr: ex?ex.escalationPctPerYr:(def.potCategory==="engine"?(catalogueEsc??2.5):2.5),
          openingBalance: ex?ex.openingBalance:"",
          saved: !!ex,
          savedId: ex?ex.id:null,
          validationWarning: ex?(ex.validationWarning||null):null,
          warningAcknowledged: ex?!!ex.warningAcknowledged:false,
          validationChecked: !!ex,
          checking:false
        };
      });
      setPots(merged);
    })();
  },[step]);

  const setPotField=(code,field,val)=>setPots(prev=>({...prev,[code]:{...prev[code],[field]:val,saved:false,validationChecked:false,validationWarning:null,warningAcknowledged:false}}));
  const acknowledgePot=(code,val)=>setPots(prev=>({...prev,[code]:{...prev[code],warningAcknowledged:val}}));

  const addCustomPot=()=>{
    const code=customCode.trim().toUpperCase();
    const label=customLabel.trim();
    if(!code||!label){notify("Enter both a code and a label for the custom pot","error");return;}
    if(pots[code]){notify("A pot with that code already exists","error");return;}
    setPots(prev=>({...prev,[code]:{code,label,potCategory:"custom",enginePosition:null,accrualBasis:"per_FH",accrualRate:"",escalationPctPerYr:2.5,openingBalance:"",saved:false,savedId:null,validationWarning:null,warningAcknowledged:false,validationChecked:false,checking:false}}));
    setCustomCode("");setCustomLabel("");
  };

  const savePot=async(code)=>{
    const p=pots[code];
    if(p.accrualRate===""||p.openingBalance===""){notify("Enter accrual rate and opening balance first","error");return;}
    if(p.validationWarning&&!p.warningAcknowledged){notify("Please review and acknowledge the flagged warning before saving","error");return;}
    setPots(prev=>({...prev,[code]:{...prev[code],checking:true}}));
    let warning=p.validationWarning;
    if(!p.validationChecked){
      const result=await validatePotWithAI(p,asset);
      warning=result.flagged?(result.message||"This entry looks unusual — please double check."):null;
      if(result.flagged){
        setPots(prev=>({...prev,[code]:{...prev[code],checking:false,validationChecked:true,validationWarning:warning,warningAcknowledged:false}}));
        notify("This entry was flagged — review and acknowledge to save","error");
        return;
      }
    }
    try{
      const saved=await db.saveReservePot(asset.id,asset.companyId,{...p,code,validationWarning:warning||null,warningAcknowledged:!!p.warningAcknowledged});
      setPots(prev=>({...prev,[code]:{...prev[code],checking:false,saved:true,savedId:saved.id,validationChecked:true,validationWarning:warning||null}}));
      notify(`${code} saved`,"success");
    }catch(e){
      setPots(prev=>({...prev,[code]:{...prev[code],checking:false}}));
      notify(`Failed to save ${code}`,"error");
    }
  };

  // Only writes a NEW append-only lease record if the details actually
  // changed from what was loaded — otherwise this is purely a pot-entry
  // pass and the existing lease record (and currentLeaseId) is left
  // alone, avoiding a pointless duplicate history entry every time the
  // wizard is reopened just to fill in more pots.
  const leaseUnchanged = originalLease
    && originalLease.lessee===form.lessee
    && originalLease.leaseStart===form.leaseStart
    && originalLease.leaseEnd===form.leaseEnd
    && originalLease.migrationDate===form.migrationDate;

  const activate=async()=>{
    setActivating(true);
    try{
      if(leaseUnchanged){
        notify("Reserve pots updated — lease details unchanged","success");
      }else{
        const lease=await db.createLease(asset.id,asset.companyId,form);
        await saveAsset({...asset,currentLeaseId:lease.id});
        notify(originalLease?"Lease updated (new record created)":"Lease activated","success");
      }
      onClose();
    }catch(e){
      notify("Failed to activate lease","error");
    }
    setActivating(false);
  };

  const deleteLease=async()=>{
    if(!originalLease) return;
    if(!confirm(`Delete this lease record for ${originalLease.lessee}? Reserve pot balances are NOT affected — only the lease record itself is removed.`)) return;
    setDeleting(true);
    try{
      await db.deleteLease(originalLease.id);
      await saveAsset({...asset,currentLeaseId:null});
      notify("Lease deleted","success");
      onClose();
    }catch(e){
      notify("Failed to delete lease","error");
    }
    setDeleting(false);
  };

  const potList=pots?Object.values(pots):[];
  const counts={
    green: potList.filter(p=>p.saved&&!(p.validationWarning&&!p.warningAcknowledged)).length,
    amber: potList.filter(p=>(!p.saved&&(p.accrualRate!==""||p.openingBalance!==""))||(p.saved&&p.validationWarning&&!p.warningAcknowledged)).length,
    red: potList.filter(p=>!p.saved&&p.accrualRate===""&&p.openingBalance==="").length
  };

  const stepMeta={
    overview:{label:"Current Lease",num:null},
    details:{label:"Lease Details",num:1},
    pots:{label:"Reserve Pot Entry",num:2},
    confirm:{label:"Confirm & Activate",num:3}
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(5,10,16,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}} onClick={onClose}>
      <div className="card" style={{width:step==="pots"?680:480,maxWidth:"94vw",maxHeight:"90vh",overflow:"auto",padding:24}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <h2 style={{fontSize:15,color:"#C9A84C",fontWeight:700}}>Lease / Reserve Setup — MSN {asset.msn}</h2>
          <button className="btn btn-ghost" style={{padding:"4px 10px"}} onClick={onClose}>✕</button>
        </div>
        <div style={{fontSize:11,color:"#475569",marginBottom:18}}>
          {step==="loading"?"Loading current lease…":(stepMeta[step].num?`Step ${stepMeta[step].num} of 3 — ${stepMeta[step].label}`:stepMeta[step].label)}
        </div>

        {step==="loading"&&<div style={{color:"#475569",fontSize:12}}>Loading…</div>}

        {step==="overview"&&(
          <>
            <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.6,marginBottom:16}}>
              <div><strong style={{color:"#e2e8f0"}}>Lessee:</strong> {form.lessee}</div>
              <div><strong style={{color:"#e2e8f0"}}>Lease term:</strong> {form.leaseStart} → {form.leaseEnd}</div>
              <div><strong style={{color:"#e2e8f0"}}>Migration date:</strong> {form.migrationDate}</div>
            </div>
            <div style={{display:"flex",gap:10,marginBottom:20,fontSize:11}}>
              {pots?(
                <>
                  <span className="pill" style={{background:"#0d2818",color:"#34d399"}}>{counts.green} Complete</span>
                  <span className="pill" style={{background:"#2a220e",color:"#fbbf24"}}>{counts.amber} In progress / needs review</span>
                  <span className="pill" style={{background:"#2a0e0e",color:"#f87171"}}>{counts.red} Outstanding</span>
                </>
              ):(
                <span style={{color:"#475569"}}>Loading pot status…</span>
              )}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <button className="btn btn-gold" onClick={()=>setStep("pots")}>Reserve Pots →</button>
              <button className="btn btn-ghost" onClick={()=>setStep("details")}>✏ Edit Lease Details</button>
              <button className="btn btn-danger" disabled={deleting} onClick={deleteLease}>
                {deleting?"Deleting…":"🗑 Delete This Lease"}
              </button>
            </div>
          </>
        )}

        {step==="details"&&(
          <>
            <div style={{display:"grid",gridTemplateColumns:"1fr",gap:14}}>
              <div>
                <label className="form-label">Lessee (Airline)</label>
                <input type="text" placeholder="e.g. Example Airways" value={form.lessee} onChange={e=>set("lessee",e.target.value)}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                <div>
                  <label className="form-label">Lease Start</label>
                  <input type="date" value={form.leaseStart} onChange={e=>set("leaseStart",e.target.value)}/>
                </div>
                <div>
                  <label className="form-label">Lease End</label>
                  <input type="date" value={form.leaseEnd} onChange={e=>set("leaseEnd",e.target.value)}/>
                </div>
              </div>
              <div>
                <label className="form-label">Migration Date</label>
                <input type="date" value={form.migrationDate} onChange={e=>set("migrationDate",e.target.value)}/>
                <div style={{fontSize:10,color:"#475569",marginTop:4}}>Defaults to today — the date TailiQ becomes this lease's system of record.</div>
              </div>
            </div>

            <div style={{display:"flex",gap:10,marginTop:14}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>originalLease?setStep("overview"):onClose()}>
                {originalLease?"← Back":"Cancel"}
              </button>
              <button className="btn btn-gold" style={{flex:1}} disabled={!canContinue} onClick={()=>setStep("pots")}>
                Continue →
              </button>
            </div>
          </>
        )}

        {step==="pots"&&(
          <>
            {!pots&&<div style={{color:"#475569",fontSize:12}}>Loading pot checklist…</div>}
            {pots&&(
              <>
                <div style={{display:"flex",gap:10,marginBottom:14,fontSize:11}}>
                  <span className="pill" style={{background:"#0d2818",color:"#34d399"}}>{counts.green} Complete</span>
                  <span className="pill" style={{background:"#2a220e",color:"#fbbf24"}}>{counts.amber} In progress / needs review</span>
                  <span className="pill" style={{background:"#2a0e0e",color:"#f87171"}}>{counts.red} Outstanding</span>
                </div>
                {potList.map(p=>(
                  <PotRow key={p.code} pot={p}
                    onField={(field,val)=>setPotField(p.code,field,val)}
                    onSave={()=>savePot(p.code)}
                    onAcknowledge={val=>acknowledgePot(p.code,val)}/>
                ))}
                <div className="card" style={{padding:14,marginBottom:10,background:"#0d1622"}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#e2e8f0",marginBottom:8}}>+ Add Custom Pot</div>
                  <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                    <input type="text" placeholder="Code (e.g. AVIONICS-OH)" value={customCode} onChange={e=>setCustomCode(e.target.value)} style={{fontSize:12,padding:"6px 8px",width:180}}/>
                    <input type="text" placeholder="Label" value={customLabel} onChange={e=>setCustomLabel(e.target.value)} style={{fontSize:12,padding:"6px 8px",flex:1,minWidth:160}}/>
                    <button className="btn btn-ghost" style={{fontSize:12}} onClick={addCustomPot}>+ Add</button>
                  </div>
                </div>
                <div style={{fontSize:10,color:"#475569",marginBottom:14}}>
                  Partial completion is fine — outstanding pots can be finished later, and Brain 3 will caveat any missing pots rather than treating them as zero.
                </div>
              </>
            )}
            <div style={{display:"flex",gap:10,marginTop:8}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setStep(originalLease?"overview":"details")}>← Back</button>
              <button className="btn btn-gold" style={{flex:1}} onClick={()=>setStep("confirm")}>Continue →</button>
            </div>
          </>
        )}

        {step==="confirm"&&(
          <>
            <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.6,marginBottom:14}}>
              <div><strong style={{color:"#e2e8f0"}}>Lessee:</strong> {form.lessee}</div>
              <div><strong style={{color:"#e2e8f0"}}>Lease term:</strong> {form.leaseStart} → {form.leaseEnd}</div>
              <div><strong style={{color:"#e2e8f0"}}>Migration date:</strong> {form.migrationDate}</div>
              {leaseUnchanged&&<div style={{marginTop:6,fontSize:11,color:"#64748b"}}>No changes to lease details — activating will only save pot updates.</div>}
            </div>
            <div style={{display:"flex",gap:10,marginBottom:18,fontSize:11}}>
              <span className="pill" style={{background:"#0d2818",color:"#34d399"}}>{counts.green} Complete</span>
              <span className="pill" style={{background:"#2a220e",color:"#fbbf24"}}>{counts.amber} In progress / needs review</span>
              <span className="pill" style={{background:"#2a0e0e",color:"#f87171"}}>{counts.red} Outstanding</span>
            </div>
            {(counts.amber>0||counts.red>0)&&(
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:14,padding:10,background:"#0d1622",borderRadius:6}}>
                Some pots aren't complete yet — that's fine, this lease can still be activated. Outstanding pots will be flagged in Fly-Forward projections rather than treated as zero.
              </div>
            )}
            <div style={{display:"flex",gap:10}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setStep("pots")}>← Back</button>
              <button className="btn btn-gold" style={{flex:1}} disabled={activating} onClick={activate}>
                {activating?"Saving…":(leaseUnchanged?"Save Pot Updates":"Activate Lease")}
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function OverviewTab({asset,isAdmin,saveAsset,notify}){

  const startEdit=()=>{setForm(JSON.parse(JSON.stringify(asset)));setEditing(true);};
  const cancel=()=>{setForm(null);setEditing(false);};
  const save=async()=>{await saveAsset(form);setEditing(false);setForm(null);notify("Saved");};
  const d=editing?form:asset;
  const af=asset.airframe||{};
  const set=(path,val)=>{const f=JSON.parse(JSON.stringify(form));const parts=path.split(".");let obj=f;for(let i=0;i<parts.length-1;i++){if(!obj[parts[i]])obj[parts[i]]={};obj=obj[parts[i]];}obj[parts[parts.length-1]]=val;setForm(f);};
  const fmtMMYYYY=(s)=>{if(!s)return"—";if(/^\d{2}\/\d{4}$/.test(s))return s;try{const d=new Date(s);if(isNaN(d))return s;return String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear();}catch{return s;}};
  const Field=({label,path,type="text"})=>{
    const parts=path.split(".");const val=parts.reduce((o,k)=>o?.[k],d);
    return<div className="form-group"><label className="form-label">{label}</label>
      {editing&&isAdmin?<input type="text" placeholder={type==="mmyyyy"?"MM/YYYY":""} defaultValue={type==="mmyyyy"?fmtMMYYYY(val):val||""} onBlur={e=>set(path,e.target.value)} className={isEmpty(val)?"amber":""}/>
      :<div style={{fontSize:13,fontWeight:500,color:isEmpty(val)?"#475569":"#e2e8f0",fontStyle:isEmpty(val)?"italic":"normal"}}>{type==="mmyyyy"?fmtMMYYYY(val):val||"Not entered"}</div>}
    </div>;

  // Status calcs

  if(asset.apu?.llps?.length){const ll=Math.min(...asset.apu.llps.map(l=>calcLLPRem(l,asset.apu.currentFC)));llpVals.push({label:"APU",val:ll});}
  const lgItems=[["NLG",asset.landingGear?.nose],["LH",asset.landingGear?.left],["RH",asset.landingGear?.right]];
  return(
    <div className="grid2">
      <div className="card" style={{padding:18}}>
        <div className="flj" style={{marginBottom:12}}>
          <div className="section-title" style={{margin:0}}>Asset Details</div>
          {!isAdmin?null:!editing?<button className="btn btn-ghost" onClick={startEdit}>Edit</button>:<div className="flab g8"><button className="btn btn-ghost" onClick={cancel}>Cancel</button><button className="btn btn-gold" onClick={save}>Save</button></div>}
        </div>
        <div className="grid2" style={{gap:"0 16px"}}>
          <Field label="MSN" path="msn"/><Field label="Registration" path="registration"/>
          <div className="form-group">
            <label className="form-label" style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
              <span>{d.operatorLabel||"Current Operator"}</span>
              {editing&&isAdmin&&<button type="button" onClick={()=>set("operatorLabel",d.operatorLabel==="Previous Operator"?"Current Operator":"Previous Operator")} style={{fontSize:9,fontWeight:700,padding:"1px 7px",borderRadius:3,border:"1px solid #C9A84C",background:"none",color:"#C9A84C",cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.05em",flexShrink:0}}>{"→ "+(d.operatorLabel==="Previous Operator"?"Current":"Previous")}</button>}
            </label>
            {editing&&isAdmin?<input type="text" defaultValue={d.operator||""} onBlur={e=>set("operator",e.target.value)} className={isEmpty(d.operator)?"amber":""}/>:<div style={{fontSize:13,fontWeight:500,color:isEmpty(d.operator)?"#475569":"#e2e8f0",fontStyle:isEmpty(d.operator)?"italic":"normal"}}>{d.operator||"Not entered"}</div>}
          </div>
          <Field label="Model" path="model"/>
          <Field label="Manufacturer" path="manufacturer"/><Field label="Date of Manufacture (MM/YYYY)" path="dom" type="mmyyyy"/>
        </div>
        <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid #1e3048"}}>
          <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Current Airframe</div>
          <div className="grid2" style={{gap:8}}>
            {[["AIRFRAME TSN",fmtHHMM(af.currentFH)],["AIRFRAME CSN",af.currentFC?.toLocaleString()||"—"]].map(([l,v])=>(
              <div key={l} style={{background:"#070f18",border:"1px solid #1B3A6B",borderRadius:8,padding:"12px 14px"}}>
                <div style={{fontSize:9,color:"#475569",fontWeight:700,letterSpacing:"0.08em"}}>{l}</div>
                <div style={{fontSize:20,fontWeight:700,color:"#C9A84C",fontFamily:"monospace",marginTop:4}}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div className="card" style={{padding:18}}>
          <div className="section-title">Status Summary</div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",marginBottom:6}}>LLP Limiters</div>

              const bg=val===null?"transparent":val<1000?"#2a0e0e":val<3000?"#2a1f0a":"#0d2818";
              return<div key={label} className="flj" style={{padding:"5px 0",borderBottom:"1px solid #0f2030"}}>
                <span style={{fontSize:12,color:"#94a3b8"}}>{label}</span>
                <span className="pill" style={{background:bg,color:col,fontSize:11}}>{val!==null?`${val.toLocaleString()} FC`:"No data"}</span>
              </div>;
            })}
            {llpVals.length===0&&<div style={{fontSize:12,color:"#475569",fontStyle:"italic"}}>No LLP data</div>}
          </div>
          <div>
            <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",marginBottom:6}}>Landing Gear Overhauls</div>
            {lgItems.map(([label,g])=>{
              const days=daysFromNow(g?.nextDue);
              const col=days===null?"#475569":days<0?"#f87171":days<365?"#fbbf24":"#34d399";
              const bg=days===null?"transparent":days<0?"#2a0e0e":days<365?"#2a1f0a":"#0a1a0a";
              return<div key={label} className="flj" style={{padding:"5px 0",borderBottom:"1px solid #0f2030"}}>
                <span style={{fontSize:12,color:"#94a3b8"}}>{label}</span>
                <span className="pill" style={{background:bg,color:col,fontSize:11}}>{g?.nextDue?`${fmtDate(g.nextDue)}${days!==null?` (${days<0?Math.abs(days)+"d overdue":days+"d"})`:""}`:"Not entered"}</span>
              </div>;
            })}
          </div>
          <div style={{marginTop:10,paddingTop:8,borderTop:"1px solid #1e3048"}}>
            <div className="flj"><span style={{fontSize:11,color:"#475569"}}>Last Report</span><span style={{fontSize:11,fontWeight:600,color:asset._lastPeriod?"#e2e8f0":"#f87171"}}>{asset._lastPeriod||"None"}</span></div>
          </div>
        </div>
        <div className="card" style={{padding:18}}>
          <div className="section-title">Check History</div>
          {(asset.checks||[]).map((c,i)=>(
            <div key={i} style={{marginBottom:10,paddingBottom:10,borderBottom:i<(asset.checks.length-1)?"1px solid #1e3048":"none"}}>
              <div style={{fontSize:11,fontWeight:600,color:"#94a3b8",marginBottom:6}}>{c.name}</div>
              <div className="grid2" style={{gap:"4px 10px"}}>
                {[["Last Date",c.lastDate,"date"],["Next Due",c.nextDate,"date"]].map(([l,v,t])=>(
                  <div key={l}><div style={{fontSize:10,color:"#475569"}}>{l}</div><div style={{fontSize:12,fontWeight:500,color:isEmpty(v)?"#475569":"#e2e8f0"}}>{t==="date"?fmtDate(v):v||"—"}</div></div>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}


function ShopVisitEditor({eng,engIdx,asset,isAdmin,saveAsset,notify}){
  const[adding,setAdding]=useState(false);
  const[newSV,setNewSV]=useState({details:"",date:"",fh:"",fc:"",mro:""});
  const saveSV=async()=>{
    const engines=JSON.parse(JSON.stringify(asset.engines||[]));
    engines[engIdx].shopVisits=[...(engines[engIdx].shopVisits||[]),{...newSV,fh:parseHHMM(newSV.fh),fc:+newSV.fc}];
    await saveAsset({...asset,engines});
    setAdding(false);setNewSV({details:"",date:"",fh:"",fc:"",mro:""});notify("Shop visit added");
  };
  const delSV=async(si)=>{
    if(!confirm("Delete shop visit?"))return;
    const engines=JSON.parse(JSON.stringify(asset.engines||[]));
    engines[engIdx].shopVisits.splice(si,1);
    await saveAsset({...asset,engines});notify("Deleted");
  };
  return(
    <div>
      <div className="flj" style={{marginBottom:8}}>
        <div style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:"0.05em"}}>Shop Visit History</div>
        <button className="btn btn-primary" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>setAdding(true)}>+ Add Visit</button>
      </div>
      {(()=>{const svs=eng.shopVisits||[];if(!svs.length)return null;const last=svs[svs.length-1];const sinceFH=eng.currentFH&&last.fh?eng.currentFH-last.fh:null;const sinceFC=eng.currentFC&&last.fc?eng.currentFC-last.fc:null;const sinceDays=last.date?Math.floor((new Date()-new Date(last.date))/86400000):null;return(<div style={{background:"#0a1a2a",border:"1px solid #1B3A6B",borderRadius:6,padding:"10px 12px",marginBottom:10}}><div style={{fontSize:9,color:"#C9A84C",fontWeight:700,textTransform:"uppercase",marginBottom:6}}>Since Last Shop Visit</div><div className="grid3" style={{gap:8}}><div><div style={{fontSize:9,color:"#475569"}}>Days</div><div style={{fontSize:14,fontWeight:700,color:"#C9A84C",fontFamily:"monospace"}}>{sinceDays!==null?sinceDays.toLocaleString():"—"}</div></div><div><div style={{fontSize:9,color:"#475569"}}>FH</div><div style={{fontSize:14,fontWeight:700,color:"#C9A84C",fontFamily:"monospace"}}>{sinceFH!==null?fmtHHMM(sinceFH):"—"}</div></div><div><div style={{fontSize:9,color:"#475569"}}>FC</div><div style={{fontSize:14,fontWeight:700,color:"#C9A84C",fontFamily:"monospace"}}>{sinceFC!==null?sinceFC.toLocaleString():"—"}</div></div></div></div>);})()}
      <table><thead><tr><th>Details</th><th>Date</th><th>TSN</th><th>CSN</th><th>MRO</th><th></th></tr></thead>
      <tbody>{eng.shopVisits?.length?eng.shopVisits.map((sv,si)=>(
        <tr key={si}>
          <td style={{fontWeight:500}}>{sv.details}</td><td>{fmtDate(sv.date)}</td>
          <td style={{fontFamily:"monospace"}}>{fmtHHMM(sv.fh)}</td><td style={{fontFamily:"monospace"}}>{sv.fc?.toLocaleString()}</td>
          <td style={{color:"#94a3b8"}}>{sv.mro}</td>
          <td><button className="btn-danger btn" style={{fontSize:10,padding:"2px 6px"}} onClick={()=>delSV(si)}>✕</button></td>
        </tr>
      )):<tr><td colSpan={isAdmin?6:5} style={{color:"#475569",fontStyle:"italic"}}>No shop visits recorded</td></tr>}</tbody></table>
      {adding&&(
        <div style={{background:"#0d1925",borderRadius:6,padding:12,marginTop:8,border:"1px solid #1e3048"}}>
          <div className="grid3" style={{gap:6,marginBottom:8}}>
            <div style={{gridColumn:"1/-1"}}><label className="form-label">Details / Description</label><input value={newSV.details} onChange={e=>setNewSV({...newSV,details:e.target.value})}/></div>
            {[["Date","date","date"],["TSN (HH:MM)","fh","text"],["CSN","fc","number"],["MRO Facility","mro","text"]].map(([l,k,t])=>(
              <div key={k}><label className="form-label">{l}</label><input type={t} value={newSV[k]} onChange={e=>setNewSV({...newSV,[k]:e.target.value})}/></div>
            ))}
          </div>
          <div className="flab g8"><button className="btn btn-ghost" onClick={()=>setAdding(false)}>Cancel</button><button className="btn btn-gold" onClick={saveSV}>Add Visit</button></div>
        </div>
      )}
    </div>
  );
}


function EnginesTab({asset,isAdmin,saveAsset,notify}){
