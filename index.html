<script type="module" id="firebase-init">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, collection, doc, getDoc, getDocs, setDoc, deleteDoc, addDoc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyDkhfG3b3u4pwWQTTnXFEykJZaVncK_6bY",
    authDomain: "vector-fleet.firebaseapp.com",
    projectId: "vector-fleet",
    storageBucket: "vector-fleet.firebasestorage.app",
    messagingSenderId: "1047074349759",
    appId: "1:1047074349759:web:fcc4c11b47e04b82cd1c0a"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window._firestore = { db, collection, doc, getDoc, getDocs, setDoc, deleteDoc, addDoc, query, where, orderBy };
  window._firebaseReady = true;
  window.dispatchEvent(new Event('firebase-ready'));
</script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const CLOUD_NAME = "dgo3buxcy";
const UPLOAD_PRESET = "fs7bezpu";

const getFS = () => {
  if (window._firestore) return window._firestore;
  throw new Error("Firebase not ready");
};

const db = {
  async getAssets() {
    const { db: fs, collection, getDocs } = getFS();
    const snap = await getDocs(collection(fs, "assets"));
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  },
  async saveAsset(asset) {
    const { db: fs, doc, setDoc } = getFS();
    const { _dbId, _updatedAt, ...data } = asset;
    await setDoc(doc(fs, "assets", String(asset.id)), { ...data, updatedAt: new Date().toISOString() });
  },
  async deleteAsset(id) {
    const { db: fs, doc, deleteDoc } = getFS();
    await deleteDoc(doc(fs, "assets", String(id)));
  },
  async getSetting(key) {
    try {
      const { db: fs, doc, getDoc } = getFS();
      const snap = await getDoc(doc(fs, "settings", key));
      return snap.exists() ? snap.data().value : null;
    } catch { return null; }
  },
  async setSetting(key, value) {
    const { db: fs, doc, setDoc } = getFS();
    await setDoc(doc(fs, "settings", key), { value });
  },
  async getUtilisation(asset_id) {
    const { db: fs, collection, query, where, getDocs } = getFS();
    const q = query(collection(fs, "utilisation"), where("asset_id", "==", String(asset_id)));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  },
  async saveUtilisation(data) {
    const { db: fs, collection, addDoc } = getFS();
    await addDoc(collection(fs, "utilisation"), { ...data, asset_id: String(data.asset_id), created_at: new Date().toISOString() });
  },
  async deleteUtilisation(id) {
    const { db: fs, doc, deleteDoc } = getFS();
    await deleteDoc(doc(fs, "utilisation", id));
  }
};

// calcLLPRem and lowestLimiter now live in /calculations/llpCalculator.js (Brain 2)
const daysFromNow=(d)=>{if(!d)return null;let parsed=d;if(/^\d{2}\/\d{2}\/\d{4}$/.test(d)){const m=d.split("/");parsed=m[2]+"-"+m[1]+"-"+m[0];}return Math.ceil((new Date(parsed)-new Date())/86400000);};
const fmtDate=(s)=>{try{return s?new Date(s).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}):"—";}catch{return s||"—";}};
const fmtHHMM=(dec)=>{if(!dec&&dec!==0)return"—";if(typeof dec==="string"&&dec.includes(":"))return dec;return`${Math.floor(dec)}:${String(Math.round((dec%1)*60)).padStart(2,"0")}`;};
const parseHHMM=(s)=>{if(!s)return 0;const p=s.toString().split(":");return parseFloat(p[0])+(parseFloat(p[1]||0)/60);};
const isCFM=(asset)=>asset?.engines?.some(e=>e.type?.toUpperCase().includes("CFM"));
const isEmpty=(v)=>!v&&v!==0;

function assetStatus(asset){
  const llpVals=(asset.engines||[]).flatMap(e=>(e.llps||[]).map(l=>calcLLPRem(l,e.currentFC)));
  if(asset.apu?.llps)llpVals.push(...asset.apu.llps.map(l=>calcLLPRem(l,asset.apu.currentFC)));
  const minLLP=llpVals.length?Math.min(...llpVals):null;
  const lgDays=["nose","left","right"].map(k=>daysFromNow(asset.landingGear?.[k]?.nextDue)).filter(x=>x!=null);
  const minLG=lgDays.length?Math.min(...lgDays):null;
  if((minLLP!==null&&minLLP<1000)||(minLG!==null&&minLG<0))return"critical";
  if((minLLP!==null&&minLLP<3000)||(minLG!==null&&minLG<365))return"warn";
  return"ok";
}
const SC={critical:{dot:"#f87171",border:"#dc2626"},warn:{dot:"#fbbf24",border:"#d97706"},ok:{dot:"#34d399",border:"#1e3348"}};

function App(){
  const[assets,setAssets]=useState([]);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState(null);
  const[view,setView]=useState("dashboard");
  const[selectedId,setSelectedId]=useState(null);
  const[isAdmin,setIsAdmin]=useState(true);
  const[pinModal,setPinModal]=useState(false);
  const[pinInput,setPinInput]=useState("");
  const[pinError,setPinError]=useState("");
  const[notification,setNotification]=useState(null);
  const[adminPin,setAdminPin]=useState("1234");

  const loadAssets=useCallback(async()=>{
    try{
      const assets=await db.getAssets();
      setAssets(assets);
      const pin=await db.getSetting("admin_pin");
      if(pin)setAdminPin(pin);
      setError(null);
    }catch(e){setError(e.message);}
    setLoading(false);
  },[]);

  useEffect(()=>{
    const doLoad=()=>loadAssets();
    if(window._firebaseReady){
      doLoad();
    } else {
      window.addEventListener('firebase-ready', doLoad, {once:true});
    }
  },[loadAssets]);

  const saveAsset=useCallback(async(asset)=>{
    await db.saveAsset(asset);
    await loadAssets();
  },[loadAssets]);

  const notify=(msg,type="success")=>{setNotification({msg,type});setTimeout(()=>setNotification(null),3500);};
  const selectedAsset=assets.find(a=>a.id===selectedId);

  if(loading)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}>
      <div style={{textAlign:"center"}}>
        <div style={{width:32,height:32,border:"3px solid #C9A84C",borderTop:"3px solid transparent",borderRadius:"50%",animation:"spin 1s linear infinite",margin:"0 auto 12px"}}/>
        <p style={{color:"#64748b",fontSize:13}}>Loading fleet data…</p>
      </div>
    </div>
  );

  if(error)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}>
      <div style={{textAlign:"center",maxWidth:400,padding:32}}>
        <div style={{color:"#f87171",fontSize:14,fontWeight:700,marginBottom:8}}>Connection Error</div>
        <p style={{color:"#64748b",fontSize:12,marginBottom:16}}>{error}</p>
        <button onClick={loadAssets} style={{padding:"8px 20px",background:"#1e3a5f",border:"none",borderRadius:6,color:"#60a5fa",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>Retry</button>
      </div>
    </div>
  );

  return(
    <div>
      <header style={{background:"#0d1c2c",borderBottom:"1px solid #1e3348",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 8px rgba(0,0,0,0.3)",padding:"8px 16px"}}>

              </button>
            </nav>
          </div>
        </div>
      </header>

      {notification&&(
        <div style={{position:"fixed",bottom:24,right:18,zIndex:300,padding:"10px 16px",borderRadius:8,
          background:notification.type==="error"?"#2a0e0e":"#0d2818",
          border:`1px solid ${notification.type==="error"?"#7f1d1d":"#166534"}`,
          color:notification.type==="error"?"#f87171":"#34d399",
          fontWeight:600,fontSize:13,animation:"fadeIn 0.2s ease",boxShadow:"0 4px 16px rgba(0,0,0,0.4)"}}>
          {notification.msg}
        </div>
      )}

      {pinModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div className="card" style={{padding:32,width:300,textAlign:"center"}}>
            <div style={{fontSize:28,marginBottom:8}}>🔒</div>
            <h3 style={{color:"#C9A84C",marginBottom:6,fontSize:16}}>Admin Access</h3>
            <p style={{color:"#64748b",fontSize:12,marginBottom:14}}>Enter your PIN to continue</p>
            <input type="password" placeholder="PIN" value={pinInput} onChange={e=>setPinInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"){if(pinInput===adminPin){setIsAdmin(true);setPinModal(false);setView("admin");notify("Admin access granted");}else setPinError("Incorrect PIN");}}}
              style={{textAlign:"center",letterSpacing:8,fontSize:20,marginBottom:6}}/>
            {pinError&&<p style={{color:"#f87171",fontSize:12,marginBottom:6}}>{pinError}</p>}
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setPinModal(false)}>Cancel</button>
              <button className="btn btn-gold" style={{flex:1}} onClick={()=>{if(pinInput===adminPin){setIsAdmin(true);setPinModal(false);setView("admin");notify("Admin access granted");}else setPinError("Incorrect PIN");}}>Unlock</button>
            </div>
          </div>
        </div>
      )}

      <main style={{padding:"20px 22px",maxWidth:1480,margin:"0 auto"}}>
        {view==="dashboard"&&!selectedId&&<Dashboard assets={assets} onSelect={id=>{setSelectedId(id);setView("asset");}}/>}
        {view==="asset"&&selectedId&&selectedAsset&&<AssetView asset={selectedAsset} saveAsset={saveAsset} isAdmin={isAdmin} notify={notify} onBack={()=>{setView("dashboard");setSelectedId(null);}} loadAssets={loadAssets}/>}
        {view==="upload"&&<UploadView assets={assets} saveAsset={saveAsset} notify={notify}/>}
        {view==="guide"&&<GuideView/>}
        {view==="portfolio"&&<PortfolioView assets={assets} onSelect={(id)=>{setSelectedId(id);setView("asset");}}/>}
        {view==="admin"&&isAdmin&&<AdminView assets={assets} saveAsset={saveAsset} notify={notify} loadAssets={loadAssets} adminPin={adminPin} setAdminPin={setAdminPin}/>}
        {view==="admin"&&!isAdmin&&<div style={{padding:60,textAlign:"center",color:"#475569"}}>Admin access required.</div>}
      </main>
    </div>
  );
}

function Dashboard({assets,onSelect}){
  const[viewMode,setViewMode]=useState("list");
  const[filter,setFilter]=useState("");
  const[sortCol,setSortCol]=useState("msn");
  const[sortDir,setSortDir]=useState("asc");
  const filtered=assets.filter(a=>[a.msn,a.registration,a.operator,a.model].some(v=>v?.toLowerCase().includes(filter.toLowerCase())));
  const sorted=[...filtered].sort((a,b)=>{const av=String(a[sortCol]||""),bv=String(b[sortCol]||"");return sortDir==="asc"?av.localeCompare(bv):bv.localeCompare(av);});
  const stats={total:assets.length,ok:assets.filter(a=>assetStatus(a)==="ok").length,warn:assets.filter(a=>assetStatus(a)==="warn").length,critical:assets.filter(a=>assetStatus(a)==="critical").length};
  const toggleSort=col=>{if(sortCol===col)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortCol(col);setSortDir("asc");}};
  const LLPCell=({eng})=>{if(!eng)return<td style={{color:"#475569"}}>—</td>;if(eng.atShop)return<td><span style={{fontSize:11,color:"#94a3b8"}}>🔧</span></td>;const ll=lowestLimiter(eng);if(ll===null)return<td style={{color:"#475569",fontSize:11}}>No data</td>;const col=ll<1000?"#f87171":ll<3000?"#fbbf24":"#34d399";return<td><span className="pill" style={{background:ll<1000?"#2a0e0e":ll<3000?"#2a1f0a":"#0d2818",color:col}}>{ll.toLocaleString()}</span></td>;};
  const LGCell=({g})=>{if(!g||!g.nextDue)return<td style={{color:"#475569"}}>—</td>;if(g.atShop)return<td><span style={{fontSize:11,color:"#94a3b8"}}>🔧</span></td>;const d=daysFromNow(g.nextDue);const col=d<0?"#f87171":d<365?"#fbbf24":"#64748b";return<td><span className="pill" style={{background:d<0?"#2a0e0e":d<365?"#2a1f0a":"transparent",color:col}}>{fmtDate(g.nextDue)}</span></td>;};
  const APUCell=({apu})=>{if(!apu?.llps?.length)return<td style={{color:"#475569"}}>—</td>;const ll=Math.min(...apu.llps.map(l=>calcLLPRem(l,apu.currentFC)));const col=ll<1000?"#f87171":ll<3000?"#fbbf24":"#34d399";return<td><span className="pill" style={{background:ll<1000?"#2a0e0e":ll<3000?"#2a1f0a":"#0d2818",color:col}}>{ll.toLocaleString()}</span></td>;};
  return(
    <div style={{animation:"fadeIn 0.2s ease"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10,marginBottom:18}}>
        {[["Total Assets",stats.total,"#60a5fa","#0d1e2e","#1e3a5f"],["All Clear",stats.ok,"#34d399","#0d2818","#166534"],["Attention",stats.warn,"#fbbf24","#2a1f0a","#78350f"],["Critical",stats.critical,"#f87171","#2a0e0e","#7f1d1d"]].map(([l,v,c,bg,border])=>(
          <div key={l} style={{background:bg,border:`1px solid ${border}`,borderRadius:6,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:10,color:"#475569",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>{l}</span>
            <span style={{fontSize:20,fontWeight:700,color:c,fontFamily:"monospace"}}>{v}</span>
          </div>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,gap:8,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}>
          <input placeholder="Search MSN, reg, operator…" value={filter} onChange={e=>setFilter(e.target.value)} style={{minWidth:0,flex:1}}/>
          <span style={{fontSize:12,color:"#475569",whiteSpace:"nowrap"}}>{sorted.length}</span>
        </div>
        <div style={{display:"flex",gap:4,background:"#152030",padding:3,borderRadius:6,flexShrink:0}}>
          {[["list","☰"],["card","⊞"]].map(([m,l])=>(
            <button key={m} className="btn" onClick={()=>setViewMode(m)} style={{padding:"5px 10px",fontSize:14,background:viewMode===m?"#1e3348":"transparent",color:viewMode===m?"#C9A84C":"#64748b"}}>{l}</button>
          ))}
        </div>
      </div>
      {viewMode==="list"&&(
        <div className="card" style={{overflow:"auto"}}>
          <table>
            <thead><tr>
              <th style={{width:24}}></th>
              {[["MSN","msn"],["Reg","registration"],["Model","model"],["Operator","operator"]].map(([l,k])=>(
                <th key={k}><button onClick={()=>toggleSort(k)} style={{background:"none",border:"none",color:sortCol===k?"#C9A84C":"#475569",fontFamily:"inherit",fontSize:10,fontWeight:700,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.05em",whiteSpace:"nowrap"}}>{l}{sortCol===k?(sortDir==="asc"?" ↑":" ↓"):""}</button></th>
              ))}
              <th>AF TSN</th><th>AF CSN</th><th>Eng 1</th><th>Eng 2</th><th>APU</th><th>NLG</th><th>LLG</th><th>RLG</th><th>Last Report</th><th></th>
            </tr></thead>
            <tbody>
              {sorted.map((a,i)=>{const st=assetStatus(a);const af=a.airframe||{};return(
                <tr key={a.id} className="row-hover" onClick={()=>onSelect(a.id)} style={{background:i%2===0?"#0d1e2e":"#152535"}}>
                  <td style={{textAlign:"center"}}><div style={{width:8,height:8,borderRadius:"50%",background:SC[st].dot,margin:"0 auto",boxShadow:st!=="ok"?`0 0 7px ${SC[st].dot},0 0 14px ${SC[st].dot}44`:"none"}}/></td>
                  <td style={{fontWeight:700,color:"#C9A84C",fontFamily:"monospace"}}>{a.msn}</td>
                  <td style={{fontWeight:600}}>{a.registration||"—"}</td>
                  <td><span style={{color:"#94a3b8"}}>{a.model||"—"}</span>{isCFM(a)?<span className="tag" style={{background:"#1e3a5f",color:"#60a5fa",marginLeft:5}}>CFM</span>:<span className="tag" style={{background:"#1e2a4a",color:"#a78bfa",marginLeft:5}}>V2500</span>}</td>
                  <td style={{color:"#94a3b8"}}>{a.operator||"—"}</td>
                  <td style={{fontFamily:"monospace"}}>{fmtHHMM(af.currentFH)}</td>
                  <td style={{fontFamily:"monospace"}}>{af.currentFC?.toLocaleString()||"—"}</td>
                  <LLPCell eng={a.engines?.[0]}/><LLPCell eng={a.engines?.[1]}/><APUCell apu={a.apu}/>
                  <LGCell g={a.landingGear?.nose}/><LGCell g={a.landingGear?.left}/><LGCell g={a.landingGear?.right}/>
                  <td style={{fontSize:11,color:a._lastPeriod?"#64748b":"#f87171"}}>{a._lastPeriod||"No report"}</td>
                  <td onClick={e=>e.stopPropagation()}><button className="btn btn-gold" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>onSelect(a.id)}>View</button></td>
                </tr>
              );})}
              {sorted.length===0&&<tr><td colSpan={15} style={{textAlign:"center",padding:48,color:"#475569"}}>{assets.length===0?"No assets yet — go to Admin to add your first aircraft.":"No results."}</td></tr>}
            </tbody>
          </table>
        </div>
      )}
      {viewMode==="card"&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:12}}>
          {sorted.map(a=>{const st=assetStatus(a);const af=a.airframe||{};return(
            <div key={a.id} className="card card-hover" onClick={()=>onSelect(a.id)} style={{borderLeft:`3px solid ${SC[st].border}`,padding:16}}>
              <div className="flj" style={{marginBottom:10}}>
                <div>
                  <div className="flab g8"><span style={{fontWeight:700,fontSize:15,color:"#C9A84C",fontFamily:"monospace"}}>MSN {a.msn}</span>{isCFM(a)?<span className="tag" style={{background:"#1e3a5f",color:"#60a5fa"}}>CFM</span>:<span className="tag" style={{background:"#1e2a4a",color:"#a78bfa"}}>V2500</span>}</div>
                  <div style={{fontSize:14,fontWeight:600,color:"#f1f5f9",marginTop:2}}>{a.registration||"—"}</div>
                  <div style={{fontSize:11,color:"#475569"}}>{a.model} · {a.operator||"—"}</div>
                </div>
                <div style={{width:10,height:10,borderRadius:"50%",background:SC[st].dot,boxShadow:st!=="ok"?`0 0 8px ${SC[st].dot}`:"none"}}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,background:"#0d1925",borderRadius:6,padding:"8px 10px",marginBottom:10}}>
                {[["AF TSN",fmtHHMM(af.currentFH)],["AF CSN",af.currentFC?.toLocaleString()||"—"]].map(([l,v])=>(
                  <div key={l}><div style={{fontSize:9,color:"#475569",fontWeight:700,textTransform:"uppercase"}}>{l}</div><div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",fontFamily:"monospace"}}>{v}</div></div>
                ))}
              </div>
              <div style={{marginBottom:10}}>
                {(a.engines||[]).map((eng,ei)=>{const ll=lowestLimiter(eng);const col=ll===null?"#475569":ll<1000?"#f87171":ll<3000?"#fbbf24":"#34d399";return<div key={ei} className="flj" style={{padding:"3px 0",borderBottom:"1px solid #0f2030"}}><span style={{fontSize:11,color:"#64748b"}}>Eng {ei+1} LLP</span><span style={{fontSize:11,fontWeight:700,color:col}}>{ll!==null?`${ll.toLocaleString()} FC`:"No data"}</span></div>;})}
                {(()=>{const ll=a.apu?.llps?.length?Math.min(...a.apu.llps.map(l=>calcLLPRem(l,a.apu.currentFC))):null;const col=ll===null?"#475569":ll<1000?"#f87171":ll<3000?"#fbbf24":"#34d399";return<div className="flj" style={{padding:"3px 0",borderBottom:"1px solid #0f2030"}}><span style={{fontSize:11,color:"#64748b"}}>APU LLP</span><span style={{fontSize:11,fontWeight:700,color:col}}>{ll!==null?`${ll.toLocaleString()} FC`:"N/A"}</span></div>;})()}
                {["nose","left","right"].map(k=>{const g=a.landingGear?.[k];const days=g?.nextDue?daysFromNow(g.nextDue):null;const col=days===null?"#475569":days<0?"#f87171":days<365?"#fbbf24":"#64748b";const label=k==="nose"?"NLG":k==="left"?"LH":"RH";return<div key={k} className="flj" style={{padding:"3px 0",borderBottom:"1px solid #0f2030"}}><span style={{fontSize:11,color:"#64748b"}}>{label}</span><span style={{fontSize:11,fontWeight:600,color:col}}>{g?.nextDue?fmtDate(g.nextDue):"N/A"}</span></div>;})}
              </div>
              <button className="btn btn-gold" style={{width:"100%",padding:"7px 0",fontSize:12}} onClick={e=>{e.stopPropagation();onSelect(a.id);}}>View Details</button>
            </div>
          );})}
        </div>
      )}
      <div className="flab" style={{gap:16,marginTop:14,fontSize:11,color:"#334155",flexWrap:"wrap"}}>
        {[["#f87171","Critical"],["#fbbf24","Attention"],["#34d399","All clear"]].map(([c,l])=>(
          <div key={l} className="flab" style={{gap:5}}><div style={{width:8,height:8,borderRadius:"50%",background:c}}/>{l}</div>
        ))}
      </div>
    </div>
  );
}

function openTechSpec(html){
  const withBar=html.replace('<body>',`<body><div style="position:fixed;top:0;left:0;right:0;background:#1B3A6B;padding:10px 20px;display:flex;gap:10px;align-items:center;z-index:999;box-shadow:0 2px 8px rgba(0,0,0,0.3)"><span style="color:#C9A84C;font-weight:700;font-size:14px;flex:1">Vector Fleet Manager</span><button onclick="window.print()" style="background:#C9A84C;color:#0a1520;border:none;border-radius:6px;padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer">🖨 Print / Save PDF</button><button onclick="window.close()" style="background:transparent;color:#94a3b8;border:1px solid #2d3f55;border-radius:6px;padding:8px 16px;font-size:13px;cursor:pointer">✕ Close</button></div><div style="height:52px"></div>`);
  const withPrint=withBar.replace('</style>','@media print{body>div:first-child{display:none!important}div[style*="height:52px"]{display:none!important}}</style>');
  const win=window.open();win.document.write(withPrint);win.document.close();
}


function buildTechSpecHTML(asset,engPhoto=""){
  const today=new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"});
  const af=asset.airframe||{};const lg=asset.landingGear||{};const apu=asset.apu||{};
  const engineOnly=asset._engineOnly;
  const enginePos=asset._enginePos||1;
  const specCSS=`@page{size:A4;margin:14mm 18mm}body{font-family:Arial,sans-serif;color:#111;font-size:11px;line-height:1.45;margin:0}
.cover{text-align:center;page-break-after:always;padding:46px 30px}.cover h1{color:#1B3A6B;font-size:24px;margin:0 0 5px}.cover h2{color:#1B3A6B;font-size:17px;margin:0 0 18px}
.cover .meta{color:#374151;font-size:13px;line-height:2.2}.cover .disc{font-size:9px;color:#6b7280;max-width:460px;margin:24px auto 0;line-height:1.6;text-align:left}
.cover .dt{margin-top:14px;font-size:12px;color:#374151}
h3{background:#1B3A6B;color:#C9A84C;font-size:11.5px;padding:5px 10px;border-radius:4px;margin:18px 0 7px;letter-spacing:0.04em}
table{width:100%;border-collapse:collapse;margin-bottom:9px;font-size:10.5px}
th{background:#f1f5f9;color:#374151;font-weight:700;text-align:left;padding:5px 8px;font-size:9.5px;text-transform:uppercase;letter-spacing:0.04em;border:1px solid #e2e8f0}
td{padding:5px 8px;border:1px solid #e2e8f0;vertical-align:top}
.kv td:first-child{color:#6b7280;font-weight:600;width:180px}
.pb{page-break-before:always;height:0;margin:0;padding:0}
.footer{text-align:center;font-size:8px;color:#aaa;margin-top:20px;border-top:1px solid #e2e8f0;padding-top:7px}`;
  const llpRows=(llps,csn)=>!llps?.length?'<tr><td colspan="4" style="color:#aaa;font-style:italic">No LLP data entered</td></tr>':llps.map(l=>{const r=calcLLPRem(l,csn);return`<tr><td>${l.desc||""}</td><td style="font-family:monospace">${l.pn||""}</td><td style="font-family:monospace">${l.sn||""}</td><td style="font-weight:700;color:${r<1000?"#dc2626":r<3000?"#d97706":"#111"}">${r.toLocaleString()}</td></tr>`;}).join("");
  const svRows=(visits,currentFH,currentFC)=>{if(!visits||!visits.length)return'<tr><td colspan="4" style="color:#aaa;font-style:italic">No shop visits recorded</td></tr>';const mroLine=(mro)=>mro?'<br/><span style="font-size:9px;color:#6b7280">'+mro+'</span>':"";const rows=visits.map(sv=>'<tr><td>'+(sv.details||"")+'</td><td>'+fmtDate(sv.date)+mroLine(sv.mro)+'</td><td style="font-family:monospace">'+(fmtHHMM(sv.fh)||"")+'</td><td style="font-family:monospace">'+(sv.fc?sv.fc.toLocaleString():"")+'</td></tr>').join("");const last=visits[visits.length-1];const sinceFH=currentFH&&last.fh?currentFH-last.fh:null;const sinceFC=currentFC&&last.fc?currentFC-last.fc:null;const sinceDays=last.date?Math.floor((new Date()-new Date(last.date))/86400000):null;const sinceRow='<tr style="background:#f1f5f9"><td colspan="2" style="color:#1B3A6B;font-weight:700">Since Last Shop Visit</td><td style="font-family:monospace">'+(sinceFH!==null?fmtHHMM(sinceFH):"—")+'</td><td style="font-family:monospace">'+(sinceFC!==null?sinceFC.toLocaleString():"—")+'</td></tr><tr style="background:#f1f5f9"><td colspan="4" style="color:#6b7280;font-size:9px">Days since last shop visit: '+(sinceDays!==null?sinceDays.toLocaleString():"—")+'</td></tr>';return rows+sinceRow;};
  const engSec=(eng,pos)=>{if(!eng)return"";const ll=lowestLimiter(eng);return`<div class="pb"></div><h3>Engine #${pos} — ESN ${eng.sn||"—"}</h3>
<table class="kv"><tr><td>Engine Type</td><td>${eng.type||"—"}</td><td style="color:#6b7280;font-weight:600;width:120px">Thrust</td><td>${eng.thrust||"—"}</td></tr>
<tr><td>TSN</td><td>${fmtHHMM(eng.currentFH)}</td><td style="color:#6b7280;font-weight:600">CSN</td><td>${(eng.currentFC||0).toLocaleString()}</td></tr>
<tr><td>Lowest LLP Limiter</td><td colspan="3" style="font-weight:700;color:${ll!==null&&ll<1000?"#dc2626":ll!==null&&ll<3000?"#d97706":"#111"}">${ll!==null?ll.toLocaleString()+" FC":"No LLP data"}</td></tr></table>
<p style="font-weight:700;font-size:10px;margin:8px 0 4px">Life Limited Parts</p>
<table><thead><tr><th>LLP Descriptor</th><th>P/N</th><th>S/N</th><th>FC Remaining</th></tr></thead><tbody>${llpRows(eng.llps,eng.currentFC)}</tbody></table>
<p style="font-weight:700;font-size:10px;margin:8px 0 4px">Shop Visit History</p>
<table><thead><tr><th>Details</th><th>Date / MRO</th><th>TSN</th><th>CSN</th></tr></thead><tbody>${svRows(eng.shopVisits,eng.currentFH,eng.currentFC)}</tbody></table>`;};
  const lgFromDDMMYYYY=(s)=>{if(!s)return"";const m=/^(\d{2})\/(\d{2})\/(\d{4})$/.exec(s);if(m)return m[3]+"-"+m[2]+"-"+m[1];return s;};
  const lgFmtDate=(s)=>{if(!s)return"—";if(/^\d{2}\/\d{2}\/\d{4}$/.test(s))return s;return fmtDate(s)||"—";};
  const lgSec=(g,title)=>{if(!g)return"";const calcCSN=(g.startFC||0)+((af.currentFC||0)-(g.refAirframeFC||0));const calcFH=(g.startFH||0)+((af.currentFH||0)-(g.refAirframeFH||0));const sinceFH=(af.currentFH||0)-(g.lastOverhaulFH||0);const sinceFC=(af.currentFC||0)-(g.lastOverhaulFC||0);const lastDateISO=lgFromDDMMYYYY(g.lastOverhaulDate);const sinceDays=lastDateISO?Math.floor((new Date()-new Date(lastDateISO))/86400000):null;return'<table style="margin-bottom:14px"><thead><tr><th colspan="4" style="background:#1B3A6B;color:#C9A84C;font-size:11px">'+title+'</th></tr><tr><th>Part Number</th><th>Serial Number</th><th>Totals Since New</th><th>Next Overhaul Due</th></tr></thead><tbody><tr><td>'+( g.pn||"—")+'</td><td>'+(g.sn||"—")+'</td><td>FH: '+fmtHHMM(calcFH)+'&nbsp; CSN: '+Math.round(calcCSN).toLocaleString()+'</td><td style="font-weight:700">'+ lgFmtDate(g.nextDue)+'</td></tr></tbody></table>'+'<table style="margin-bottom:14px"><thead><tr><th>Last Overhaul Date</th><th>FH at Overhaul</th><th>CSN at Overhaul</th><th>Days Since</th><th>FH Since</th><th>CSN Since</th></tr></thead><tbody><tr><td>'+lgFmtDate(g.lastOverhaulDate)+'</td><td>'+(g.lastOverhaulFH?fmtHHMM(g.lastOverhaulFH):"—")+'</td><td>'+(g.lastOverhaulFC?g.lastOverhaulFC.toLocaleString():"—")+'</td><td>'+(sinceDays!==null?sinceDays.toLocaleString():"—")+'</td><td>'+fmtHHMM(sinceFH)+'</td><td>'+Math.round(sinceFC).toLocaleString()+'</td></tr></tbody></table>';};
  if(engineOnly){
    const eng=asset.engines?.[0];
    const ll=lowestLimiter(eng);

function AssetView({asset,saveAsset,isAdmin,notify,onBack,loadAssets}){
  const[tab,setTab]=useState("overview");
  const genSpec=async()=>{
    const isCFMAsset=isCFM(asset);
    const photoKey=isCFMAsset?"engine_photo_cfm56":"engine_photo_v2500";
    const engPhoto=await db.getSetting(photoKey).catch(()=>null);
    const base=buildTechSpecHTML(asset,engPhoto);
    const withBar=base.replace('<body>',`<body><div style="position:fixed;top:0;left:0;right:0;background:#1B3A6B;padding:10px 20px;display:flex;gap:10px;align-items:center;z-index:999;box-shadow:0 2px 8px rgba(0,0,0,0.3);print-color-adjust:exact;-webkit-print-color-adjust:exact"><span style="color:#C9A84C;font-weight:700;font-size:14px;flex:1">Vector Fleet — Tech Spec MSN ${asset.msn}</span><button onclick="window.print()" style="background:#C9A84C;color:#0a1520;border:none;border-radius:6px;padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer">🖨 Print / Save PDF</button><button onclick="window.close()" style="background:transparent;color:#94a3b8;border:1px solid #2d3f55;border-radius:6px;padding:8px 16px;font-size:13px;cursor:pointer">✕ Close</button></div><div style="height:52px"></div>`);
    const withPrint=withBar.replace('</style>','@media print{body>div:first-child{display:none!important}div[style*="height:52px"]{display:none!important}}</style>');
    const win=window.open();
    win.document.write(withPrint);
    win.document.close();
  };
  return(
    <div style={{animation:"fadeIn 0.2s ease"}}>
      <div className="flab g12" style={{marginBottom:16}}>
        <button className="btn btn-ghost" onClick={onBack}>← Fleet</button>
        <div style={{flex:1}}>
          <h1 style={{fontSize:18,color:"#C9A84C",fontWeight:700}}>MSN {asset.msn} — {asset.registration||"—"}</h1>

function GearCard({title,gkey,asset,form,editing,isAdmin,set,setForm,af}){
  const g=(editing?form:asset).landingGear?.[gkey]||{};
  const fromDDMMYYYY=(s)=>{if(!s)return"";const m=/^(\d{2})\/(\d{2})\/(\d{4})$/.exec(s);if(m)return m[3]+"-"+m[2]+"-"+m[1];return s;};
  const toDDMMYYYY=(s)=>{if(!s)return"";if(/^\d{2}\/\d{2}\/\d{4}$/.test(s))return s;try{const dt=new Date(s);if(isNaN(dt))return s||"";return String(dt.getDate()).padStart(2,"0")+"/"+String(dt.getMonth()+1).padStart(2,"0")+"/"+dt.getFullYear();}catch{return s||"";}};
  const fmtDigits=(raw)=>{const n=raw.replace(/\D/g,"").slice(0,8);if(n.length<=2)return n;if(n.length<=4)return n.slice(0,2)+"/"+n.slice(2);return n.slice(0,2)+"/"+n.slice(2,4)+"/"+n.slice(4);};
  const plus10=(s)=>{const m=/^(\d{2})\/(\d{2})\/(\d{4})$/.exec(s);if(!m)return"";return m[1]+"/"+m[2]+"/"+(+m[3]+10);};
  const[lastDateVal,setLastDateVal]=useState(toDDMMYYYY(g.lastOverhaulDate)||"");
  const[nextDueVal,setNextDueVal]=useState(toDDMMYYYY(g.nextDue)||"");
  useEffect(()=>{if(!editing){setLastDateVal(toDDMMYYYY(g.lastOverhaulDate)||"");setNextDueVal(toDDMMYYYY(g.nextDue)||"");}},[editing]);
  const handleLastDateChange=(raw)=>{const fmt=fmtDigits(raw);setLastDateVal(fmt);if(/^\d{2}\/\d{2}\/\d{4}$/.test(fmt))setNextDueVal(plus10(fmt));};
  const handleLastDateBlur=(val)=>{
    if(/^\d{2}\/\d{2}\/\d{4}$/.test(val)){
      const n=plus10(val);
      setNextDueVal(n);
      // Write both fields in one operation to avoid stale form snapshot
      const f=JSON.parse(JSON.stringify(form));
      if(!f.landingGear)f.landingGear={};
      if(!f.landingGear[gkey])f.landingGear[gkey]={};
      f.landingGear[gkey].lastOverhaulDate=val;
      f.landingGear[gkey].nextDue=n;
      setForm(f);
    } else {
      set("landingGear."+gkey+".lastOverhaulDate",val);
    }
  };
  const handleNextDueChange=(raw)=>setNextDueVal(fmtDigits(raw));
  const handleNextDueBlur=(val)=>{if(/^\d{2}\/\d{2}\/\d{4}$/.test(val))set("landingGear."+gkey+".nextDue",val);};
  const tsn=(g.startFH||0)+((af.currentFH||0)-(g.refAirframeFH||0));

        <div><label className="form-label">Date (DDMMYYYY)</label>
          {editing&&isAdmin
            ?<input type="text" placeholder="DDMMYYYY" value={lastDateVal} onChange={e=>handleLastDateChange(e.target.value)} onBlur={e=>handleLastDateBlur(e.target.value)}/>
            :<div style={{fontSize:13,fontWeight:500,color:isEmpty(activeDateStr)?"#475569":"#e2e8f0"}}>{activeDateStr||"Not entered"}</div>}
        </div>
        <div/>
        <div><label className="form-label">TSN at Overhaul</label>
          {editing&&isAdmin?<input type="number" value={g.lastOverhaulFH||""} onChange={e=>set("landingGear."+gkey+".lastOverhaulFH",+e.target.value)}/>

async function uploadToCloudinary(file) {
  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', UPLOAD_PRESET);
  formData.append('folder', 'vector-fleet');
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
    method: 'POST',
    body: formData
  });
  if (!res.ok) throw new Error('Upload failed');
  const data = await res.json();
  return data.secure_url;
}


function LopaCropTool({asset,saveAsset,notify,onClose}){
  const[stage,setStage]=useState("upload"); // upload | pages | crop | saving
  const[file,setFile]=useState(null);
  const[pdfDoc,setPdfDoc]=useState(null);
  const[pageThumbs,setPageThumbs]=useState([]);
  const[selectedPage,setSelectedPage]=useState(1);
  const[pageImageUrl,setPageImageUrl]=useState(null);
  const[imgNatural,setImgNatural]=useState({w:0,h:0});
  const[crop,setCrop]=useState({x:40,y:40,w:300,h:200});
  const[dragMode,setDragMode]=useState(null); // null | "move" | "br" | "tl" etc
  const[dragStart,setDragStart]=useState(null);
  const[error,setError]=useState(null);
  const imgRef=useRef(null);
  const containerRef=useRef(null);

  const handleFile=async(e)=>{
    const f=e.target.files?.[0];
    if(!f)return;
    setFile(f);setError(null);
    const isPDF=f.type==="application/pdf";
    if(isPDF){
      if(!window.pdfjsLib){setError("PDF rendering library failed to load. Please refresh and try again.");return;}
      try{
        const buf=await f.arrayBuffer();
        const doc=await pdfjsLib.getDocument({data:buf}).promise;
        setPdfDoc(doc);
        if(doc.numPages===1){
          await renderPage(doc,1);
          setStage("crop");
        } else {
          const thumbs=[];
          for(let i=1;i<=doc.numPages;i++){
            const page=await doc.getPage(i);
            const viewport=page.getViewport({scale:0.3});
            const canvas=document.createElement("canvas");
            canvas.width=viewport.width;canvas.height=viewport.height;
            await page.render({canvasContext:canvas.getContext("2d"),viewport}).promise;
            thumbs.push({page:i,url:canvas.toDataURL()});
          }
          setPageThumbs(thumbs);
          setStage("pages");
        }
      }catch(err){setError("Could not read PDF: "+err.message);}
    } else if(f.type.startsWith("image/")){
      const url=URL.createObjectURL(f);
      setPageImageUrl(url);
      setStage("crop");
    } else {
      setError("Please upload a PDF or image file.");
    }
  };

  const renderPage=async(doc,pageNum)=>{
    const page=await doc.getPage(pageNum);
    const viewport=page.getViewport({scale:2});
    const canvas=document.createElement("canvas");
    canvas.width=viewport.width;canvas.height=viewport.height;
    await page.render({canvasContext:canvas.getContext("2d"),viewport}).promise;
    setPageImageUrl(canvas.toDataURL());
  };

  const choosePage=async(pageNum)=>{
    setSelectedPage(pageNum);
    await renderPage(pdfDoc,pageNum);
    setStage("crop");
  };

  const onImgLoad=()=>{
    const el=imgRef.current;
    if(!el)return;
    setImgNatural({w:el.naturalWidth,h:el.naturalHeight});
    // default crop box to 80% centered
    const dispW=el.clientWidth,dispH=el.clientHeight;
    setCrop({x:dispW*0.1,y:dispH*0.1,w:dispW*0.8,h:dispH*0.8});
  };

  const getRelPos=(e)=>{
    const rect=containerRef.current.getBoundingClientRect();
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    return{x:clientX-rect.left,y:clientY-rect.top};
  };

  const startDrag=(mode)=>(e)=>{
    e.preventDefault();e.stopPropagation();
    setDragMode(mode);
    setDragStart({...getRelPos(e),crop:{...crop}});
  };

  const onDrag=(e)=>{
    if(!dragMode||!dragStart)return;
    const pos=getRelPos(e);
    const dx=pos.x-dragStart.x,dy=pos.y-dragStart.y;
    const el=imgRef.current;
    const maxW=el.clientWidth,maxH=el.clientHeight;
    let{x,y,w,h}=dragStart.crop;
    if(dragMode==="move"){
      x=Math.max(0,Math.min(maxW-w,x+dx));
      y=Math.max(0,Math.min(maxH-h,y+dy));
    } else if(dragMode==="br"){
      w=Math.max(40,Math.min(maxW-x,w+dx));
      h=Math.max(40,Math.min(maxH-y,h+dy));
    } else if(dragMode==="tl"){
      const newX=Math.max(0,Math.min(x+w-40,x+dx));
      const newY=Math.max(0,Math.min(y+h-40,y+dy));
      w=w+(x-newX);h=h+(y-newY);x=newX;y=newY;
    }
    setCrop({x,y,w,h});
  };

  const endDrag=()=>{setDragMode(null);setDragStart(null);};

  const confirmCrop=async()=>{
    setStage("saving");
    try{
      const el=imgRef.current;
      const scaleX=el.naturalWidth/el.clientWidth;
      const scaleY=el.naturalHeight/el.clientHeight;
      const canvas=document.createElement("canvas");
      canvas.width=crop.w*scaleX;
      canvas.height=crop.h*scaleY;
      const ctx=canvas.getContext("2d");
      ctx.fillStyle="#fff";ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(el,crop.x*scaleX,crop.y*scaleY,crop.w*scaleX,crop.h*scaleY,0,0,canvas.width,canvas.height);
      const blob=await new Promise(res=>canvas.toBlob(res,"image/png"));
      const croppedFile=new File([blob],"lopa-crop.png",{type:"image/png"});
      const url=await uploadToCloudinary(croppedFile);
      const photos=(asset.photos||[]).filter(p=>p.label!=="LOPA");
      const updated=[...photos,{label:"LOPA",url,date:new Date().toISOString().split("T")[0]}];
      await saveAsset({...asset,photos:updated});
      notify("LOPA photo saved");
      onClose();
    }catch(err){
      setError("Failed to save crop: "+err.message);
      setStage("crop");
    }
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div className="card" style={{padding:20,maxWidth:900,width:"100%",maxHeight:"90vh",overflow:"auto",background:"#0b1520"}}>
        <div className="flj" style={{marginBottom:14}}>
          <div className="section-title" style={{margin:0}}>LOPA Crop Tool</div>
          <button className="btn btn-ghost" onClick={onClose}>✕ Close</button>
        </div>
        {error&&<div style={{color:"#f87171",fontSize:12,marginBottom:10}}>{error}</div>}

        {stage==="upload"&&(
          <div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:10}}>Upload the full LOPA file (PDF or image). You'll be able to pick a page and crop to just the cabin diagram.</div>
            <input type="file" accept=".pdf,image/*" onChange={handleFile}/>
          </div>
        )}

        {stage==="pages"&&(
          <div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:10}}>This PDF has multiple pages. Select the page with the cabin diagram.</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
              {pageThumbs.map(t=>(
                <div key={t.page} onClick={()=>choosePage(t.page)} style={{cursor:"pointer",border:"2px solid #1e3348",borderRadius:6,overflow:"hidden",width:140}}>
                  <img src={t.url} style={{width:"100%",display:"block"}}/>
                  <div style={{textAlign:"center",fontSize:11,color:"#94a3b8",padding:"4px 0",background:"#0d1925"}}>Page {t.page}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {stage==="crop"&&pageImageUrl&&(
          <div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:10}}>Drag the box to select just the cabin diagram. Drag corners to resize.</div>
            <div ref={containerRef} style={{position:"relative",display:"inline-block",maxWidth:"100%"}}
              onMouseMove={onDrag} onMouseUp={endDrag} onMouseLeave={endDrag}
              onTouchMove={onDrag} onTouchEnd={endDrag}>
              <img ref={imgRef} src={pageImageUrl} onLoad={onImgLoad} style={{maxWidth:"100%",display:"block",userSelect:"none"}} draggable={false}/>
              <div onMouseDown={startDrag("move")} onTouchStart={startDrag("move")}
                style={{position:"absolute",left:crop.x,top:crop.y,width:crop.w,height:crop.h,border:"2px solid #C9A84C",background:"rgba(201,168,76,0.15)",cursor:"move"}}>
                <div onMouseDown={startDrag("tl")} onTouchStart={startDrag("tl")} style={{position:"absolute",left:-6,top:-6,width:14,height:14,background:"#C9A84C",borderRadius:"50%",cursor:"nwse-resize"}}/>
                <div onMouseDown={startDrag("br")} onTouchStart={startDrag("br")} style={{position:"absolute",right:-6,bottom:-6,width:14,height:14,background:"#C9A84C",borderRadius:"50%",cursor:"nwse-resize"}}/>
              </div>
            </div>
            <div className="flab g8" style={{marginTop:14}}>
              <button className="btn btn-ghost" onClick={()=>{setStage("upload");setFile(null);setPageImageUrl(null);}}>Start Over</button>
              <button className="btn btn-gold" onClick={confirmCrop}>Save Crop as LOPA</button>
            </div>
          </div>
        )}

        {stage==="saving"&&<div style={{textAlign:"center",padding:30,color:"#64748b"}}>Saving crop...</div>}
      </div>
    </div>
  );
}

function PhotoManager({asset, saveAsset, notify, label="photos", field="photos"}) {
  const [uploading, setUploading] = useState(false);
  const [photoLabel, setPhotoLabel] = useState('Airframe');
  const [lopaToolOpen, setLopaToolOpen] = useState(false);
  const photos = asset[field] || [];

  const handleUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setUploading(true);
    try {
      const url = await uploadToCloudinary(file);
      const updated = [...photos, {label: photoLabel, url, date: new Date().toISOString().split('T')[0]}];
      await saveAsset({...asset, [field]: updated});
      notify(`${photoLabel} photo uploaded`);
    } catch(err) {
      notify('Upload failed: ' + err.message, 'error');
    }
    setUploading(false);
  };

  const deletePhoto = async (i) => {
    if (!confirm('Delete photo?')) return;
    const updated = photos.filter((_,idx) => idx !== i);
    await saveAsset({...asset, [field]: updated});
    notify('Photo deleted');
  };

  return (
    <div>
      <div className="flab g8" style={{marginBottom:12,flexWrap:'wrap'}}>
        <select value={photoLabel} onChange={e=>setPhotoLabel(e.target.value)} style={{width:160}}>
          {['Airframe','LOPA','Cabin','Flight Deck','Passenger Seat','Galley G1','Galley G2','Galley G3','Engine','Landing Gear','Documents','Other'].map(l=>(
            <option key={l}>{l}</option>
          ))}
        </select>
        <label style={{cursor:'pointer'}}>
          <input type="file" accept="image/*" onChange={handleUpload} style={{display:'none'}}/>
          <span className="btn btn-primary" style={{padding:'7px 14px',fontSize:12}}>
            {uploading ? '⏳ Uploading…' : '+ Upload Photo'}
          </span>
        </label>
        <button className="btn btn-ghost" style={{padding:'7px 14px',fontSize:12}} onClick={()=>setLopaToolOpen(true)}>
          ✂️ Crop LOPA from File
        </button>
      </div>
      {lopaToolOpen&&<LopaCropTool asset={asset} saveAsset={saveAsset} notify={notify} onClose={()=>setLopaToolOpen(false)}/>}
      {photos.length === 0 && <div style={{color:'#475569',fontSize:12,fontStyle:'italic',padding:'8px 0'}}>No photos uploaded yet.</div>}
      <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
        {photos.map((p,i) => (
          <div key={i} style={{background:'#0d1925',borderRadius:6,overflow:'hidden',border:'1px solid #1e3348',width:120}}>
            <img src={p.url} alt={p.label} style={{width:'100%',height:70,objectFit:'cover',display:'block'}}/>
            <div style={{padding:'5px 7px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontSize:10,color:'#94a3b8',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:70}}>{p.label}</div>
              <button className="btn-danger btn" style={{fontSize:9,padding:'1px 5px'}} onClick={()=>deletePhoto(i)}>✕</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}


function CheckDateInput({val,onCommit,yrs}){
  const toDisplay=(s)=>{if(!s)return"";if(/^\d{2}\/\d{2}\/\d{4}$/.test(s))return s;try{const dt=new Date(s);if(isNaN(dt))return"";return String(dt.getDate()).padStart(2,"0")+"/"+String(dt.getMonth()+1).padStart(2,"0")+"/"+dt.getFullYear();}catch{return"";}};
  const toISO=(s)=>{const m=/^(\d{2})\/(\d{2})\/(\d{4})$/.exec(s);if(m)return m[3]+"-"+m[2]+"-"+m[1];return null;};
  const plus=(s,y)=>{const m=/^(\d{2})\/(\d{2})\/(\d{4})$/.exec(s);if(!m)return null;return m[1]+"/"+m[2]+"/"+(+m[3]+y);};
  const isoPlus=(isoStr,y)=>{if(!isoStr)return null;const dt=new Date(isoStr);if(isNaN(dt))return null;dt.setFullYear(dt.getFullYear()+y);return dt.toISOString().split("T")[0];};
  const[local,setLocal]=useState(toDisplay(val)||"");
  useEffect(()=>{setLocal(toDisplay(val)||"");},[val]);
  const fmt=(raw)=>{const n=raw.replace(/\D/g,"").slice(0,8);if(n.length<=2)return n;if(n.length<=4)return n.slice(0,2)+"/"+n.slice(2);return n.slice(0,2)+"/"+n.slice(2,4)+"/"+n.slice(4);};
  const handleChange=(raw)=>setLocal(fmt(raw));
  const handleBlur=()=>{
    const iso=toISO(local);
    if(iso){const nextISO=yrs?isoPlus(iso,yrs):null;onCommit(iso,nextISO);}
    else if(!local){onCommit("",null);}
  };
  return<input type="text" placeholder="DDMMYYYY" value={local} onChange={e=>handleChange(e.target.value)} onBlur={handleBlur} style={{width:130}}/>;
}


function SpecsQuickImport({asset,saveAsset,notify,open}){
  const[file,setFile]=useState(null);
  const[extracting,setExtracting]=useState(false);
  const[error,setError]=useState(null);
  const[extracted,setExtracted]=useState(null);

  const handleFile=e=>{const f=e.target.files?.[0];if(f){setFile(f);setExtracted(null);setError(null);}};

  const extract=async()=>{
    if(!file)return;
    const isPDF=file.type==="application/pdf";
    const isExcel=file.type==="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"||file.type==="application/vnd.ms-excel"||file.name.endsWith(".xlsx")||file.name.endsWith(".xls");
    const isImage=file.type.startsWith("image/");
    if(!isPDF&&!isExcel&&!isImage){setError("Unsupported file type. Please upload a PDF, Excel file, or image/screenshot.");return;}
    if(file.size>10*1024*1024){setError("File is too large (maximum 10 MB).");return;}
    setExtracting(true);setError(null);
    try{
      const prompt="Extract aircraft specification data from this document or image. Only extract fields that are clearly present — do not guess or invent values. Return ONLY valid JSON, no markdown:\n{\"dom\":\"MM/YYYY string or null\",\"operator\":\"string or null\",\"weights\":{\"mtow\":number_or_null,\"mtow_lb\":number_or_null,\"mtw\":number_or_null,\"mtw_lb\":number_or_null,\"mzfw\":number_or_null,\"mzfw_lb\":number_or_null,\"mlw\":number_or_null,\"mlw_lb\":number_or_null},\"checks\":[{\"name\":\"e.g. 6 Year Check or 12 Year Check\",\"lastDate\":\"DD/MM/YYYY or null\",\"lastFH\":number_or_null,\"lastFC\":number_or_null,\"nextDate\":\"DD/MM/YYYY or null\"}],\"specs\":{\"config\":\"string or null\",\"seatConfig\":\"string or null\",\"seatMfr\":\"string or null\",\"attendantSeats\":\"string or null\",\"galleys\":\"string or null\",\"lavs\":\"string or null\",\"cargoType\":\"string or null\",\"adsb\":true_false_or_null,\"cpdlc\":true_false_or_null,\"tcas\":true_false_or_null,\"cdss\":true_false_or_null}}";
      let resp;
      if(isPDF){
        const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej(new Error("Could not read the file."));r.readAsDataURL(file);});
        resp=await fetch("/api/extract",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:2000,messages:[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}},{type:"text",text:prompt}]}]})});
      } else if(isImage){
        const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej(new Error("Could not read the file."));r.readAsDataURL(file);});
        resp=await fetch("/api/extract",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:2000,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type,data:base64}},{type:"text",text:prompt}]}]})});
      } else {
        const arrayBuffer=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(new Error("Could not read the file."));r.readAsArrayBuffer(file);});
        let csvText;
        try{
          const wb=XLSX.read(new Uint8Array(arrayBuffer),{type:"array"});
          csvText=wb.SheetNames.map(name=>"Sheet: "+name+"\n"+XLSX.utils.sheet_to_csv(wb.Sheets[name],{skipHidden:true})).join("\n\n");
        }catch(xlsxErr){throw new Error("Could not parse the Excel file.");}
        resp=await fetch("/api/extract",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:2000,messages:[{role:"user",content:[{type:"text",text:"The following is the contents of an Excel spreadsheet exported as CSV.\n\n"+csvText+"\n\n"+prompt}]}]})});
      }
      if(!resp.ok)throw new Error("Extraction request failed (error "+resp.status+"). Please try again.");
      const result=await resp.json();
      if(result.error)throw new Error("Extraction failed. Please check the file and try again.");
      let parsed;
      try{
        const rawParsed=result.ok?result.data:JSON.parse((result.raw||"").replace(/```json|```/g,"").trim());
        parsed=Array.isArray(rawParsed)?rawParsed[rawParsed.length-1]:rawParsed;
      }catch(parseErr){throw new Error("Could not extract structured data from this file. Try a clearer image or a different file.");}
      setExtracted(parsed);
    }catch(err){
      setError(err.message||"Extraction failed.");
    }
    setExtracting(false);
  };

  const fieldList=()=>{
    if(!extracted)return[];
    const list=[];
    if(extracted.dom)list.push(["Date of Manufacture (Overview)","dom",extracted.dom]);
    if(extracted.operator)list.push(["Current Operator (Overview)","operator",extracted.operator]);
    const w=extracted.weights||{};
    [["mtow","MTOW (kg)"],["mtow_lb","MTOW (lb)"],["mtw","Max Taxi (kg)"],["mtw_lb","Max Taxi (lb)"],["mzfw","MZFW (kg)"],["mzfw_lb","MZFW (lb)"],["mlw","MLW (kg)"],["mlw_lb","MLW (lb)"]].forEach(([k,l])=>{
      if(w[k]!=null)list.push([l,"weights."+k,w[k]]);
    });
    (extracted.checks||[]).forEach((c,i)=>{
      if(c.lastDate)list.push([c.name+" — Last Date","checks."+i+".lastDate",c.lastDate]);
      if(c.lastFH!=null)list.push([c.name+" — Last TSN","checks."+i+".lastFH",c.lastFH]);
      if(c.lastFC!=null)list.push([c.name+" — Last CSN","checks."+i+".lastFC",c.lastFC]);
      if(c.nextDate)list.push([c.name+" — Next Due","checks."+i+".nextDate",c.nextDate]);
    });
    const s=extracted.specs||{};
    [["config","Configuration"],["seatConfig","Passenger Seating Config"],["seatMfr","Passenger Seating Manufacturer"],["attendantSeats","Attendant Seats"],["galleys","Galleys"],["lavs","Lavatories"],["cargoType","Cargo Type"]].forEach(([k,l])=>{
      if(s[k])list.push([l,"specs."+k,s[k]]);
    });
    [["adsb","ADS-B"],["cpdlc","CPDLC"],["tcas","TCAS 7.1"],["cdss","Cockpit Door Surveillance System"]].forEach(([k,l])=>{
      if(s[k]!=null)list.push([l,"specs."+k,s[k]?"Installed":"Not Installed"]);
    });
    return list;
  };

  const normalizeDate=(s)=>{
    if(!s)return s;
    // Already ISO
    if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
    // DD/MM/YYYY -> ISO
    const m=/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/.exec(s);
    if(m)return m[3]+"-"+m[2].padStart(2,"0")+"-"+m[1].padStart(2,"0");
    // Try generic Date parse as last resort, only if it produces a valid date
    const dt=new Date(s);
    if(!isNaN(dt))return dt.toISOString().split("T")[0];
    return null; // unparseable - don't write garbage
  };

  const applyAll=async()=>{
    const f=JSON.parse(JSON.stringify(asset));
    if(extracted.dom)f.dom=extracted.dom;
    if(extracted.operator)f.operator=extracted.operator;
    const w=extracted.weights||{};
    if(!f.weights)f.weights={};
    Object.keys(w).forEach(k=>{if(w[k]!=null)f.weights[k]=w[k];});
    if(extracted.checks?.length){
      if(!f.checks||!f.checks.length)f.checks=extracted.checks.map(c=>({name:c.name,lastDate:"",lastFH:0,lastFC:0,nextDate:""}));
      extracted.checks.forEach((ec,i)=>{
        let target=f.checks.find(fc=>fc.name===ec.name)||f.checks[i];
        if(!target)return;
        if(ec.lastDate){const norm=normalizeDate(ec.lastDate);if(norm)target.lastDate=norm;}
        if(ec.lastFH!=null)target.lastFH=ec.lastFH;
        if(ec.lastFC!=null)target.lastFC=ec.lastFC;
        if(ec.nextDate){const norm=normalizeDate(ec.nextDate);if(norm)target.nextDate=norm;}
      });
    }
    const s=extracted.specs||{};
    if(!f.specs)f.specs={};
    Object.keys(s).forEach(k=>{if(s[k]!=null)f.specs[k]=s[k];});
    await saveAsset(f);
    notify("Specs data imported");
    setExtracted(null);setFile(null);
  };

  return(
    <div className="card" style={{padding:16,marginBottom:16,gridColumn:"1/-1"}}>
      {open&&<div>
        <div style={{fontSize:11,color:"#64748b",marginBottom:10}}>Upload a tech spec PDF, Excel sheet, or screenshot. Claude will extract Date of Manufacture, Operator, Weights, Check History, and Specifications fields for review before saving. Engines, APU, and Landing Gear are not covered here — use their dedicated uploaders.</div>
        <div className="flab g8" style={{marginBottom:10}}>
          <input type="file" accept=".pdf,.xlsx,.xls,image/*" onChange={handleFile}/>
          <button className="btn btn-primary" disabled={!file||extracting} onClick={extract}>{extracting?"Extracting...":"Extract"}</button>
        </div>
        {error&&<div style={{color:"#f87171",fontSize:12,marginBottom:10}}>{error}</div>}
        {extracted&&(()=>{
          const w=extracted.weights||{};
          const hasWeights=["mtow","mtw","mzfw","mlw"].some(k=>w[k]!=null||w[k+"_lb"]!=null);
          const checks=extracted.checks||[];
          const s=extracted.specs||{};
          const overviewRows=[];
          if(extracted.dom)overviewRows.push(["Date of Manufacture",extracted.dom]);
          if(extracted.operator)overviewRows.push(["Current Operator",extracted.operator]);
          const specRows=[];
          [["config","Configuration"],["seatConfig","Passenger Seating Config"],["seatMfr","Passenger Seating Manufacturer"],["attendantSeats","Attendant Seats"],["galleys","Galleys"],["lavs","Lavatories"],["cargoType","Cargo Type"]].forEach(([k,l])=>{
            if(s[k])specRows.push([l,s[k]]);
          });
          [["adsb","ADS-B"],["cpdlc","CPDLC"],["tcas","TCAS 7.1"],["cdss","Cockpit Door Surveillance System"]].forEach(([k,l])=>{
            if(s[k]!=null)specRows.push([l,s[k]?"Installed":"Not Installed"]);
          });
          const nothingFound=!overviewRows.length&&!hasWeights&&!checks.length&&!specRows.length;
          return(
            <div style={{background:"#0d1925",borderRadius:6,padding:12}}>
              <div style={{fontSize:11,fontWeight:700,color:"#C9A84C",textTransform:"uppercase",marginBottom:10}}>Detected Fields — Review Before Saving</div>
              {nothingFound?<div style={{color:"#475569",fontStyle:"italic",fontSize:12}}>No recognisable fields found in this file.</div>:(
              <div className="grid2" style={{gap:12}}>
                {overviewRows.length>0&&<div className="card" style={{padding:12,gridColumn:"1/-1"}}>
                  <div className="section-title">Overview</div>
                  <table><tbody>{overviewRows.map(([l,v],i)=>(<tr key={i}><td style={{color:"#64748b"}}>{l}</td><td style={{fontWeight:600}}>{v}</td></tr>))}</tbody></table>
                </div>}
                {hasWeights&&<div className="card" style={{padding:12}}>
                  <div className="section-title">Operating Weights</div>
                  <table><thead><tr><th>Parameter</th><th>kg</th><th>lb</th></tr></thead><tbody>
                    {[["MTOW","mtow","mtow_lb"],["Max Taxi","mtw","mtw_lb"],["MZFW","mzfw","mzfw_lb"],["MLW","mlw","mlw_lb"]].map(([l,k,klb])=>(
                      (w[k]!=null||w[klb]!=null)?<tr key={k}><td style={{color:"#64748b"}}>{l}</td><td>{w[k]!=null?w[k].toLocaleString():"—"}</td><td style={{color:"#475569"}}>{w[klb]!=null?w[klb].toLocaleString():"—"}</td></tr>:null
                    ))}
                  </tbody></table>
                </div>}
                {specRows.length>0&&<div className="card" style={{padding:12}}>
                  <div className="section-title">Specifications</div>
                  <table><tbody>{specRows.map(([l,v],i)=>(<tr key={i}><td style={{color:"#64748b"}}>{l}</td><td style={{fontWeight:600}}>{v}</td></tr>))}</tbody></table>
                </div>}
                {checks.length>0&&<div className="card" style={{padding:12,gridColumn:"1/-1"}}>
                  <div className="section-title">Check History</div>
                  <table><thead><tr><th>Check</th><th>Last Date</th><th>Last TSN</th><th>Last CSN</th><th>Next Due</th></tr></thead><tbody>

function UploadView({assets,saveAsset,notify}){
  const[uploadType,setUploadType]=useState("util");
  const[file,setFile]=useState(null);
  const[extracting,setExtracting]=useState(false);
  const[extracted,setExtracted]=useState(null);
  const[error,setError]=useState(null);
  const[done,setDone]=useState(false);
  const[matchedAsset,setMatchedAsset]=useState(null);
  const[instructions,setInstructions]=useState("");
  const[showInstructions,setShowInstructions]=useState(false);

  const handleFile=e=>{const f=e.target.files?.[0];if(f){setFile(f);setExtracted(null);setError(null);setDone(false);}};

const extract=async()=>{
    if(!file)return;
    const isPDF=file.type==="application/pdf";
    const isExcel=file.type==="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"||file.type==="application/vnd.ms-excel"||file.name.endsWith(".xlsx")||file.name.endsWith(".xls");
    if(!isPDF&&!isExcel){setError("Unsupported file type. Please upload a PDF or Excel (.xlsx / .xls) file.");return;}
    if(file.size>10*1024*1024){setError("File is too large (maximum 10 MB). Please check you have selected the correct file.");return;}
    setExtracting(true);setError(null);
    try{
      const basePrompt=uploadType==="llp"
        ?"Extract engine LLP data from this document. Process each section (FAN, HPC, HPT, LPT) separately. For each LLP row, read left to right: first the LLP DESCRIPTION (e.g. FAN DISK, BOOSTER SPOOL, FAN SHAFT — each row has a unique description, do not repeat), then PART NUMBER, then SERIAL NUMBER. The remaining cycles value is in the RIGHTMOST column group labelled REMAINING CYCLES — identify the engine variant sub-column from the engine type at the top of the document (e.g. CFM56-5B4/P = use 5B4/P sub-column). Each data row corresponds to exactly one description row — match them by row position. Exclude rows where remaining cycles is N/L, N/A, or non-numeric — this includes cells that mix a number with extra wording (e.g. \"2290 to insp. (non LLP)\" is non-numeric and must be excluded, not read as 2290). All TSN and FH values must be formatted as HH:MM strings. You may reason through the table section by section before answering. Once you have finished reasoning, output the final result as a single fenced code block starting with ```json and ending with ``` — this fenced block must contain ONLY the JSON object below and nothing else inside the fences:\n{\"msn\":\"string\",\"registration\":\"string\",\"engines\":[{\"position\":\"LH or RH\",\"esn\":\"string\",\"engine_type\":\"string\",\"variant\":\"string\",\"csn\":number,\"tsn\":number,\"llps\":[{\"desc\":\"string\",\"pn\":\"string\",\"sn\":\"string\",\"fc_remaining\":number}]}]}"
        :uploadType==="apu_llp"
        ?"Extract APU LLP data ONLY from this document. The APU serial number is labelled SERIAL NUMBER. The fc_remaining value for each LLP must come from the RESIDUAL LIFE - CYS column, not the TOTAL LIFE column. Return ONLY valid JSON, no markdown:\n{\"msn\":\"string or null if not present\",\"registration\":\"string or null if not present\",\"apu\":{\"sn\":\"string\",\"csn\":number,\"llps\":[{\"desc\":\"string\",\"pn\":\"string\",\"sn\":\"string\",\"fc_remaining\":number}]}}"
       :"Extract ALL data from this aircraft utilisation report. This report has separate columns for ENGINE Position 1, ENGINE Position 2, and APU — they are three distinct components, each with their own S/N, TSN, CSN, and FH/FC figures. Do not confuse the APU column with an engine position. Some aircraft only have data for ONE engine position in this report — the single engine may be reported under EITHER Position 1 OR Position 2, so check both columns rather than assuming Position 1 is always populated. Whichever position column is blank or absent, set that entire engine value to null (either \"engine1\" or \"engine2\", whichever is blank) — do not copy APU figures or any other column into a blank engine position, and do not invent placeholder values. All TSN and FH values must be formatted as HH:MM strings. Return ONLY valid JSON, no markdown:\n{\"month_year\":\"e.g. May 2026\",\"operator\":\"string\",\"msn\":\"string\",\"registration\":\"string\",\"airframe\":{\"fh_period\":\"HH:MM\",\"fc_period\":number,\"tsn\":\"HH:MM\",\"csn\":number},\"engine1\":{\"model\":\"string\",\"sn\":\"string\",\"tsn\":\"HH:MM\",\"csn\":number,\"fh_period\":\"HH:MM\",\"fc_period\":number} or null if Position 1 is blank in the report,\"engine2\":{\"model\":\"string\",\"sn\":\"string\",\"tsn\":\"HH:MM\",\"csn\":number,\"fh_period\":\"HH:MM\",\"fc_period\":number} or null if Position 2 is blank in the report,\"apu\":{\"sn\":\"string\",\"tsn\":\"HH:MM\",\"csn\":number},\"landing_gear\":{\"nose\":{\"pn\":\"string\",\"sn\":\"string\",\"csn\":number},\"left\":{\"pn\":\"string\",\"sn\":\"string\",\"csn\":number},\"right\":{\"pn\":\"string\",\"sn\":\"string\",\"csn\":number}},\"removals\":[{\"component\":\"engine or landing_gear or apu\",\"sn\":\"string\",\"position\":\"string\",\"date\":\"string\",\"reason\":\"string\",\"tsn_at_removal\":\"HH:MM\",\"csn_at_removal\":number,\"mro\":\"string\"}]}"
      const prompt=instructions?basePrompt+" Additional instructions: "+instructions:basePrompt;
      // LLP sheets are dense, repetitive tables — use Sonnet for stronger table-tracking accuracy.
      // Everything else (utilisation reports, APU LLP, specs import) stays on Haiku.
      const extractModel=uploadType==="llp"?"claude-sonnet-4-6":"claude-haiku-4-5-20251001";
      let resp;
      if(isPDF){
        const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej(new Error("Could not read the file. Please try again."));r.readAsDataURL(file);});
        resp=await fetch("/api/extract",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:extractModel,max_tokens:4000,messages:[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}},{type:"text",text:prompt}]}]})});
      } else {
        const arrayBuffer=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(new Error("Could not read the file. Please try again."));r.readAsArrayBuffer(file);});
        let csvText;
        try{
          const wb=XLSX.read(new Uint8Array(arrayBuffer),{type:"array"});
          csvText=wb.SheetNames.map(name=>"Sheet: "+name+"\n"+XLSX.utils.sheet_to_csv(wb.Sheets[name],{skipHidden:true})).join("\n\n");
        }catch(xlsxErr){
          throw new Error("Could not parse the Excel file. Please check the file is not corrupted and try again.");
        }
        resp=await fetch("/api/extract",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:extractModel,max_tokens:4000,messages:[{role:"user",content:[{type:"text",text:"The following is the contents of an Excel spreadsheet exported as CSV. This is the most recent month's data.\n\n"+csvText+"\n\n"+prompt}]}]})});
      }
      if(!resp.ok){
        const status=resp.status;
        if(status===401||status===403)throw new Error("Authentication error with the AI service. Please contact your administrator.");
        if(status===429)throw new Error("Too many requests — please wait a moment and try again.");
        if(status>=500)throw new Error("The extraction service is temporarily unavailable. Please try again in a few minutes.");
        throw new Error("Extraction request failed (error "+status+"). Please try again.");
      }
      let result;
      try{result=await resp.json();}catch(jsonErr){throw new Error("Received an unexpected response from the server. Please try again.");}
      if(result.error){
        const msg=result.error;
        if(msg.includes("credit")||msg.includes("billing"))throw new Error("AI service billing issue — please contact your administrator.");
        if(msg.includes("overloaded")||msg.includes("capacity"))throw new Error("The AI service is busy right now. Please wait a moment and try again.");
        throw new Error("Extraction failed. Please check the file is a valid report and try again.");
      }
      let parsed;
      try{
      const rawParsed=result.ok?result.data:JSON.parse((result.raw||"").replace(/```json|```/g,"").trim());
  parsed=Array.isArray(rawParsed)?rawParsed[rawParsed.length-1]:rawParsed;
}catch(parseErr){
        throw new Error("The AI could not extract structured data from this file. Check it is the correct report type, or try adding specific instructions above.");
      }
      
      setExtracted({parsed,fileName:file.name});
    }catch(err){
      const msg=err.message||"";
      if(msg.startsWith("{")||msg.includes('"error"')){
        setError("Extraction failed. Please check the file is a valid report and try again.");
      } else {
        setError(msg);
      }
    }
    setExtracting(false);
  };

  const confirmSave=async()=>{
    const d=extracted.parsed;
    const msn=d.msn?.toString().replace(/^0+/,"");
    const previousAsset=assets.find(a=>a.msn?.toString().replace(/^0+/,"")===msn)||null;

    const result=window.processUtilisationReport({newReport:d,previousAsset});

    if(result.historyOnly){
      // Out-of-order / duplicate-period upload: per product decision, this is
      // saved into history only and must never overwrite live asset state.
      await db.saveUtilisation(result.utilisationRecord);
      setExtracted(prev=>({...prev,warnings:result.warnings}));
      setDone(true);
      return;
    }

    await saveAsset(result.mergedAsset);
    await db.saveUtilisation(result.utilisationRecord);

    if(result.isNewAsset){
      setDone(true);notify(`MSN ${msn} created from ${d.month_year} report`);return;
    }

    if(result.warnings.length){
      setExtracted(prev=>({...prev,warnings:result.warnings}));
      setDone(true);
    } else {
      setDone(true);
      notify(`MSN ${msn} updated for ${d.month_year}`);
    }
  };

  const confirmLLP=async()=>{
    const d=extracted.parsed;
    const msn=d.msn?.toString().replace(/^0+/,"");
let asset=assets.find(a=>a.msn?.toString().replace(/^0+/,"")===msn);
if(!asset){
  const esnList=(d.engines||[]).map(e=>e.esn).filter(Boolean);
  if(esnList.length){asset=assets.find(a=>(a.engines||[]).some(e=>esnList.includes(e.sn)));}
}
if(!asset&&d.apu?.sn){asset=assets.find(a=>a.apu?.sn&&a.apu.sn===d.apu.sn);}
if(!asset){setError("Could not match this LLP sheet to any aircraft. Check the file contains a recognisable MSN, engine S/N, or APU S/N.");return;}
    setMatchedAsset(asset);
    // Handle engine LLPs
    const engines=JSON.parse(JSON.stringify(asset.engines||[]));
   (d.engines||[]).forEach(eng=>{
  if(!eng.esn)return;
  const matchIdx=(asset.engines||[]).findIndex(e=>e.sn===eng.esn);
  if(matchIdx===-1)return;
  const idx=matchIdx;
  if(engines[idx]){
    engines[idx].sn=eng.esn||engines[idx].sn;
    engines[idx].type=eng.engine_type||engines[idx].type;
    const refCSN=eng.csn||0;
    engines[idx].llps=(eng.llps||[]).map(l=>({desc:l.desc,pn:l.pn,sn:l.sn,startFCRem:l.fc_remaining,refFC:refCSN}));
  }
});

    // Handle APU LLPs
    let apu=JSON.parse(JSON.stringify(asset.apu||{}));
    if(d.apu?.llps?.length){
      const refCSN=d.apu.csn||0;
      if(d.apu.sn)apu.sn=d.apu.sn;
      // If no currentFC yet, initialise from LLP sheet CSN
      if(!apu.currentFC&&d.apu.csn)apu.currentFC=d.apu.csn;
      apu.llps=(d.apu.llps||[]).map(l=>({desc:l.desc,pn:l.pn,sn:l.sn,startFCRem:l.fc_remaining,refFC:refCSN}));
    }

    const hasEngines=(d.engines||[]).length>0;
    const hasAPU=d.apu?.llps?.length>0;

    await saveAsset({...asset,engines,apu});
    setDone(true);
    notify(`LLP data saved for MSN ${msn}${hasEngines&&hasAPU?" (engines + APU)":hasAPU?" (APU)":""}`);
  };

                    ["Eng 1 S/N",extracted.parsed.engine1?.sn,prev?.engines?.[0]?.sn,false,true],
                    ["Eng 1 TSN",extracted.parsed.engine1?.tsn,prev?.engines?.[0]?.currentFH?fmtHHMM(prev.engines[0].currentFH):null,false,false],
                    ["Eng 1 CSN",extracted.parsed.engine1?.csn,prev?.engines?.[0]?.currentFC,true,false],

                    ["Eng 2 TSN",extracted.parsed.engine2?.tsn,prev?.engines?.[1]?.currentFH?fmtHHMM(prev.engines[1].currentFH):null,false,false],
                    ["Eng 2 CSN",extracted.parsed.engine2?.csn,prev?.engines?.[1]?.currentFC,true,false],

                    ["APU CSN",extracted.parsed.apu?.csn,prev?.apu?.currentFC,true,false]
                  ];
                  return rows.map(([l,v,prevV,isNum,isSN])=>{
                    const changed=isSN&&prevV&&v&&String(v)!==String(prevV);
                    const delta=isNum&&v&&prevV?v-prevV:null;
                    const deltaCol=delta===null?"#475569":delta<0?"#f87171":delta>500?"#fbbf24":"#34d399";
                    return<div key={l} className="flj" style={{padding:"5px 6px",borderBottom:"1px solid #1e3048",background:changed?"#2a1400":"transparent",borderRadius:3}}>
                      <span style={{fontSize:11,color:"#5a7a9a"}}>{l}</span>
                      <div style={{textAlign:"right"}}>
                        <span style={{fontSize:12,fontWeight:700,color:changed?"#fbbf24":"#f1f5f9"}}>{v?.toString()||"—"}</span>
                        {changed&&<span style={{fontSize:10,color:"#f87171",marginLeft:6}}>⚠ changed</span>}
                        {delta!==null&&<span style={{fontSize:10,color:deltaCol,marginLeft:6}}>{delta>0?"+":""}{delta}</span>}
                      </div>
                    </div>;
                  });
                })()}
              </div>
              {(()=>{
                const msn=(extracted.parsed.msn||"").toString().replace(/^0+/,"");
                const prev=assets.find(a=>a.msn?.toString().replace(/^0+/,"")===msn)||null;
                if(!prev)return null;
                // Use Brain 1's actual verdict so this banner can never disagree
                // with what Confirm & Save is about to do.
                const preview=window.processUtilisationReport({newReport:extracted.parsed,previousAsset:prev});
                const dc=preview.deltaCheck;
                if(dc.status==="first_report")return null;
                const isProblem=dc.status==="mismatch"||dc.status==="out_of_order";
                const isInfo=dc.status==="gap_detected";
                const bg=isProblem?"#2a0e0e":isInfo?"#2a1f0a":"#0d2818";
                const border=isProblem?"#7f1d1d":isInfo?"#92660a":"#166534";
                const fg=isProblem?"#f87171":isInfo?"#fbbf24":"#34d399";
                const headline=dc.status==="out_of_order"
                  ?"⚠ Out-of-order upload — this period predates the asset's current data. Will be saved to history only; live state will not change."
                  :dc.status==="mismatch"
                  ?"⚠ Delta mismatch — check report figures"
                  :dc.status==="gap_detected"
                  ?`⚠ Gap detected — ${dc.monthsGap} months since last report. Tolerance widened accordingly.`
                  :"✓ Delta verified — period figures match report";
                return<div style={{gridColumn:"1/-1",background:bg,border:`1px solid ${border}`,borderRadius:6,padding:"8px 12px"}}>
                  <div style={{fontSize:11,fontWeight:700,color:fg}}>{headline}</div>
                  {dc.fc.calc!==null&&<div style={{fontSize:10,color:"#64748b",marginTop:2}}>
                    FC delta: {dc.fc.calc} · Period FC: {dc.fc.reported??"—"} {dc.fc.match===false?"⚠":dc.fc.match===true?"✓":""}
                  </div>}
                  {dc.fh.calc!==null&&<div style={{fontSize:10,color:"#64748b"}}>
                    FH delta: {fmtHHMM(dc.fh.calc)} · Period FH: {extracted.parsed.airframe?.fh_period||"—"} {dc.fh.match===false?"⚠":dc.fh.match===true?"✓":""}
                  </div>}
                </div>;
              })()}
            </div>
          )}
          <div className="flj" style={{marginTop:16,paddingTop:14,borderTop:"1px solid #1e3048"}}>
            <button className="btn btn-ghost" onClick={()=>{setExtracted(null);setFile(null);}}>Discard</button>
            <button className="btn btn-gold" onClick={uploadType==="util"?confirmSave:confirmLLP}>✓ Confirm & Save</button>
          </div>
        </div>
      )}
      {done&&(
        <div style={{background:"#0d2818",border:"1px solid #166534",borderRadius:8,padding:24,textAlign:"center"}}>
          <div style={{fontSize:36,marginBottom:8}}>✅</div>
          <div style={{fontWeight:700,color:"#34d399",fontSize:16,marginBottom:10}}>Saved successfully</div>
          {extracted?.warnings?.length>0&&(
            <div style={{background:"#2a1f0a",border:"1px solid #78350f",borderRadius:6,padding:12,marginBottom:14,textAlign:"left"}}>
              <div style={{fontSize:11,fontWeight:700,color:"#fbbf24",marginBottom:6}}>⚠ Flags to review:</div>
              {extracted.warnings.map((w,i)=>(
                <div key={i} style={{fontSize:12,color:"#fcd34d",marginBottom:4,lineHeight:1.5}}>{w}</div>
              ))}
            </div>
          )}
          <button className="btn btn-ghost" onClick={()=>{setFile(null);setExtracted(null);setDone(false);}}>Upload Another</button>
        </div>
      )}
    </div>
  );
}


function EnginePhotoSettings({notify}) {
  const [photos, setPhotos] = useState({v2500: null, cfm56: null});
  const [uploading, setUploading] = useState(null);

  useEffect(() => {
    db.getSetting('engine_photo_v2500').then(v => { if(v) setPhotos(p => ({...p, v2500: v})); });
    db.getSetting('engine_photo_cfm56').then(v => { if(v) setPhotos(p => ({...p, cfm56: v})); });
  }, []);

  const handleUpload = async (type, file) => {
    if (!file) return;
    setUploading(type);
    try {
      const url = await uploadToCloudinary(file);
      await db.setSetting(`engine_photo_${type}`, url);
      setPhotos(p => ({...p, [type]: url}));
      notify(`${type.toUpperCase()} photo updated`);
    } catch(err) {
      notify('Upload failed: ' + err.message, 'error');
    }
    setUploading(null);
  };

  return (
    <div className="grid2" style={{gap:16}}>
      {[['v2500','V2500 / IAE'],['cfm56','CFM56']].map(([type, label]) => (
        <div key={type} style={{background:'#0d1925',borderRadius:8,overflow:'hidden',border:'1px solid #1e3348'}}>
          {photos[type]
            ? <img src={photos[type]} alt={label} style={{width:'100%',height:140,objectFit:'cover',display:'block'}}/>
            : <div style={{width:'100%',height:140,background:'#0a1620',display:'flex',alignItems:'center',justifyContent:'center',color:'#475569',fontSize:12}}>No photo</div>
          }
          <div style={{padding:'10px 12px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:12,fontWeight:600,color:'#e2e8f0'}}>{label}</span>
            <label style={{cursor:'pointer'}}>
              <input type="file" accept="image/*" onChange={e=>handleUpload(type,e.target.files?.[0])} style={{display:'none'}}/>
              <span className="btn btn-primary" style={{fontSize:11,padding:'5px 10px'}}>
                {uploading===type ? '⏳ Uploading…' : photos[type] ? 'Replace' : 'Upload'}
              </span>
            </label>
          </div>
        </div>
      ))}
    </div>
  );
}
